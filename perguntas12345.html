<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador Estácio - Final Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --p: #004a8d; --s: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; }
        .container { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: #fff; padding: 25px; margin-bottom: 25px; border-radius: 8px; border-left: 8px solid var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .opt { padding: 12px; border: 1px solid #eee; margin-top: 8px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .opt:hover { background: #f1f8ff; }
        .opt.sel { background: #d1e7ff; border-color: var(--p); font-weight: bold; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
        #status { font-weight: bold; color: var(--p); display: none; text-align: center; padding: 10px; background: #eef6ff; border-radius: 5px; }
        button { padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="color:var(--p); margin:0;">IA Estácio</h2>
    <p style="font-size: 0.9rem; color: #666;">Chave configurada. Selecione seus PDFs e gere a prova.</p>
    
    <label><strong>Arquivos PDF:</strong></label>
    <input type="file" id="pdfFile" accept="application/pdf" multiple>
    
    <button style="background:var(--p)" onclick="gerar()">GERAR 50 QUESTÕES</button>
    <div id="status">⌛ IA lendo material...</div>
    
    <button style="background:#666; margin-top: auto; padding: 8px;" onclick="location.reload()">REINICIAR TUDO</button>
</aside>

<main class="main">
    <header>
        <span>SIMULADOR DE QUESTÕES</span>
        <span id="timer">60:00</span>
    </header>
    <div class="container" id="quizArea">
        <div style="text-align:center; color:#999; margin-top:100px;">
            <h3>O sistema está pronto.</h3>
            <p>Anexe o conteúdo e a IA criará as questões para você.</p>
        </div>
    </div>
    <button style="background:var(--s); padding:20px; font-size: 1.2rem;" onclick="corrigir()">FINALIZAR E CORRIGIR</button>
</main>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    
    // Chave corrigida (sem o espaço que estava causando o erro)
    const API_KEY = "AlzaSyBq4N0dzn9-9_qn-sXOpmGy38zgkN29E80";
    let questoes = [];
    let respostas = [];

    async function extrairTexto(f) {
        const doc = await pdfjsLib.getDocument({data: await f.arrayBuffer()}).promise;
        let t = "";
        for(let i=1; i<=doc.numPages; i++){
            const p = await doc.getPage(i);
            const c = await p.getTextContent();
            t += c.items.map(s => s.str).join(" ") + " ";
        }
        return t;
    }

    async function gerar() {
        const files = document.getElementById('pdfFile').files;
        const loader = document.getElementById('status');
        if(files.length === 0) return alert("Selecione pelo menos um PDF!");

        loader.style.display = "block";
        try {
            let textoGeral = "";
            for(let file of files) textoGeral += await extrairTexto(file);

            const prompt = `Analise este material: "${textoGeral.substring(0,25000)}". Gere EXATAMENTE 50 questões de múltipla escolha (4 opções). Retorne APENAS o JSON puro: [{"q":"pergunta","options":["a","b","c","d"],"correct":0}]`;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{parts: [{text: prompt}]}] })
            });

            const data = await res.json();
            if(data.error) throw new Error(data.error.message);

            const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
            questoes = JSON.parse(raw);
            renderizar();
        } catch(e) {
            console.error(e);
            alert("Erro na IA: A chave pode estar expirada ou o texto é muito longo. Tente com um PDF menor.");
        } finally { loader.style.display = "none"; }
    }

    function renderizar() {
        const area = document.getElementById('quizArea');
        area.innerHTML = "";
        respostas = new Array(questoes.length).fill(null);
        questoes.forEach((q, i) => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `<p><strong>${i+1}.</strong> ${q.q}</p>`;
            q.options.forEach((o, idx) => {
                const opt = document.createElement('div');
                opt.className = 'opt';
                opt.id = `q${i}o${idx}`;
                opt.innerText = o;
                opt.onclick = () => {
                    respostas[i] = idx;
                    d.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
                    opt.classList.add('sel');
                };
                d.appendChild(opt);
            });
            area.appendChild(d);
        });
        window.scrollTo(0,0);
    }

    function corrigir() {
        questoes.forEach((q, i) => {
            const u = respostas[i];
            const c = q.correct;
            document.getElementById(`q${i}o${c}`).classList.add('correct');
            if(u !== null && u !== c) document.getElementById(`q${i}o${u}`).classList.add('wrong');
        });
        alert("Simulado corrigido!");
    }
</script>
</body>
</html>
