<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IA Simulador - Ajuste de Chave</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --p: #004a8d; --s: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; }
        .container { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: #fff; padding: 25px; margin-bottom: 25px; border-radius: 8px; border-left: 8px solid var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .opt { padding: 12px; border: 1px solid #eee; margin-top: 8px; border-radius: 4px; cursor: pointer; }
        .opt.sel { background: #d1e7ff; border-color: var(--p); font-weight: bold; }
        .correct { background: #d4edda !important; }
        #status { font-weight: bold; color: var(--p); display: none; text-align: center; padding: 10px; background: #eef6ff; }
        input, button { padding: 12px; border-radius: 6px; border: 1px solid #ccc; }
        button { background: var(--p); color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="color:var(--p); margin:0;">Simulador Estácio</h2>
    
    <label><strong>1. Cole sua API Key aqui:</strong></label>
    <input type="password" id="userKey" placeholder="AlzaSy...">
    
    <label><strong>2. Selecione o PDF:</strong></label>
    <input type="file" id="pdfFile" accept="application/pdf">
    
    <button onclick="gerar()">CRIAR QUESTÕES</button>
    
    <div id="status">⌛ Processando...</div>
</aside>

<main class="main">
    <header><span>ÁREA DE ESTUDO</span><span>60:00</span></header>
    <div class="container" id="quizArea">
        <div style="text-align:center; color:#999; margin-top:100px;">Insira a chave e suba o PDF.</div>
    </div>
    <button style="background:var(--s); padding:20px;" onclick="corrigir()">CORRIGIR</button>
</main>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let questoes = []; let respostas = [];

    async function gerar() {
        const key = document.getElementById('userKey').value.trim();
        const files = document.getElementById('pdfFile').files;
        if(!key || files.length === 0) return alert("Preencha a chave e o arquivo!");

        document.getElementById('status').style.display = "block";

        try {
            const doc = await pdfjsLib.getDocument({data: await files[0].arrayBuffer()}).promise;
            let texto = "";
            for(let i=1; i<=Math.min(doc.numPages, 10); i++){
                const p = await doc.getPage(i);
                const c = await p.getTextContent();
                texto += c.items.map(s => s.str).join(" ") + " ";
            }

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{parts: [{text: `Gere 50 questões múltipla escolha sobre: "${texto.substring(0, 15000)}". Retorne apenas JSON: [{"q":"...","options":["..."],"correct":0}]`}]}] })
            });

            const data = await res.json();
            if(data.error) throw new Error(data.error.message);

            const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
            questoes = JSON.parse(raw);
            render();
        } catch(e) {
            alert("Erro: " + e.message);
        } finally { document.getElementById('status').style.display = "none"; }
    }

    function render() {
        const area = document.getElementById('quizArea'); area.innerHTML = "";
        respostas = new Array(questoes.length).fill(null);
        questoes.forEach((q, i) => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `<p><strong>${i+1}.</strong> ${q.q}</p>`;
            q.options.forEach((o, idx) => {
                const opt = document.createElement('div');
                opt.className = 'opt'; opt.id = `q${i}o${idx}`;
                opt.innerText = o;
                opt.onclick = () => {
                    respostas[i] = idx;
                    d.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
                    opt.classList.add('sel');
                };
                d.appendChild(opt);
            });
            area.appendChild(d);
        });
    }

    function corrigir() {
        questoes.forEach((q, i) => {
            const c = q.correct;
            document.getElementById(`q${i}o${c}`).classList.add('correct');
        });
    }
</script>
</body>
</html>
