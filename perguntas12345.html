<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Estácio - Teoria do Direito e da Norma</title>
    <style>
        :root {
            --primary-color: #004691;
            --secondary-color: #f4f4f4;
            --accent-color: #e74c3c;
            --success-color: #2ecc71;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #e9ecef;
            color: var(--text-color);
        }

        /* Sidebar - Quadro de Questões */
        #sidebar {
            width: 300px;
            height: 100vh;
            background: white;
            border-right: 1px solid #ccc;
            position: fixed;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .timer-box {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .grid-item {
            width: 40px;
            height: 40px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            background: #fff;
            font-weight: bold;
        }

        .grid-item.answered {
            background-color: var(--primary-color);
            color: white;
        }

        .grid-item.current {
            border: 3px solid var(--accent-color);
        }

        /* Área de Conteúdo */
        #main-content {
            margin-left: 300px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
        }

        .question-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: none; /* Esconde todas, mostra uma por vez */
        }

        .question-card.active {
            display: block;
        }

        h2 { color: var(--primary-color); margin-top: 0; }

        .options label {
            display: block;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .options label:hover { background-color: #f0f7ff; }

        input[type="radio"] { margin-right: 15px; transform: scale(1.2); }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-next { background: var(--primary-color); color: white; }
        .btn-prev { background: #6c757d; color: white; }
        .btn-finish { background: var(--success-color); color: white; width: 100%; margin-top: 20px; }

        /* Resultado */
        #result-screen {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }

        .score-circle {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="timer-box" id="timer">60:00</div>
    <h3>Quadro de Questões</h3>
    <div class="question-grid" id="grid">
        </div>
    <button class="btn-finish" onclick="finishQuiz()">Finalizar Prova</button>
</div>

<div id="main-content">
    <div id="quiz-container">
        </div>

    <div id="result-screen">
        <h2>Resultado da Prova</h2>
        <div class="score-circle" id="score-display">0/10</div>
        <p id="feedback-text"></p>
        <button onclick="location.reload()" class="btn-next">Refazer Simulado</button>
    </div>
</div>
