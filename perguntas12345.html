<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador IA Estácio - Estável</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --p: #004a8d; --s: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; }
        .container { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: #fff; padding: 25px; margin-bottom: 25px; border-radius: 8px; border-left: 8px solid var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .opt { padding: 12px; border: 1px solid #eee; margin-top: 8px; border-radius: 4px; cursor: pointer; }
        .opt.sel { background: #d1e7ff; border-color: var(--p); font-weight: bold; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; }
        #status { font-weight: bold; color: var(--p); display: none; text-align: center; padding: 10px; background: #eef6ff; }
        input, button { padding: 12px; border-radius: 6px; border: 1px solid #ccc; }
        button { background: var(--p); color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="color:var(--p); margin:0;">IA Estácio</h2>
    
    <label><strong>1. API Key:</strong></label>
    <input type="password" id="userKey" placeholder="Cole sua chave aqui">
    
    <label><strong>2. Material (PDF):</strong></label>
    <input type="file" id="pdfFile" accept="application/pdf">
    
    <button onclick="gerar()">GERAR SIMULADO</button>
    
    <div id="status">⌛ Conectando ao Google IA...</div>
</aside>

<main class="main">
    <header><span>SIMULADOR DE QUESTÕES</span><span>60:00</span></header>
    <div class="container" id="quizArea">
        <div style="text-align:center; color:#999; margin-top:100px;">Insira a chave e selecione o PDF para começar.</div>
    </div>
    <button style="background:var(--s); padding:20px;" onclick="corrigir()">FINALIZAR E CORRIGIR</button>
</main>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let questoes = [];

    async function gerar() {
        const key = document.getElementById('userKey').value.trim();
        const file = document.getElementById('pdfFile').files[0];
        if(!key || !file) return alert("Erro: Chave ou arquivo faltando!");

        const loader = document.getElementById('status');
        loader.style.display = "block";

        try {
            const doc = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
            let texto = "";
            for(let i=1; i<=Math.min(doc.numPages, 12); i++){
                const p = await doc.getPage(i);
                const c = await p.getTextContent();
                texto += c.items.map(s => s.str).join(" ") + " ";
            }

            // URL PARA VERSÃO ESTÁVEL V1
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Gere 50 questões de múltipla escolha (4 alternativas) sobre o seguinte conteúdo técnico: "${texto.substring(0, 18000)}". Retorne APENAS o JSON no formato: [{"q":"pergunta","options":["a","b","c","d"],"correct":0}]` }] }]
                })
            });

            const data = await res.json();
            if(data.error) throw new Error(data.error.message);

            let raw = data.candidates[0].content.parts[0].text;
            raw = raw.replace(/```json|```/g, '').trim();
            
            questoes = JSON.parse(raw);
            render();
        } catch(e) {
            alert("ERRO TÉCNICO: " + e.message);
        } finally { loader.style.display = "none"; }
    }

    function render() {
        const area = document.getElementById('quizArea'); area.innerHTML = "";
        questoes.forEach((q, i) => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `<p><strong>${i+1}.</strong> ${q.q}</p>`;
            q.options.forEach((o, idx) => {
                const opt = document.createElement('div');
                opt.className = 'opt'; opt.id = `q${i}o${idx}`;
                opt.innerText = o;
                opt.onclick = () => {
                    d.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
                    opt.classList.add('sel');
                };
                d.appendChild(opt);
            });
            area.appendChild(d);
        });
    }

    function corrigir() {
        questoes.forEach((q, i) => {
            document.getElementById(`q${i}o${q.correct}`).classList.add('correct');
        });
        alert("Simulado Corrigido! As respostas corretas estão em verde.");
    }
</script>
</body>
</html>
