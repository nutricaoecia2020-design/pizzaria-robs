<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amarelinhas | Delivery Claro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --amarelo: #FFD700; 
            --verde-claro: #22c55e; 
            --verde-fundo: #f0fdf4;
            --texto-escuro: #064e3b;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--verde-fundo); color: var(--texto-escuro); }
        .font-black-italic { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; font-style: italic; letter-spacing: -0.05em; }
        .hero-gradient { background: linear-gradient(180deg, var(--amarelo) 0%, var(--verde-fundo) 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Botão de Voltar Ultra Visível */
        .btn-voltar { 
            background-color: var(--verde-claro); 
            color: white; 
            padding: 12px 24px; 
            border-radius: 20px; 
            font-weight: 900; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        /* Botão de Finalizar Pedido */
        .btn-finalizar {
            background-color: var(--verde-claro);
            color: white;
            width: 100%;
            padding: 20px;
            border-radius: 30px;
            font-family: 'Archivo Black', sans-serif;
            font-style: italic;
            font-size: 1.5rem;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
            border: 4px solid white;
        }
        
        .card-branco { background: white; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-28">

    <header class="hero-gradient pt-8 pb-12 px-6 rounded-b-[4rem]">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-emerald-900 font-black-italic text-4xl italic">AMARELINHAS</h1>
                <span class="bg-white text-emerald-600 px-4 py-2 rounded-full text-[10px] font-black uppercase italic shadow-sm">Aracaju, SE</span>
            </div>

            <div class="bg-emerald-600 text-white p-6 rounded-[2.5rem] mb-10 flex flex-col md:flex-row items-center justify-between gap-6 shadow-xl border-4 border-white">
                <div class="text-center md:text-left">
                    <h2 class="text-2xl font-black italic text-amarelo leading-none mb-1">CADASTRE SUA LOJA!</h2>
                    <p class="text-emerald-50 text-xs font-bold uppercase">Aumente suas vendas hoje mesmo.</p>
                </div>
                <button onclick="window.open('https://wa.me/5579999999999')" class="bg-white text-emerald-600 px-8 py-4 rounded-2xl font-black italic uppercase text-sm shadow-lg hover:scale-105 transition">
                    QUERO CADASTRAR
                </button>
            </div>
            
            <div class="relative max-w-2xl mx-auto">
                <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-emerald-400 text-lg"></i>
                <input type="text" id="searchInput" onkeyup="searchGlobal()" placeholder="O que você procura?" 
                    class="w-full bg-white p-6 pl-16 rounded-[2.5rem] shadow-xl font-bold outline-none border-2 border-emerald-100 text-emerald-900">
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 -mt-6">
        
        <section id="viewMarket">
            <div id="listaLojas" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                </div>
        </section>

        <section id="viewLojaInterna" class="hidden max-w-3xl mx-auto">
            <div class="flex justify-start mb-6">
                <button onclick="goBack()" class="btn-voltar">
                    <i class="fas fa-arrow-left"></i> VOLTAR PARA AS LOJAS
                </button>
            </div>
            <div id="headerLoja" class="mb-8"></div>
            <div id="menuLoja" class="grid grid-cols-1 gap-4"></div>
        </section>
    </main>

    <div id="cartFloat" class="fixed bottom-10 right-6 z-[100] hidden">
        <button onclick="toggleCart()" class="bg-emerald-600 text-white p-6 rounded-[2.5rem] shadow-2xl flex items-center gap-4 border-4 border-white">
            <i class="fas fa-shopping-cart text-2xl"></i>
            <span id="cartCount" class="font-black text-2xl">0</span>
        </button>
    </div>

    <div id="modalCart" class="hidden fixed inset-0 bg-white z-[200] flex flex-col">
        <div class="p-6 flex justify-between items-center bg-emerald-50 border-b-4 border-emerald-100">
            <h2 class="font-black-italic text-2xl text-emerald-800">MEU CARRINHO</h2>
            <button onclick="toggleCart()" class="text-3xl text-emerald-600 p-2"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <div class="space-y-4">
                    <h3 class="text-emerald-900 font-black italic text-lg uppercase">Itens Selecionados</h3>
                    <div id="cartItems" class="space-y-3"></div>
                </div>

                <div class="bg-emerald-50 p-6 rounded-[2.5rem] border-2 border-emerald-100">
                    <h3 class="text-emerald-800 font-black italic text-lg mb-4 uppercase">Dados de Entrega</h3>
                    <div class="space-y-3">
                        <input type="text" id="custName" placeholder="Seu Nome" class="w-full bg-white p-4 rounded-2xl border-2 border-emerald-100 font-bold text-emerald-900">
                        <input type="text" id="custEnd" placeholder="Seu Endereço Completo" class="w-full bg-white p-4 rounded-2xl border-2 border-emerald-100 font-bold text-emerald-900">
                        <input type="text" id="custTel" placeholder="WhatsApp para Contato" class="w-full bg-white p-4 rounded-2xl border-2 border-emerald-100 font-bold text-emerald-900">
                        <select id="custPag" class="w-full bg-white p-4 rounded-2xl border-2 border-emerald-100 font-bold text-emerald-900">
                            <option value="Pix">Pagar com Pix</option>
                            <option value="Cartão">Cartão na Entrega</option>
                            <option value="Dinheiro">Dinheiro</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-8 bg-white border-t-4 border-emerald-50">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between text-emerald-900 font-black text-3xl mb-6 italic">
                    <span>TOTAL:</span>
                    <span id="cartTotal" class="text-emerald-600">R$ 0,00</span>
                </div>
                <button onclick="finalizarPedido()" class="btn-finalizar">
                    ENVIAR PEDIDO PELO WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <script>
        const db = JSON.parse(localStorage.getItem('amarelinhas_db')) || [];
        let allCarts = JSON.parse(localStorage.getItem('amarelinhas_multi_carts')) || {};
        let activeLojaId = null;

        function renderMarketplace(data = db) {
            const container = document.getElementById('listaLojas');
            container.innerHTML = data.map(l => `
                <div onclick="openStore('${l.id}')" class="card-branco p-6 cursor-pointer border-2 border-transparent hover:border-emerald-400 transition-all text-center">
                    <img src="${l.img}" class="w-32 h-32 rounded-3xl object-cover mx-auto mb-4 shadow-md">
                    <span class="text-[9px] font-black text-emerald-500 uppercase">${l.categoria}</span>
                    <h3 class="font-black-italic text-emerald-900 text-xl italic">${l.nome}</h3>
                </div>
            `).join('');
        }

        function openStore(id) {
            activeLojaId = id;
            const loja = db.find(l => l.id === id);
            document.getElementById('viewMarket').classList.add('hidden');
            document.getElementById('viewLojaInterna').classList.remove('hidden');
            
            document.getElementById('headerLoja').innerHTML = `
                <div class="card-branco p-8 flex flex-col items-center border-b-4 border-amarelo">
                    <img src="${loja.img}" class="w-32 h-32 rounded-full border-4 border-emerald-100 shadow-xl mb-4">
                    <h2 class="text-3xl font-black-italic italic text-emerald-900">${loja.nome}</h2>
                </div>
            `;
            renderMenu();
            updateUI();
        }

        function renderMenu() {
            const loja = db.find(l => l.id === activeLojaId);
            const menu = document.getElementById('menuLoja');
            const storeCart = allCarts[activeLojaId] || [];

            menu.innerHTML = loja.produtos.map(p => {
                const inCart = storeCart.find(c => c.id === p.id);
                return `
                    <div class="card-branco p-4 flex items-center gap-4">
                        <img src="${p.img}" class="w-20 h-20 object-cover rounded-2xl">
                        <div class="flex-1">
                            <h4 class="font-bold text-emerald-900 uppercase text-sm">${p.nome}</h4>
                            <p class="text-emerald-600 font-black text-xl italic">R$ ${p.preco.toFixed(2)}</p>
                        </div>
                        <div class="flex items-center gap-3 bg-emerald-50 p-2 rounded-xl">
                            <button onclick="updateQty(${p.id}, -1)" class="w-8 h-8 font-black text-emerald-700">-</button>
                            <span class="font-black text-lg">${inCart ? inCart.qty : 0}</span>
                            <button onclick="updateQty(${p.id}, 1)" class="bg-emerald-500 text-white w-8 h-8 rounded-lg font-black shadow-md">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateQty(pid, change) {
            if (!allCarts[activeLojaId]) allCarts[activeLojaId] = [];
            let storeCart = allCarts[activeLojaId];
            const prod = db.find(l => l.id === activeLojaId).produtos.find(p => p.id === pid);
            const idx = storeCart.findIndex(c => c.id === pid);

            if (idx > -1) {
                storeCart[idx].qty += change;
                if (storeCart[idx].qty <= 0) storeCart.splice(idx, 1);
            } else if (change > 0) {
                storeCart.push({ ...prod, qty: 1 });
            }

            localStorage.setItem('amarelinhas_multi_carts', JSON.stringify(allCarts));
            renderMenu();
            updateUI();
        }

        function updateUI() {
            const storeCart = allCarts[activeLojaId] || [];
            const count = storeCart.reduce((acc, i) => acc + i.qty, 0);
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartFloat').classList.toggle('hidden', count === 0);
            renderCartModal();
        }

        function renderCartModal() {
            const container = document.getElementById('cartItems');
            const storeCart = allCarts[activeLojaId] || [];
            let total = 0;
            container.innerHTML = storeCart.map(item => {
                total += item.preco * item.qty;
                return `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border-2 border-emerald-50 shadow-sm">
                        <div class="flex items-center gap-3">
                            <span class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-lg font-black">${item.qty}x</span>
                            <span class="font-bold text-emerald-900 text-xs">${item.nome}</span>
                        </div>
                        <span class="text-emerald-600 font-black">R$ ${(item.preco * item.qty).toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').innerText = `R$ ${total.toFixed(2)}`;
        }

        function finalizarPedido() {
            const nome = document.getElementById('custName').value;
            const end = document.getElementById('custEnd').value;
            const tel = document.getElementById('custTel').value;
            const pag = document.getElementById('custPag').value;

            if(!nome || !end || !tel) { alert("Ops! Preencha seus dados de entrega primeiro."); return; }

            const loja = db.find(l => l.id === activeLojaId);
            const cart = allCarts[activeLojaId];
            
            let texto = `✅ *PEDIDO RECEBIDO - AMARELINHAS*\n\n`;
            texto += `🏪 *LOJA:* ${loja.nome}\n`;
            texto += `👤 *CLIENTE:* ${nome}\n`;
            texto += `📍 *ENTREGA:* ${end}\n`;
            texto += `📱 *CONTATO:* ${tel}\n`;
            texto += `💳 *PAGAMENTO:* ${pag}\n\n`;
            texto += `🛒 *ITENS:* \n`;
            cart.forEach(i => texto += `• ${i.qty}x ${i.nome}\n`);
            texto += `\n💰 *VALOR TOTAL: ${document.getElementById('cartTotal').innerText}*`;
            
            window.open(`https://wa.me/55${loja.whatsapp}?text=${encodeURIComponent(texto)}`, '_blank');
        }

        function searchGlobal() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            renderMarketplace(db.filter(l => l.nome.toLowerCase().includes(t)));
        }

        function toggleCart() { document.getElementById('modalCart').classList.toggle('hidden'); }
        
        function goBack() {
            activeLojaId = null;
            document.getElementById('viewMarket').classList.remove('hidden');
            document.getElementById('viewLojaInterna').classList.add('hidden');
            document.getElementById('cartFloat').classList.add('hidden');
        }

        renderMarketplace();
    </script>
</body>
</html>
