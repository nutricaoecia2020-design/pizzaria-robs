<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Aju | Amarelinhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amarelo: #FFD700; --preto: #000000; }
        .bg-amarelo { background-color: var(--amarelo); }
        .text-amarelo { color: var(--amarelo); }
        .font-black-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-zinc-50 pb-28 font-sans overflow-x-hidden">

    <header class="bg-amarelo p-6 sticky top-0 z-50 shadow-md rounded-b-[3rem]">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-preto font-black-italic text-3xl italic tracking-tighter">AMARELINHAS</h1>
                <div class="bg-black text-amarelo p-2 px-4 rounded-2xl text-[10px] font-black uppercase italic">Aju, SE</div>
            </div>
            
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                <input type="text" id="searchInput" onkeyup="searchGlobal()" placeholder="Buscar comida, farmácia ou mercado..." class="w-full bg-white p-4 pl-12 rounded-[1.5rem] shadow-inner font-bold outline-none border-2 border-transparent focus:border-black transition">
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-8">
        
        <div class="bg-zinc-900 p-6 rounded-[2.5rem] text-white relative overflow-hidden shadow-2xl">
            <div class="relative z-10">
                <p class="text-amarelo font-black uppercase text-xs tracking-widest italic">OFERTA DO DIA</p>
                <h3 class="text-2xl font-black italic mt-1 leading-none uppercase">Peça seu produto pela <br>sua Amarelinha!</h3>
                <button class="bg-amarelo text-preto px-6 py-2 rounded-xl mt-4 font-black italic text-xs uppercase">Aproveitar agora</button>
            </div>
            <i class="fas fa-bolt absolute -right-4 -bottom-4 text-9xl text-white/5 rotate-12"></i>
        </div>

        <section>
            <h2 class="font-black-italic text-zinc-900 mb-4 ml-2">Categorias</h2>
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                <div onclick="filterCat('ALIMENTAÇÃO')" class="flex-shrink-0 bg-white p-4 rounded-[2rem] border-2 border-zinc-100 flex flex-col items-center gap-2 shadow-sm cursor-pointer hover:border-amarelo transition">
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center text-xl text-orange-500">🍔</div>
                    <span class="text-[10px] font-black uppercase italic">Comida</span>
                </div>
                <div onclick="filterCat('ÁGUA MINERAL')" class="flex-shrink-0 bg-white p-4 rounded-[2rem] border-2 border-zinc-100 flex flex-col items-center gap-2 shadow-sm cursor-pointer hover:border-amarelo transition">
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-xl text-blue-500">💧</div>
                    <span class="text-[10px] font-black uppercase italic">Água</span>
                </div>
                <div onclick="filterCat('FARMÁCIA')" class="flex-shrink-0 bg-white p-4 rounded-[2rem] border-2 border-zinc-100 flex flex-col items-center gap-2 shadow-sm cursor-pointer hover:border-amarelo transition">
                    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-xl text-red-500">💊</div>
                    <span class="text-[10px] font-black uppercase italic">Saúde</span>
                </div>
                <div onclick="filterCat('MERCADO')" class="flex-shrink-0 bg-white p-4 rounded-[2rem] border-2 border-zinc-100 flex flex-col items-center gap-2 shadow-sm cursor-pointer hover:border-amarelo transition">
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-xl text-green-500">🛒</div>
                    <span class="text-[10px] font-black uppercase italic">Mercado</span>
                </div>
            </div>
        </section>

        <section id="viewMarket">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="font-black-italic text-zinc-900">Lojas em Destaque</h2>
                <span class="text-[10px] font-bold text-zinc-400 uppercase italic">Ver todas</span>
            </div>
            <div id="listaLojas" class="flex flex-col gap-4"></div>
        </section>

        <section id="viewLojaInterna" class="hidden animate-in slide-in-from-right duration-300">
            <button onclick="goBack()" class="mb-6 bg-zinc-200 px-6 py-2 rounded-full font-black text-xs italic text-zinc-600 flex items-center">
                <i class="fas fa-chevron-left mr-2"></i> VOLTAR PARA LOJAS
            </button>
            <div id="headerLoja" class="mb-8"></div>
            <div id="menuLoja" class="grid grid-cols-1 gap-4"></div>
        </section>
    </main>

    <div id="cartFloat" class="fixed bottom-24 right-4 z-[100] hidden animate-bounce">
        <button onclick="toggleCart()" class="bg-black text-amarelo p-5 rounded-[2rem] shadow-2xl flex items-center gap-4 border-4 border-amarelo">
            <i class="fas fa-shopping-basket text-2xl"></i>
            <span id="cartCount" class="font-black text-2xl italic">0</span>
        </button>
    </div>

    <div id="modalCart" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[200] flex flex-col">
        <div class="p-8 flex justify-between items-center bg-amarelo rounded-b-[3rem]">
            <h2 class="font-black-italic text-3xl">MEU CARRINHO</h2>
            <button onclick="toggleCart()" class="text-4xl text-preto"><i class="fas fa-times-circle"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-8 space-y-6 text-white"></div>
        <div class="p-8 bg-zinc-900 rounded-t-[3rem] border-t-4 border-amarelo">
            <div class="flex justify-between text-amarelo font-black text-3xl mb-6 italic uppercase tracking-tighter">
                <span>Total</span>
                <span id="cartTotal">R$ 0,00</span>
            </div>
            <button onclick="finalizarPedido()" class="w-full bg-amarelo text-preto py-6 rounded-[2rem] font-black italic text-xl shadow-2xl uppercase tracking-widest active:scale-95 transition">
                Finalizar via WhatsApp
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-[50] rounded-t-[2.5rem] shadow-2xl">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-preto">
            <i class="fas fa-house-chimney text-xl"></i>
            <span class="text-[9px] font-black uppercase italic">Início</span>
        </button>
        <button onclick="toggleCart()" class="flex flex-col items-center gap-1 text-zinc-300">
            <i class="fas fa-shopping-bag text-xl"></i>
            <span class="text-[9px] font-black uppercase italic">Pedidos</span>
        </button>
        <button onclick="alert('Funcionalidade em breve!')" class="flex flex-col items-center gap-1 text-zinc-300">
            <i class="fas fa-user-circle text-xl"></i>
            <span class="text-[9px] font-black uppercase italic">Perfil</span>
        </button>
    </nav>

    <script>
        const db = JSON.parse(localStorage.getItem('amarelinhas_db')) || [];
        // Carrega o carrinho salvo ou cria um novo
        let cart = JSON.parse(localStorage.getItem('cart_persist_amarelinhas')) || [];
        let activeLoja = null;

        function renderMarketplace(data = db) {
            const container = document.getElementById('listaLojas');
            if(data.length === 0) {
                container.innerHTML = `<div class="text-center p-20 text-zinc-300 font-black italic">Ops! Nada encontrado...</div>`;
                return;
            }

            container.innerHTML = data.map(l => `
                <div onclick="openStore('${l.id}')" class="bg-white p-5 rounded-[2.5rem] border-2 border-white flex items-center gap-5 shadow-sm hover:border-amarelo transition-all cursor-pointer group">
                    <img src="${l.img}" class="w-20 h-20 rounded-[1.8rem] object-cover shadow-inner border group-hover:scale-105 transition">
                    <div class="flex-1">
                        <span class="text-[9px] bg-amarelo px-3 py-1 rounded-full font-black text-zinc-800 uppercase italic">${l.categoria}</span>
                        <h3 class="font-black-italic text-zinc-900 text-xl leading-tight mt-2 italic">${l.nome}</h3>
                        <div class="flex items-center gap-3 mt-1">
                            <span class="text-[10px] font-black text-green-500 uppercase"><i class="fas fa-motorcycle"></i> 20-30 min</span>
                            <span class="text-[10px] font-black text-zinc-400 uppercase">• Frete Grátis</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function searchGlobal() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const filtrado = db.filter(l => 
                l.nome.toLowerCase().includes(termo) || 
                l.categoria.toLowerCase().includes(termo) ||
                l.produtos.some(p => p.nome.toLowerCase().includes(termo))
            );
            renderMarketplace(filtrado);
        }

        function filterCat(cat) {
            const filtrado = db.filter(l => l.categoria === cat);
            renderMarketplace(filtrado);
        }

        function openStore(id) {
            activeLoja = db.find(l => l.id === id);
            document.getElementById('viewMarket').classList.add('hidden');
            document.getElementById('viewLojaInterna').classList.remove('hidden');
            window.scrollTo(0,0);

            document.getElementById('headerLoja').innerHTML = `
                <div class="flex flex-col items-center text-center gap-4">
                    <img src="${activeLoja.img}" class="w-32 h-32 rounded-[3rem] object-cover border-8 border-white shadow-2xl">
                    <div>
                        <h2 class="text-3xl font-black-italic text-zinc-900 italic tracking-tighter uppercase">${activeLoja.nome}</h2>
                        <div class="flex gap-2 justify-center mt-2">
                             <span class="bg-green-100 text-green-700 text-[9px] font-black px-4 py-1 rounded-full italic uppercase">Aberto agora</span>
                             <span class="bg-amarelo text-zinc-900 text-[9px] font-black px-4 py-1 rounded-full italic uppercase">${activeLoja.categoria}</span>
                        </div>
                    </div>
                </div>
            `;

            const menu = document.getElementById('menuLoja');
            menu.innerHTML = activeLoja.produtos.map(p => {
                const inCart = cart.find(c => c.id === p.id);
                return `
                    <div class="bg-white p-4 rounded-[2rem] flex items-center gap-4 shadow-sm border border-zinc-100">
                        <img src="${p.img}" class="w-24 h-24 object-cover rounded-[1.5rem] shadow-inner">
                        <div class="flex-1">
                            <h4 class="font-black italic text-zinc-800 uppercase text-sm">${p.nome}</h4>
                            <p class="text-green-600 font-black text-xl mt-1 tracking-tighter italic">R$ ${p.preco.toFixed(2)}</p>
                            <div class="flex items-center gap-4 mt-3">
                                <button onclick="addToCart(${p.id}, -1)" class="bg-zinc-100 w-10 h-10 rounded-xl font-black text-xl">-</button>
                                <span class="font-black italic text-lg" id="qty-${p.id}">${inCart ? inCart.qty : 0}</span>
                                <button onclick="addToCart(${p.id}, 1)" class="bg-amarelo text-preto w-10 h-10 rounded-xl font-black text-xl shadow-lg shadow-yellow-100">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(pid, change) {
            const prod = activeLoja.produtos.find(p => p.id === pid);
            const cartItemIndex = cart.findIndex(c => c.id === pid);

            if (cartItemIndex > -1) {
                cart[cartItemIndex].qty += change;
                if (cart[cartItemIndex].qty <= 0) cart.splice(cartItemIndex, 1);
            } else if (change > 0) {
                cart.push({ 
                    ...prod, 
                    qty: 1, 
                    lojaWpp: activeLoja.whatsapp, 
                    lojaNome: activeLoja.nome 
                });
            }
            
            // Salva o carrinho no LocalStorage para não perder ao trocar de loja
            localStorage.setItem('cart_persist_amarelinhas', JSON.stringify(cart));
            updateUI();
        }

        function updateUI() {
            // Atualiza números na tela da loja atual
            if(activeLoja) {
                activeLoja.produtos.forEach(p => {
                    const badge = document.getElementById(`qty-${p.id}`);
                    if (badge) {
                        const item = cart.find(c => c.id === p.id);
                        badge.innerText = item ? item.qty : 0;
                    }
                });
            }
            
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartFloat').classList.toggle('hidden', count === 0);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const totalSpan = document.getElementById('cartTotal');
            let total = 0;

            if(cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-30 font-black italic">CARRINHO VAZIO</div>`;
                totalSpan.innerText = `R$ 0,00`;
                return;
            }

            container.innerHTML = cart.map(item => {
                total += item.preco * item.qty;
                return `
                    <div class="flex justify-between items-center bg-zinc-900/50 p-4 rounded-3xl border border-white/5">
                        <div class="flex items-center gap-4">
                            <span class="bg-amarelo text-preto w-10 h-10 flex items-center justify-center rounded-xl font-black italic">${item.qty}x</span>
                            <div>
                                <p class="font-black italic uppercase text-xs">${item.nome}</p>
                                <p class="text-amarelo font-bold text-[8px] uppercase tracking-widest">${item.lojaNome}</p>
                            </div>
                        </div>
                        <span class="font-black italic text-amarelo">R$ ${(item.preco * item.qty).toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            totalSpan.innerText = `R$ ${total.toFixed(2)}`;
        }

        function goBack() {
            document.getElementById('viewMarket').classList.remove('hidden');
            document.getElementById('viewLojaInterna').classList.add('hidden');
            activeLoja = null;
        }

        function toggleCart() { document.getElementById('modalCart').classList.toggle('hidden'); }

        function finalizarPedido() {
            if(cart.length === 0) return;
            // Agrupa por loja para enviar o pedido
            const lojasNoPedido = [...new Set(cart.map(i => i.lojaNome))];
            
            lojasNoPedido.forEach(lojaNome => {
                const itensLoja = cart.filter(i => i.lojaNome === lojaNome);
                const wpp = itensLoja[0].lojaWpp;
                let msg = `🟡 *AMARELINHAS | DELIVERY AJU*\n------------------------------\n`;
                itensLoja.forEach(i => msg += `👉 *${i.qty}x* ${i.nome} (R$ ${i.preco.toFixed(2)})\n`);
                msg += `------------------------------\n_Pedido via Amarelinhas!_`;
                window.open(`https://wa.me/55${wpp}?text=${encodeURIComponent(msg)}`, '_blank');
            });

            // Opcional: Limpa o carrinho após finalizar
            if(confirm("Deseja esvaziar o carrinho agora?")) {
                cart = [];
                localStorage.removeItem('cart_persist_amarelinhas');
                updateUI();
                toggleCart();
            }
        }

        renderMarketplace();
        updateUI();
    </script>
</body>
</html>
