<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Aju | Amarelinhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amarelo: #FFD700; --preto: #000000; }
        .bg-amarelo { background-color: var(--amarelo); }
        .text-amarelo { color: var(--amarelo); }
        .font-black-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .cart-float { position: fixed; bottom: 85px; right: 20px; z-index: 100; }
    </style>
</head>
<body class="bg-yellow-50 pb-24 font-sans">

    <header class="bg-amarelo p-5 sticky top-0 z-50 shadow-md rounded-b-3xl">
        <div class="max-w-xl mx-auto flex flex-col items-center gap-2">
            <h1 class="text-preto font-black-italic text-3xl tracking-tighter">DELIVERY AJU</h1>
            <div class="bg-black text-amarelo px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">
                Peça seu produto pela sua Amarelinha
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 min-h-screen">
        
        <section id="cat-scroll" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="filterCat('ALIMENTAÇÃO')" class="bg-white px-5 py-2 rounded-2xl shadow-sm border border-yellow-200 flex-shrink-0 font-black text-xs italic">🍔 ALIMENTAÇÃO</button>
            <button onclick="filterCat('ÁGUA MINERAL')" class="bg-white px-5 py-2 rounded-2xl shadow-sm border border-yellow-200 flex-shrink-0 font-black text-xs italic">💧 ÁGUA</button>
            <button onclick="filterCat('FARMÁCIA')" class="bg-white px-5 py-2 rounded-2xl shadow-sm border border-yellow-200 flex-shrink-0 font-black text-xs italic">💊 FARMÁCIA</button>
            <button onclick="filterCat('MERCADO')" class="bg-white px-5 py-2 rounded-2xl shadow-sm border border-yellow-200 flex-shrink-0 font-black text-xs italic">🛒 MERCADO</button>
        </section>

        <div id="viewMarket">
            <h2 class="font-black-italic text-zinc-800 text-lg mb-4 mt-2">Lojas Cadastradas</h2>
            <div id="listaLojas" class="space-y-4"></div>
        </div>

        <div id="viewLojaInterna" class="hidden">
            <div id="headerLoja" class="mb-6 bg-white p-6 rounded-3xl shadow-sm border-t-8 border-amarelo"></div>
            <div id="menuLoja" class="space-y-4"></div>
        </div>
    </main>

    <div id="cartFloat" class="cart-float hidden" onclick="toggleCart()">
        <div class="bg-black text-amarelo px-6 py-4 rounded-full shadow-2xl flex items-center gap-3">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span id="cartCount" class="font-black text-lg italic">0</span>
        </div>
    </div>

    <div id="modalCart" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[200] flex flex-col">
        <div class="p-6 flex justify-between items-center bg-amarelo">
            <h2 class="font-black-italic text-2xl">SEU PEDIDO</h2>
            <button onclick="toggleCart()" class="text-3xl text-preto"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4 text-white"></div>
        <div class="p-6 bg-zinc-900 border-t-2 border-amarelo">
            <div class="flex justify-between text-amarelo font-black text-xl mb-4 italic uppercase">
                <span>Total</span>
                <span id="cartTotal">R$ 0,00</span>
            </div>
            <button onclick="finalizarPedido()" class="w-full bg-amarelo text-preto py-5 rounded-2xl font-black italic text-xl shadow-lg uppercase">
                Enviar para o WhatsApp
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around items-center z-50 rounded-t-3xl shadow-2xl">
        <button onclick="location.reload()" class="text-center text-preto"><i class="fas fa-home text-xl"></i><p class="text-[9px] font-black uppercase">Home</p></button>
        <button onclick="alert('Funcionalidade em breve!')" class="text-center text-zinc-300"><i class="fas fa-search text-xl"></i><p class="text-[9px] font-black uppercase">Busca</p></button>
        <button onclick="toggleCart()" class="text-center text-zinc-300"><i class="fas fa-shopping-cart text-xl"></i><p class="text-[9px] font-black uppercase">Carrinho</p></button>
    </nav>

    <script>
        const db = JSON.parse(localStorage.getItem('amarelinhas_db')) || [];
        let cart = [];
        let activeLoja = null;

        function renderMarketplace(categoria = null) {
            const container = document.getElementById('listaLojas');
            let lojas = categoria ? db.filter(l => l.categoria === categoria) : db;
            
            if(lojas.length === 0) {
                container.innerHTML = `<div class="text-center p-10 text-zinc-400 italic">Nenhum parceiro nesta categoria.</div>`;
                return;
            }

            container.innerHTML = lojas.map(l => `
                <div onclick="openStore('${l.id}')" class="bg-white p-4 rounded-3xl border-2 border-white flex items-center gap-4 shadow-sm hover:border-amarelo transition-all cursor-pointer">
                    <img src="${l.img}" class="w-16 h-16 object-cover rounded-2xl shadow-inner border">
                    <div class="flex-1">
                        <span class="text-[8px] bg-amarelo px-2 py-0.5 rounded-full font-black text-zinc-700">${l.categoria}</span>
                        <h3 class="font-black-italic text-zinc-800 text-lg leading-tight mt-1">${l.nome}</h3>
                        <p class="text-[10px] text-green-600 font-black uppercase mt-1">✓ Aberto para Pedidos</p>
                    </div>
                    <i class="fas fa-chevron-right text-amarelo pr-2"></i>
                </div>
            `).join('');
        }

        function openStore(id) {
            activeLoja = db.find(l => l.id === id);
            document.getElementById('viewMarket').classList.add('hidden');
            document.getElementById('viewLojaInterna').classList.remove('hidden');
            document.getElementById('cat-scroll').classList.add('hidden');

            document.getElementById('headerLoja').innerHTML = `
                <div class="flex items-center gap-4">
                    <img src="${activeLoja.img}" class="w-20 h-20 rounded-2xl object-cover border-4 border-yellow-50">
                    <div>
                        <h2 class="text-2xl font-black-italic text-zinc-900">${activeLoja.nome}</h2>
                        <p class="text-xs font-bold text-zinc-400 uppercase italic"><i class="fas fa-motorcycle text-amarelo"></i> Delivery Aju • Rápido</p>
                    </div>
                </div>
            `;

            const menu = document.getElementById('menuLoja');
            menu.innerHTML = activeLoja.produtos.map(p => `
                <div class="bg-white p-3 rounded-2xl flex items-center gap-4 shadow-sm relative border border-gray-100">
                    <img src="${p.img}" class="w-20 h-20 object-cover rounded-xl shadow-inner">
                    <div class="flex-1">
                        <h4 class="font-black italic text-zinc-800 text-sm uppercase">${p.nome}</h4>
                        <p class="text-amarelo font-black text-lg mt-1 tracking-tighter">R$ ${p.preco.toFixed(2)}</p>
                        <div class="flex items-center gap-4 mt-2">
                            <button onclick="addToCart(${p.id}, -1)" class="bg-gray-100 w-8 h-8 rounded-full font-black text-xl">-</button>
                            <span class="font-black italic" id="qty-${p.id}">0</span>
                            <button onclick="addToCart(${p.id}, 1)" class="bg-amarelo text-preto w-8 h-8 rounded-full font-black text-xl shadow-lg shadow-yellow-200">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
            updateQtyVisuals();
        }

        function addToCart(pid, change) {
            const prod = activeLoja.produtos.find(p => p.id === pid);
            const cartItem = cart.find(c => c.id === pid);

            if (cartItem) {
                cartItem.qty += change;
                if (cartItem.qty <= 0) cart = cart.filter(c => c.id !== pid);
            } else if (change > 0) {
                cart.push({ ...prod, qty: 1, lojaWpp: activeLoja.whatsapp, lojaNome: activeLoja.nome });
            }
            
            updateQtyVisuals();
            renderCart();
        }

        function updateQtyVisuals() {
            db.forEach(l => l.produtos.forEach(p => {
                const badge = document.getElementById(`qty-${p.id}`);
                if (badge) {
                    const item = cart.find(c => c.id === p.id);
                    badge.innerText = item ? item.qty : 0;
                }
            }));
            const btn = document.getElementById('cartFloat');
            cart.length > 0 ? btn.classList.remove('hidden') : btn.classList.add('hidden');
            document.getElementById('cartCount').innerText = cart.reduce((acc, i) => acc + i.qty, 0);
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const totalSpan = document.getElementById('cartTotal');
            let total = 0;

            container.innerHTML = cart.map(item => {
                total += item.preco * item.qty;
                return `
                    <div class="flex justify-between items-center border-b border-zinc-800 pb-3">
                        <div class="flex items-center gap-3">
                            <span class="bg-amarelo text-preto px-2 rounded font-black italic">${item.qty}x</span>
                            <div class="text-sm">
                                <p class="font-black italic uppercase">${item.nome}</p>
                                <p class="text-zinc-500 text-[10px]">${item.lojaNome}</p>
                            </div>
                        </div>
                        <span class="font-black italic">R$ ${(item.preco * item.qty).toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            totalSpan.innerText = `R$ ${total.toFixed(2)}`;
        }

        function filterCat(c) { renderMarketplace(c); }
        function toggleCart() { document.getElementById('modalCart').classList.toggle('hidden'); }

        function finalizarPedido() {
            if(cart.length === 0) return;
            const lojaWpp = cart[0].lojaWpp;
            let msg = `🟡 *DELIVERY AJU | AMARELINHAS*\n------------------------------\n`;
            cart.forEach(item => {
                msg += `👉 *${item.qty}x* ${item.nome} - R$ ${(item.preco * item.qty).toFixed(2)}\n`;
            });
            msg += `------------------------------\n💰 *Total: ${document.getElementById('cartTotal').innerText}*\n\n_Pedido feito pela sua Amarelinha!_`;
            window.open(`https://wa.me/55${lojaWpp}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        renderMarketplace();
    </script>
</body>
</html>
