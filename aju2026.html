<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amarelinhas | Versão Clara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --amarelo: #FFD700; 
            --verde-suave: #22c55e; 
            --verde-fundo: #f0fdf4;
            --texto: #064e3b;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--verde-fundo); color: var(--texto); }
        .font-black-italic { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; font-style: italic; }
        
        /* Botões com visibilidade máxima */
        .btn-acao { 
            background-color: var(--verde-suave); 
            color: white; 
            font-weight: 900; 
            padding: 15px 30px; 
            border-radius: 25px; 
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            transition: all 0.2s;
        }
        .btn-acao:hover { transform: scale(1.05); }
        
        .card { background: white; border-radius: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">

    <header class="bg-gradient-to-b from-[var(--amarelo)] to-[var(--verde-fundo)] pt-10 pb-16 px-6 rounded-b-[3rem]">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="font-black-italic text-4xl mb-8">AMARELINHAS</h1>
            
            <div class="bg-emerald-600 p-6 rounded-[2rem] border-4 border-white shadow-xl flex flex-col md:flex-row items-center justify-between gap-4 mb-10">
                <div class="text-left">
                    <p class="text-white font-black italic text-xl uppercase">Cadastre sua Loja!</p>
                    <p class="text-emerald-50 text-xs font-bold">Aumente suas vendas hoje mesmo.</p>
                </div>
                <button class="bg-white text-emerald-600 px-6 py-3 rounded-xl font-black italic text-sm">QUERO CADASTRAR</button>
            </div>

            <div class="relative group">
                <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-emerald-400"></i>
                <input type="text" id="searchInput" onkeyup="search()" placeholder="O que você procura hoje?" 
                    class="w-full p-6 pl-14 rounded-full shadow-2xl border-2 border-emerald-50 outline-none focus:border-emerald-400 font-bold">
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 -mt-10">
        
        <div id="viewMarket">
            <h2 class="font-black italic text-xl mb-6 px-4 uppercase">Lojas em Destaque</h2>
            <div id="listaLojas" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                </div>
        </div>

        <div id="viewProdutos" class="hidden">
            <button onclick="goBack()" class="btn-acao mb-8">
                <i class="fas fa-arrow-left"></i> VOLTAR PARA AS LOJAS
            </button>
            
            <div id="infoLoja" class="card p-8 text-center mb-8 border-b-4 border-yellow-400">
                </div>

            <h3 class="font-black italic text-lg mb-4 uppercase px-4">Cardápio do Dia</h3>
            <div id="gridProdutos" class="grid grid-cols-1 gap-4">
                </div>
        </div>
    </main>

    <div id="cartBar" class="fixed bottom-6 right-6 hidden">
        <button onclick="openCart()" class="bg-emerald-600 text-white p-6 rounded-full shadow-2xl flex items-center gap-4 border-4 border-white btn-acao">
            <i class="fas fa-shopping-basket text-2xl"></i>
            <span id="cartCount" class="text-2xl font-black">0</span>
        </button>
    </div>

    <div id="modalCart" class="fixed inset-0 bg-white z-[500] hidden flex flex-col">
        <div class="p-6 bg-emerald-50 border-b flex justify-between items-center">
            <h2 class="font-black italic text-xl">MEU PEDIDO</h2>
            <button onclick="closeCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>
        <div class="p-8 border-t bg-white">
            <div class="flex justify-between font-black text-2xl mb-6 italic">
                <span>TOTAL:</span>
                <span id="totalPrice">R$ 0,00</span>
            </div>
            <button onclick="sendWhatsApp()" class="btn-acao w-full text-xl uppercase italic">
                CONCLUIR E ENVIAR PEDIDO
            </button>
        </div>
    </div>

    <script>
        // Banco de Dados de Exemplo (Certifique-se de que os dados existem)
        const lojas = [
            {
                id: 1,
                nome: "PIZZARIA DO ROB",
                categoria: "ALIMENTAÇÃO",
                img: "https://via.placeholder.com/150",
                whatsapp: "5579999999999",
                produtos: [
                    { id: 101, nome: "Pizza de Calabresa G", preco: 45.90, img: "https://via.placeholder.com/80" },
                    { id: 102, nome: "Pizza de Frango G", preco: 48.00, img: "https://via.placeholder.com/80" }
                ]
            },
            {
                id: 2,
                nome: "ÁGUA MINERAL AJU",
                categoria: "ÁGUA",
                img: "https://via.placeholder.com/150",
                whatsapp: "5579888888888",
                produtos: [
                    { id: 201, nome: "Garrafão 20L", preco: 12.00, img: "https://via.placeholder.com/80" }
                ]
            }
        ];

        let cart = [];
        let currentLoja = null;

        function renderLojas(data = lojas) {
            const container = document.getElementById('listaLojas');
            container.innerHTML = data.map(loja => `
                <div onclick="showLoja(${loja.id})" class="card p-6 flex items-center gap-6 cursor-pointer hover:border-emerald-400 border-2 border-transparent transition">
                    <img src="${loja.img}" class="w-24 h-24 rounded-2xl object-cover shadow">
                    <div>
                        <span class="text-[10px] font-black text-emerald-500 uppercase">${loja.categoria}</span>
                        <h3 class="font-black italic text-xl uppercase">${loja.nome}</h3>
                        <p class="text-xs font-bold text-emerald-600 mt-1"><i class="fas fa-clock"></i> 20-30 MIN • FRETE GRÁTIS</p>
                    </div>
                </div>
            `).join('');
        }

        function showLoja(id) {
            currentLoja = lojas.find(l => l.id === id);
            document.getElementById('viewMarket').classList.add('hidden');
            document.getElementById('viewProdutos').classList.remove('hidden');
            
            document.getElementById('infoLoja').innerHTML = `
                <img src="${currentLoja.img}" class="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-emerald-100 shadow-lg">
                <h2 class="text-3xl font-black italic uppercase">${currentLoja.nome}</h2>
                <span class="inline-block mt-2 bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full font-black text-[10px]">ABERTO AGORA</span>
            `;

            renderProdutos();
        }

        function renderProdutos() {
            const container = document.getElementById('gridProdutos');
            container.innerHTML = currentLoja.produtos.map(p => {
                const itemNoCart = cart.find(c => c.id === p.id);
                const qtd = itemNoCart ? itemNoCart.qtd : 0;
                
                return `
                    <div class="card p-4 flex items-center gap-4">
                        <img src="${p.img}" class="w-20 h-20 rounded-xl object-cover">
                        <div class="flex-1">
                            <h4 class="font-bold uppercase text-sm">${p.nome}</h4>
                            <p class="text-emerald-600 font-black text-xl italic">R$ ${p.preco.toFixed(2)}</p>
                        </div>
                        <div class="flex items-center gap-3 bg-emerald-50 p-2 rounded-xl">
                            <button onclick="updateQty(${p.id}, -1)" class="w-8 h-8 font-black text-emerald-700">-</button>
                            <span class="font-black text-lg">${qtd}</span>
                            <button onclick="updateQty(${p.id}, 1)" class="bg-emerald-500 text-white w-8 h-8 rounded-lg font-black shadow-md">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateQty(pid, delta) {
            const p = currentLoja.produtos.find(prod => prod.id === pid);
            const index = cart.findIndex(c => c.id === pid);

            if (index > -1) {
                cart[index].qtd += delta;
                if (cart[index].qtd <= 0) cart.splice(index, 1);
            } else if (delta > 0) {
                cart.push({ ...p, qtd: 1 });
            }

            renderProdutos();
            updateUI();
        }

        function updateUI() {
            const totalItems = cart.reduce((acc, item) => acc + item.qtd, 0);
            document.getElementById('cartCount').innerText = totalItems;
            document.getElementById('cartBar').classList.toggle('hidden', totalItems === 0);
            
            let totalMoney = cart.reduce((acc, item) => acc + (item.preco * item.qtd), 0);
            document.getElementById('totalPrice').innerText = `R$ ${totalMoney.toFixed(2)}`;
        }

        function sendWhatsApp() {
            let msg = `*PEDIDO AMARELINHAS*\n\n`;
            msg += `*LOJA:* ${currentLoja.nome}\n\n`;
            cart.forEach(i => msg += `• ${i.qtd}x ${i.nome}\n`);
            msg += `\n*TOTAL: ${document.getElementById('totalPrice').innerText}*`;
            
            window.open(`https://wa.me/${currentLoja.whatsapp}?text=${encodeURIComponent(msg)}`);
        }

        function goBack() {
            document.getElementById('viewMarket').classList.remove('hidden');
            document.getElementById('viewProdutos').classList.add('hidden');
            document.getElementById('cartBar').classList.add('hidden');
            cart = [];
        }

        function openCart() { document.getElementById('modalCart').classList.remove('hidden'); renderCartItems(); }
        function closeCart() { document.getElementById('modalCart').classList.add('hidden'); }
        
        function renderCartItems() {
            const container = document.getElementById('cartItems');
            container.innerHTML = cart.map(i => `
                <div class="flex justify-between border-b pb-4">
                    <span class="font-bold">${i.qtd}x ${i.nome}</span>
                    <span class="font-black text-emerald-600">R$ ${(i.preco * i.qtd).toFixed(2)}</span>
                </div>
            `).join('');
        }

        renderLojas();
    </script>
</body>
</html>
