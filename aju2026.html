<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Amarelinhas | Aracaju</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* MANTENDO O ESTILO ORIGINAL DAS IMAGENS */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000; /* Fundo preto para as estrelas aparecerem */
            color: white;
            overflow-x: hidden;
        }

        header {
            background-color: #ffcc00; /* Amarelo Amarelinhas */
            padding: 30px 10px;
            text-align: center;
            color: black;
            font-weight: bold;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
            font-style: italic;
        }

        /* --- EFEITO ESTRELAS BRILHANDO --- */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: blink 2s infinite alternate;
            z-index: 0;
        }

        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* --- AGRUPAR TRÊS LOJAS POR FILEIRA --- */
        .lojas-section {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .lojas-section h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .lojas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 lojas por linha */
            gap: 20px;
        }

        .card-loja {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .card-loja:hover {
            border-color: #ffcc00;
            transform: translateY(-5px);
        }

        .card-loja img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .status-aberto {
            color: #25d366;
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }

        /* --- CHECKOUT COM CAMPO DE TELEFONE --- */
        .checkout-container {
            max-width: 450px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            color: #333;
            position: relative;
            z-index: 1;
        }

        .checkout-container h3 {
            text-align: center;
            margin-top: 0;
        }

        .input-grupo {
            margin-bottom: 15px;
        }

        .input-grupo input, .input-grupo select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-enviar {
            width: 100%;
            background-color: #25d366;
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        /* --- WHATSAPP FLUTUANTE --- */
        .zap-flutuante {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            transition: 0.3s;
        }

        .zap-flutuante:hover {
            transform: scale(1.1);
        }

        /* RESPONSIVO PARA CELULAR */
        @media (max-width: 800px) {
            .lojas-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>DELIVERY AMARELINHAS</h1>
        <p>Aracaju e Região</p>
    </header>

    <div class="lojas-section">
        <h2>Lojas em Destaque</h2>
        <div class="lojas-grid">
            <div class="card-loja">
                <img src="https://via.placeholder.com/70" alt="Loja">
                <h3>FERFEEFREFFE</h3>
                <span class="status-aberto">● Aberto Agora</span>
                <p>Água Mineral</p>
            </div>

            <div class="card-loja">
                <img src="https://via.placeholder.com/70" alt="Loja">
                <h3>EWFFFWF</h3>
                <span class="status-aberto">● Aberto Agora</span>
                <p>Alimentação</p>
            </div>

            <div class="card-loja">
                <img src="https://via.placeholder.com/70" alt="Loja">
                <h3>PIZZARIA ROBS</h3>
                <span class="status-aberto">● Aberto Agora</span>
                <p>Pizzas</p>
            </div>
        </div>
    </div>

    <div class="checkout-container">
        <h3>Finalizar Pedido</h3>
        <div class="input-grupo">
            <input type="text" placeholder="Seu Nome Completo">
        </div>
        <div class="input-grupo">
            <input type="text" placeholder="Endereço (Rua, Número, Bairro)">
        </div>
        <div class="input-grupo">
            <input type="tel" placeholder="Telefone de Contato (WhatsApp)">
        </div>
        <div class="input-grupo">
            <select>
                <option>Forma de Pagamento: Pix</option>
                <option>Cartão</option>
                <option>Dinheiro</option>
            </select>
        </div>
        <button class="btn-enviar">CONCLUIR E ENVIAR PEDIDO</button>
    </div>

    <a href="https://wa.me/5579999769581" class="zap-flutuante" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="60" alt="WhatsApp">
    </a>

    <script>
        // Script para gerar estrelas dinamicamente no fundo
        function criarEstrelas() {
            const body = document.body;
            for (let i = 0; i < 100; i++) {
                const estrela = document.createElement("div");
                estrela.className = "star";
                const tamanho = Math.random() * 3 + "px";
                estrela.style.width = tamanho;
                estrela.style.height = tamanho;
                estrela.style.left = Math.random() * 100 + "vw";
                estrela.style.top = Math.random() * 100 + "vh";
                estrela.style.animationDelay = Math.random() * 2 + "s";
                body.appendChild(estrela);
            }
        }
        criarEstrelas();
    </script>

</body>
</html>
