<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-20 font-sans">

    <nav class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <h1 class="text-center font-black text-red-600 text-xl tracking-tighter uppercase italic">MEU<span class="text-gray-900">DELIVERY</span></h1>
    </nav>

    <main class="max-w-xl mx-auto p-4">
        <h2 class="font-black text-gray-900 text-lg mb-6 border-l-4 border-red-600 pl-3">CARDÁPIO DO DIA</h2>
        
        <div id="grid-loja" class="grid grid-cols-1 gap-4">
            </div>

        <div id="loja-vazia" class="hidden text-center py-20 text-gray-400">
            <i class="fas fa-utensils text-4xl mb-4"></i>
            <p class="font-bold">Estamos preparando as delícias...</p>
            <p class="text-sm">Volte em instantes!</p>
        </div>
    </main>

    <script>
        const IMG_DEFAULT = "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200";

        function carregarLoja() {
            const db = JSON.parse(localStorage.getItem('meu_delivery_db')) || [];
            const grid = document.getElementById('grid-loja');
            const vazia = document.getElementById('loja-vazia');

            // Mostra apenas itens ATIVOS
            const ativos = db.filter(p => p.ativo === true);

            if (ativos.length === 0) {
                vazia.classList.remove('hidden');
                grid.innerHTML = '';
                return;
            }

            vazia.classList.add('hidden');
            grid.innerHTML = ativos.map(p => `
                <div class="bg-white p-3 rounded-3xl border border-gray-100 flex items-center gap-4 shadow-sm hover:shadow-md transition">
                    <div class="relative">
                        <img src="${p.img}" onerror="this.src='${IMG_DEFAULT}'" class="w-24 h-24 object-cover rounded-2xl shadow-inner">
                    </div>
                    <div class="flex-1">
                        <span class="text-[9px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-black uppercase">${p.cat}</span>
                        <h3 class="font-bold text-gray-900 py-1 text-base uppercase">${p.nome}</h3>
                        <div class="flex justify-between items-end mt-1">
                            <span class="text-green-600 font-black text-lg font-mono">R$ ${p.preco.toFixed(2)}</span>
                            <button class="bg-red-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg shadow-red-200 active:scale-90 transition">
                                <i class="fas fa-plus text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Atualiza se você trocar de aba e voltar
        window.onfocus = carregarLoja;
        carregarLoja();
    </script>
</body>
</html>
