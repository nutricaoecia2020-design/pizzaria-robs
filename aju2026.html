<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Amarelinhas | Aracaju</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --amarelo: #FFD700; --verde-suave: #22c55e; --verde-fundo: #f0fdf4; --texto: #064e3b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--verde-fundo); color: var(--texto); margin: 0; }
        .font-black-italic { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; font-style: italic; }
        
        @keyframes brilho { 0%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px var(--amarelo); } 50% { text-shadow: 0 0 30px var(--amarelo), 0 0 40px #ffea00; } }
        .stars-glow { animation: brilho 2s infinite; }

        @keyframes vibrate { 0% { transform: translate(0); } 25% { transform: translate(-2px, 2px); } 50% { transform: translate(2px, -2px); } 75% { transform: translate(-2px, -2px); } 100% { transform: translate(0); } }
        .wpp-vibrate { animation: vibrate 0.4s linear infinite; }
        
        .card { background: white; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .btn-acao { background-color: var(--verde-suave); color: white; font-weight: 900; border-radius: 20px; transition: all 0.2s; }
        .btn-acao:hover { opacity: 0.9; transform: scale(1.02); }
        
        #modalCart { transition: transform 0.3s ease-in-out; z-index: 2001; }
        .hidden-cart { transform: translateX(100%); }
        .visible-cart { transform: translateX(0); }
    </style>
</head>
<body class="pb-24">

    <header class="bg-gradient-to-b from-[var(--amarelo)] to-[var(--verde-fundo)] pt-12 pb-20 px-6 rounded-b-[4rem] text-center">
        <h1 class="font-black-italic text-4xl mb-8 stars-glow text-emerald-900 uppercase">DELIVERY AMARELINHAS</h1>
        
        <div class="max-w-4xl mx-auto bg-emerald-600 p-6 rounded-[2rem] border-4 border-white shadow-2xl flex flex-col md:flex-row items-center justify-between gap-6 mb-10">
            <div class="text-left text-white">
                <p class="font-black italic text-2xl leading-none uppercase">SEJA UM PARCEIRO AMARELINHAS!</p>
                <p class="text-sm font-bold opacity-90">Cadastre seu negócio: (79) 99976-9581</p>
            </div>
            <button onclick="window.open('https://wa.me/5579999769581')" class="bg-white text-emerald-600 px-8 py-4 rounded-2xl font-black italic">CADASTRAR LOJA</button>
        </div>

        <div class="max-w-2xl mx-auto relative">
            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-emerald-500"></i>
            <input type="text" id="searchInput" onkeyup="search()" placeholder="O que você procura hoje?" class="w-full p-6 pl-16 rounded-full shadow-xl border-none outline-none font-bold text-lg">
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 -mt-12 min-h-[500px]">
        <div id="viewMarket">
            <h2 class="font-black italic text-2xl mb-8 px-4 uppercase text-emerald-800">Lojas em Aracaju</h2>
            <div id="listaLojas" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <div id="viewProdutos" class="hidden">
            <button onclick="goBack()" class="btn-acao px-6 py-3 mb-8 flex items-center gap-2 shadow-lg"><i class="fas fa-arrow-left"></i> VOLTAR</button>
            <div id="infoLojaHeader" class="card p-10 text-center mb-10 border-b-8 border-yellow-400"></div>
            <div id="gridProdutos" class="space-y-4"></div>
        </div>
    </main>

    <footer class="bg-emerald-950 text-white mt-32 pt-20 pb-12 px-8 rounded-t-[5rem]">
        <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-16 mb-16">
            <div>
                <h3 class="font-black-italic text-2xl mb-6 text-yellow-400">AMARELINHAS</h3>
                <p class="text-emerald-200 leading-relaxed">Conectando você aos melhores de Aracaju.</p>
            </div>
            <div>
                <h4 class="font-black italic text-lg mb-6 uppercase">CONTATO ADM</h4>
                <p class="text-emerald-200"><i class="fab fa-whatsapp"></i> (79) 99976-9581</p>
            </div>
            <div>
                <h4 class="font-black italic text-lg mb-6 uppercase">MISSÃO</h4>
                <p class="text-emerald-200 italic">"Tecnologia simples e eficiente."</p>
            </div>
        </div>
        <div class="text-center border-t border-emerald-900 pt-10 text-emerald-500 font-bold text-[10px]">© 2026 DELIVERY AMARELINHAS</div>
    </footer>

    <div id="cartBar" class="fixed bottom-6 right-6 hidden z-[100]">
        <button onclick="openCart()" class="bg-emerald-600 text-white px-8 py-6 rounded-full shadow-2xl flex items-center gap-4 border-4 border-white">
            <i class="fas fa-shopping-basket text-3xl"></i>
            <span id="cartCount" class="text-3xl font-black">0</span>
        </button>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/60 z-[2000] hidden" onclick="closeCart()"></div>
    <div id="modalCart" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col hidden-cart">
        <div class="p-8 bg-emerald-50 flex justify-between items-center border-b">
            <h2 class="font-black italic text-2xl uppercase">Meu Pedido</h2>
            <button onclick="closeCart()" class="text-3xl font-black">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-4">
            <div id="cartItems"></div>
            <div class="mt-8 bg-emerald-50 p-6 rounded-3xl space-y-4 border border-emerald-100">
                <input type="text" id="clienteNome" placeholder="Seu Nome" class="w-full p-4 rounded-xl border-none font-bold">
                <input type="text" id="clienteEnd" placeholder="Endereço" class="w-full p-4 rounded-xl border-none font-bold">
                <input type="tel" id="clienteTel" placeholder="Seu Telefone / WhatsApp" class="w-full p-4 rounded-xl border-none font-bold">
                
                <select id="clientePag" class="w-full p-4 rounded-xl border-none font-bold bg-white">
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>
        </div>
        <div class="p-8 border-t bg-emerald-50">
            <div class="flex justify-between font-black text-2xl mb-8 italic">
                <span>TOTAL:</span>
                <span id="totalPrice" class="text-emerald-700">R$ 0,00</span>
            </div>
            <button onclick="sendWhatsApp()" class="btn-acao w-full py-6 text-xl uppercase italic shadow-xl">ENVIAR NO WHATSAPP</button>
        </div>
    </div>

    <script>
        let dbLojas = JSON.parse(localStorage.getItem('amarelinhas_db')) || [];
        let cart = [];
        let currentLoja = null;

        function renderLojas(filtro = dbLojas) {
            const container = document.getElementById('listaLojas');
            if(filtro.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center py-10 font-bold text-emerald-800">Nenhuma loja cadastrada no ADM.</p>`;
                return;
            }
            container.innerHTML = filtro.map(l => `
                <div onclick="showLoja('${l.id}')" class="card p-6 flex items-center gap-6 cursor-pointer border-4 border-transparent hover:border-emerald-400">
                    <img src="${l.img}" class="w-24 h-24 rounded-3xl object-cover shadow-lg bg-emerald-50" onerror="this.src='https://via.placeholder.com/150?text=LOJA'">
                    <div>
                        <span class="text-[10px] font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full uppercase">${l.categoria}</span>
                        <h3 class="font-black-italic text-xl italic mt-2">${l.nome}</h3>
                        <p class="text-[11px] font-bold text-emerald-500 mt-1 uppercase">Clique para abrir</p>
                    </div>
                </div>
            `).join('');
        }

        function showLoja(id) {
            currentLoja = dbLojas.find(l => l.id === id);
            document.getElementById('viewMarket').classList.add('hidden');
            document.getElementById('viewProdutos').classList.remove('hidden');
            document.getElementById('infoLojaHeader').innerHTML = `
                <img src="${currentLoja.img}" class="w-32 h-32 rounded-full mx-auto mb-6 border-8 border-emerald-50 shadow-2xl object-cover" onerror="this.src='https://via.placeholder.com/150?text=LOJA'">
                <h2 class="text-3xl font-black italic uppercase">${currentLoja.nome}</h2>
            `;
            renderProdutos();
        }

        function renderProdutos() {
            const container = document.getElementById('gridProdutos');
            if(!currentLoja.produtos || currentLoja.produtos.length === 0) {
                container.innerHTML = `<p class="text-center py-10 font-bold text-gray-400">Nenhum produto nesta loja.</p>`;
                return;
            }
            container.innerHTML = currentLoja.produtos.map(p => {
                const itemNoCarrinho = cart.find(c => c.id === p.id);
                const qtd = itemNoCarrinho ? itemNoCarrinho.qtd : 0;
                return `
                    <div class="card p-5 flex items-center gap-6">
                        <img src="${p.img}" class="w-20 h-20 rounded-2xl object-cover shadow-sm bg-gray-50" onerror="this.src='https://via.placeholder.com/100?text=ITEM'">
                        <div class="flex-1">
                            <h4 class="font-bold text-emerald-900 uppercase text-sm">${p.nome}</h4>
                            <p class="text-emerald-600 font-black text-2xl italic mt-1">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                        </div>
                        <div class="flex items-center gap-4 bg-emerald-50 p-3 rounded-2xl border border-emerald-100">
                            <button onclick="updateQty('${p.id}', -1)" class="w-8 h-8 font-black text-emerald-800">-</button>
                            <span class="font-black text-xl">${qtd}</span>
                            <button onclick="updateQty('${p.id}', 1)" class="bg-emerald-500 text-white w-10 h-10 rounded-xl font-black shadow-md">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateQty(pid, delta) {
            const prod = currentLoja.produtos.find(p => p.id == pid);
            const index = cart.findIndex(c => c.id == pid);
            if (index > -1) {
                cart[index].qtd += delta;
                if (cart[index].qtd <= 0) cart.splice(index, 1);
            } else if (delta > 0) {
                cart.push({ ...prod, qtd: 1 });
            }
            renderProdutos(); 
            updateUI();
        }

        function updateUI() {
            const count = cart.reduce((acc, i) => acc + i.qtd, 0);
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartBar').classList.toggle('hidden', count === 0);
            const total = cart.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            document.getElementById('totalPrice').innerText = `R$ ${total.toFixed(2)}`;
        }

        function openCart() {
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.getElementById('modalCart').classList.remove('hidden-cart');
            document.getElementById('modalCart').classList.add('visible-cart');
            document.getElementById('cartItems').innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-emerald-50 mb-2">
                    <p class="font-black text-emerald-900">${i.qtd}x ${i.nome}</p>
                    <span class="font-black text-emerald-700">R$ ${(i.preco * i.qtd).toFixed(2)}</span>
                </div>
            `).join('');
        }

        function closeCart() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.getElementById('modalCart').classList.add('hidden-cart');
            document.getElementById('modalCart').classList.remove('visible-cart');
        }

        function search() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const filtradas = dbLojas.filter(l => l.nome.toLowerCase().includes(termo));
            renderLojas(filtradas);
        }

        function sendWhatsApp() {
            const nome = document.getElementById('clienteNome').value;
            const end = document.getElementById('clienteEnd').value;
            const tel = document.getElementById('clienteTel').value;
            
            if(!nome || !end || !tel) return alert("Preencha Nome, Endereço e Telefone!");

            let msg = `*PEDIDO: ${currentLoja.nome.toUpperCase()}*\n\n`;
            msg += `*Cliente:* ${nome}\n*Telefone:* ${tel}\n*Endereço:* ${end}\n*Pagamento:* ${document.getElementById('clientePag').value}\n`;
            msg += `----------------------------\n`;
            cart.forEach(i => msg += `✅ ${i.qtd}x ${i.nome} - R$ ${(i.preco*i.qtd).toFixed(2)}\n`);
            msg += `----------------------------\n`;
            msg += `*TOTAL: ${document.getElementById('totalPrice').innerText}*`;
            window.open(`https://wa.me/${currentLoja.whatsapp}?text=${encodeURIComponent(msg)}`);
        }

        function goBack() {
            document.getElementById('viewMarket').classList.remove('hidden');
            document.getElementById('viewProdutos').classList.add('hidden');
            cart = []; updateUI();
        }

        renderLojas();
    </script>
</body>
</html>
