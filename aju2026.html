<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-20">

    <nav class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <h1 class="text-center font-bold text-red-600 text-xl italic">MEU<span class="text-gray-800">DELIVERY</span></h1>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <h2 class="font-bold text-gray-800 text-lg mb-4">Cardápio do Dia</h2>
        
        <div id="grid-loja" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>

        <div id="loja-vazia" class="hidden text-center py-20 text-gray-400">
            <i class="fas fa-shopping-basket text-4xl mb-2"></i>
            <p>Nenhum produto ativo no momento.</p>
        </div>
    </main>

    <script>
        function carregarLoja() {
            const db = JSON.parse(localStorage.getItem('meu_delivery_db')) || [];
            const grid = document.getElementById('grid-loja');
            const vazia = document.getElementById('loja-vazia');

            // Filtra apenas produtos ATIVOS
            const ativos = db.filter(p => p.ativo === true);

            if (ativos.length === 0) {
                vazia.classList.remove('hidden');
                grid.innerHTML = '';
                return;
            }

            vazia.classList.add('hidden');
            grid.innerHTML = ativos.map(p => `
                <div class="bg-white p-3 rounded-2xl border flex items-center gap-4 shadow-sm">
                    <img src="${p.img}" class="w-20 h-20 object-cover rounded-xl shadow-inner">
                    <div class="flex-1">
                        <span class="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded font-bold uppercase">${p.cat}</span>
                        <h3 class="font-bold text-gray-800 py-1">${p.nome}</h3>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-green-600 font-bold">R$ ${p.preco.toFixed(2)}</span>
                            <button class="bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Atualiza a loja toda vez que a janela ganha foco (ex: voltou do admin)
        window.onfocus = carregarLoja;
        carregarLoja();
    </script>
</body>
</html>
