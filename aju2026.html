<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quero Delivery | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --quero-orange: #FF5E00; --quero-purple: #4B1D6E; }
        .text-quero { color: var(--quero-orange); }
        .bg-quero { background-color: var(--quero-orange); }
        .bg-purple-quero { background-color: var(--quero-purple); }
        .font-black-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
    </style>
</head>
<body class="bg-gray-50 pb-24 font-sans">

    <header class="bg-purple-quero p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <img src="https://logodownload.org/wp-content/uploads/2020/09/quero-delivery-logo.png" class="w-24 brightness-200" alt="Quero">
            <div class="text-white text-[10px] font-bold text-right leading-tight">
                <p>ENTREGAR EM:</p>
                <p class="text-orange-400">Aracaju, SE <i class="fas fa-chevron-down"></i></p>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 min-h-screen">
        
        <section id="viewMarketplace">
            <div class="mb-6">
                <h2 class="font-black-italic text-gray-800 text-xl mb-1">Explore Lojas</h2>
                <p class="text-xs text-gray-400 font-bold uppercase">As melhores opções perto de você</p>
            </div>
            <div id="gridLojas" class="grid grid-cols-1 gap-4">
                </div>
        </section>

        <section id="viewCardapio" class="hidden">
            <button onclick="goBack()" class="mb-6 text-quero font-bold text-sm flex items-center bg-orange-50 px-4 py-2 rounded-full w-fit">
                <i class="fas fa-chevron-left mr-2"></i> VOLTAR PARA LOJAS
            </button>
            <div id="storeHeader" class="mb-8">
                </div>
            <div id="menuContainer" class="space-y-6">
                </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around items-center z-50">
        <div class="text-center text-quero"><i class="fas fa-home text-xl"></i><p class="text-[10px] font-bold">Início</p></div>
        <div class="text-center text-gray-300"><i class="fas fa-search text-xl"></i><p class="text-[10px] font-bold">Busca</p></div>
        <div class="text-center text-gray-300"><i class="fas fa-list text-xl"></i><p class="text-[10px] font-bold">Pedidos</p></div>
        <div class="text-center text-gray-300"><i class="fas fa-user text-xl"></i><p class="text-[10px] font-bold">Perfil</p></div>
    </nav>

    <script>
        const db = JSON.parse(localStorage.getItem('quero_db')) || [];

        function renderMarketplace() {
            const container = document.getElementById('gridLojas');
            if(db.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-gray-300 font-bold italic">Nenhuma loja aberta no momento :(</div>`;
                return;
            }
            container.innerHTML = db.map(loja => `
                <div onclick="openStore('${loja.id}')" class="bg-white p-4 rounded-3xl border-2 border-gray-100 flex items-center gap-4 shadow-sm hover:shadow-xl transition-all cursor-pointer">
                    <img src="${loja.img}" class="w-20 h-20 rounded-2xl object-cover shadow-inner">
                    <div class="flex-1">
                        <h3 class="font-black-italic text-gray-800 text-base leading-tight">${loja.nome}</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase mt-1"><i class="fas fa-clock text-orange-400"></i> 25-35 min • <span class="text-green-500">Entrega Grátis</span></p>
                        <div class="flex items-center gap-1 mt-2">
                             <i class="fas fa-star text-orange-400 text-[10px]"></i><span class="text-[10px] font-bold text-gray-600">4.9</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openStore(id) {
            const loja = db.find(l => l.id === id);
            document.getElementById('viewMarketplace').classList.add('hidden');
            document.getElementById('viewCardapio').classList.remove('hidden');

            document.getElementById('storeHeader').innerHTML = `
                <div class="flex items-center gap-4">
                    <img src="${loja.img}" class="w-24 h-24 rounded-3xl object-cover shadow-lg border-4 border-white">
                    <div>
                        <h2 class="text-2xl font-black-italic text-gray-800 leading-none">${loja.nome}</h2>
                        <span class="inline-block mt-2 bg-green-100 text-green-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Aberto agora</span>
                    </div>
                </div>
            `;

            const containerMenu = document.getElementById('menuContainer');
            const ativos = loja.produtos.filter(p => p.ativo);
            
            if(ativos.length === 0) {
                containerMenu.innerHTML = `<p class="text-center py-20 text-gray-300 font-bold italic">O cardápio está sendo atualizado...</p>`;
                return;
            }

            containerMenu.innerHTML = ativos.map(p => `
                <div class="bg-white p-4 rounded-3xl border border-gray-100 flex items-center gap-4 shadow-sm relative overflow-hidden group">
                    <img src="${p.img}" class="w-24 h-24 rounded-2xl object-cover group-hover:scale-105 transition duration-500">
                    <div class="flex-1">
                        <span class="text-[8px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded font-black uppercase tracking-widest">${p.cat}</span>
                        <h4 class="font-black-italic text-gray-800 text-sm mt-1 uppercase leading-tight">${p.nome}</h4>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-quero font-black text-lg">R$ ${p.preco.toFixed(2)}</span>
                            <button onclick="fazerPedido('${loja.whatsapp}', '${p.nome}', ${p.preco})" class="bg-quero text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-200 active:scale-90 transition">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            window.scrollTo(0,0);
        }

        function fazerPedido(wpp, produto, preco) {
            const texto = `🍟 *NOVO PEDIDO (Via Quero Delivery)*\n------------------------------\n*Item:* ${produto}\n*Preço:* R$ ${preco.toFixed(2)}\n------------------------------\n_Gostaria de confirmar meu pedido!_`;
            const link = `https://wa.me/55${wpp}?text=${encodeURIComponent(texto)}`;
            window.open(link, '_blank');
        }

        function goBack() {
            document.getElementById('viewMarketplace').classList.remove('hidden');
            document.getElementById('viewCardapio').classList.add('hidden');
        }

        renderMarketplace();
    </script>
</body>
</html>
