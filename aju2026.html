<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Amarelinhas | Aracaju</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --amarelo: #ffcc00;
            --verde-btn: #25d366;
            --dark-bg: #121212;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* --- EFEITO ESTRELAS BRILHANDO --- */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        /* --- LAYOUT DE LOJAS (3 POR FILA) --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .lojas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 Lojas por fileira */
            gap: 20px;
            margin-top: 30px;
        }

        @media (max-width: 992px) {
            .lojas-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .lojas-grid { grid-template-columns: 1fr; }
        }

        .loja-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .loja-card:hover {
            transform: translateY(-5px);
            border-color: var(--amarelo);
        }

        /* --- FORMULÁRIO DE CHECKOUT --- */
        .checkout-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            color: #333;
        }

        .checkout-form input, .checkout-form select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        /* --- BOTÃO WHATSAPP FLUTUANTE --- */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--verde-btn);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            text-decoration: none;
            transition: 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            background-color: #128c7e;
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <header style="background: var(--amarelo); padding: 40px 20px; text-align: center; color: black;">
        <h1 style="margin: 0; font-style: italic;">DELIVERY AMARELINHAS</h1>
        <p>Aracaju e Região</p>
    </header>

    <div class="container">
        <h2 style="text-align: center; margin-top: 40px;">Lojas em Destaque</h2>
        
        <div class="lojas-grid">
            <div class="loja-card">
                <img src="https://via.placeholder.com/80" alt="Loja" style="border-radius: 50%;">
                <h3>FERFEEFREFFE</h3>
                <span style="color: var(--verde-btn);">● Aberto Agora</span>
                <p>Água Mineral</p>
            </div>

            <div class="loja-card">
                <img src="https://via.placeholder.com/80" alt="Loja" style="border-radius: 50%;">
                <h3>EWFFFWF</h3>
                <span style="color: var(--verde-btn);">● Aberto Agora</span>
                <p>Alimentação</p>
            </div>

            <div class="loja-card">
                <img src="https://via.placeholder.com/80" alt="Loja" style="border-radius: 50%;">
                <h3>PIZZARIA ROBS</h3>
                <span style="color: var(--verde-btn);">● Aberto Agora</span>
                <p>Pizzas</p>
            </div>
        </div>

        <div id="checkout" style="margin-top: 50px; max-width: 500px; margin-left: auto; margin-right: auto;">
            <h3 style="text-align: center;">Finalizar Pedido</h3>
            <div class="checkout-form">
                <input type="text" placeholder="Seu Nome Completo">
                <input type="text" placeholder="Endereço (Rua, Número, Bairro)">
                <input type="tel" placeholder="Telefone de Contato (WhatsApp)" id="user_phone">
                <select>
                    <option value="pix">Forma de Pagamento: Pix</option>
                    <option value="cartao">Cartão de Crédito/Débito</option>
                    <option value="dinheiro">Dinheiro</option>
                </select>
                <button style="background: var(--verde-btn); color: white; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">
                    ENVIAR PEDIDO NO WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/5579999769581" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // Gerador de Estrelas Aleatórias
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                container.appendChild(star);
            }
        }
        createStars();
    </script>

</body>
</html>
