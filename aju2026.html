<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Aju | Amarelinhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amarelo: #FFD700; --preto: #000000; }
        .bg-amarelo { background-color: var(--amarelo); }
        .text-amarelo { color: var(--amarelo); }
        .font-black-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-zinc-50 pb-28 font-sans overflow-x-hidden">

    <header class="bg-amarelo p-6 sticky top-0 z-50 shadow-md rounded-b-[3rem]">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-preto font-black-italic text-3xl italic tracking-tighter">AMARELINHAS</h1>
                <div class="bg-black text-amarelo p-2 px-4 rounded-2xl text-[10px] font-black uppercase italic">Aracaju, SE</div>
            </div>
            
            <div class="relative max-w-2xl mx-auto">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                <input type="text" id="searchInput" onkeyup="searchGlobal()" placeholder="Buscar comida, farmácia ou mercado..." class="w-full bg-white p-4 pl-12 rounded-[1.5rem] shadow-inner font-bold outline-none border-2 border-transparent focus:border-black transition">
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-8">
        
        <section id="catSection">
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-2 justify-start md:justify-center">
                <div onclick="filterCat('ALIMENTAÇÃO')" class="flex-shrink-0 bg-white p-4 w-24 rounded-[2rem] border-2 border-zinc-100 flex flex-col items-center gap-2 shadow-sm cursor-pointer hover:border-amarelo transition">
                    <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-xl">🍔</div>
                    <span class="text-[9px] font-black uppercase italic">Comida</span>
                </div>
                <div onclick="filterCat('ÁGUA MINERAL')" class="flex-shrink-0 bg-white p-4 w-24 rounded-[2rem] border-2 border-zinc-100 flex flex-col items-center gap-2 shadow-sm cursor-pointer hover:border-amarelo transition">
                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-xl">💧</div>
                    <span class="text-[9px] font-black uppercase italic">Água</span>
                </div>
                <div onclick="filterCat('FARMÁCIA')" class="flex-shrink-0 bg-white p-4 w-24 rounded-[2rem] border-2 border-zinc-100 flex flex-col items-center gap-2 shadow-sm cursor-pointer hover:border-amarelo transition">
                    <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center text-xl">💊</div>
                    <span class="text-[9px] font-black uppercase italic">Saúde</span>
                </div>
                <div onclick="filterCat('MERCADO')" class="flex-shrink-0 bg-white p-4 w-24 rounded-[2rem] border-2 border-zinc-100 flex flex-col items-center gap-2 shadow-sm cursor-pointer hover:border-amarelo transition">
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-xl">🛒</div>
                    <span class="text-[9px] font-black uppercase italic">Mercado</span>
                </div>
            </div>
        </section>

        <section id="viewMarket">
            <h2 class="font-black-italic text-zinc-900 mb-6 text-xl italic px-2">Lojas Disponíveis</h2>
            <div id="listaLojas" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </section>

        <section id="viewLojaInterna" class="hidden max-w-2xl mx-auto">
            <button onclick="goBack()" class="mb-6 bg-zinc-200 px-6 py-2 rounded-full font-black text-xs italic text-zinc-600 flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> VOLTAR PARA O MARKETPLACE
            </button>
            <div id="headerLoja" class="mb-8"></div>
            <div id="menuLoja" class="grid grid-cols-1 gap-4">
                </div>
        </section>
    </main>

    <div id="cartFloat" class="fixed bottom-24 right-4 z-[100] hidden">
        <button onclick="toggleCart()" class="bg-black text-amarelo p-5 rounded-full shadow-2xl flex items-center gap-4 border-4 border-amarelo transform hover:scale-110 transition">
            <i class="fas fa-shopping-basket text-2xl"></i>
            <span id="cartCount" class="font-black text-2xl italic">0</span>
        </button>
    </div>

    <div id="modalCart" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md z-[200] flex flex-col">
        <div class="p-8 flex justify-between items-center bg-amarelo">
            <h2 class="font-black-italic text-2xl" id="cartStoreTitle">CARRINHO</h2>
            <button onclick="toggleCart()" class="text-3xl"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-8 space-y-4 text-white"></div>
        <div class="p-8 bg-zinc-900 border-t-2 border-amarelo">
            <div class="flex justify-between text-amarelo font-black text-2xl mb-6 italic">
                <span>TOTAL</span>
                <span id="cartTotal">R$ 0,00</span>
            </div>
            <button onclick="finalizarPedido()" class="w-full bg-amarelo text-preto py-5 rounded-2xl font-black italic text-xl uppercase">
                Enviar Pedido
            </button>
        </div>
    </div>

    <script>
        const db = JSON.parse(localStorage.getItem('amarelinhas_db')) || [];
        // Agora o carrinho é um OBJETO onde cada chave é o ID da loja
        let allCarts = JSON.parse(localStorage.getItem('amarelinhas_multi_carts')) || {};
        let activeLojaId = null;

        function renderMarketplace(data = db) {
            const container = document.getElementById('listaLojas');
            container.innerHTML = data.map(l => `
                <div onclick="openStore('${l.id}')" class="bg-white p-4 rounded-[2rem] border-2 border-transparent hover:border-amarelo transition shadow-sm cursor-pointer flex flex-col items-center text-center">
                    <img src="${l.img}" class="w-24 h-24 rounded-3xl object-cover mb-3 border shadow-sm">
                    <span class="text-[8px] bg-zinc-100 px-2 py-1 rounded font-black uppercase text-zinc-500">${l.categoria}</span>
                    <h3 class="font-black-italic text-zinc-900 text-lg mt-1 italic">${l.nome}</h3>
                    <div class="text-[9px] font-bold text-green-500 uppercase mt-2 italic">Aberto Agora</div>
                </div>
            `).join('');
        }

        function openStore(id) {
            activeLojaId = id;
            const loja = db.find(l => l.id === id);
            document.getElementById('viewMarket').classList.add('hidden');
            document.getElementById('catSection').classList.add('hidden');
            document.getElementById('viewLojaInterna').classList.remove('hidden');
            
            document.getElementById('headerLoja').innerHTML = `
                <div class="text-center">
                    <img src="${loja.img}" class="w-32 h-32 rounded-[2.5rem] mx-auto border-8 border-white shadow-xl mb-4">
                    <h2 class="text-3xl font-black-italic italic">${loja.nome}</h2>
                    <p class="text-zinc-400 font-bold uppercase text-xs tracking-widest mt-1">${loja.categoria}</p>
                </div>
            `;

            renderMenu();
            updateUI();
        }

        function renderMenu() {
            const loja = db.find(l => l.id === activeLojaId);
            const menu = document.getElementById('menuLoja');
            const storeCart = allCarts[activeLojaId] || [];

            menu.innerHTML = loja.produtos.map(p => {
                const inCart = storeCart.find(c => c.id === p.id);
                return `
                    <div class="bg-white p-4 rounded-3xl flex items-center gap-4 shadow-sm">
                        <img src="${p.img}" class="w-20 h-20 object-cover rounded-2xl border">
                        <div class="flex-1">
                            <h4 class="font-black italic text-zinc-800 uppercase text-sm">${p.nome}</h4>
                            <p class="text-green-600 font-black text-lg">R$ ${p.preco.toFixed(2)}</p>
                            <div class="flex items-center gap-4 mt-2">
                                <button onclick="updateQty(${p.id}, -1)" class="bg-zinc-100 w-8 h-8 rounded-lg font-black">-</button>
                                <span class="font-black italic" id="qty-${p.id}">${inCart ? inCart.qty : 0}</span>
                                <button onclick="updateQty(${p.id}, 1)" class="bg-amarelo w-8 h-8 rounded-lg font-black shadow-md">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateQty(pid, change) {
            if (!allCarts[activeLojaId]) allCarts[activeLojaId] = [];
            let storeCart = allCarts[activeLojaId];
            
            const prod = db.find(l => l.id === activeLojaId).produtos.find(p => p.id === pid);
            const itemIndex = storeCart.findIndex(c => c.id === pid);

            if (itemIndex > -1) {
                storeCart[itemIndex].qty += change;
                if (storeCart[itemIndex].qty <= 0) storeCart.splice(itemIndex, 1);
            } else if (change > 0) {
                storeCart.push({ ...prod, qty: 1 });
            }

            localStorage.setItem('amarelinhas_multi_carts', JSON.stringify(allCarts));
            renderMenu();
            updateUI();
        }

        function updateUI() {
            const storeCart = allCarts[activeLojaId] || [];
            const count = storeCart.reduce((acc, i) => acc + i.qty, 0);
            
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartFloat').classList.toggle('hidden', count === 0);
            
            if (activeLojaId) {
                const loja = db.find(l => l.id === activeLojaId);
                document.getElementById('cartStoreTitle').innerText = `CARRINHO: ${loja.nome}`;
            }
            renderCartModal();
        }

        function renderCartModal() {
            const container = document.getElementById('cartItems');
            const storeCart = allCarts[activeLojaId] || [];
            let total = 0;

            container.innerHTML = storeCart.map(item => {
                total += item.preco * item.qty;
                return `
                    <div class="flex justify-between items-center bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
                        <div class="flex items-center gap-3">
                            <span class="bg-amarelo text-preto px-2 rounded font-black italic">${item.qty}x</span>
                            <span class="font-black italic uppercase text-xs">${item.nome}</span>
                        </div>
                        <span class="text-amarelo font-black">R$ ${(item.preco * item.qty).toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').innerText = `R$ ${total.toFixed(2)}`;
        }

        function goBack() {
            activeLojaId = null;
            document.getElementById('viewMarket').classList.remove('hidden');
            document.getElementById('catSection').classList.remove('hidden');
            document.getElementById('viewLojaInterna').classList.add('hidden');
            document.getElementById('cartFloat').classList.add('hidden');
        }

        function toggleCart() { document.getElementById('modalCart').classList.toggle('hidden'); }

        function finalizarPedido() {
            const loja = db.find(l => l.id === activeLojaId);
            const storeCart = allCarts[activeLojaId];
            let msg = `🟡 *PEDIDO: ${loja.nome}*\n------------------\n`;
            storeCart.forEach(i => msg += `👉 *${i.qty}x* ${i.nome}\n`);
            msg += `------------------\n*TOTAL: ${document.getElementById('cartTotal').innerText}*`;
            window.open(`https://wa.me/55${loja.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function searchGlobal() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            renderMarketplace(db.filter(l => l.nome.toLowerCase().includes(t) || l.categoria.toLowerCase().includes(t)));
        }

        function filterCat(c) { renderMarketplace(db.filter(l => l.categoria === c)); }

        renderMarketplace();
    </script>
</body>
</html>
