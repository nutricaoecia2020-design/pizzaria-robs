<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Local | Peça Agora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .category-card:hover { transform: translateY(-5px); transition: 0.3s; }
        
        /* Esconde a barra de rolagem */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .snap-x { scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .snap-start { scroll-snap-align: start; }

        /* Estilo dos botões de navegação */
        .nav-btn {
            background: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            cursor: pointer;
            border: 1px solid #f3f4f6;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #f9fafb; color: #dc2626; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-4">
                    <h1 class="text-2xl font-bold text-red-600 tracking-tighter">MEU<span class="text-gray-800">DELIVERY</span></h1>
                    <div class="hidden md:flex items-center text-sm text-gray-500 bg-gray-100 p-2 rounded-lg">
                        <i class="fas fa-map-marker-alt text-red-500 mr-2"></i>
                        <span>Entregar em: <strong>Rua das Flores, 123</strong></span>
                    </div>
                </div>
                
                <div class="flex-1 max-w-md mx-8 hidden md:block">
                    <div class="relative">
                        <input type="text" placeholder="Buscar lojas ou pratos..." class="w-full bg-gray-100 border-none rounded-full py-2 pl-10 focus:ring-2 focus:ring-red-500">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <button class="text-gray-600 font-medium">Entrar</button>
                    <button class="relative bg-red-100 p-2 rounded-full text-red-600">
                        <i class="fas fa-shopping-bag text-xl"></i>
                        <span class="absolute -top-1 -right-1 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <section class="mb-10">
            <h2 class="text-xl font-bold text-gray-800 mb-6">O que você quer hoje?</h2>
            
            <div class="relative group">
                <button onclick="sideScroll('scroll-container', 'left')" class="nav-btn -left-5 hidden group-hover:flex">
                    <i class="fas fa-chevron-left"></i>
                </button>

                <div id="scroll-container" class="flex overflow-x-auto gap-4 pb-4 no-scrollbar snap-x">
                    
                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">🍔</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Lanches</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">🛒</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Mercados</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">🍱</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Orientais</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">👕</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Roupas</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">🍽️</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Restaurantes</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">🍎</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Hortifruti</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">🍰</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Docerias</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">💄</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Cosméticos</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">🔥</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Gás e Água</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">💊</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Farmácias</span>
                    </div>

                    <div class="category-card flex-shrink-0 w-28 bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500 snap-start">
                        <div class="text-3xl mb-2">🍦</div>
                        <span class="text-xs font-semibold text-gray-700 block truncate">Sorvetes</span>
                    </div>
                </div>

                <button onclick="sideScroll('scroll-container', 'right')" class="nav-btn -right-5 hidden group-hover:flex">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-xl font-bold text-gray-800">Lojas Disponíveis</h2>
                <a href="#" class="text-red-600 text-sm font-bold hover:underline">Ver todas</a>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden hover:shadow-md transition cursor-pointer border border-gray-100">
                    <div class="relative h-40 bg-gray-200">
                        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=500&q=80" alt="Pizza" class="w-full h-full object-cover">
                        <div class="absolute top-3 right-3 bg-white px-2 py-1 rounded-lg text-xs font-bold shadow-sm">
                            <i class="fas fa-star text-yellow-400"></i> 4.8
                        </div>
                    </div>
                    <div class="p-4 flex items-center gap-4">
                        <div class="w-12 h-12 bg-white rounded-full border border-gray-100 flex items-center justify-center -mt-10 z-10 shadow-sm overflow-hidden">
                            <img src="https://via.placeholder.com/50" alt="Logo">
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800">Pizzaria do Bairro</h3>
                            <p class="text-xs text-gray-500 italic">Pizza • 3.2km</p>
                        </div>
                        <div class="text-right text-xs">
                            <span class="block font-bold text-green-600">30-45 min</span>
                            <span class="text-gray-400">Frete R$ 5,00</span>
                        </div>
                    </div>
                </div>
                </div>
        </section>
    </main>

    <script>
        function sideScroll(elementId, direction) {
            const container = document.getElementById(elementId);
            const scrollAmount = 300; // Distância do clique
            
            if (direction === 'left') {
                container.scrollLeft -= scrollAmount;
            } else {
                container.scrollLeft += scrollAmount;
            }
        }
    </script>

</body>
</html>
