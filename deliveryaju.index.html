<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Local | Peça Já</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .category-card:hover { transform: translateY(-5px); transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-red-600 tracking-tighter">MEU<span class="text-gray-900">DELIVERY</span></h1>
            <div class="hidden md:flex items-center bg-gray-100 px-4 py-2 rounded-full w-1/3">
                <i class="fas fa-search text-gray-400 mr-2"></i>
                <input type="text" placeholder="Buscar lojas ou pratos..." class="bg-transparent outline-none w-full text-sm">
            </div>
            <div class="flex items-center gap-6">
                <button class="font-bold text-gray-700 hover:text-red-600">Entrar</button>
                <div class="relative">
                    <i class="fas fa-shopping-bag text-2xl text-red-600"></i>
                    <span class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                </div>
            </div>
        </div>
    </header>

    <section class="container mx-auto px-4 py-8">
        <div class="flex overflow-x-auto gap-4 pb-4 no-scrollbar">
            <div class="category-card min-w-[100px] bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500">
                <div class="text-3xl mb-2">🍕</div>
                <span class="text-xs font-bold text-gray-600">Pizzarias</span>
            </div>
            <div class="category-card min-w-[100px] bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500">
                <div class="text-3xl mb-2">🍔</div>
                <span class="text-xs font-bold text-gray-600">Lanches</span>
            </div>
            <div class="category-card min-w-[100px] bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500">
                <div class="text-3xl mb-2">🥗</div>
                <span class="text-xs font-bold text-gray-600">Saudáveis</span>
            </div>
            <div class="category-card min-w-[100px] bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500">
                <div class="text-3xl mb-2">🍦</div>
                <span class="text-xs font-bold text-gray-600">Doces</span>
            </div>
            <div class="category-card min-w-[100px] bg-white p-4 rounded-2xl shadow-sm text-center cursor-pointer border border-transparent hover:border-red-500">
                <div class="text-3xl mb-2">🐶</div>
                <span class="text-xs font-bold text-gray-600">PetShop</span>
            </div>
        </div>
    </section>

    <section class="container mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800 uppercase tracking-tight">Lojas Disponíveis</h2>
            <a href="#" class="text-red-600 font-bold text-sm">Ver todas</a>
        </div>

        <div id="lista-lojas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
                <p>Buscando lojas parceiras...</p>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATFpMv8Qd7XqypPjD4RRIzFd80EBdUDjc",
            authDomain: "deliveryaju-3e6bf.firebaseapp.com",
            databaseURL: "https://deliveryaju-3e6bf-default-rtdb.firebaseio.com",
            projectId: "deliveryaju-3e6bf",
            storageBucket: "deliveryaju-3e6bf.firebasestorage.app",
            messagingSenderId: "582528849886",
            appId: "1:582528849886:web:a7d4b0c545422c05b7ef4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const container = document.getElementById('lista-lojas');

        // Escutar o banco de dados em tempo real
        onValue(ref(db, 'lojas'), (snapshot) => {
            const lojas = snapshot.val();
            container.innerHTML = ""; // Limpa o carregando

            if (lojas) {
                Object.keys(lojas).forEach((id) => {
                    const loja = lojas[id];
                    
                    // HTML dinâmico para cada loja cadastrada
                    container.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm overflow-hidden hover:shadow-lg transition cursor-pointer border border-gray-100 group">
                            <div class="relative h-44 overflow-hidden">
                                <img src="${loja.imagem}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                                <div class="absolute top-3 right-3 bg-white px-2 py-1 rounded-lg text-xs font-bold shadow-md flex items-center gap-1">
                                    <i class="fas fa-star text-yellow-400"></i> ${loja.nota}
                                </div>
                            </div>
                            <div class="p-4 flex items-center gap-4">
                                <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center text-xl shadow-inner">
                                    <i class="fas fa-store text-gray-400"></i>
                                </div>
                                <div class="flex-1">
                                    <h3 class="font-bold text-gray-800 leading-tight">${loja.nome}</h3>
                                    <p class="text-[11px] text-gray-500 uppercase tracking-wider font-medium">${loja.categoria} • ${loja.endereco}</p>
                                </div>
                                <div class="text-right">
                                    <span class="block text-sm font-bold text-green-600">${loja.tempo} min</span>
                                    <span class="text-[10px] text-gray-400">Frete R$ 0,00</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p class='col-span-full text-center text-gray-500 py-10'>Nenhuma loja aberta no momento.</p>";
            }
        });
    </script>
</body>
</html>
