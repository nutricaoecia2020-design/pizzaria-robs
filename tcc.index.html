<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador ABNT Professional - 160 Páginas</title>
    <style>
        :root { --sidebar-width: 480px; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #ecf0f1; }

        /* PAINEL DE CONTROLE ESQUERDO */
        #editor {
            width: var(--sidebar-width); height: 100vh; background: #2c3e50; padding: 20px;
            overflow-y: auto; position: fixed; left: 0; top: 0; z-index: 100; color: white;
        }
        .section-box { border: 1px solid #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #34495e; }
        h2 { font-size: 0.85rem; color: #3498db; text-transform: uppercase; margin: 0 0 10px 0; border-bottom: 1px solid #5d6d7e; padding-bottom: 5px; }
        label { display: block; font-size: 11px; margin-top: 10px; color: #bdc3c7; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: none; border-radius: 4px; font-size: 13px; background: #ecf0f1; color: #2c3e50; }
        
        .btn-print { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; position: sticky; bottom: 0; }
        .btn-add { background: #2980b9; margin-top: 10px; padding: 10px; width: 100%; color: white; border: none; border-radius: 4px; cursor: pointer; }

        /* ÁREA DE VISUALIZAÇÃO (FOLHAS A4) */
        #preview-container { 
            margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width));
            padding: 40px; display: flex; flex-direction: column; align-items: center; background: #95a5a6;
        }
        
        .folha {
            width: 210mm; min-height: 297mm; background: white;
            padding: 3cm 2cm 2cm 3cm; /* Margens ABNT: Sup 3, Esq 3, Dir 2, Inf 2 */
            font-family: "Times New Roman", Times, serif; font-size: 12pt; line-height: 1.5; color: black;
            text-align: justify; position: relative; margin-bottom: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        /* Classes Utilitárias */
        .center { text-align: center; }
        .bold { font-weight: bold; }
        .uppercase { text-transform: uppercase; }
        .indent { text-indent: 1.5cm; }
        .page-num { position: absolute; top: 2cm; right: 2cm; font-size: 10pt; }
        .titulo-secao { font-weight: bold; text-transform: uppercase; margin: 1.5em 0 1em 0; }
        
        @media print {
            body { background: white; }
            #editor { display: none !important; }
            #preview-container { margin-left: 0 !important; width: 100% !important; padding: 0 !important; }
            .folha { box-shadow: none !important; margin: 0 !important; page-break-after: always !important; }
        }
    </style>
</head>
<body>

    <div id="editor">
        <div class="section-box">
            <h2>Identificação Principal</h2>
            <label>Nome do Autor</label>
            <input type="text" id="in-aluno" oninput="update()" value="ROBERTO CARLOS SILVA VASCONCELOS">
            <label>Título do Trabalho</label>
            <textarea id="in-titulo" oninput="update()">AS MEDIDAS PROTETIVAS DE URGÊNCIA E SUA EFETIVIDADE NA PREVENÇÃO DO FEMINICÍDIO</textarea>
        </div>

        <div class="section-box">
            <h2>Estrutura de Longo Alcance</h2>
            <p style="font-size: 10px; color: #bdc3c7;">Para 160 páginas, cole o conteúdo por partes abaixo:</p>
            
            <label>Resumo / Abstract</label>
            <textarea id="in-resumo" rows="4" oninput="update()">Cole aqui o resumo...</textarea>

            <label>Introdução (Págs 1-20)</label>
            <textarea id="in-intro" rows="6" oninput="update()">Cole aqui a introdução completa...</textarea>

            <label>Desenvolvimento Parte 1 (Págs 21-80)</label>
            <textarea id="in-cap1" rows="6" oninput="update()">Cole aqui o primeiro grande bloco de capítulos...</textarea>

            <label>Desenvolvimento Parte 2 (Págs 81-160)</label>
            <textarea id="in-cap2" rows="6" oninput="update()">Cole aqui o restante do conteúdo...</textarea>
            
            <label>Referências Bibliográficas</label>
            <textarea id="in-ref" rows="4" oninput="update()">BIANCHINI, Alice. Lei Maria da Penha...</textarea>
        </div>

        <button class="btn-print" onclick="window.print()">GERAR PDF COMPLETO</button>
    </div>

    <div id="preview-container">
        <div class="folha">
            <div class="center bold uppercase" style="font-size: 14pt;">
                CENTRO UNIVERSITÁRIO ESTÁCIO DE SERGIPE<br>CURSO DE DIREITO
            </div>
            <div style="height: 10em;"></div>
            <div class="center bold uppercase t14" id="out-aluno"></div>
            <div style="height: 10em;"></div>
            <div class="center bold uppercase t14" id="out-titulo"></div>
            <div style="height: 20em;"></div>
            <div class="center bold uppercase">
                ARACAJU – SE<br>2026
            </div>
        </div>

        <div class="folha">
            <div class="page-num">2</div>
            <div class="titulo-secao center">RESUMO</div>
            <div id="out-resumo"></div>
        </div>

        <div class="folha">
            <div class="page-num">3</div>
            <div class="titulo-secao">1 INTRODUÇÃO</div>
            <div id="out-intro" class="indent"></div>
        </div>

        <div class="folha">
            <div class="page-num">4</div>
            <div class="titulo-secao">2 DESENVOLVIMENTO (PARTE I)</div>
            <div id="out-cap1" class="indent"></div>
        </div>

        <div class="folha">
            <div class="page-num">5</div>
            <div class="titulo-secao">3 DESENVOLVIMENTO (PARTE II)</div>
            <div id="out-cap2" class="indent"></div>
        </div>

        <div class="folha">
            <div class="page-num">6</div>
            <div class="titulo-secao">REFERÊNCIAS</div>
            <div id="out-ref" style="font-size: 10pt; line-height: 1.2;"></div>
        </div>
    </div>

    <script>
        function update() {
            const map = {
                'in-aluno': 'out-aluno',
                'in-titulo': 'out-titulo',
                'in-resumo': 'out-resumo',
                'in-intro': 'out-intro',
                'in-cap1': 'out-cap1',
                'in-cap2': 'out-cap2',
                'in-ref': 'out-ref'
            };

            for (let id in map) {
                let val = document.getElementById(id).value;
                let out = document.getElementById(map[id]);
                
                if (id === 'in-aluno' || id === 'in-titulo') {
                    out.innerText = val.toUpperCase();
                } else {
                    // Preserva quebras de linha para textos longos
                    out.innerHTML = val.replace(/\n/g, '<br>');
                }
            }
        }
        
        // Inicialização
        window.onload = update;
    </script>
</body>
</html>
