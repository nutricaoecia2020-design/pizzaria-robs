<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Artigo Científico ABNT - Final</title>
    <style>
        :root { --sidebar-width: 450px; }
        * { box-sizing: border-box; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #ecf0f1; }

        /* PAINEL DE EDIÇÃO (ESQUERDA) */
        #editor {
            width: var(--sidebar-width); height: 100vh; background: white; padding: 25px;
            overflow-y: auto; border-right: 2px solid #bdc3c7; position: fixed; left: 0; top: 0;
            z-index: 100;
        }
        .section-box { border: 1px solid #dfe6e9; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #fdfdfd; }
        h2 { font-size: 0.9rem; color: #2980b9; text-transform: uppercase; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-top: 10px; color: #7f8c8d; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }

        /* ÁREA DO DOCUMENTO (DIREITA) */
        #preview-container { 
            margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width));
            padding: 40px; display: flex; flex-direction: column; align-items: center; 
        }
        
        .folha {
            width: 210mm; min-height: 297mm; background: white;
            padding: 3cm 2cm 2cm 3cm; /* Margens ABNT [cite: 218, 219] */
            font-family: "Times New Roman", Times, serif; font-size: 12pt; line-height: 1.5; color: black;
            text-align: justify; position: relative; margin-bottom: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .center { text-align: center; }
        .bold { font-weight: bold; }
        .uppercase { text-transform: uppercase; }
        .t14 { font-size: 14pt; }
        .indent { text-indent: 1.5cm; } /* Espaço de 1,5 [cite: 241] */
        .page-num { position: absolute; top: 2cm; right: 2cm; font-size: 10pt; }
        
        .spacer-8 { height: 8em; } 
        .spacer-23 { height: 23em; }

        /* CONFIGURAÇÃO DE IMPRESSÃO */
        @media print {
            @page { size: A4; margin: 0; }
            body { display: block; background: white; }
            #editor { display: none !important; }
            #preview-container { margin-left: 0 !important; width: 100% !important; padding: 0 !important; display: block !important; }
            .folha { 
                box-shadow: none !important; margin: 0 !important; 
                width: 210mm !important; height: 297mm !important;
                page-break-after: always !important; 
                display: block !important;
            }
        }
    </style>
</head>
<body>

    <div id="editor">
        <div class="section-box">
            <h2>1. Capa e Identificação</h2>
            <label>Instituição</label>
            <input type="text" id="in-inst" oninput="sync()" value="NOME DA INSTITUIÇÃO">
            <label>Curso</label>
            <input type="text" id="in-curso" oninput="sync()" value="NOME DO CURSO">
            <label>Nome do Aluno</label>
            <input type="text" id="in-aluno" oninput="sync()" placeholder="Nome Completo">
            <label>Título do Artigo</label>
            <input type="text" id="in-titulo" oninput="sync()" placeholder="letras minúsculas">
            <label>Cidade</label>
            <input type="text" id="in-cidade" oninput="sync()" value="ARACAJU">
            <label>Ano</label>
            <input type="text" id="in-ano" oninput="sync()" value="2026">
        </div>

        <div class="section-box">
            <h2>2. Elementos Textuais</h2>
            <label>Sumário (pressione Enter entre os itens)</label>
            <textarea id="in-sumario" rows="4" oninput="sync()">INTRODUÇÃO
1. TÍTULO DO TÓPICO
2. TÍTULO DO TÓPICO
CONCLUSÃO
REFERÊNCIAS</textarea>
            <label>Introdução</label>
            <textarea id="in-intro" rows="3" oninput="sync()"></textarea>
            <label>1. Título do Tópico</label>
            <input type="text" id="in-t1-tit" oninput="sync()" value="1. TÍTULO DO TÓPICO">
            <label>Texto do Tópico 1</label>
            <textarea id="in-t1-txt" rows="4" oninput="sync()"></textarea>
        </div>

        <button onclick="window.print()">GERAR PDF PRONTO</button>
    </div>

    <div id="preview-container">
        <div class="folha">
            <div class="center bold uppercase t14">
                <div id="out-inst">NOME DA INSTITUIÇÃO</div>
                <div id="out-curso">NOME DO CURSO</div>
            </div>
            <div class="spacer-8"></div>
            <div class="center bold uppercase t14" id="out-aluno">NOME COMPLETO DO ALUNO</div>
            <div class="spacer-8"></div>
            <div class="center t14" id="out-titulo">Título do artigo científico</div>
            <div class="spacer-23"></div>
            <div class="center bold uppercase">
                <span id="out-cidade">CIDADE</span>, <span id="out-ano">2026</span>
            </div>
        </div>

        <div class="folha">
            <div class="page-num">2</div>
            <div class="center bold uppercase" id="out-titulo-rep" style="font-size: 12pt;">TÍTULO DO ARTIGO</div>
            <div class="center" id="out-aluno-rep">Nome do Aluno</div>
            
            <br><br>
            <div class="bold uppercase">SUMÁRIO</div>
            <div id="out-sumario" style="white-space: pre-line; line-height: 2.0; margin-top: 10px;"></div>

            <br><br>
            <div class="bold uppercase">INTRODUÇÃO</div>
            <div id="out-intro" class="indent" style="margin-top: 1.5em;">Texto da introdução... [cite: 242-245]</div>
        </div>

        <div class="folha">
            <div class="page-num">3</div>
            <div class="bold uppercase" id="out-t1-tit">1. TÍTULO DO TÓPICO</div>
            <div id="out-t1-txt" class="indent" style="margin-top: 1.5em;">Conteúdo do primeiro tópico...</div>
        </div>
    </div>

    <script>
        function sync() {
            const fields = {
                'in-inst': 'out-inst',
                'in-curso': 'out-curso',
                'in-aluno': 'out-aluno',
                'in-titulo': 'out-titulo',
                'in-cidade': 'out-cidade',
                'in-ano': 'out-ano',
                'in-sumario': 'out-sumario',
                'in-intro': 'out-intro',
                'in-t1-tit': 'out-t1-tit',
                'in-t1-txt': 'out-t1-txt'
            };

            for (let inId in fields) {
                let val = document.getElementById(inId).value;
                let outElement = document.getElementById(fields[inId]);
                
                if (inId === 'in-aluno') {
                    outElement.innerText = val.toUpperCase() || "NOME DO ALUNO";
                    document.getElementById('out-aluno-rep').innerText = val; // Mantém minúsculo na pág 2 se desejar, ou mude para upper
                } else if (inId === 'in-titulo') {
                    outElement.innerText = val || "Título do artigo";
                    document.getElementById('out-titulo-rep').innerText = val.toUpperCase();
                } else {
                    outElement.innerText = val || "...";
                }
            }
        }
        sync();
    </script>
</body>
</html>
