<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador ABNT - Roberto Carlos Silva Vasconcelos</title>
    <style>
        :root { --sidebar-width: 450px; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #ecf0f1; }

        /* PAINEL DE CONTROLE */
        #editor {
            width: var(--sidebar-width); height: 100vh; background: white; padding: 25px;
            overflow-y: auto; border-right: 2px solid #bdc3c7; position: fixed; left: 0; top: 0;
            z-index: 100;
        }
        .section-box { border: 1px solid #dfe6e9; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #fdfdfd; }
        h2 { font-size: 0.9rem; color: #2980b9; text-transform: uppercase; margin: 0 0 10px 0; border-bottom: 2px solid #eee; }
        label { display: block; font-size: 11px; font-weight: bold; margin-top: 10px; color: #7f8c8d; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }

        /* ÁREA DE VISUALIZAÇÃO */
        #preview-container { 
            margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width));
            padding: 40px; display: flex; flex-direction: column; align-items: center; 
        }
        
        .folha {
            width: 210mm; min-height: 297mm; background: white;
            padding: 3cm 2cm 2cm 3cm; 
            font-family: "Times New Roman", Times, serif; font-size: 12pt; line-height: 1.5; color: black;
            text-align: justify; position: relative; margin-bottom: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden; display: flex; flex-direction: column;
        }

        .center { text-align: center; }
        .bold { font-weight: bold; }
        .uppercase { text-transform: uppercase; }
        .t14 { font-size: 14pt; }
        .indent { text-indent: 1.5cm; }
        .page-num { position: absolute; top: 2cm; right: 2cm; font-size: 10pt; }
        
        .topico-esquerda { text-align: left; font-weight: bold; text-transform: uppercase; margin-bottom: 1em; margin-top: 1em; }
        .spacer-8 { height: 8em; } 
        .spacer-23 { height: 23em; }

        @media print {
            @page { size: A4; margin: 0; }
            body { display: block; }
            #editor { display: none !important; }
            #preview-container { margin-left: 0 !important; width: 100% !important; padding: 0 !important; }
            .folha { box-shadow: none !important; margin: 0 !important; page-break-after: always !important; }
        }
    </style>
</head>
<body>

    <div id="editor">
        <div class="section-box">
            <h2>1. Capa e Identificação</h2>
            <label>Nome do Aluno</label>
            <input type="text" id="in-aluno" oninput="sync()" value="ROBERTO CARLOS SILVA VASCONCELOS">
            <label>Título do Artigo</label>
            <textarea id="in-titulo" oninput="sync()">AS MEDIDAS PROTETIVAS DE URGÊNCIA E SUA EFETIVIDADE NA PREVENÇÃO DO FEMINICÍDIO</textarea>
            <label>Cidade / Ano</label>
            <input type="text" id="in-cidade" oninput="sync()" value="ARACAJU – SE">
            <input type="text" id="in-ano" oninput="sync()" value="2026">
        </div>

        <div class="section-box">
            <h2>2. Elementos Pré-Textuais</h2>
            <label>Resumo</label>
            <textarea id="in-resumo" rows="4" oninput="sync()">O presente Trabalho de Conclusão de Curso analisa a efetividade das medidas protetivas de urgência previstas na Lei nº 11.340/2006, conhecida como Lei Maria da Penha, como instrumento de prevenção ao feminicídio no Brasil...</textarea>
            <label>Sumário</label>
            <textarea id="in-sumario" rows="6" oninput="sync()">1 INTRODUÇÃO
1.1 JUSTIFICATIVA
2 O CONTEXTO HISTÓRICO E A LEI MARIA DA PENHA
3 AS MEDIDAS PROTETIVAS DE URGÊNCIA
4 EFETIVIDADE E DESAFIOS
5 CONCLUSÃO
REFERÊNCIAS</textarea>
        </div>

        <div class="section-box">
            <h2>3. Elementos Textuais</h2>
            <label>Introdução</label>
            <textarea id="in-intro" rows="6" oninput="sync()">A violência doméstica e familiar contra a mulher não é um fenômeno moderno, mas sim uma herança de uma estrutura social patriarcal que, durante séculos, legitimou a subordinação feminina...</textarea>
            <label>Desenvolvimento (Tópico 2)</label>
            <textarea id="in-desenv" rows="6" oninput="sync()">A violência contra a mulher possui raízes históricas profundas na estrutura patriarcal da sociedade brasileira. Durante muitos anos, a mulher foi considerada juridicamente subordinada ao homem...</textarea>
        </div>

        <button onclick="window.print()">GERAR PDF DO TCC</button>
    </div>

    <div id="preview-container">
        <div class="folha">
            <div class="center bold uppercase t14">
                CENTRO UNIVERSITÁRIO ESTÁCIO DE SERGIPE<br>CURSO DE DIREITO
            </div>
            <div class="spacer-8"></div>
            <div class="center bold uppercase t14" id="out-aluno"></div>
            <div class="spacer-8"></div>
            <div class="center bold uppercase t14" id="out-titulo"></div>
            <div class="spacer-23"></div>
            <div class="center bold uppercase">
                <span id="out-cidade"></span><br><span id="out-ano"></span>
            </div>
        </div>

        <div class="folha">
            <div class="page-num">2</div>
            <div class="topico-esquerda">RESUMO</div>
            <div id="out-resumo" style="white-space: pre-line; margin-bottom: 2em;"></div>
            
            <div class="topico-esquerda">SUMÁRIO</div>
            <div id="out-sumario" style="white-space: pre-line; line-height: 1.8;"></div>
        </div>

        <div class="folha">
            <div class="page-num">3</div>
            <div class="topico-esquerda">1 INTRODUÇÃO</div>
            <div id="out-intro" class="indent" style="white-space: pre-line;"></div>
        </div>

        <div class="folha">
            <div class="page-num">4</div>
            <div class="topico-esquerda">2 O CONTEXTO HISTÓRICO</div>
            <div id="out-desenv" class="indent" style="white-space: pre-line;"></div>
        </div>
    </div>

    <script>
        function sync() {
            const fields = {
                'in-aluno': 'out-aluno',
                'in-titulo': 'out-titulo',
                'in-cidade': 'out-cidade',
                'in-ano': 'out-ano',
                'in-resumo': 'out-resumo',
                'in-sumario': 'out-sumario',
                'in-intro': 'out-intro',
                'in-desenv': 'out-desenv'
            };

            for (let inId in fields) {
                let val = document.getElementById(inId).value;
                let outElement = document.getElementById(fields[inId]);
                
                if (inId === 'in-aluno' || inId === 'in-titulo') {
                    outElement.innerText = val.toUpperCase();
                } else {
                    outElement.innerText = val;
                }
            }
        }
        // Inicializa os dados
        sync();
    </script>
</body>
</html>
