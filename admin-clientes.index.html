<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes - Robs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #e31837; text-align: center; border-bottom: 3px solid #e31837; padding-bottom: 15px; margin-bottom: 30px; }
        
        /* Estilo do Login */
        .login-box { text-align: center; padding: 60px 20px; }
        input[type="password"] { padding: 15px; border: 2px solid #ddd; border-radius: 10px; width: 280px; margin-bottom: 15px; font-size: 16px; outline: none; transition: 0.3s; }
        input[type="password"]:focus { border-color: #e31837; }
        
        /* Botões */
        .btn-principal { padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-principal:hover { background: #218838; transform: translateY(-2px); }
        .btn-sair { background: #6c757d; margin-top: 20px; padding: 10px 20px; color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* Tabela Responsiva */
        .table-container { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #e31837; color: white; padding: 15px; text-align: left; font-size: 14px; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 13px; color: #333; }
        tr:hover { background: #fff5f5; }
        
        .btn-excluir { background: #dc3545; padding: 6px 12px; font-size: 11px; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-excluir:hover { background: #c82333; }
        
        .hidden { display: none; }
        .vazio { color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div id="area-login" class="login-box">
        <h1>🔐 Área Administrativa</h1>
        <p>Insira a senha para gerenciar os clientes</p>
        <input type="password" id="senha" placeholder="Senha do Sistema">
        <br>
        <button class="btn-principal" onclick="verificarAcesso()">Acessar Banco de Dados</button>
    </div>

    <div id="area-dados" class="hidden">
        <h1>👥 Lista de Clientes Cadastrados</h1>
        
        <div class="table-container">
            <table id="tabela-clientes">
                <thead>
                    <tr>
                        <th>Nome Completo</th>
                        <th>CPF</th>
                        <th>Sexo</th>
                        <th>Estado Civil</th>
                        <th>WhatsApp/Tel</th>
                        <th>E-mail</th>
                        <th>Localidade (CEP)</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    </tbody>
            </table>
        </div>

        <div style="text-align: center;">
            <button class="btn-sair" onclick="location.reload()">Sair do Sistema</button>
        </div>
    </div>
</div>

<script>
    // Configurações do Supabase
    const supabaseUrl = 'https://gsvvyktjeqlmhspqzppy.supabase.co';
    const supabaseKey = 'sb_publishable_0lVSMGWIIYBvwu_iWWWPKw_qvoAHjOs';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Função de Login Simples
    function verificarAcesso() {
        const senha = document.getElementById("senha").value;
        if(senha === "robs123") { 
            document.getElementById("area-login").classList.add("hidden");
            document.getElementById("area-dados").classList.remove("hidden");
            carregarClientes();
        } else {
            alert("Senha incorreta!");
        }
    }

    // Função para buscar e exibir os dados
    async function carregarClientes() {
        const corpo = document.getElementById("corpo-tabela");
        corpo.innerHTML = "<tr><td colspan='8' style='text-align:center'>Carregando dados...</td></tr>";

        const { data, error } = await _supabase
            .from('clientes')
            .select('*');

        if (error) {
            alert("Erro ao conectar ao banco: " + error.message);
            return;
        }

        corpo.innerHTML = "";

        if (data.length === 0) {
            corpo.innerHTML = "<tr><td colspan='8' style='text-align:center'>Nenhum cliente cadastrado.</td></tr>";
            return;
        }

        data.forEach(c => {
            // Verificamos cada campo. Se estiver vazio no banco, exibe "---"
            corpo.innerHTML += `
                <tr>
                    <td><b>${c.nome_completo || 'Não informado'}</b></td>
                    <td>${c.cpf || '<span class="vazio">VAZIO</span>'}</td>
                    <td>${c.sexo || '---'}</td>
                    <td>${c.estado_civil || '---'}</td>
                    <td>${c.whatsapp || c.telefone || '---'}</td>
                    <td>${c.email || '---'}</td>
                    <td>${c.cep || '---'}</td>
                    <td>
                        <button class="btn-excluir" onclick="removerCliente('${c['eu ia']}')">Apagar</button>
                    </td>
                </tr>
            `;
        });
    }

    // Função para excluir registro
    async function removerCliente(id) {
        if(confirm("ATENÇÃO: Deseja apagar este cadastro permanentemente?")) {
            const { error } = await _supabase
                .from('clientes')
                .delete()
                .eq('eu ia', id); 

            if(error) {
                console.error(error);
                alert("Erro ao excluir: " + error.message);
            } else {
                alert("Cliente removido com sucesso!");
                carregarClientes(); // Atualiza a lista automaticamente
            }
        }
    }
</script>

</body>
</html>
