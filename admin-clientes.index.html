<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes - Robs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #e31837; text-align: center; border-bottom: 2px solid #e31837; padding-bottom: 10px; }
        .login-box { text-align: center; padding: 40px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 250px; margin-bottom: 10px; }
        button { padding: 12px 20px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #e31837; color: white; }
        tr:hover { background: #fff5f5; }
        .btn-excluir { background: #dc3545; padding: 5px 10px; font-size: 11px; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="area-login" class="login-box">
        <h1>🔐 Área Restrita</h1>
        <p>Acesse a lista de clientes cadastrados</p>
        <input type="password" id="senha" placeholder="Senha Administrativa">
        <br>
        <button onclick="verificarAcesso()">Visualizar Dados</button>
    </div>

    <div id="area-dados" class="hidden">
        <h1>👥 Clientes Cadastrados</h1>
        <div style="overflow-x: auto;">
            <table id="tabela-clientes">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Sexo</th>
                        <th>Estado Civil</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
        <div style="margin-top: 20px; text-align: center;">
            <button onclick="location.reload()" style="background:#666">Sair</button>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://gsvvyktjeqlmhspqzppy.supabase.co';
    const supabaseKey = 'sb_publishable_0lVSMGWIIYBvwu_iWWWPKw_qvoAHjOs';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    function verificarAcesso() {
        const senha = document.getElementById("senha").value;
        if(senha === "robs123") { 
            document.getElementById("area-login").classList.add("hidden");
            document.getElementById("area-dados").classList.remove("hidden");
            carregarClientes();
        } else {
            alert("Senha incorreta!");
        }
    }

    async function carregarClientes() {
        // Buscando todas as colunas conforme sua imagem
        const { data, error } = await _supabase
            .from('clientes')
            .select('*');

        if (error) {
            alert("Erro ao carregar: " + error.message);
            return;
        }

        const corpo = document.getElementById("corpo-tabela");
        corpo.innerHTML = "";

        data.forEach(c => {
            corpo.innerHTML += `
                <tr>
                    <td><b>${c.nome_completo || ''}</b></td>
                    <td>${c.cpf || 'VAZIO'}</td>
                    <td>${c.sexo || ''}</td>
                    <td>${c.estado_civil || ''}</td>
                    <td>
                        <button class="btn-excluir" onclick="removerCliente('${c['eu ia']}')">Remover</button>
                    </td>
                </tr>
            `;
        });
    }

    async function removerCliente(id) {
        if(confirm("Deseja apagar este cadastro permanentemente?")) {
            // AQUI ESTÁ O SEGREDO: O filtro deve usar o nome exato da coluna 'eu ia'
            const { error } = await _supabase
                .from('clientes')
                .delete()
                .eq('eu ia', id); 

            if(error) {
                console.error(error);
                alert("Erro ao excluir: " + error.message);
            } else {
                alert("Cliente removido!");
                carregarClientes();
            }
        }
    }
</script>
</body>
</html>
