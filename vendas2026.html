<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Amarelinhas - Gestão de Pedidos</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0fdf4; padding: 20px; color: #064e3b; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; font-style: italic; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #064e3b; color: white; text-transform: uppercase; font-size: 12px; }
        tr:hover { background-color: #f9f9f9; }
        .btn-limpar { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Caderno de Notas - Todos os Pedidos</h1>
        <button class="btn-limpar" onclick="limparHistorico()">Limpar Tudo</button>
        
        <table id="tabelaPedidos">
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Loja</th>
                    <th>Cliente</th>
                    <th>Produtos</th>
                    <th>Total</th>
                    <th>Pagamento</th>
                    <th>Contato</th>
                    <th>Endereço</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                </tbody>
        </table>
    </div>

    <script>
        function carregarPedidos() {
            const corpo = document.getElementById('corpoTabela');
            const pedidos = JSON.parse(localStorage.getItem('amarelinhas_pedidos') || "[]");
            
            corpo.innerHTML = "";
            // Mostra o mais recente primeiro
            pedidos.reverse().forEach(p => {
                const linha = corpo.insertRow();
                linha.innerHTML = `
                    <td>${p.data}</td>
                    <td style="font-weight:bold; color:#059669">${p.loja}</td>
                    <td>${p.cliente}</td>
                    <td style="font-size:12px">${p.produtos}</td>
                    <td style="font-weight:bold">R$ ${p.total}</td>
                    <td>${p.pagamento}</td>
                    <td>${p.contato}</td>
                    <td>${p.endereco}</td>
                `;
            });
        }

        function limparHistorico() {
            if(confirm("Deseja apagar todos os registros do caderno?")) {
                localStorage.setItem('amarelinhas_pedidos', "[]");
                carregarPedidos();
            }
        }

        // Atualiza a tabela sempre que abrir a página ou mudar algo
        window.onload = carregarPedidos;
        window.addEventListener('storage', carregarPedidos); // Atualiza se outra aba salvar pedido
    </script>
</body>
</html>
