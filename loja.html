<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria Robs | Premium Delivery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #e31837;
            --dark: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --success: #28a745;
            --click-flash: #ffd700; /* Cor do flash ao clicar */
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: var(--dark); color: var(--text); margin: 0; padding-bottom: 50px; }

        header {
            background: rgba(18, 18, 18, 0.95);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            backdrop-filter: blur(10px);
        }

        .logo h1 { color: var(--primary); margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }

        .cart-trigger {
            background: var(--primary); color: white; padding: 10px 18px; border-radius: 50px;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .cart-count {
            position: absolute; top: -5px; right: -5px; background: white; color: var(--primary);
            font-size: 12px; width: 20px; height: 20px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
        }

        .cart-sidebar {
            position: fixed; right: -100%; top: 0; width: 350px; height: 100%;
            background: var(--card); z-index: 1001; box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            transition: 0.4s; padding: 25px; overflow-y: auto;
        }
        .cart-sidebar.active { right: 0; }
        .close-cart { font-size: 24px; cursor: pointer; margin-bottom: 20px; display: block; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .header-meta { text-align: center; margin-bottom: 30px; background: #1e1e1e; padding: 20px; border-radius: 15px; }
        #statusLoja { padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .aberto { background: var(--success); }
        .fechado { background: #555; }

        #produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .produto-card {
            background: var(--card); border-radius: 18px; overflow: hidden;
            transition: 0.3s; border: 1px solid #333;
        }
        .prod-img { width: 100%; height: 180px; object-fit: cover; }
        .prod-info { padding: 15px; }
        .prod-price { color: var(--primary); font-weight: bold; font-size: 20px; }

        input, select, textarea {
            width: 100%; background: #2a2a2a; border: 1px solid #444; color: white;
            padding: 12px; border-radius: 10px; margin-bottom: 12px; outline: none;
        }

        .btn { border: none; border-radius: 10px; cursor: pointer; font-weight: 600; padding: 12px; transition: background 0.2s, transform 0.1s; width: 100%; }
        .btn:active { transform: scale(0.95); }
        .btn-add { background: var(--primary); color: white; }
        
        /* Classe de Animação */
        .btn-flash-success { background: var(--success) !important; }

        .painel-gestao { margin-top: 50px; padding: 25px; background: #1a1a1a; border: 2px dashed var(--primary); border-radius: 20px; }
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background: #222; padding: 10px; border-radius: 12px; }
        .bola { width: 15px; height: 15px; border-radius: 50%; }
        .vermelha { background: #dc3545; } .azul { background: #007bff; } .verde { background: #28a745; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #333; color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #222; }

        .btn-acao { padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; margin-right: 5px; color: white; }
        .btn-entregar { background: #25d366; } .btn-fim { background: #666; } .btn-del { background: #ff4444; }

        .float-btns { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 99; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 24px; }

        @media(max-width: 600px) { .cart-sidebar { width: 100%; } }
    </style>
</head>
<body>

<header>
    <div class="logo"><h1>Robs<span>🍕</span></h1></div>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i>
        <span class="cart-count" id="contagem">0</span>
    </div>
</header>

<div class="container">
    <div class="header-meta">
        <div id="statusLoja">Carregando...</div>
        <div style="font-size: 14px; color: var(--text-dim)">
            <i class="far fa-clock"></i> <span id="relogio">00:00:00</span> | 
            <i class="far fa-calendar-alt"></i> <span id="data">--/--/--</span>
        </div>
    </div>

    <h2 style="margin-bottom: 25px;"><i class="fas fa-pizza-slice"></i> Cardápio</h2>
    <div id="produtos">Carregando...</div>

    <div id="finalizacao" style="margin-top: 40px; background: #1e1e1e; padding: 25px; border-radius: 20px;">
        <h3><i class="fas fa-truck"></i> Finalizar Pedido</h3>
        <input id="nome" placeholder="Seu Nome">
        <input id="endereco" placeholder="Endereço Completo">
        <input id="contato" placeholder="WhatsApp (79999999999)">
        <select id="pagamento" onchange="window.renderCarrinho()">
            <option value="Dinheiro">Dinheiro</option>
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
        </select>
        <textarea id="obs" placeholder="Observações..."></textarea>
        
        <div id="pixArea" style="display:none; background: #000; padding: 15px; border-radius: 10px; text-align: center; border: 1px dashed var(--primary); margin-bottom: 15px;">
            <p>Pix: <b>rcsv74@gmail.com</b></p>
            <button class="btn" style="background: #007bff; width: auto; padding: 5px 15px;" onclick="window.copiarPix()">Copiar Pix</button>
        </div>

        <button id="btnFinalizar" class="btn btn-add" style="padding: 18px; font-size: 18px;" onclick="window.finalizar()">
            <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO
        </button>
    </div>

    <div class="painel-gestao">
        <h3><i class="fas fa-tools"></i> Painel do Lojista</h3>
        <div id="gestaoLogin" style="text-align: center;">
            <input type="password" id="senhaMestra" placeholder="Senha" style="max-width: 150px; display: inline-block;">
            <button class="btn btn-add" style="width: auto; padding: 10px 20px;" onclick="acessarGestao()">Entrar</button>
        </div>
        <div id="gestaoConteudo" style="display:none;">
            <div id="corpoTabelaPedidos"></div>
        </div>
    </div>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <span class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></span>
    <h3>Seu Carrinho</h3>
    <div id="carrinhoItens"></div>
    <div style="margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;">
        <div style="display:flex; justify-content:space-between; font-size: 20px; font-weight: bold;">
            <span>Total:</span>
            <span style="color: var(--primary)">R$ <span id="total">0.00</span></span>
        </div>
        <button class="btn btn-add" style="margin-top: 20px;" onclick="toggleCart()">Continuar Comprando</button>
    </div>
</div>

<div class="float-btns">
    <a href="https://wa.me/5579999769581" class="circle-btn" style="background: #25d366;"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/robs_pizzaria" class="circle-btn" style="background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%);"><i class="fab fa-instagram"></i></a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD-SUA_CHAVE_FIREBASE", 
    authDomain: "robs-pizzariadelivery.firebaseapp.com",
    projectId: "robs-pizzariadelivery",
    storageBucket: "robs-pizzariadelivery.appspot.com",
    messagingSenderId: "338805720977",
    appId: "1:338805720977:web:8666359590892994406a48"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const _supabase = supabase.createClient('https://gsvvyktjeqlmhspqzppy.supabase.co','sb_publishable_0lVSMGWIIYBvwu_iWWWPKw_qvoAHjOs');

let carrinho = [];
let produtosDoBanco = [];

// --- FUNÇÃO DE FEEDBACK (SOM E COR) ---
function dispararFeedback(elemento) {
    // 1. Som (Beep rápido)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Frequência do beep
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.1);

    // 2. Cor (Piscar verde)
    if(elemento) {
        elemento.classList.add('btn-flash-success');
        setTimeout(() => elemento.classList.remove('btn-flash-success'), 300);
    }
}

// Interface
window.toggleCart = () => document.getElementById('cartSidebar').classList.toggle('active');
window.copiarPix = () => { navigator.clipboard.writeText("rcsv74@gmail.com"); alert("Pix copiado!"); };

function atualizarTempo() {
    const agora = new Date();
    document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR');
    document.getElementById('data').textContent = agora.toLocaleDateString('pt-BR');
}
setInterval(atualizarTempo, 1000);

// CARDÁPIO E COMPRAS
async function carregarProdutos(){
    const {data:produtos} = await _supabase.from('produtos').select('*');
    produtosDoBanco = produtos;
    let lista = document.getElementById("produtos");
    lista.innerHTML = "";
    produtos.forEach((p, index) => {
        lista.innerHTML += `
            <div class="produto-card">
                <img src="${p.url_imagem||'https://via.placeholder.com/300x200'}" class="prod-img">
                <div class="prod-info">
                    <div style="font-weight:600">${p.nome}</div>
                    <div class="prod-price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                    <button class="btn btn-add" id="btn-add-${index}" style="margin-top:10px" onclick="window.add(${index})">Adicionar</button>
                </div>
            </div>`;
    });
}

window.add = (i) => { 
    dispararFeedback(document.getElementById(`btn-add-${i}`));
    carrinho.push(produtosDoBanco[i]); 
    window.renderCarrinho(); 
}

window.remover = (i) => { 
    carrinho.splice(i,1); 
    window.renderCarrinho(); 
}

window.renderCarrinho = function(){
    let area = document.getElementById("carrinhoItens"); area.innerHTML = ""; let total = 0;
    carrinho.forEach((p,i)=>{ 
        total += parseFloat(p.preco);
        area.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; background:#2a2a2a; padding:10px; border-radius:10px;">
            <span>${p.nome}</span><button class="btn-acao btn-del" onclick="window.remover(${i})">X</button>
        </div>`;
    });
    document.getElementById("total").innerText = total.toFixed(2);
    document.getElementById("contagem").innerText = carrinho.length;
    document.getElementById("pixArea").style.display = (document.getElementById("pagamento").value === "Pix" && total > 0) ? "block" : "none";
}

window.finalizar = async function(){
    const btn = document.getElementById("btnFinalizar");
    dispararFeedback(btn);

    let n = document.getElementById("nome").value;
    let e = document.getElementById("endereco").value;
    let c = document.getElementById("contato").value;
    let p = document.getElementById("pagamento").value;
    let t = document.getElementById("total").innerText;
    
    if(!n || !e || !c || carrinho.length < 1) return alert("Preencha tudo e adicione itens!");

    let listaProd = ""; carrinho.forEach(item => { listaProd += `• ${item.nome}\n`; });
    try {
        await addDoc(collection(db, "pedidos"), { 
            cliente: n, endereco: e, telefone: c, pagamento: p,
            produtos: listaProd, total: t, status: 'Pendente', data: serverTimestamp() 
        });
        window.open(`https://wa.me/5579999769581?text=${encodeURIComponent('*Pizzaria Robs*\n'+listaProd+'\n*Total:* R$ '+t+'\n*Cliente:* '+n)}`);
        location.reload();
    } catch(err) { alert("Erro ao salvar!"); }
}

function verificarHorario(){
    let agora=new Date(); let dia=agora.getDay(); let hora=agora.getHours();
    let aberto = ((dia>=3 && dia<=6) || dia==0) && (hora>=18 && hora<23);
    let status=document.getElementById("statusLoja");
    status.innerHTML = aberto ? "🟢 LOJA ABERTA" : "🔴 FECHADO";
    status.className = aberto ? "aberto" : "fechado";
}

verificarHorario();
carregarProdutos();
</script>
</body>
</html>
