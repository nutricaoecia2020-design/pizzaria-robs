<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e31837">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="UTF-8">
<title>Pizzaria Robs</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;}
.container{
max-width:900px;margin:auto;background:#fff;min-height:100vh;padding:20px;
border-left:8px solid #e31837;border-right:8px solid #e31837;
box-shadow:0 0 15px rgba(0,0,0,0.08);
}
.topo-info{
text-align:center;
font-size:14px;
color:#555;
margin-bottom:10px;
}
.status-btn{
display:inline-block;
padding:8px 15px;
border-radius:20px;
color:#fff;
font-weight:bold;
margin-top:8px;
}
.aberto{background:#28a745;animation:piscando 1s infinite;}
.fechado{background:#6c757d;}
@keyframes piscando{
0%{opacity:1;}50%{opacity:0.4;}100%{opacity:1;}
}
h2{color:#e31837;margin:5px 0;}
.aviso{
background:#fff3cd;color:#856404;padding:10px;border-radius:8px;
margin:15px 0;font-weight:bold;text-align:center;border:1px solid #ffeeba;
}

#produtos{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.produto{
background:#fff;padding:12px;border-radius:12px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

img{width:70px;height:70px;object-fit:cover;border-radius:10px;}
button{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.add{background:#28a745;color:#fff;}
.rem{background:#dc3545;color:#fff;}
.final{background:#e31837;color:#fff;width:100%;padding:14px;margin-top:20px;font-weight:bold;font-size:16px;}
input,select,textarea{
width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;
border-radius:8px;box-sizing:border-box;
}
.total-box{font-size:18px;font-weight:bold;color:#e31837;margin-top:10px;}
.pix-area{text-align:center;margin-top:15px;}
.timer{font-size:22px;font-weight:bold;color:#e31837;margin-top:10px;}
.copy-btn{background:#007bff;color:white;margin-top:5px;}

@media(max-width:600px){
#produtos{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="container">

<div class="topo-info">
📞 (79) 99976-9581 <br>
📍 Delivery Bairro Luzia - Aracaju - SE <br>
🗓 Aberto de Quarta a Domingo <br>
🕒 18:00 às 22:30
<br>
<div id="statusLoja" class="status-btn"></div>
</div>

<h2>🍕 Pizzaria Robs</h2>

<div class="aviso">
⚠️ Para fechar o pedido é obrigatório escolher 2 sabores.
</div>

<div id="produtos">Carregando cardápio...</div>

<h3>🛒 Carrinho</h3>
<div id="carrinho"></div>
<div class="total-box">Total: R$ <span id="total">0.00</span></div>

<h3>📍 Dados do Cliente</h3>
<input id="nome" placeholder="Seu Nome">
<input id="endereco" placeholder="Endereço de Entrega">
<input id="contato" placeholder="Telefone de Contato">

<select id="pagamento" onchange="window.renderCarrinho()">
<option>Dinheiro</option>
<option>Pix</option>
<option>Cartão</option>
</select>

<textarea id="obs" placeholder="Alguma observação?"></textarea>

<div id="pixArea" class="pix-area" style="display:none;">
<h3>Pagamento via Pix</h3>
<div id="qrcode"></div>
<p>Chave Pix: rcsv74@gmail.com</p>
<button class="copy-btn" onclick="window.copiarPix()">Copiar Chave Pix</button>
</div>

<button class="final" id="btnPedido" onclick="window.finalizar()">Enviar Pedido via WhatsApp</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// Configuração corrigida com a sua chave real
const firebaseConfig = {
    apiKey: "AIzaSyD-SUA_CHAVE_FIREBASE", 
    authDomain: "robs-pizzariadelivery.firebaseapp.com",
    projectId: "robs-pizzariadelivery",
    storageBucket: "robs-pizzariadelivery.appspot.com",
    messagingSenderId: "338805720977",
    appId: "1:338805720977:web:8666359590892994406a48"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const supabaseUrl='https://gsvvyktjeqlmhspqzppy.supabase.co';
const supabaseKey='sb_publishable_0lVSMGWIIYBvwu_iWWWPKw_qvoAHjOs';
const _supabase=supabase.createClient(supabaseUrl,supabaseKey);

let carrinho=[];
let produtosDoBanco=[];

/* ===== STATUS DA LOJA ===== */
function verificarHorario(){
    let agora=new Date();
    let dia=agora.getDay();
    let hora=agora.getHours();
    let minuto=agora.getMinutes();
    let aberto=false;

    if((dia>=3 && dia<=6) || dia==0){
        if((hora>18 || (hora==18 && minuto>=0)) && (hora<22 || (hora==22 && minuto<=30))){
            aberto=true;
        }
    }

    let status=document.getElementById("statusLoja");
    if(status) {
        if(aberto){
            status.innerHTML="🟢 LOJA ABERTA";
            status.className="status-btn aberto";
        }else{
            status.innerHTML="🔴 FECHADO - Agendamento";
            status.className="status-btn fechado";
        }
    }
}
verificarHorario();
setInterval(verificarHorario,60000);

/* ===== CARDÁPIO E CARRINHO (Funções exportadas para o HTML) ===== */
window.add = function(index){
    carrinho.push(produtosDoBanco[index]);
    window.renderCarrinho();
}

window.remover = function(index){
    carrinho.splice(index,1);
    window.renderCarrinho();
}

window.copiarPix = function(){
    navigator.clipboard.writeText("rcsv74@gmail.com");
    alert("Chave Pix copiada!");
}

async function carregarProdutos(){
    let lista=document.getElementById("produtos");
    const{data:produtos,error}=await _supabase.from('produtos').select('*');
    if(error){lista.innerHTML="Erro ao carregar.";return;}
    produtosDoBanco=produtos;
    lista.innerHTML="";
    produtos.forEach((p,index)=>{
        lista.innerHTML+=`<div class="produto">
            <div style="display:flex;align-items:center;gap:12px">
                <img src="${p.url_imagem||'https://via.placeholder.com/70'}">
                <div><b>${p.nome}</b><br>R$ ${parseFloat(p.preco).toFixed(2)}</div>
            </div>
            <button class="add" onclick="window.add(${index})">Add</button>
        </div>`;
    });
}

window.renderCarrinho = function(){
    let area=document.getElementById("carrinho");
    area.innerHTML="";
    let total=0;
    carrinho.forEach((p,index)=>{
        total+=parseFloat(p.preco);
        area.innerHTML+=`<div class="produto" style="background:#f9f9f9">
            <span>${p.nome}</span>
            <button class="rem" onclick="window.remover(${index})">X</button>
        </div>`;
    });
    document.getElementById("total").innerText=total.toFixed(2);
    
    // Mostra/Esconde área do PIX
    let pag = document.getElementById("pagamento").value;
    let pixArea = document.getElementById("pixArea");
    if(pag === "Pix" && total > 0){
        pixArea.style.display = "block";
    } else {
        pixArea.style.display = "none";
    }
}

/* ===== FINALIZAR E ENVIAR AO PAINEL ===== */
window.finalizar = async function(){
    let nome=document.getElementById("nome").value;
    let endereco=document.getElementById("endereco").value;
    let contato=document.getElementById("contato").value;
    let total=document.getElementById("total").innerText;
    let pag = document.getElementById("pagamento").value;
    let obs = document.getElementById("obs").value;

    if(!nome||!endereco||!contato||carrinho.length<2){
        alert("Preencha os dados e escolha no mínimo 2 sabores!");return;
    }

    let listaProd = "";
    carrinho.forEach(p => { listaProd += `• ${p.nome}\n`; });

    try {
        // Envia ao Firebase (Coleção: pedidos)
        await addDoc(collection(db, "pedidos"), {
            cliente: nome,
            endereco: endereco,
            telefone: contato,
            total: total,
            produtos: listaProd,
            pagamento: pag,
            observacao: obs,
            data: serverTimestamp()
        });

        // WhatsApp
        let msg = `Pizzaria Robs\n\n${listaProd}\nTotal: R$ ${total}\nCliente: ${nome}\nEndereço: ${endereco}`;
        window.open(`https://wa.me/5579999769581?text=${encodeURIComponent(msg)}`);
    } catch (e) { 
        console.error(e);
        alert("Erro ao conectar painel!"); 
    }
}

carregarProdutos();
</script>
</body>
</html>
