<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria Robs | Premium Delivery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #00a8ff; 
            --bg-light: #f0f8ff; 
            --dark: #121212;
            --card: #1e1e1e;
            --text-dark: #333333;
            --text-white: #ffffff;
            --text-dim: #666666;
            --success: #28a745;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        
        body { background: var(--bg-light); color: var(--text-dark); margin: 0; padding-bottom: 50px; }

        header {
            background: rgba(0, 168, 255, 0.9);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            color: white;
        }

        .logo h1 { margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }

        .cart-trigger {
            background: white; color: var(--primary); padding: 10px 18px; border-radius: 50px;
            cursor: pointer; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .cart-count {
            position: absolute; top: -5px; right: -5px; background: var(--dark); color: white;
            font-size: 12px; width: 20px; height: 20px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
        }

        .cart-sidebar {
            position: fixed; right: -100%; top: 0; width: 350px; height: 100%;
            background: var(--card); z-index: 1001; box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            transition: 0.4s; padding: 25px; overflow-y: auto; color: white;
        }
        .cart-sidebar.active { right: 0; }
        .close-cart { font-size: 24px; cursor: pointer; margin-bottom: 20px; display: block; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .banner-promo {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white; padding: 25px; border-radius: 20px; margin-bottom: 20px;
            text-align: center; border: 3px solid #fff;
        }

        .combo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn-promo { background: #ff79c6; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }

        #produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .produto-card {
            background: var(--card); border-radius: 18px; overflow: hidden;
            border: 1px solid #333; color: white;
        }
        .prod-img { width: 100%; height: 180px; object-fit: cover; background: #333; }
        .prod-info { padding: 15px; }
        .prod-price { color: var(--primary); font-weight: bold; font-size: 20px; }

        input, select { width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #ddd; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }

        @media(max-width: 600px) { .cart-sidebar { width: 100%; } .combo-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo"><h1>Robs 🍕</h1></div>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i>
        <span class="cart-count" id="contagem">0</span>
    </div>
</header>

<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <span id="statusLoja" style="padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold;">Verificando...</span>
    </div>

    <section class="banner-promo">
        <h2>PROMOÇÃO DA SEMANA</h2>
        <p>Dois sabores por apenas <b>R$ 29,90</b></p>
        <div class="combo-grid">
            <select id="comboSabor1"><option value="">Carregando...</option></select>
            <select id="comboSabor2"><option value="">Carregando...</option></select>
        </div>
        <button class="btn-promo" onclick="addCombo()">ADICIONAR PROMOÇÃO</button>
    </section>

    <h2><i class="fas fa-pizza-slice"></i> Nosso Cardápio</h2>
    <div id="produtos">Carregando cardápio...</div>

    <div style="margin-top: 40px; background: white; padding: 25px; border-radius: 20px;">
        <h3><i class="fas fa-truck"></i> Finalizar Pedido</h3>
        <input id="nome" placeholder="Seu Nome">
        <input id="endereco" placeholder="Endereço e Bairro">
        <input id="contato" placeholder="WhatsApp (DDD + Número)">
        <select id="pagamento">
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <button class="btn-add" style="background: #25d366; padding: 18px;" onclick="finalizar()">
            <i class="fab fa-whatsapp"></i> ENVIAR PELO WHATSAPP
        </button>
    </div>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <span class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></span>
    <h3>Seu Carrinho</h3>
    <div id="carrinhoItens"></div>
    <hr>
    <div style="display:flex; justify-content:space-between; font-size: 20px; font-weight: bold;">
        <span>Total:</span>
        <span>R$ <span id="total">0.00</span></span>
    </div>
</div>

<script>
    // SEU LINK DO APPS SCRIPT ATUALIZADO
    const API_URL = "https://script.google.com/macros/s/AKfycbx0YVnht7nSwp9N98fS5wBgmZ6J7Wz7OXn2zyCUtfGncoyW3YtT4t6HArmFW51s3IG6/exec";

    let carrinho = [];
    let produtosDoBanco = [];

    async function carregarProdutos() {
        const lista = document.getElementById("produtos");
        const s1 = document.getElementById("comboSabor1");
        const s2 = document.getElementById("comboSabor2");

        try {
            const response = await fetch(API_URL);
            produtosDoBanco = await response.json();
            
            lista.innerHTML = "";
            s1.innerHTML = s2.innerHTML = '<option value="">Escolha um sabor</option>';

            produtosDoBanco.forEach((p, index) => {
                s1.innerHTML += `<option value="${p.nome}">${p.nome}</option>`;
                s2.innerHTML += `<option value="${p.nome}">${p.nome}</option>`;

                lista.innerHTML += `
                    <div class="produto-card">
                        <img src="${p.url_imagem}" class="prod-img" onerror="this.src='https://via.placeholder.com/300x180?text=Pizza'">
                        <div class="prod-info">
                            <div style="font-weight:bold">${p.nome}</div>
                            <div class="prod-price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                            <button class="btn-add" style="margin-top:10px" onclick="add(${index})">Adicionar</button>
                        </div>
                    </div>`;
            });
        } catch (e) {
            lista.innerHTML = "Erro ao carregar. Verifique o nome da aba 'produtos' na planilha.";
        }
    }

    window.add = (i) => { carrinho.push(produtosDoBanco[i]); renderCarrinho(); };
    
    window.addCombo = () => {
        const v1 = document.getElementById("comboSabor1").value;
        const v2 = document.getElementById("comboSabor2").value;
        if(!v1 || !v2) return alert("Selecione os sabores!");
        carrinho.push({ nome: `Combo: ${v1} / ${v2}`, preco: 29.90 });
        renderCarrinho();
    };

    window.remover = (i) => { carrinho.splice(i, 1); renderCarrinho(); };
    window.toggleCart = () => document.getElementById('cartSidebar').classList.toggle('active');

    window.renderCarrinho = () => {
        const area = document.getElementById("carrinhoItens");
        let total = 0;
        area.innerHTML = "";
        carrinho.forEach((p, i) => {
            total += parseFloat(p.preco);
            area.innerHTML += `<div style="display:flex; justify-content:space-between; background:#333; padding:10px; border-radius:8px; margin-bottom:5px">
                <span>${p.nome}</span>
                <button onclick="remover(${i})" style="background:none; border:none; color:red; cursor:pointer">X</button>
            </div>`;
        });
        document.getElementById("total").innerText = total.toFixed(2);
        document.getElementById("contagem").innerText = carrinho.length;
    };

    window.finalizar = async function() {
        const nome = document.getElementById("nome").value;
        const end = document.getElementById("endereco").value;
        if(!nome || !end || carrinho.length === 0) return alert("Dados incompletos!");

        const itens = carrinho.map(p => p.nome).join(", ");
        const total = document.getElementById("total").innerText;

        // Envia para a planilha
        fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                cliente: nome,
                telefone: document.getElementById("contato").value,
                endereco: end,
                produtos: itens,
                total: total,
                pagamento: document.getElementById("pagamento").value
            })
        });

        const msg = `*PEDIDO ROBS*\n*Cliente:* ${nome}\n*Itens:* ${itens}\n*Total:* R$ ${total}`;
        window.open(`https://wa.me/5579999769581?text=${encodeURIComponent(msg)}`);
    };

    function checkStatus() {
        const h = new Date().getHours();
        const s = document.getElementById("statusLoja");
        if(h >= 18 && h < 23) { s.innerText = "🟢 ABERTO AGORA"; s.style.background = "#28a745"; }
        else { s.innerText = "🔴 FECHADO NO MOMENTO"; s.style.background = "#dc3545"; }
    }

    checkStatus();
    carregarProdutos();
</script>

</body>
</html>
