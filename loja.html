<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzaria Robs</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border:8px solid #e31837}
#produtos{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.produto{display:flex;justify-content:space-between;background:#fff;padding:10px;border-radius:10px;border:1px solid #eee}
button{padding:8px;border:none;border-radius:8px;cursor:pointer}
.add{background:#28a745;color:#fff}
.rem{background:#dc3545;color:#fff}
.final{background:#e31837;color:#fff;width:100%;padding:12px}
.painel{margin-top:30px;padding:15px;border:2px dashed #e31837;border-radius:10px}
</style>
</head>

<body>
<div class="container">

<h2>🍕 Pizzaria Robs</h2>

<div id="produtos">Carregando...</div>

<h3>Carrinho</h3>
<div id="carrinho"></div>
Total: R$ <span id="total">0.00</span>

<h3>Dados</h3>
<input id="nome" placeholder="Nome">
<input id="endereco" placeholder="Endereço">
<input id="contato" placeholder="Telefone">

<button class="final" onclick="finalizar()">Enviar Pedido</button>

<div class="painel">
<h3>📋 Pedidos do Dia</h3>
<div id="listaPedidos"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD-SUA_CHAVE_FIREBASE",
authDomain: "robs-pizzariadelivery.firebaseapp.com",
projectId: "robs-pizzariadelivery",
storageBucket: "robs-pizzariadelivery.appspot.com",
messagingSenderId: "338805720977",
appId: "1:338805720977:web:8666359590892994406a48"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SUPABASE (SEU)
const supabaseUrl='https://gsvvyktjeqlmhspqzppy.supabase.co';
const supabaseKey='sb_publishable_0lVSMGWIIYBvwu_iWWWPKw_qvoAHjOs';
const supabase=supabase.createClient(supabaseUrl,supabaseKey);

let carrinho=[];
let produtos=[];

// CARREGAR PRODUTOS
async function carregar(){
let {data}=await supabase.from('produtos').select('*');
produtos=data||[];
let html="";
produtos.forEach((p,i)=>{
html+=`
<div class="produto">
<span>${p.nome} - R$ ${parseFloat(p.preco).toFixed(2)}</span>
<button class="add" onclick="add(${i})">+</button>
</div>`;
});
document.getElementById("produtos").innerHTML=html;
}
carregar();

// CARRINHO
window.add=(i)=>{carrinho.push(produtos[i]);render()}
window.rem=(i)=>{carrinho.splice(i,1);render()}

function render(){
let html="";let total=0;
carrinho.forEach((p,i)=>{
total+=parseFloat(p.preco);
html+=`<div class="produto">${p.nome}<button class="rem" onclick="rem(${i})">x</button></div>`
});
document.getElementById("carrinho").innerHTML=html;
document.getElementById("total").innerText=total.toFixed(2);
}

// FINALIZAR PEDIDO
window.finalizar=async()=>{
let n=nome.value,e=endereco.value,c=contato.value;
if(!n||!e||!c||carrinho.length<1) return alert("Preencha tudo");

let lista="";
carrinho.forEach(p=>lista+=p.nome+" | ");

await addDoc(collection(db,"pedidos"),{
cliente:n,
endereco:e,
telefone:c,
produtos:lista,
total:total.innerText,
status:"preparando",
data:serverTimestamp()
});

alert("Pedido enviado!");
location.reload();
}

// LISTA PEDIDOS
function renderPedidos(pedidos){
let html="";
pedidos.forEach(p=>{
let cor="#ffc107";
if(p.status=="entrega") cor="#007bff";
if(p.status=="finalizado") cor="#28a745";

html+=`
<div style="border-left:5px solid ${cor};padding:10px;margin:10px;background:#fff">
<b>#${p.id.slice(0,5)}</b><br>
${p.cliente}<br>
${p.endereco}<br>
R$ ${p.total}<br>
Status: ${p.status}<br>

<input id="loc_${p.id}" placeholder="Link localização">

<button onclick="iniciar('${p.id}')">🚀 Entrega</button>
<button onclick="finalizarPedido('${p.id}')">✅ Finalizar</button>
</div>`;
});
listaPedidos.innerHTML=html;
}

// TEMPO REAL
onSnapshot(collection(db,"pedidos"),snap=>{
let lista=[];
snap.forEach(doc=>lista.push({id:doc.id,...doc.data()}));
renderPedidos(lista);
});

// AÇÕES
window.iniciar=async(id)=>{
let loc=document.getElementById("loc_"+id).value;
await updateDoc(doc(db,"pedidos",id),{
status:"entrega",
localizacao:loc
});
}

window.finalizarPedido=async(id)=>{
if(confirm("Remover pedido?")){
await deleteDoc(doc(db,"pedidos",id));
}
}

</script>
</body>
</html>
