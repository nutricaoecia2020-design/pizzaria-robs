<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImobPro v3.0 | Gestão Profissional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-blue: #0ea5e9; --dark-slate: #1e293b; --success-green: #22c55e; --bg-light: #f8fafc; --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--dark-slate); overflow-x: hidden; }
        .sidebar { width: var(--sidebar-width); background-color: #ffffff; height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid #e2e8f0; padding: 30px 0; z-index: 1000; }
        .sidebar-brand { padding: 0 30px 40px; display: flex; align-items: center; color: var(--primary-blue); font-weight: 700; font-size: 1.5rem; }
        .nav-menu { list-style: none; padding: 0; margin: 0; }
        .nav-item { margin: 4px 15px; }
        .nav-link { display: flex; align-items: center; padding: 12px 20px; color: #64748b; text-decoration: none; border-radius: 12px; font-weight: 500; transition: 0.3s; }
        .nav-link i { margin-right: 15px; font-size: 1.2rem; width: 25px; text-align: center; }
        .nav-link:hover, .nav-link.active { background-color: #f0f9ff; color: var(--primary-blue); }
        .main-wrapper { margin-left: var(--sidebar-width); padding: 40px; min-height: 100vh; }
        .imob-banner { background: #ffffff; border-radius: 20px; padding: 30px; margin-bottom: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(14, 165, 233, 0.1); }
        .property-card { background: #fff; border-radius: 20px; overflow: hidden; border: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04); transition: 0.3s; height: 100%; }
        .img-zoom-container { height: 220px; overflow: hidden; position: relative; }
        .property-img { width: 100%; height: 100%; object-fit: cover; }
        .ref-tag { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; }
        #preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .preview-box { position: relative; width: 100px; height: 100px; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .btn-del-img { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; z-index: 10; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand"><i class="fas fa-house-laptop me-2"></i> ImobPro</div>
    <ul class="nav-menu">
        <li class="nav-item"><a href="#" class="nav-link active" onclick="navegar('sec-vitrine')"><i class="fas fa-home"></i> Vitrine</a></li>
        <li class="nav-item"><a href="#" class="nav-link" onclick="navegar('sec-cadastro')"><i class="fas fa-plus-circle"></i> Novo Imóvel</a></li>
        <li class="nav-item"><a href="#" class="nav-link" onclick="navegar('sec-ajustes')"><i class="fas fa-sliders-h"></i> Ajustes</a></li>
    </ul>
</aside>

<main class="main-wrapper">
    <header class="imob-banner">
        <div>
            <h3 id="headerNome" class="mb-0 fw-bold">Carregando...</h3>
            <p id="headerEnd" class="text-muted mb-0 small">...</p>
        </div>
        <div id="headerWhatsTxt" class="fw-bold text-success"></div>
    </header>

    <section id="sec-vitrine" class="content-section">
        <div id="vitrineGrid" class="row g-4"></div>
    </section>

    <section id="sec-cadastro" class="content-section d-none">
        <div class="card p-4 border-0 shadow-sm">
            <h4 class="fw-bold mb-4">Cadastrar Imóvel</h4>
            <form id="formImovel" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">CÓDIGO (REF)</label>
                    <input type="text" id="imob-ref" class="form-control" placeholder="Ex: 101" required>
                </div>
                <div class="col-md-9">
                    <label class="form-label fw-bold">Título do Anúncio</label>
                    <input type="text" id="imob-titulo" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Preço (R$)</label>
                    <input type="number" id="imob-preco" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Tipo</label>
                    <select id="imob-tipo" class="form-select"><option>Casa</option><option>Apartamento</option><option>Terreno</option></select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Bairro</label>
                    <input type="text" id="imob-bairro" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold text-primary">Fotos (Até 20)</label>
                    <input type="file" id="imob-fotos-input" class="form-control" multiple accept="image/*" onchange="processarFotos(this.files)">
                    <div id="preview-grid"></div>
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold">Descrição</label>
                    <textarea id="imob-desc" class="form-control" rows="4"></textarea>
                </div>
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-primary px-5 rounded-pill">PUBLICAR NO SITE</button>
                </div>
            </form>
        </div>
    </section>

    <section id="sec-ajustes" class="content-section d-none">
        <div class="card p-4 border-0 shadow-sm">
            <h5>Configurações</h5>
            <form id="formConfig" class="row g-3">
                <div class="col-md-6"><label>Nome da Imobiliária</label><input type="text" id="conf-nome" class="form-control"></div>
                <div class="col-md-6"><label>WhatsApp (Com DDD)</label><input type="text" id="conf-zap" class="form-control"></div>
                <div class="col-12"><label>Endereço</label><input type="text" id="conf-end" class="form-control"></div>
                <div class="col-12"><button class="btn btn-primary">Salvar Ajustes</button></div>
            </form>
        </div>
    </section>
</main>

<script>
    let db_imoveis = JSON.parse(localStorage.getItem('imob_v3_data')) || [];
    let db_config = JSON.parse(localStorage.getItem('imob_v3_config')) || { nome: "Sua Imobiliária", zap: "5579", end: "Aracaju - SE" };
    let tempFotos = [];

    function navegar(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.add('d-none'));
        document.getElementById(id).classList.remove('d-none');
        if(id === 'sec-vitrine') renderVitrine();
    }

    function processarFotos(files) {
        Array.from(files).forEach(file => {
            if(tempFotos.length < 20) {
                const reader = new FileReader();
                reader.onload = (e) => { tempFotos.push(e.target.result); renderPreviews(); };
                reader.readAsDataURL(file);
            }
        });
    }

    function renderPreviews() {
        const grid = document.getElementById('preview-grid');
        grid.innerHTML = tempFotos.map((img, i) => `<div class="preview-box"><img src="${img}"><button type="button" class="btn-del-img" onclick="removerFoto(${i})">&times;</button></div>`).join('');
    }

    function removerFoto(i) { tempFotos.splice(i, 1); renderPreviews(); }

    document.getElementById('formImovel').onsubmit = (e) => {
        e.preventDefault();
        const novo = {
            id: Date.now(),
            ref: document.getElementById('imob-ref').value,
            titulo: document.getElementById('imob-titulo').value,
            preco: parseFloat(document.getElementById('imob-preco').value),
            tipo: document.getElementById('imob-tipo').value,
            bairro: document.getElementById('imob-bairro').value,
            desc: document.getElementById('imob-desc').value,
            fotos: [...tempFotos]
        };
        db_imoveis.unshift(novo);
        localStorage.setItem('imob_v3_data', JSON.stringify(db_imoveis));
        tempFotos = []; e.target.reset(); renderPreviews();
        alert("Imóvel Cadastrado com Sucesso!"); navegar('sec-vitrine');
    };

    function renderVitrine() {
        const grid = document.getElementById('vitrineGrid');
        grid.innerHTML = db_imoveis.map(i => `
            <div class="col-md-4">
                <div class="property-card">
                    <div class="img-zoom-container">
                        <img src="${i.fotos[0] || ''}" class="property-img">
                        <span class="ref-tag">REF: ${i.ref}</span>
                    </div>
                    <div class="p-3">
                        <h6 class="fw-bold">${i.titulo}</h6>
                        <p class="text-success fw-bold">R$ ${i.preco.toLocaleString('pt-BR')}</p>
                        <button onclick="removerImob(${i.id})" class="btn btn-sm btn-danger w-100">Excluir</button>
                    </div>
                </div>
            </div>`).join('');
    }

    function removerImob(id) { if(confirm("Remover?")) { db_imoveis = db_imoveis.filter(x => x.id !== id); localStorage.setItem('imob_v3_data', JSON.stringify(db_imoveis)); renderVitrine(); } }

    function aplicarConfig() {
        document.getElementById('headerNome').innerText = db_config.nome;
        document.getElementById('headerEnd').innerText = db_config.end;
        document.getElementById('headerWhatsTxt').innerText = "WhatsApp: " + db_config.zap;
    }

    document.getElementById('formConfig').onsubmit = (e) => {
        e.preventDefault();
        db_config.nome = document.getElementById('conf-nome').value;
        db_config.zap = document.getElementById('conf-zap').value;
        db_config.end = document.getElementById('conf-end').value;
        localStorage.setItem('imob_v3_config', JSON.stringify(db_config));
        aplicarConfig(); alert("Salvo!");
    };

    aplicarConfig(); renderVitrine();
</script>
</body>
</html>
