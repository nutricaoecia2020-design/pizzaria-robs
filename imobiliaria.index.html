<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Roberto Vasconcelos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .input-form { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 16px; outline: none; transition: 0.3s; }
        .input-form:focus { border-color: #0ea5e9; ring: 3px ring #bae6fd; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100">
        <div class="bg-slate-900 p-10 text-white flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold">Portal Admin v5.0</h1>
                <p class="text-sky-400 font-bold tracking-widest uppercase text-xs mt-1">Sincronização Ativa: imobiliaria-ad836</p>
            </div>
            <div class="h-14 w-14 bg-sky-500 rounded-2xl flex items-center justify-center shadow-lg shadow-sky-500/20">
                <i class="fas fa-upload text-2xl"></i>
            </div>
        </div>

        <form id="form-cadastro" class="p-10 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="md:col-span-2">
                    <label class="block text-sm font-black text-slate-700 mb-2 uppercase italic">Título do Anúncio</label>
                    <input type="text" id="titulo" class="input-form" placeholder="Ex: Mansão no Luzia com 4 Suítes" required>
                </div>
                <div>
                    <label class="block text-sm font-black text-slate-700 mb-2 uppercase italic">Referência (REF)</label>
                    <input type="text" id="ref" class="input-form" placeholder="Ex: RV-200" required>
                </div>
                <div>
                    <label class="block text-sm font-black text-slate-700 mb-2 uppercase italic">Tipo</label>
                    <select id="tipo" class="input-form font-bold text-slate-600">
                        <option value="Casa">Casa</option>
                        <option value="Apartamento">Apartamento</option>
                        <option value="Terreno">Terreno</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-black text-slate-700 mb-2 uppercase italic">Valor (R$)</label>
                    <input type="number" id="preco" class="input-form font-bold text-sky-600" placeholder="Apenas números" required>
                </div>
                <div>
                    <label class="block text-sm font-black text-slate-700 mb-2 uppercase italic">Bairro / Localização</label>
                    <input type="text" id="bairro" class="input-form" placeholder="Ex: Luzia" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-black text-slate-700 mb-2 uppercase italic">Descrição do Imóvel</label>
                <textarea id="desc" rows="4" class="input-form" placeholder="Conte os detalhes do imóvel aqui..."></textarea>
            </div>

            <div class="p-8 bg-sky-50 rounded-[32px] border-4 border-dashed border-sky-200 text-center">
                <i class="fas fa-images text-4xl text-sky-400 mb-4"></i>
                <label class="block text-lg font-black text-sky-900 mb-2">FOTOS DO IMÓVEL (ATÉ 20 UNIDADES)</label>
                <input type="file" id="fotos" multiple accept="image/*" class="hidden">
                <button type="button" onclick="document.getElementById('fotos').click()" class="bg-white text-sky-600 font-bold px-6 py-2 rounded-full border border-sky-200 shadow-sm hover:bg-sky-100 transition">
                    SELECIONAR ARQUIVOS
                </button>
                <div id="preview-status" class="mt-4 text-sm font-bold text-slate-500">Nenhuma foto selecionada</div>
            </div>

            <button type="submit" id="btn-salvar" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-black py-6 rounded-3xl shadow-xl shadow-sky-500/30 transition-all transform hover:scale-[1.01] flex items-center justify-center space-x-4">
                <i class="fas fa-check-circle text-2xl"></i>
                <span class="text-xl">PUBLICAR IMÓVEL AGORA</span>
            </button>
        </form>

        <div class="p-10 bg-slate-50 border-t border-slate-100">
            <h2 class="text-2xl font-black text-slate-800 mb-8">Imóveis no Site</h2>
            <div id="lista-db" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis.json";
        const DELETE_URL = "https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis/";

        // Monitor de seleção de fotos
        document.getElementById('fotos').onchange = function() {
            const qtd = this.files.length;
            document.getElementById('preview-status').innerText = qtd + (qtd === 1 ? " foto selecionada" : " fotos selecionadas");
        };

        // Função para converter TODAS as fotos sem perder nenhuma
        async function lerFotos(files) {
            const total = Math.min(files.length, 20);
            const arrayFotos = [];
            
            for (let i = 0; i < total; i++) {
                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(files[i]);
                });
                arrayFotos.push(base64); // Guarda cada uma na lista
            }
            return arrayFotos;
        }

        // Cadastro no Firebase
        document.getElementById('form-cadastro').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            const fotosInput = document.getElementById('fotos').files;

            if (fotosInput.length === 0) return alert("Selecione as fotos primeiro!");

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> <span>SUBINDO ' + fotosInput.length + ' FOTOS...</span>';

            const listaFinalDeFotos = await lerFotos(fotosInput);

            const imovelParaSubir = {
                titulo: document.getElementById('titulo').value,
                ref: document.getElementById('ref').value,
                tipo: document.getElementById('tipo').value,
                preco: parseFloat(document.getElementById('preco').value),
                bairro: document.getElementById('bairro').value,
                desc: document.getElementById('desc').value,
                fotos: listaFinalDeFotos // AQUI ESTÁ O ARRAY COM AS 20 FOTOS
            };

            try {
                // O segredo do POST: ele cria um registro novo toda vez, sem apagar o anterior
                await fetch(DB_URL, {
                    method: 'POST',
                    body: JSON.stringify(imovelParaSubir)
                });
                alert("Imóvel publicado com sucesso!");
                location.reload();
            } catch (err) {
                alert("Erro de conexão!");
                btn.disabled = false;
            }
        };

        async function carregar() {
            const container = document.getElementById('lista-db');
            const res = await fetch(DB_URL);
            const data = await res.json();
            
            if(!data) {
                container.innerHTML = '<p class="text-slate-400 font-bold italic">Nenhum imóvel cadastrado.</p>';
                return;
            }

            container.innerHTML = Object.keys(data).map(id => `
                <div class="bg-white p-5 rounded-[24px] border border-slate-200 flex items-center justify-between shadow-sm">
                    <div class="flex items-center space-x-5">
                        <img src="${data[id].fotos ? data[id].fotos[0] : ''}" class="w-16 h-16 rounded-2xl object-cover shadow-md bg-slate-100">
                        <div>
                            <h4 class="font-black text-slate-800">${data[id].titulo}</h4>
                            <p class="text-[10px] text-sky-600 font-black uppercase tracking-tighter">REF: ${data[id].ref} • ${data[id].fotos ? data[id].fotos.length : 0} FOTOS</p>
                        </div>
                    </div>
                    <button onclick="excluir('${id}')" class="h-12 w-12 bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition flex items-center justify-center">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        async function excluir(id) {
            if(confirm("Deseja mesmo apagar este imóvel?")) {
                await fetch(`${DELETE_URL}${id}.json`, { method: 'DELETE' });
                carregar();
            }
        }

        window.onload = carregar;
    </script>
</body>
</html>
