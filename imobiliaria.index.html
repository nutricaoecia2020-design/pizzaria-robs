<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Roberto Vasconcelos - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-box { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 16px; outline: none; transition: 0.3s; background: white; }
        .input-box:focus { border-color: #0ea5e9; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        .foto-card { position: relative; width: 90px; height: 90px; }
        .foto-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 2px solid #0ea5e9; }
        .btn-remove { position: absolute; -top: 8px; -right: 8px; background: #ef4444; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100">
        <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold">Gerenciador de Imóveis</h1>
                <p class="text-sky-400 text-xs font-bold uppercase tracking-widest">Sistema ImobPro v7.0</p>
            </div>
            <i class="fas fa-house-chimney text-3xl text-sky-500"></i>
        </div>

        <form id="form-imovel" class="p-8 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-xs font-black text-slate-500 mb-2 uppercase">Título do Anúncio</label>
                    <input type="text" id="titulo" class="input-box" placeholder="Ex: Casa no Luzia com Piscina" required>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-500 mb-2 uppercase">Referência (REF)</label>
                    <input type="text" id="ref" class="input-box" placeholder="Ex: RV-01" required>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-500 mb-2 uppercase">Tipo</label>
                    <select id="tipo" class="input-box font-bold">
                        <option value="Casa">Casa</option>
                        <option value="Apartamento">Apartamento</option>
                        <option value="Terreno">Terreno</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-500 mb-2 uppercase">Preço (R$)</label>
                    <input type="number" id="preco" class="input-box font-bold text-sky-600" placeholder="0.00" required>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-500 mb-2 uppercase">Bairro</label>
                    <input type="text" id="bairro" class="input-box" placeholder="Ex: Luzia" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-500 mb-2 uppercase">Características / Descrição</label>
                <textarea id="caracteristicas" rows="4" class="input-box" placeholder="Descreva quartos, suítes, vagas e diferenciais..."></textarea>
            </div>

            <div class="bg-sky-50 p-8 rounded-[32px] border-4 border-dashed border-sky-200 text-center">
                <h3 class="font-black text-sky-900 mb-4 uppercase">Fotos do Imóvel (Máximo 20)</h3>
                
                <input type="file" id="input-file" multiple accept="image/*" class="hidden">
                <button type="button" onclick="document.getElementById('input-file').click()" class="bg-sky-500 hover:bg-sky-600 text-white font-black px-8 py-3 rounded-2xl transition shadow-lg flex items-center mx-auto space-x-2">
                    <i class="fas fa-images"></i>
                    <span>ADICIONAR FOTOS</span>
                </button>

                <div id="preview-container" class="flex flex-wrap justify-center gap-4 mt-8">
                    </div>
                <p id="total-fotos" class="mt-4 text-xs font-extrabold text-slate-400 uppercase italic">Nenhuma foto adicionada</p>
            </div>

            <button type="submit" id="btn-publicar" class="w-full bg-slate-900 hover:bg-black text-white font-black py-6 rounded-[24px] shadow-xl transition-all flex items-center justify-center space-x-3">
                <i class="fas fa-paper-plane"></i>
                <span class="text-lg">PUBLICAR IMÓVEL COMPLETO</span>
            </button>
        </form>

        <div class="p-8 bg-slate-50 border-t" id="lista-ativa"></div>
    </div>

    <script>
        const API_URL = "https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis.json";
        let bancoDeFotos = []; // Aqui as fotos ficam salvas antes de enviar

        // Captura e acumula as fotos
        document.getElementById('input-file').onchange = function(e) {
            const novosArquivos = Array.from(e.target.files);
            
            novosArquivos.forEach(file => {
                if(bancoDeFotos.length < 20) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        bancoDeFotos.push(event.target.result);
                        atualizarTelaFotos();
                    };
                    reader.readAsDataURL(file);
                }
            });
            this.value = ""; // Limpa o seletor para permitir novas adições
        };

        function atualizarTelaFotos() {
            const container = document.getElementById('preview-container');
            const texto = document.getElementById('total-fotos');
            container.innerHTML = "";
            
            bancoDeFotos.forEach((img, idx) => {
                container.innerHTML += `
                    <div class="foto-card">
                        <img src="${img}">
                        <div class="btn-remove" onclick="removerFoto(${idx})">×</div>
                    </div>
                `;
            });
            texto.innerText = `Total: ${bancoDeFotos.length} de 20 fotos`;
        }

        function removerFoto(idx) {
            bancoDeFotos.splice(idx, 1);
            atualizarTelaFotos();
        }

        // ENVIO PARA O FIREBASE
        document.getElementById('form-imovel').onsubmit = async (e) => {
            e.preventDefault();
            if(bancoDeFotos.length === 0) return alert("Selecione ao menos 1 foto.");

            const btn = document.getElementById('btn-publicar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>ENVIANDO DADOS...</span>';

            const payload = {
                titulo: document.getElementById('titulo').value,
                ref: document.getElementById('ref').value,
                tipo: document.getElementById('tipo').value,
                preco: document.getElementById('preco').value,
                bairro: document.getElementById('bairro').value,
                desc: document.getElementById('caracteristicas').value,
                fotos: bancoDeFotos // Envia o conjunto completo de fotos
            };

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("Imóvel publicado com sucesso!");
                location.reload();
            } catch (err) {
                alert("Erro ao salvar. Tente novamente.");
                btn.disabled = false;
            }
        };

        // CARREGAR LISTA
        async function carregar() {
            const div = document.getElementById('lista-ativa');
            const res = await fetch(API_URL);
            const data = await res.json();
            if(!data) return div.innerHTML = "<p class='text-center text-slate-400'>Nenhum imóvel online.</p>";

            div.innerHTML = Object.keys(data).map(key => `
                <div class="flex items-center justify-between bg-white p-4 mb-3 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex items-center space-x-4">
                        <img src="${data[key].fotos ? data[key].fotos[0] : ''}" class="w-12 h-12 rounded-lg object-cover">
                        <div>
                            <p class="font-bold text-slate-800">${data[key].titulo}</p>
                            <p class="text-[10px] font-black text-sky-500 uppercase">REF: ${data[key].ref} | ${data[key].fotos ? data[key].fotos.length : 0} fotos</p>
                        </div>
                    </div>
                    <button onclick="apagar('${key}')" class="text-red-400 hover:text-red-600 p-2"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        async function apagar(id) {
            if(confirm("Excluir este imóvel?")) {
                await fetch(`https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis/${id}.json`, { method: 'DELETE' });
                carregar();
            }
        }
        window.onload = carregar;
    </script>
</body>
</html>
