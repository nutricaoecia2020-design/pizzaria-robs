<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImobSystem Pro | Gestão Imobiliária</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --bg-light: #f8fafc;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-light);
            color: #334155;
        }

        /* Sidebar Customizada */
        .sidebar {
            background-color: var(--primary-color);
            min-height: 100vh;
            color: white;
            padding-top: 20px;
        }

        .nav-link {
            color: #94a3b8;
            padding: 12px 20px;
            margin: 4px 15px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--accent-color);
            color: white;
        }

        /* Header e Cards */
        .main-content { padding: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .property-card img { height: 200px; object-fit: cover; border-top-left-radius: 12px; border-top-right-radius: 12px; }
        
        .imob-header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-placeholder {
            width: 60px;
            height: 60px;
            background: #e2e8f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .price-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-color);
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 6px;
        }

        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            border: none;
        }
        .btn-whatsapp:hover { background-color: #128c7e; color: white; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar shadow">
            <div class="text-center mb-4">
                <h5 class="fw-bold"><i class="fas fa-building me-2"></i>ImobPro</h5>
            </div>
            <div class="nav flex-column">
                <a class="nav-link active" href="#" onclick="showSection('dashboard')"><i class="fas fa-home me-2"></i> Vitrine</a>
                <a class="nav-link" href="#" onclick="showSection('novo-imovel')"><i class="fas fa-plus-circle me-2"></i> Novo Imóvel</a>
                <a class="nav-link" href="#" onclick="showSection('clientes')"><i class="fas fa-users me-2"></i> Clientes</a>
                <a class="nav-link" href="#" onclick="showSection('configuracoes')"><i class="fas fa-cog me-2"></i> Minha Imobiliária</a>
            </div>
        </nav>

        <main class="col-md-10 main-content">
            
            <div class="imob-header shadow-sm">
                <div class="d-flex align-items-center">
                    <div id="headerLogo" class="logo-placeholder me-3">
                        <i class="fas fa-image text-muted"></i>
                    </div>
                    <div>
                        <h4 id="headerNome" class="mb-0 fw-bold text-dark">Sua Imobiliária</h4>
                        <small id="headerEndereco" class="text-muted"><i class="fas fa-map-marker-alt me-1"></i> Configurar endereço</small>
                    </div>
                </div>
                <div class="text-end">
                    <span id="headerTelefone" class="badge bg-light text-dark border p-2"><i class="fab fa-whatsapp text-success me-1"></i> (00) 00000-0000</span>
                </div>
            </div>

            <section id="sec-dashboard" class="content-section">
                <div class="row mb-4">
                    <div class="col-md-4">
                        <input type="text" id="buscaBairro" class="form-control" placeholder="🔍 Buscar por bairro..." onkeyup="filtrar()">
                    </div>
                    <div class="col-md-3">
                        <select id="buscaTipo" class="form-select" onchange="filtrar()">
                            <option value="">Todos os tipos</option>
                            <option value="Casa">Casa</option>
                            <option value="Apartamento">Apartamento</option>
                        </select>
                    </div>
                </div>
                <div id="listaImoveis" class="row g-4">
                    </div>
            </section>

            <section id="sec-novo-imovel" class="content-section d-none">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4">Cadastrar Propriedade</h5>
                    <form id="formImovel" class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Título do Anúncio</label>
                            <input type="text" id="imob_titulo" class="form-control" required placeholder="Ex: Casa Duplex com Piscina">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Preço (R$)</label>
                            <input type="number" id="imob_preco" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tipo</label>
                            <select id="imob_tipo" class="form-select">
                                <option value="Casa">Casa</option>
                                <option value="Apartamento">Apartamento</option>
                                <option value="Terreno">Terreno</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Bairro</label>
                            <input type="text" id="imob_bairro" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">URL da Foto</label>
                            <input type="text" id="imob_foto" class="form-control" placeholder="https://linkdaimagem.com/foto.jpg">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descrição Curta (Características)</label>
                            <textarea id="imob_desc" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary px-5">Publicar Imóvel</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="sec-clientes" class="content-section d-none">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4">Base de Contatos</h5>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Nome</th>
                                    <th>WhatsApp</th>
                                    <th>Interesse</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaClientes"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="sec-configuracoes" class="content-section d-none">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4">Dados da Minha Imobiliária</h5>
                    <form id="formConfig" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nome Fantasia</label>
                            <input type="text" id="conf_nome" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">WhatsApp de Vendas</label>
                            <input type="text" id="conf_tel" class="form-control" placeholder="5579999999999">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Endereço Físico</label>
                            <input type="text" id="conf_end" class="form-control">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">URL da Logo (PNG transparente preferencialmente)</label>
                            <input type="text" id="conf_logo" class="form-control">
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-dark px-5">Salvar Configurações</button>
                        </div>
                    </form>
                </div>
            </section>

        </main>
    </div>
</div>

<script>
    // Inicialização de Dados
    let imoveis = JSON.parse(localStorage.getItem('imob_dados')) || [];
    let config = JSON.parse(localStorage.getItem('imob_config')) || {
        nome: "Sua Imobiliária",
        tel: "",
        end: "Aracaju, SE",
        logo: ""
    };

    // Função para trocar abas
    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-' + id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // Salvar Configuração da Imobiliária
    document.getElementById('formConfig').addEventListener('submit', (e) => {
        e.preventDefault();
        config = {
            nome: document.getElementById('conf_nome').value,
            tel: document.getElementById('conf_tel').value,
            end: document.getElementById('conf_end').value,
            logo: document.getElementById('conf_logo').value
        };
        localStorage.setItem('imob_config', JSON.stringify(config));
        aplicarConfig();
        alert('Dados atualizados com sucesso!');
    });

    function aplicarConfig() {
        document.getElementById('headerNome').innerText = config.nome;
        document.getElementById('headerEndereco').innerHTML = `<i class="fas fa-map-marker-alt me-1"></i> ${config.end}`;
        document.getElementById('headerTelefone').innerHTML = `<i class="fab fa-whatsapp text-success me-1"></i> ${config.tel}`;
        if(config.logo) {
            document.getElementById('headerLogo').innerHTML = `<img src="${config.logo}" style="width:100%; height:100%; object-fit:contain">`;
        }
    }

    // Salvar Imóvel
    document.getElementById('formImovel').addEventListener('submit', (e) => {
        e.preventDefault();
        const novo = {
            id: Date.now(),
            titulo: document.getElementById('imob_titulo').value,
            preco: parseFloat(document.getElementById('imob_preco').value),
            tipo: document.getElementById('imob_tipo').value,
            bairro: document.getElementById('imob_bairro').value,
            foto: document.getElementById('imob_foto').value || 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=400&q=80',
            desc: document.getElementById('imob_desc').value
        };
        imoveis.push(novo);
        localStorage.setItem('imob_dados', JSON.stringify(imoveis));
        e.target.reset();
        filtrar();
        showSection('dashboard');
    });

    // Renderizar Imóveis (Vitrine)
    function filtrar() {
        const grid = document.getElementById('listaImoveis');
        const termo = document.getElementById('buscaBairro').value.toLowerCase();
        const tipo = document.getElementById('buscaTipo').value;

        grid.innerHTML = '';
        
        imoveis.filter(i => {
            return i.bairro.toLowerCase().includes(termo) && (!tipo || i.tipo === tipo);
        }).forEach(i => {
            grid.innerHTML += `
                <div class="col-md-4 col-lg-3">
                    <div class="card property-card shadow-sm h-100">
                        <img src="${i.foto}" class="card-img-top">
                        <div class="card-body">
                            <span class="price-badge">R$ ${i.preco.toLocaleString('pt-BR')}</span>
                            <h6 class="fw-bold mt-2 mb-1">${i.titulo}</h6>
                            <p class="small text-muted mb-2"><i class="fas fa-map-marker-alt"></i> ${i.bairro}</p>
                            <p class="small text-secondary" style="height: 40px; overflow: hidden;">${i.desc}</p>
                            <button onclick="compartilhar('${i.id}')" class="btn btn-whatsapp w-100 btn-sm mt-2">
                                <i class="fab fa-whatsapp me-1"></i> Enviar p/ Cliente
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // Link do WhatsApp
    function compartilhar(id) {
        const i = imoveis.find(item => item.id == id);
        const msg = `🏠 *IMÓVEL DISPONÍVEL - ${config.nome}*%0A%0A*${i.titulo}*%0A📍 Bairro: ${i.bairro}%0A💰 Valor: R$ ${i.preco.toLocaleString('pt-BR')}%0A📝 Detalhes: ${i.desc}%0A%0A📸 Veja a foto: ${i.foto}%0A%0A📞 Contato: ${config.tel}`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    // Init
    aplicarConfig();
    filtrar();
    
    // Preencher campos de config se já existirem
    document.getElementById('conf_nome').value = config.nome;
    document.getElementById('conf_tel').value = config.tel;
    document.getElementById('conf_end').value = config.end;
    document.getElementById('conf_logo').value = config.logo;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
