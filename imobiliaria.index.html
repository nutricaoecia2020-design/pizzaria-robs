<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Roberto Vasconcelos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .input-form { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.3s; }
        .input-form:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white rounded-[32px] shadow-2xl overflow-hidden">
        <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Gerenciador de Imóveis</h1>
                <p class="text-sky-400 text-sm font-semibold">Roberto Vasconcelos – Aracaju/SE</p>
            </div>
            <i class="fas fa-house-medical text-3xl text-sky-500"></i>
        </div>

        <form id="form-cadastro" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Título do Anúncio</label>
                    <input type="text" id="titulo" class="input-form" placeholder="Ex: Casa Duplex no Luzia" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Referência (Cód/REF)</label>
                    <input type="text" id="ref" class="input-form" placeholder="Ex: RV01" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Tipo</label>
                    <select id="tipo" class="input-form">
                        <option value="Casa">Casa</option>
                        <option value="Apartamento">Apartamento</option>
                        <option value="Terreno">Terreno</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Preço (R$)</label>
                    <input type="number" id="preco" class="input-form" placeholder="Ex: 500000" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Bairro</label>
                    <input type="text" id="bairro" class="input-form" placeholder="Ex: Luzia" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Descrição Completa</label>
                <textarea id="desc" rows="4" class="input-form" placeholder="Detalhes do imóvel..."></textarea>
            </div>

            <div class="bg-sky-50 p-6 rounded-2xl border-2 border-dashed border-sky-200">
                <label class="block text-sm font-bold text-sky-700 mb-2">Fotos do Imóvel (Selecione até 20 fotos de uma vez)</label>
                <input type="file" id="fotos" multiple accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-sky-500 file:text-white hover:file:bg-sky-600">
                <p class="text-xs text-slate-400 mt-2 italic">* No computador, segure 'Ctrl' para selecionar várias fotos.</p>
            </div>

            <button type="submit" id="btn-salvar" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-black py-5 rounded-2xl shadow-lg transition-all flex items-center justify-center space-x-3">
                <i class="fas fa-cloud-upload-alt text-xl"></i>
                <span>PUBLICAR NO SITE</span>
            </button>
        </form>

        <div class="p-8 bg-slate-50 border-t">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Imóveis Ativos no Firebase</h2>
            <div id="lista-imoveis" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        // URL DO SEU FIREBASE
        const DB_URL = "https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis.json";
        const DELETE_URL = "https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis/";

        // Função para converter várias imagens em uma lista de textos (Base64)
        async function converterFotos(arquivos) {
            const listaDeFotos = [];
            for (let i = 0; i < arquivos.length; i++) {
                if (i >= 20) break; // Limite de 20 fotos
                const file = arquivos[i];
                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
                listaDeFotos.push(base64);
            }
            return listaDeFotos;
        }

        // CADASTRO
        document.getElementById('form-cadastro').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            
            // Inicia carregamento
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>PROCESSANDO 20 FOTOS...</span>';

            const arquivos = document.getElementById('fotos').files;
            if (arquivos.length === 0) {
                alert("Por favor, selecione ao menos uma foto.");
                btn.disabled = false;
                btn.innerHTML = '<span>PUBLICAR NO SITE</span>';
                return;
            }

            const fotosBase64 = await converterFotos(arquivos);

            const novoImovel = {
                titulo: document.getElementById('titulo').value,
                ref: document.getElementById('ref').value,
                tipo: document.getElementById('tipo').value,
                preco: parseFloat(document.getElementById('preco').value),
                bairro: document.getElementById('bairro').value,
                desc: document.getElementById('desc').value,
                fotos: fotosBase64 // Aqui vai a lista com as 20 fotos
            };

            try {
                // O método POST garante que um novo imóvel seja criado sem apagar o anterior
                await fetch(DB_URL, {
                    method: 'POST',
                    body: JSON.stringify(novoImovel)
                });
                alert("Imóvel publicado com sucesso com " + fotosBase64.length + " fotos!");
                location.reload(); 
            } catch (error) {
                alert("Erro ao conectar com o Firebase.");
                btn.disabled = false;
            }
        };

        // LISTAR E EXCLUIR
        async function carregarImoveis() {
            const lista = document.getElementById('lista-imoveis');
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                
                if (!data) {
                    lista.innerHTML = '<p class="text-slate-400">Nenhum imóvel cadastrado.</p>';
                    return;
                }

                lista.innerHTML = Object.keys(data).map(key => {
                    const imob = data[key];
                    return `
                        <div class="flex items-center justify-between bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                            <div class="flex items-center space-x-4">
                                <img src="${imob.fotos ? imob.fotos[0] : ''}" class="w-16 h-16 rounded-lg object-cover">
                                <div>
                                    <p class="font-bold text-slate-800">${imob.titulo}</p>
                                    <p class="text-xs text-slate-500">REF: ${imob.ref} | ${imob.fotos ? imob.fotos.length : 0} fotos</p>
                                </div>
                            </div>
                            <button onclick="excluirImovel('${key}')" class="text-red-500 hover:bg-red-50 p-3 rounded-full">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                lista.innerHTML = 'Erro ao carregar dados.';
            }
        }

        async function excluirImovel(id) {
            if (confirm("Deseja apagar este imóvel permanentemente?")) {
                await fetch(`${DELETE_URL}${id}.json`, { method: 'DELETE' });
                carregarImoveis();
            }
        }

        window.onload = carregarImoveis;
    </script>
</body>
</html>
