<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - ImobPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #0ea5e9; ring: 2px ring #bae6fd; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white rounded-[32px] shadow-xl overflow-hidden">
        <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Painel ImobPro</h1>
                <p class="text-slate-400 text-sm">Cadastro de Imóveis - Roberto Vasconcelos</p>
            </div>
            <i class="fas fa-user-shield text-3xl text-sky-500"></i>
        </div>

        <form id="form-cadastro" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Título do Anúncio</label>
                    <input type="text" id="titulo" class="input-field" placeholder="Ex: Casa Duplex no Luzia" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Referência (Cód/REF)</label>
                    <input type="text" id="ref" class="input-field" placeholder="Ex: RV1001" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Tipo de Imóvel</label>
                    <select id="tipo" class="input-field">
                        <option value="Apartamento">Apartamento</option>
                        <option value="Casa">Casa</option>
                        <option value="Terreno">Terreno</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Valor (R$)</label>
                    <input type="number" id="preco" class="input-field" placeholder="Apenas números" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Bairro</label>
                    <input type="text" id="bairro" class="input-field" placeholder="Ex: Luzia" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Cidade</label>
                    <input type="text" id="cidade" class="input-field" value="Aracaju" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Descrição Completa</label>
                <textarea id="desc" rows="4" class="input-field" placeholder="Detalhes do imóvel..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Fotos do Imóvel (Até 20 fotos)</label>
                <input type="file" id="fotos" multiple accept="image/*" class="input-field">
                <p class="text-xs text-slate-400 mt-2 italic">* Selecione várias imagens de uma vez.</p>
            </div>

            <button type="submit" id="btn-salvar" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-black py-4 rounded-xl shadow-lg transition flex items-center justify-center space-x-2">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>PUBLICAR NO SITE</span>
            </button>
        </form>

        <div class="border-t border-slate-100 p-8">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Imóveis Ativos no Firebase</h2>
            <div id="lista-imoveis" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE (O link que você criou)
        const DB_URL = "https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis";

        const form = document.getElementById('form-cadastro');
        const lista = document.getElementById('lista-imoveis');

        // Função para converter imagens em Base64 (para salvar no banco)
        async function converterImagens(files) {
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            });
            return Promise.all(promises);
        }

        // SALVAR NO FIREBASE
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>ENVIANDO...</span>';

            const fotosFiles = document.getElementById('fotos').files;
            const fotosBase64 = await converterImagens(fotosFiles);

            const novoImovel = {
                id: Date.now(),
                titulo: document.getElementById('titulo').value,
                ref: document.getElementById('ref').value,
                tipo: document.getElementById('tipo').value,
                preco: parseFloat(document.getElementById('preco').value),
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                desc: document.getElementById('desc').value,
                fotos: fotosBase64
            };

            try {
                await fetch(`${DB_URL}.json`, {
                    method: 'POST',
                    body: JSON.stringify(novoImovel)
                });
                alert("Imóvel publicado com sucesso!");
                form.reset();
                carregarImoveis();
            } catch (error) {
                alert("Erro ao salvar no Firebase.");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> <span>PUBLICAR NO SITE</span>';
            }
        };

        // CARREGAR LISTA PARA GERENCIAR (EXCLUIR)
        async function carregarImoveis() {
            try {
                const response = await fetch(`${DB_URL}.json`);
                const data = await response.json();
                lista.innerHTML = "";

                if (!data) {
                    lista.innerHTML = "<p class='text-slate-400'>Nenhum imóvel cadastrado.</p>";
                    return;
                }

                Object.keys(data).forEach(key => {
                    const imob = data[key];
                    lista.innerHTML += `
                        <div class="flex items-center justify-between bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <div class="flex items-center space-x-4">
                                <img src="${imob.fotos[0]}" class="w-16 h-16 rounded-lg object-cover">
                                <div>
                                    <p class="font-bold text-slate-800">${imob.titulo}</p>
                                    <p class="text-xs text-slate-500">REF: ${imob.ref} | R$ ${imob.preco.toLocaleString('pt-BR')}</p>
                                </div>
                            </div>
                            <button onclick="excluirImovel('${key}')" class="text-red-500 hover:text-red-700 p-2">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erro ao carregar lista:", error);
            }
        }

        // EXCLUIR DO FIREBASE
        async function excluirImovel(key) {
            if (confirm("Deseja realmente excluir este imóvel do site?")) {
                await fetch(`${DB_URL}/${key}.json`, { method: 'DELETE' });
                carregarImoveis();
            }
        }

        window.onload = carregarImoveis;
    </script>
</body>
</html>
