<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ImobPro – Sistema de 20 Fotos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .input-form { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; }
        .input-form:focus { border-color: #0ea5e9; ring: 2px ring #bae6fd; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white rounded-[32px] shadow-2xl overflow-hidden">
        <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
            <h1 class="text-2xl font-bold">Cadastro de Imóveis v4.0</h1>
            <span class="bg-sky-500 px-4 py-1 rounded-full text-xs font-bold">CONECTADO AO FIREBASE</span>
        </div>

        <form id="form-cadastro" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" id="titulo" class="input-form" placeholder="Título do Imóvel" required>
                <input type="text" id="ref" class="input-form" placeholder="Referência (Ex: RV01)" required>
                <select id="tipo" class="input-form">
                    <option value="Casa">Casa</option>
                    <option value="Apartamento">Apartamento</option>
                </select>
                <input type="number" id="preco" class="input-form" placeholder="Preço (Apenas números)" required>
                <input type="text" id="bairro" class="input-form" placeholder="Bairro" required>
            </div>

            <div>
                <textarea id="desc" rows="3" class="input-form" placeholder="Descrição Detalhada"></textarea>
            </div>

            <div class="bg-sky-50 p-6 rounded-2xl border-2 border-dashed border-sky-300">
                <label class="block text-sm font-bold text-sky-800 mb-2 underline">FOTOS DO IMÓVEL (SELECIONE ATÉ 20):</label>
                <input type="file" id="fotos" multiple accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-sky-500 file:text-white font-bold">
                <div id="status-fotos" class="mt-2 text-xs font-bold text-slate-500"></div>
            </div>

            <button type="submit" id="btn-salvar" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-black py-5 rounded-2xl shadow-lg transition flex items-center justify-center space-x-2">
                <i class="fas fa-cloud-upload-alt text-xl"></i>
                <span>PUBLICAR IMÓVEL</span>
            </button>
        </form>

        <div class="p-8 bg-slate-50 border-t border-slate-100">
            <h2 class="text-xl font-bold text-slate-800 mb-4">Gerenciar Imóveis Ativos</h2>
            <div id="lista-imoveis" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const DB_URL = "https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis.json";
        const DELETE_URL = "https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis/";

        // FUNÇÃO QUE REALMENTE PEGA TODAS AS FOTOS SEM SUBSTITUIR
        async function converterTodasAsFotos(files) {
            const arrayDeFotos = [];
            const filesArray = Array.from(files).slice(0, 20); // Pega no máximo 20

            for (const file of filesArray) {
                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
                arrayDeFotos.push(base64); // Adiciona cada foto na lista
            }
            return arrayDeFotos;
        }

        document.getElementById('form-cadastro').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            const fotosInput = document.getElementById('fotos').files;

            if (fotosInput.length === 0) return alert("Selecione fotos!");

            btn.disabled = true;
            btn.innerHTML = `LENDO ${fotosInput.length} FOTOS... AGUARDE`;

            // 1. Gera a lista completa de fotos primeiro
            const listaFotosFinal = await converterTodasAsFotos(fotosInput);

            // 2. Cria o objeto completo para o Firebase
            const imovel = {
                titulo: document.getElementById('titulo').value,
                ref: document.getElementById('ref').value,
                tipo: document.getElementById('tipo').value,
                preco: parseFloat(document.getElementById('preco').value),
                bairro: document.getElementById('bairro').value,
                desc: document.getElementById('desc').value,
                fotos: listaFotosFinal // Aqui vai a LISTA com as fotos (Array)
            };

            try {
                // 3. Usa POST para criar um novo registro único no Firebase
                await fetch(DB_URL, {
                    method: 'POST',
                    body: JSON.stringify(imovel)
                });
                alert("Sucesso! Imóvel com " + listaFotosFinal.length + " fotos publicado.");
                location.reload();
            } catch (err) {
                alert("Erro ao enviar.");
                btn.disabled = false;
            }
        };

        async function carregar() {
            const lista = document.getElementById('lista-imoveis');
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(!data) { lista.innerHTML = "Nenhum imóvel."; return; }

            lista.innerHTML = Object.keys(data).map(id => `
                <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <div class="flex items-center space-x-3">
                        <img src="${data[id].fotos ? data[id].fotos[0] : ''}" class="w-12 h-12 object-cover rounded-lg">
                        <div>
                            <p class="font-bold text-slate-800">${data[id].titulo}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">REF: ${data[id].ref} | ${data[id].fotos ? data[id].fotos.length : 0} FOTOS</p>
                        </div>
                    </div>
                    <button onclick="excluir('${id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-full transition"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        async function excluir(id) {
            if(confirm("Apagar imóvel?")) {
                await fetch(`${DELETE_URL}${id}.json`, { method: 'DELETE' });
                carregar();
            }
        }

        window.onload = carregar;
    </script>
</body>
</html>
