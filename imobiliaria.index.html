<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Roberto Vasconcelos - Acumulador de Fotos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .input-form { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; }
        .foto-preview { position: relative; width: 80px; height: 80px; }
        .foto-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; border: 2px solid #0ea5e9; }
        .remove-btn { position: absolute; -top: 5px; -right: 5px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white rounded-[32px] shadow-2xl overflow-hidden">
        <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
            <h1 class="text-2xl font-bold">Gerenciador de Imóveis</h1>
            <i class="fas fa-layer-group text-sky-500 text-3xl"></i>
        </div>

        <form id="form-cadastro" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" id="titulo" class="input-form" placeholder="Título do Imóvel" required>
                <input type="text" id="ref" class="input-form" placeholder="REF: 001" required>
                <input type="number" id="preco" class="input-form" placeholder="Valor R$" required>
                <input type="text" id="bairro" class="input-form" placeholder="Bairro" required>
            </div>

            <div class="bg-sky-50 p-6 rounded-2xl border-2 border-dashed border-sky-200 text-center">
                <label class="block text-sky-800 font-black mb-4 uppercase">Adicione até 20 Fotos (Uma por uma ou várias)</label>
                
                <input type="file" id="input-foto-oculto" multiple accept="image/*" class="hidden">
                <button type="button" onclick="document.getElementById('input-foto-oculto').click()" class="bg-sky-500 text-white font-bold px-6 py-3 rounded-xl hover:bg-sky-600 transition shadow-lg">
                    <i class="fas fa-camera mr-2"></i> SELECIONAR FOTOS
                </button>

                <div id="grid-previsualizacao" class="flex flex-wrap justify-center gap-4 mt-6">
                    </div>
                <p id="contador" class="text-xs font-bold text-slate-500 mt-4 uppercase">Fotos: 0 / 20</p>
            </div>

            <button type="submit" id="btn-salvar" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-black transition flex items-center justify-center space-x-3">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>PUBLICAR COM TODAS AS FOTOS</span>
            </button>
        </form>

        <div class="p-8 bg-slate-50 border-t" id="lista-imoveis"></div>
    </div>

    <script>
        const DB_URL = "https://imobiliaria-ad836-default-rtdb.firebaseio.com/imoveis.json";
        
        // Esta lista vai guardar as fotos conforme você escolhe
        let listaGlobalFotos = [];

        // Quando você escolhe fotos no botão
        document.getElementById('input-foto-oculto').onchange = function(e) {
            const arquivos = e.target.files;
            
            for(let f of arquivos) {
                if(listaGlobalFotos.length >= 20) break;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    listaGlobalFotos.push(event.target.result); // Salva na lista
                    renderizarFotos(); // Mostra na tela
                };
                reader.readAsDataURL(f);
            }
            this.value = ""; // Reseta o botão para você clicar de novo se quiser
        };

        // Função para mostrar as fotos na tela com botão de remover
        function renderizarFotos() {
            const grid = document.getElementById('grid-previsualizacao');
            const contador = document.getElementById('contador');
            grid.innerHTML = "";
            
            listaGlobalFotos.forEach((foto, index) => {
                grid.innerHTML += `
                    <div class="foto-preview">
                        <img src="${foto}">
                        <div class="remove-btn" onclick="removerFoto(${index})">×</div>
                    </div>
                `;
            });
            contador.innerText = `Fotos: ${listaGlobalFotos.length} / 20`;
        }

        function removerFoto(index) {
            listaGlobalFotos.splice(index, 1);
            renderizarFotos();
        }

        // SALVAR TUDO
        document.getElementById('form-cadastro').onsubmit = async (e) => {
            e.preventDefault();
            if(listaGlobalFotos.length === 0) return alert("Adicione pelo menos uma foto!");

            const btn = document.getElementById('btn-salvar');
            btn.disabled = true;
            btn.innerHTML = "ENVIANDO AGORA...";

            const dados = {
                titulo: document.getElementById('titulo').value,
                ref: document.getElementById('ref').value,
                preco: document.getElementById('preco').value,
                bairro: document.getElementById('bairro').value,
                fotos: listaGlobalFotos // Envia a lista acumulada
            };

            await fetch(DB_URL, { method: 'POST', body: JSON.stringify(dados) });
            alert("Imóvel Publicado!");
            location.reload();
        };
    </script>
</body>
</html>
