<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - Cadastro</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .lista { margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
        .prod { display: flex; justify-content: space-between; align-items: center; background: #eee; padding: 10px; margin: 5px 0; border-radius: 6px; }
        img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; margin-right: 10px; }
        .info { display: flex; align-items: center; }
        .btn-remover { background: #dc3545; width: auto; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cadastrar Novo Produto</h2>

    <input type="text" id="nome" placeholder="Nome do Produto">
    <input type="number" id="preco" placeholder="Preço (ex: 29.90)">
    <input type="text" id="url_imagem" placeholder="Link da Imagem (URL)">

    <button onclick="salvarProduto()">Cadastrar no Banco de Dados</button>

    <div class="lista" id="lista">
        <p style="text-align:center; color: #888;">Carregando produtos cadastrados...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // Seus dados de conexão do print
    const URL_BANCO = 'https://gsvvyktjeqlmhspqzppy.supabase.co';
    const CHAVE_ANON = 'sb_publishable_0lVSMGWIIYBvwu_iWWWPKw_qvoAHjOs'; // Sua chave copiada
    const _supabase = supabase.createClient(URL_BANCO, CHAVE_ANON);

    // FUNÇÃO PARA SALVAR NO SUPABASE
    async function salvarProduto() {
        const nome = document.getElementById('nome').value;
        const preco = document.getElementById('preco').value;
        const url_imagem = document.getElementById('url_imagem').value;

        if (!nome || !preco) {
            alert("Por favor, preencha o nome e o preço.");
            return;
        }

        const { data, error } = await _supabase
            .from('produtos')
            .insert([{ nome: nome, preco: parseFloat(preco), url_imagem: url_imagem }]);

        if (error) {
            alert("Erro ao cadastrar: " + error.message);
        } else {
            alert("Produto '" + nome + "' cadastrado com sucesso!");
            // Limpa os campos
            document.getElementById('nome').value = "";
            document.getElementById('preco').value = "";
            document.getElementById('url_imagem').value = "";
            carregarProdutos(); // Atualiza a lista abaixo
        }
    }

    // FUNÇÃO PARA CARREGAR E MOSTRAR O QUE JÁ ESTÁ NO BANCO
    async function carregarProdutos() {
        const lista = document.getElementById("lista");
        
        const { data: produtos, error } = await _supabase
            .from('produtos')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            lista.innerHTML = "Erro ao carregar lista.";
            return;
        }

        lista.innerHTML = "<h3>Produtos no Banco:</h3>";
        
        produtos.forEach((p) => {
            lista.innerHTML += `
                <div class="prod">
                    <div class="info">
                        <img src="${p.url_imagem || 'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
                        <div>
                            <b>${p.nome}</b><br>
                            R$ ${parseFloat(p.preco).toFixed(2)}
                        </div>
                    </div>
                    <button class="btn-remover" onclick="removerProduto(${p.id})">Apagar</button>
                </div>
            `;
        });
    }

    // FUNÇÃO PARA DELETAR UM PRODUTO
    async function removerProduto(id) {
        if (confirm("Deseja realmente apagar este produto?")) {
            const { error } = await _supabase
                .from('produtos')
                .delete()
                .eq('id', id);

            if (error) alert("Erro ao apagar");
            else carregarProdutos();
        }
    }

    // Inicia a lista ao abrir a página
    carregarProdutos();
</script>

</body>
</html>
