<div id="painel" style="font-size: 60px; text-align: center; margin-top: 100px; font-family: sans-serif;">
    CARREGANDO...
</div>

<script>
    async function rodar() {
        try {
            let link = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbd2hQ8KHs-kQotr2Wbkr8oy9JdNWhQAHEL6X5HPk7bSHUW-nLQ1tlo4cOklwSBHD0BddoX1eOlWfJ/pub?gid=0&single=true&output=csv";
            let resposta = await fetch(link);
            let texto = await resposta.text();
            let linhas = texto.split('\n');
            let valor = linhas[1].split(',')[0];
            
            let caixa = document.getElementById("painel");
            caixa.innerText = "PEDIDOS: " + valor;
            
            if (parseInt(valor) > 0) {
                caixa.style.color = "red";
                caixa.style.animation = "piscar 1s infinite";
            } else {
                caixa.style.color = "black";
                caixa.style.animation = "none";
            }
        } catch(erro) {
            console.log("Aguardando...");
        }
    }
    
    setInterval(rodar, 3000);
    rodar();
</script>

<style>
    @keyframes piscar { 50% { opacity: 0; } }
</style>
