<div style="padding: 20px; font-family: sans-serif;">
    <h1>Painel da Cozinha - Cantinho do Robs</h1>
    <div id="lista-pedidos" style="display: grid; gap: 15px;">
        <!-- Pedidos aparecerão aqui -->
    </div>
</div>

<script>
    // URL do seu Google Apps Script que lê/escreve na planilha
    const API_URL = "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI";

    async function buscarPedidos() {
        let res = await fetch(API_URL + "?acao=ler");
        let pedidos = await res.json();
        
        let container = document.getElementById("lista-pedidos");
        container.innerHTML = "";
        
        pedidos.forEach(p => {
            if(p.status !== "Finalizado") {
                container.innerHTML += `
                    <div style="border: 2px solid #22c55e; padding: 15px; border-radius: 10px;">
                        <h3>Pedido #${p.id}</h3>
                        <p>${p.detalhes}</p>
                        <button onclick="mudarStatus(${p.id}, 'Em Preparo')">Aceitar</button>
                        <button onclick="mudarStatus(${p.id}, 'Pronto')">Pronto</button>
                        <button onclick="mudarStatus(${p.id}, 'Finalizado')">Finalizar/Zerar</button>
                    </div>
                `;
            }
        });
    }

    async function mudarStatus(id, novoStatus) {
        await fetch(API_URL + `?acao=atualizar&id=${id}&status=${novoStatus}`);
        buscarPedidos(); // Atualiza a tela
    }

    setInterval(buscarPedidos, 5000); // Atualiza a cada 5 segundos
    buscarPedidos();
</script>
