<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Imóveis | Vitrine Pública</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0ea5e9; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--dark); }
        .hero { background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.8)), url('https://images.unsplash.com/photo-1582408921715-18e7806367c1?q=80&w=2070&auto=format&fit=crop'); background-size: cover; padding: 100px 0; color: white; text-align: center; }
        .property-card { border: none; border-radius: 20px; overflow: hidden; transition: 0.3s; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); height: 100%; }
        .property-card:hover { transform: translateY(-10px); }
        .img-wrapper { height: 250px; position: relative; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .badge-tipo { position: absolute; top: 15px; left: 15px; background: var(--primary); color: white; padding: 5px 15px; border-radius: 50px; font-weight: 600; font-size: 0.8rem; }
        .price-tag { color: #22c55e; font-weight: 800; font-size: 1.4rem; }
        #galleryCarousel .carousel-item { height: 500px; background: #000; }
        #galleryCarousel img { height: 100%; object-fit: contain; width: 100%; }
        .btn-whats { background: #25d366; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; display: block; text-align: center; text-decoration: none; transition: 0.3s; }
        .btn-whats:hover { background: #1eb956; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white py-3 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#"><i class="fas fa-house-laptop me-2"></i><span id="txt-nome-imobiliaria">Imobiliária</span></a>
        <span id="txt-topo-whats" class="small fw-bold text-muted"></span>
    </div>
</nav>

<header class="hero">
    <div class="container">
        <h1 class="display-4 fw-bold mb-3">Seu novo lar está aqui</h1>
        <p class="lead">Consulte nossa vitrine atualizada de imóveis exclusivos.</p>
    </div>
</header>

<div class="container" style="margin-top: -50px;">
    <div class="bg-white p-4 rounded-4 shadow-lg mb-5">
        <div class="row g-3">
            <div class="col-md-8">
                <input type="text" id="filtro-busca" class="form-control form-control-lg border-0 bg-light" placeholder="Buscar por bairro ou título..." onkeyup="filtrar()">
            </div>
            <div class="col-md-4">
                <select id="filtro-tipo" class="form-select form-select-lg border-0 bg-light" onchange="filtrar()">
                    <option value="">Todas as categorias</option>
                    <option>Casa</option>
                    <option>Apartamento</option>
                    <option>Terreno</option>
                </select>
            </div>
        </div>
    </div>

    <div id="vitrine-publica" class="row g-4"></div>
</div>

<div class="modal fade" id="modalImovel" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 overflow-hidden">
            <div class="modal-body p-0">
                <button type="button" class="btn-close position-absolute top-0 end-0 m-3 z-3 bg-white p-2 rounded-circle" data-bs-dismiss="modal"></button>
                <div id="galleryCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner" id="lista-fotos-modal"></div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#galleryCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#galleryCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
                </div>
                <div class="p-4">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h3 id="m-titulo" class="fw-bold mb-0"></h3>
                            <p id="m-bairro" class="text-muted"><i class="fas fa-map-marker-alt me-2"></i></p>
                        </div>
                        <div class="text-end">
                            <span id="m-preco" class="price-tag d-block"></span>
                            <small id="m-ref" class="text-muted fw-bold"></small>
                        </div>
                    </div>
                    <hr>
                    <h6 class="fw-bold">Descrição</h6>
                    <p id="m-desc" class="text-muted" style="white-space: pre-wrap;"></p>
                    <a id="m-btn-whats" href="#" target="_blank" class="btn-whats mt-3"><i class="fab fa-whatsapp me-2"></i> QUERO MAIS INFORMAÇÕES</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // PEGA EXATAMENTE AS CHAVES DO SEU PAINEL DE 542 LINHAS
    let imoveis = JSON.parse(localStorage.getItem('imob_v3_data')) || [];
    let config = JSON.parse(localStorage.getItem('imob_v3_config')) || { nome: "Minha Imobiliária", zap: "55" };

    const modalUI = new Bootstrap.Modal('#modalImovel');

    function carregarVitrine() {
        const container = document.getElementById('vitrine-publica');
        const busca = document.getElementById('filtro-busca').value.toLowerCase();
        const tipo = document.getElementById('filtro-tipo').value;

        const lista = imoveis.filter(i => 
            (i.titulo.toLowerCase().includes(busca) || i.bairro.toLowerCase().includes(busca)) &&
            (tipo === "" || i.tipo === tipo)
        );

        container.innerHTML = lista.length ? '' : '<div class="text-center py-5"><h4>Nenhum imóvel encontrado.</h4></div>';

        lista.forEach(i => {
            const capa = i.fotos && i.fotos.length > 0 ? i.fotos[0] : 'https://via.placeholder.com/600x400?text=Sem+Imagem';
            container.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="property-card" onclick="abrir(${i.id})">
                        <div class="img-wrapper">
                            <span class="badge-tipo">${i.tipo}</span>
                            <img src="${capa}">
                        </div>
                        <div class="p-4">
                            <span class="price-tag">R$ ${i.preco.toLocaleString('pt-BR')}</span>
                            <h5 class="fw-bold text-truncate mt-2">${i.titulo}</h5>
                            <p class="text-muted small mb-0"><i class="fas fa-map-marker-alt me-1"></i> ${i.bairro}</p>
                            <hr>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="small text-muted fw-bold">REF: ${i.ref}</span>
                                <span class="text-primary fw-bold small">Ver Detalhes +</span>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function abrir(id) {
        const i = imoveis.find(x => x.id === id);
        if(!i) return;

        document.getElementById('m-titulo').innerText = i.titulo;
        document.getElementById('m-bairro').innerHTML = `<i class="fas fa-map-marker-alt me-2"></i> ${i.bairro}`;
        document.getElementById('m-preco').innerText = `R$ ${i.preco.toLocaleString('pt-BR')}`;
        document.getElementById('m-desc').innerText = i.desc || "Consulte-nos para mais informações.";
        document.getElementById('m-ref').innerText = `REF: ${i.ref}`;

        // Carregar Fotos no Carrossel
        const carrossel = document.getElementById('lista-fotos-modal');
        carrossel.innerHTML = i.fotos && i.fotos.length ? '' : '<div class="carousel-item active"><img src="https://via.placeholder.com/600x400?text=Sem+Fotos"></div>';
        
        if(i.fotos) {
            i.fotos.forEach((foto, index) => {
                carrossel.innerHTML += `<div class="carousel-item ${index === 0 ? 'active' : ''}"><img src="${foto}"></div>`;
            });
        }

        // Configurar Botão WhatsApp
        const textoZap = encodeURIComponent(`Olá! Vi o imóvel "${i.titulo}" (REF: ${i.ref}) no site e gostaria de saber mais.`);
        document.getElementById('m-btn-whats').href = `https://wa.me/${config.zap}?text=${textoZap}`;

        modalUI.show();
    }

    function aplicarConfig() {
        document.getElementById('txt-nome-imobiliaria').innerText = config.nome;
        document.getElementById('txt-topo-whats').innerHTML = `<i class="fab fa-whatsapp text-success me-1"></i> ${config.zap}`;
    }

    function filtrar() { carregarVitrine(); }

    // Init
    aplicarConfig();
    carregarVitrine();
</script>
</body>
</html>
