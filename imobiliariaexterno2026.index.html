<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Imóveis | Vitrine Pública</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0ea5e9; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); }
        .hero { background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.8)), url('https://images.unsplash.com/photo-1582408921715-18e7806367c1?q=80&w=2070&auto=format&fit=crop'); background-size: cover; padding: 80px 0; color: white; text-align: center; }
        .property-card { border: none; border-radius: 20px; overflow: hidden; transition: 0.3s; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); cursor: pointer; height: 100%; }
        .property-card:hover { transform: translateY(-10px); }
        .img-wrapper { height: 250px; position: relative; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .price-tag { color: #22c55e; font-weight: 800; font-size: 1.4rem; }
        #galleryCarousel img { height: 450px; object-fit: contain; background: #000; width: 100%; }
        .btn-whats { background: #25d366; color: white; padding: 15px; border-radius: 12px; font-weight: 700; display: block; text-align: center; text-decoration: none; }
    </style>
</head>
<body>

<nav class="navbar bg-white py-3 shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold text-primary" id="txt-nome-imobiliaria">Carregando...</span>
        <span id="txt-topo-whats" class="fw-bold"></span>
    </div>
</nav>

<header class="hero">
    <div class="container"><h1>Encontre seu imóvel</h1><p>Vitrine atualizada em tempo real</p></div>
</header>

<div class="container" style="margin-top: -40px;">
    <div id="vitrine-publica" class="row g-4"></div>
</div>

<div class="modal fade" id="modalImovel" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 rounded-4 overflow-hidden">
            <div class="modal-body p-0">
                <div id="galleryCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner" id="lista-fotos-modal"></div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#galleryCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#galleryCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
                </div>
                <div class="p-4">
                    <h3 id="m-titulo" class="fw-bold"></h3>
                    <h4 id="m-preco" class="price-tag"></h4>
                    <p id="m-desc" class="text-muted"></p>
                    <a id="m-btn-whats" href="#" target="_blank" class="btn-whats">FALAR COM CORRETOR</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let imoveis = JSON.parse(localStorage.getItem('imob_v3_data')) || [];
    let config = JSON.parse(localStorage.getItem('imob_v3_config')) || { nome: "Imobiliária", zap: "55" };

    function carregarVitrine() {
        const container = document.getElementById('vitrine-publica');
        if(imoveis.length === 0) {
            container.innerHTML = '<div class="col-12 text-center bg-white p-5 rounded"><h4>Nenhum imóvel disponível no momento.</h4></div>';
            return;
        }

        container.innerHTML = imoveis.map(i => `
            <div class="col-md-6 col-lg-4">
                <div class="property-card" onclick="abrir(${i.id})">
                    <div class="img-wrapper"><img src="${i.fotos[0] || 'https://via.placeholder.com/400'}"></div>
                    <div class="p-4">
                        <span class="price-tag">R$ ${i.preco.toLocaleString('pt-BR')}</span>
                        <h5 class="fw-bold mt-2">${i.titulo}</h5>
                        <p class="text-muted small">${i.bairro}</p>
                        <hr>
                        <small class="text-primary fw-bold">Ver mais detalhes +</small>
                    </div>
                </div>
            </div>`).join('');
    }

    const modalUI = new bootstrap.Modal(document.getElementById('modalImovel'));

    function abrir(id) {
        const i = imoveis.find(x => x.id === id);
        if(!i) return;

        document.getElementById('m-titulo').innerText = i.titulo;
        document.getElementById('m-preco').innerText = `R$ ${i.preco.toLocaleString('pt-BR')}`;
        document.getElementById('m-desc').innerText = i.desc;
        
        const carrossel = document.getElementById('lista-fotos-modal');
        carrossel.innerHTML = i.fotos.map((f, index) => `
            <div class="carousel-item ${index === 0 ? 'active' : ''}"><img src="${f}"></div>
        `).join('') || '<div class="carousel-item active"><img src="https://via.placeholder.com/400"></div>';

        document.getElementById('m-btn-whats').href = `https://wa.me/${config.zap}?text=Interesse no imóvel: ${i.titulo}`;
        modalUI.show();
    }

    document.getElementById('txt-nome-imobiliaria').innerText = config.nome;
    document.getElementById('txt-topo-whats').innerText = config.zap;
    carregarVitrine();
</script>
</body>
</html>
