<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM | Delivery Amarelinhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amarelo: #FFD700; --verde-escuro: #064e3b; }
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: var(--verde-escuro); color: white; }
        .btn-primary { background-color: #ef4444; color: white; transition: all 0.2s; }
        .btn-primary:hover { background-color: #dc2626; transform: scale(1.02); }
        .card-adm { background: white; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Efeito de carregamento */
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 sidebar p-6 flex flex-col gap-8">
        <h1 class="text-2xl font-black italic text-yellow-400">ADM AMARELINHAS</h1>
        <nav class="space-y-2">
            <button onclick="showSection('lojas')" class="w-full text-left p-3 rounded-lg hover:bg-emerald-800 flex items-center gap-3">
                <i class="fas fa-store"></i> Minhas Lojas
            </button>
            <button onclick="window.open('aju2026.html', '_blank')" class="w-full text-left p-3 rounded-lg hover:bg-emerald-800 flex items-center gap-3">
                <i class="fas fa-external-link-alt"></i> Ver Marketplace
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        
        <section id="section-lojas">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black uppercase text-emerald-900">Gerenciar Lojas Online</h2>
                <button onclick="openModalLoja()" class="btn-primary px-6 py-3 rounded-xl font-bold">+ NOVA LOJA</button>
            </div>

            <div id="gridLojas" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <p class="col-span-full text-center py-10 font-bold text-gray-400">Sincronizando com o Firebase...</p>
            </div>
        </section>

        <section id="section-produtos" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <button onclick="showSection('lojas')" class="text-emerald-600 font-bold mb-2 flex items-center gap-2">
                        <i class="fas fa-arrow-left"></i> VOLTAR PARA LOJAS
                    </button>
                    <h2 id="nomeLojaAtiva" class="text-3xl font-black uppercase text-emerald-900">Produtos da Loja</h2>
                </div>
                <button onclick="openModalProduto()" class="btn-primary px-6 py-3 rounded-xl font-bold">+ NOVO ITEM</button>
            </div>

            <div id="listaProdutos" class="space-y-4">
                <p class="text-center py-10 font-bold text-gray-400">Carregando itens...</p>
            </div>
        </section>
    </main>

    <div id="modalLoja" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="card-adm w-full max-w-md p-8">
            <h3 class="text-xl font-bold mb-6">Cadastrar Nova Loja</h3>
            <div class="space-y-4">
                <input type="text" id="lojaNome" placeholder="Nome da Loja" class="w-full p-3 border rounded-lg">
                <input type="text" id="lojaImg" placeholder="URL da Logo (Link da imagem)" class="w-full p-3 border rounded-lg">
                <input type="text" id="lojaEndereco" placeholder="Endereço da Loja" class="w-full p-3 border rounded-lg">
                <input type="text" id="lojaWpp" placeholder="WhatsApp (Ex: 5579999999999)" class="w-full p-3 border rounded-lg">
                <select id="lojaCat" class="w-full p-3 border rounded-lg font-bold">
                    <option value="ALIMENTAÇÃO">Alimentação</option>
                    <option value="ÁGUA MINERAL">Água Mineral</option>
                    <option value="FARMÁCIA">Farmácia</option>
                    <option value="MERCADO">Mercado</option>
                </select>
                <div class="flex gap-4 mt-6">
                    <button onclick="closeModalLoja()" class="flex-1 p-3 font-bold text-gray-500">Cancelar</button>
                    <button id="btnSalvarLoja" onclick="salvarLoja()" class="flex-1 btn-primary p-3 rounded-lg font-bold">SALVAR NA NUVEM</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalProduto" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="card-adm w-full max-w-md p-8">
            <h3 class="text-xl font-bold mb-6">Adicionar Produto</h3>
            <div class="space-y-4">
                <input type="text" id="prodNome" placeholder="Nome do Produto" class="w-full p-3 border rounded-lg">
                <input type="number" id="prodPreco" placeholder="Preço (Ex: 29.90)" class="w-full p-3 border rounded-lg">
                <input type="text" id="prodImg" placeholder="URL da Imagem do Produto" class="w-full p-3 border rounded-lg">
                <div class="flex gap-4 mt-6">
                    <button onclick="closeModalProduto()" class="flex-1 p-3 font-bold text-gray-500">Cancelar</button>
                    <button id="btnSalvarProduto" onclick="salvarProduto()" class="flex-1 btn-primary p-3 rounded-lg font-bold">ADICIONAR ITEM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE - URL DO SEU PROJETO
        const FIREBASE_URL = "https://amarelinhas-d6986-default-rtdb.firebaseio.com/.json";

        let db = [];
        let idLojaSelecionada = null;

        // 1. BUSCAR DADOS DO FIREBASE AO INICIAR
        async function carregarDadosNuvem() {
            try {
                const response = await fetch(FIREBASE_URL);
                const dados = await response.json();
                
                if (dados) {
                    // Trata o formato do Firebase (converte objeto para array se necessário)
                    db = Array.isArray(dados) ? dados : Object.values(dados);
                    // Remove itens nulos
                    db = db.filter(item => item !== null);
                } else {
                    db = [];
                }
                renderLojas();
            } catch (error) {
                console.error("Erro ao carregar:", error);
                alert("Erro ao conectar com o banco de dados online!");
            }
        }

        // 2. SINCRONIZAR TODAS AS ALTERAÇÕES COM O FIREBASE
        async function atualizarNuvem() {
            try {
                document.body.classList.add('loading');
                await fetch(FIREBASE_URL, {
                    method: 'PUT',
                    body: JSON.stringify(db)
                });
                document.body.classList.remove('loading');
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Falha ao salvar dados na nuvem!");
                document.body.classList.remove('loading');
            }
        }

        // 3. RENDERIZAR AS LOJAS NO PAINEL
        function renderLojas() {
            const container = document.getElementById('gridLojas');
            if (db.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center py-10 text-gray-400 font-bold uppercase">Nenhuma loja cadastrada no banco de dados.</p>`;
                return;
            }
            container.innerHTML = db.map(loja => `
                <div class="card-adm p-6 flex items-center justify-between border-2 border-transparent hover:border-emerald-500 transition-all">
                    <div class="flex items-center gap-4 cursor-pointer" onclick="abrirProdutos('${loja.id}')">
                        <img src="${loja.img}" class="w-16 h-16 rounded-full object-cover bg-gray-100" onerror="this.src='https://via.placeholder.com/150'">
                        <div>
                            <h4 class="font-black uppercase text-emerald-900">${loja.nome}</h4>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${loja.categoria} - ${loja.endereco || 'S/ Endereço'}</p>
                            <p class="text-xs text-emerald-600 font-bold">WhatsApp: ${loja.whatsapp}</p>
                        </div>
                    </div>
                    <button onclick="excluirLoja('${loja.id}')" class="text-red-400 hover:text-red-600 p-2 transition-colors">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        // 4. SALVAR NOVA LOJA
        async function salvarLoja() {
            const wppPuro = document.getElementById('lojaWpp').value.replace(/\D/g, '');
            const novaLoja = {
                id: Date.now().toString(),
                nome: document.getElementById('lojaNome').value,
                img: document.getElementById('lojaImg').value || 'https://via.placeholder.com/150',
                endereco: document.getElementById('lojaEndereco').value,
                whatsapp: wppPuro,
                categoria: document.getElementById('lojaCat').value,
                produtos: []
            };

            if(!novaLoja.nome || !novaLoja.whatsapp) return alert("Nome e WhatsApp são obrigatórios!");

            db.push(novaLoja);
            await atualizarNuvem();
            closeModalLoja();
            renderLojas();
            
            // Limpar formulário
            document.getElementById('lojaNome').value = "";
            document.getElementById('lojaWpp').value = "";
            document.getElementById('lojaImg').value = "";
            document.getElementById('lojaEndereco').value = "";
        }

        // 5. GERENCIAR PRODUTOS
        function abrirProdutos(id) {
            idLojaSelecionada = id;
            const loja = db.find(l => l.id == id);
            document.getElementById('nomeLojaAtiva').innerText = loja.nome;
            showSection('produtos');
            renderProdutos();
        }

        function renderProdutos() {
            const loja = db.find(l => l.id == idLojaSelecionada);
            const container = document.getElementById('listaProdutos');
            
            if(!loja.produtos) loja.produtos = [];

            if(loja.produtos.length === 0) {
                container.innerHTML = `<p class="text-center py-10 text-gray-400">Nenhum produto cadastrado para esta loja.</p>`;
                return;
            }

            container.innerHTML = loja.produtos.map(p => `
                <div class="card-adm p-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img src="${p.img}" class="w-12 h-12 rounded-lg object-cover bg-gray-50" onerror="this.src='https://via.placeholder.com/100'">
                        <div>
                            <p class="font-bold uppercase text-sm">${p.nome}</p>
                            <p class="text-emerald-600 font-black">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                        </div>
                    </div>
                    <button onclick="excluirProduto('${p.id}')" class="text-red-400 hover:text-red-600 p-2">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
        }

        async function salvarProduto() {
            const index = db.findIndex(l => l.id == idLojaSelecionada);
            const preco = document.getElementById('prodPreco').value;
            const nome = document.getElementById('prodNome').value;

            if(!nome || !preco) return alert("Preencha nome e preço!");

            const novoProduto = {
                id: Date.now().toString(),
                nome: nome,
                preco: parseFloat(preco),
                img: document.getElementById('prodImg').value || 'https://via.placeholder.com/100'
            };

            if(!db[index].produtos) db[index].produtos = [];
            db[index].produtos.push(novoProduto);
            
            await atualizarNuvem();
            closeModalProduto();
            renderProdutos();

            // Limpar campos
            document.getElementById('prodNome').value = "";
            document.getElementById('prodPreco').value = "";
            document.getElementById('prodImg').value = "";
        }

        // 6. EXCLUSÕES
        async function excluirLoja(id) {
            if(confirm("ATENÇÃO: Isso excluirá a loja e todos os produtos dela do site principal. Confirmar?")) {
                db = db.filter(l => l.id != id);
                await atualizarNuvem();
                renderLojas();
            }
        }

        async function excluirProduto(pid) {
            const index = db.findIndex(l => l.id == idLojaSelecionada);
            if (index !== -1) {
                db[index].produtos = db[index].produtos.filter(p => p.id != pid);
                await atualizarNuvem();
                renderProdutos();
            }
        }

        // 7. UTILITÁRIOS DE INTERFACE
        function showSection(section) {
            document.getElementById('section-lojas').classList.toggle('hidden', section !== 'lojas');
            document.getElementById('section-produtos').classList.toggle('hidden', section !== 'produtos');
        }

        function openModalLoja() { document.getElementById('modalLoja').classList.remove('hidden'); }
        function closeModalLoja() { document.getElementById('modalLoja').classList.add('hidden'); }
        function openModalProduto() { document.getElementById('modalProduto').classList.remove('hidden'); }
        function closeModalProduto() { document.getElementById('modalProduto').classList.add('hidden'); }

        // INICIAR O PAINEL
        carregarDadosNuvem();
    </script>
</body>
</html>
