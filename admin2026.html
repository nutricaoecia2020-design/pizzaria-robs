<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Amarelinhas | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amarelo: #FFD700; --zinc-950: #09090b; }
        .bg-amarelo { background-color: var(--amarelo); }
        .text-amarelo { color: var(--amarelo); }
        .border-amarelo { border-color: var(--amarelo); }
    </style>
</head>
<body class="bg-zinc-50 flex h-screen overflow-hidden font-sans">

    <aside class="w-72 bg-zinc-950 text-white flex-shrink-0 hidden lg:flex flex-col border-r border-zinc-800">
        <div class="p-8 text-center">
            <h1 class="text-amarelo font-black text-3xl italic tracking-tighter">AMARELINHAS</h1>
            <div class="h-1 w-12 bg-amarelo mx-auto mt-2"></div>
        </div>
        <nav class="flex-1 px-6 space-y-2 mt-4">
            <button onclick="changeTab('lojas')" class="w-full flex items-center p-4 bg-zinc-900 rounded-2xl text-amarelo font-bold border border-zinc-800 transition"><i class="fas fa-store mr-3"></i> Lojas Parceiras</button>
            <a href="aju2026.html" target="_blank" class="w-full flex items-center p-4 hover:bg-zinc-900 rounded-2xl text-zinc-500 transition"><i class="fas fa-external-link-alt mr-3"></i> Ir para o Site</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="bg-white p-6 shadow-sm flex justify-between items-center sticky top-0 z-20 border-b-4 border-amarelo">
            <h2 class="text-xl font-black text-zinc-900 uppercase italic tracking-tight">Painel de Gestão</h2>
            <button onclick="openModal('modalLoja')" class="bg-zinc-950 text-amarelo px-8 py-3 rounded-2xl font-black shadow-xl hover:scale-105 transition active:scale-95 text-xs uppercase italic">+ Nova Loja</button>
        </header>

        <div class="p-8 max-w-6xl mx-auto">
            <div id="tab-lojas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

            <div id="tab-produtos" class="hidden animate-in fade-in duration-300">
                <div class="flex items-center justify-between mb-6">
                    <button onclick="changeTab('lojas')" class="font-black text-zinc-400 hover:text-zinc-900 text-sm flex items-center"><i class="fas fa-chevron-left mr-2"></i> VOLTAR</button>
                    <h3 id="storeTitle" class="text-2xl font-black italic uppercase text-zinc-900 border-b-4 border-amarelo"></h3>
                    <button onclick="openModal('modalProd')" class="bg-amarelo text-zinc-950 px-6 py-2 rounded-xl text-xs font-black shadow-lg shadow-yellow-100">+ ITEM</button>
                </div>
                <div id="listaProdutos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <div id="modalLoja" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-3xl font-black italic mb-6 text-zinc-900">CADASTRAR LOJA</h3>
            <form id="formLoja" class="space-y-4">
                <input type="text" id="l_nome" placeholder="Nome Comercial" class="w-full bg-zinc-50 border-2 border-zinc-100 p-4 rounded-2xl outline-none focus:border-yellow-400 font-bold" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="l_wpp" placeholder="WhatsApp (DDD+Núm)" class="bg-zinc-50 border-2 border-zinc-100 p-4 rounded-2xl outline-none focus:border-yellow-400 font-bold" required>
                    <select id="l_cat" class="bg-zinc-50 border-2 border-zinc-100 p-4 rounded-2xl outline-none font-bold">
                        <option value="ALIMENTAÇÃO">🍔 ALIMENTAÇÃO</option>
                        <option value="ÁGUA MINERAL">💧 ÁGUA</option>
                        <option value="FARMÁCIA">💊 FARMÁCIA</option>
                        <option value="MERCADO">🛒 MERCADO</option>
                    </select>
                </div>
                <input type="text" id="l_img" placeholder="URL da Logo da Loja" class="w-full bg-zinc-50 border-2 border-zinc-100 p-4 rounded-2xl outline-none font-bold">
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal('modalLoja')" class="flex-1 font-black text-zinc-400 py-4">CANCELAR</button>
                    <button type="submit" class="flex-1 bg-amarelo text-zinc-950 py-4 rounded-2xl font-black shadow-xl italic uppercase">SALVAR</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalProd" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-3xl font-black italic mb-6 text-zinc-900 uppercase">Novo Produto</h3>
            <form id="formProd" class="space-y-4">
                <input type="text" id="p_nome" placeholder="Nome do Item" class="w-full bg-zinc-50 border-2 border-zinc-100 p-4 rounded-2xl outline-none focus:border-yellow-400 font-bold" required>
                <input type="number" id="p_preco" step="0.01" placeholder="Valor R$ 0.00" class="w-full bg-zinc-50 border-2 border-zinc-100 p-4 rounded-2xl outline-none focus:border-yellow-400 font-bold" required>
                <input type="text" id="p_img" placeholder="Link da imagem (URL)" class="w-full bg-zinc-50 border-2 border-zinc-100 p-4 rounded-2xl outline-none focus:border-yellow-400 font-bold">
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal('modalProd')" class="flex-1 font-black text-zinc-400 py-4">CANCELAR</button>
                    <button type="submit" class="flex-1 bg-zinc-950 text-amarelo py-4 rounded-2xl font-black shadow-xl italic uppercase">ADICIONAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('amarelinhas_db')) || [];
        let currentLojaId = null;

        function save() { 
            localStorage.setItem('amarelinhas_db', JSON.stringify(db)); 
            renderLojas(); 
            if(currentLojaId) renderProdutos();
        }

        document.getElementById('formLoja').onsubmit = (e) => {
            e.preventDefault();
            db.push({
                id: Date.now().toString(),
                nome: document.getElementById('l_nome').value,
                whatsapp: document.getElementById('l_wpp').value.replace(/\D/g, ''),
                categoria: document.getElementById('l_cat').value,
                img: document.getElementById('l_img').value || 'https://via.placeholder.com/150/FFD700/000000?text=LOJA',
                produtos: []
            });
            closeModal('modalLoja');
            e.target.reset();
            save();
        };

        function renderLojas() {
            const container = document.getElementById('tab-lojas');
            container.innerHTML = db.map(loja => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-transparent hover:border-amarelo transition-all group relative overflow-hidden">
                    <div class="flex items-center gap-4 cursor-pointer" onclick="openLoja('${loja.id}')">
                        <div class="relative">
                            <img src="${loja.img}" class="w-20 h-20 rounded-3xl object-cover border-4 border-zinc-50 shadow-sm group-hover:scale-110 transition">
                            <div class="absolute -bottom-2 -right-2 bg-amarelo text-zinc-950 text-[8px] font-black px-2 py-1 rounded-lg uppercase">${loja.categoria}</div>
                        </div>
                        <div>
                            <h4 class="font-black italic uppercase text-lg text-zinc-900 leading-tight">${loja.nome}</h4>
                            <p class="text-xs font-bold text-green-600 mt-1"><i class="fab fa-whatsapp"></i> ${loja.whatsapp}</p>
                            <p class="text-[10px] text-zinc-400 font-bold uppercase mt-1">${loja.produtos.length} PRODUTOS</p>
                        </div>
                    </div>
                    <button onclick="delLoja('${loja.id}')" class="absolute top-4 right-4 text-zinc-200 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function openLoja(id) {
            currentLojaId = id;
            const loja = db.find(l => l.id === id);
            document.getElementById('storeTitle').innerText = loja.nome;
            document.getElementById('tab-lojas').classList.add('hidden');
            document.getElementById('tab-produtos').classList.remove('hidden');
            renderProdutos();
        }

        document.getElementById('formProd').onsubmit = (e) => {
            e.preventDefault();
            const idx = db.findIndex(l => l.id === currentLojaId);
            db[idx].produtos.push({
                id: Date.now(),
                nome: document.getElementById('p_nome').value,
                preco: parseFloat(document.getElementById('p_preco').value),
                img: document.getElementById('p_img').value || 'https://via.placeholder.com/150/FFD700/000000?text=ITEM',
                ativo: true
            });
            closeModal('modalProd');
            e.target.reset();
            save();
        };

        function renderProdutos() {
            const loja = db.find(l => l.id === currentLojaId);
            const container = document.getElementById('listaProdutos');
            container.innerHTML = loja.produtos.map(p => `
                <div class="bg-white p-5 rounded-3xl flex items-center justify-between border border-zinc-100 shadow-sm">
                    <div class="flex items-center gap-4">
                        <img src="${p.img}" class="w-16 h-16 rounded-2xl object-cover border">
                        <div>
                            <p class="font-black italic text-zinc-800 uppercase text-sm">${p.nome}</p>
                            <p class="text-green-600 font-black tracking-tighter">R$ ${p.preco.toFixed(2)}</p>
                        </div>
                    </div>
                    <button onclick="delProd(${p.id})" class="bg-red-50 text-red-500 w-10 h-10 rounded-xl hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function delLoja(id) { if(confirm("Apagar loja permanentemente?")) { db = db.filter(l => l.id !== id); save(); } }
        function delProd(pid) { 
            const idx = db.findIndex(l => l.id === currentLojaId);
            db[idx].produtos = db[idx].produtos.filter(p => p.id !== pid);
            save();
        }

        function changeTab(tab) {
            document.getElementById('tab-lojas').classList.toggle('hidden', tab !== 'lojas');
            document.getElementById('tab-produtos').classList.toggle('hidden', tab !== 'produtos');
        }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        renderLojas();
    </script>
</body>
</html>
