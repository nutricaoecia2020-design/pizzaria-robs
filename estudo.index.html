<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Study Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.5);
            --text: #f8fafc;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1, h2 { margin-top: 0; color: var(--text); }

        /* Form Estilizado */
        .header-section {
            grid-column: span 2;
            text-align: center;
            padding: 40px 0;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--accent);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        /* Lista de Disciplinas */
        .subject-grid {
            display: grid;
            gap: 15px;
        }

        .subject-item {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent);
        }

        .timer-val {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: var(--accent);
        }

        /* Status de Aprendizado */
        .learning-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--success);
            margin-top: 5px;
            display: inline-block;
        }

        .chart-container {
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .btn-reset { background: #ef4444; margin-left: 5px; }

        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
            .header-section { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header-section">
        <h1>⚡ StudyFlow <span style="color: var(--accent);">Analytics</span></h1>
        <div class="input-group">
            <input type="text" id="name" placeholder="Nome da Matéria">
            <input type="number" id="goal" placeholder="Meta (h)">
            <button onclick="addSubject()">+ Adicionar</button>
        </div>
    </div>

    <main class="glass-card">
        <h2>Minhas Disciplinas</h2>
        <div id="subjectsList" class="subject-grid">
            </div>
    </main>

    <aside class="chart-container">
        <div class="glass-card">
            <h2>Comparativo (Horas)</h2>
            <canvas id="studyChart"></canvas>
            <div id="insight" style="margin-top: 20px; font-size: 0.9rem; color: #94a3b8;">
                </div>
        </div>
    </aside>
</div>

<script>
    let subjects = JSON.parse(localStorage.getItem('flow_studies')) || [];
    let myChart = null;

    function save() {
        localStorage.setItem('flow_studies', JSON.stringify(subjects));
        updateChart();
    }

    function addSubject() {
        const name = document.getElementById('name').value;
        const goal = document.getElementById('goal').value;
        if(!name || !goal) return;

        subjects.push({
            id: Date.now(),
            name: name,
            goal: parseFloat(goal),
            seconds: 0,
            active: false
        });
        
        document.getElementById('name').value = '';
        document.getElementById('goal').value = '';
        save();
        render();
    }

    function toggle(id) {
        subjects.map(s => {
            if(s.id === id) s.active = !s.active;
            else s.active = false; // Pausa outras ao iniciar uma
        });
        render();
    }

    function reset(id) {
        const s = subjects.find(x => x.id === id);
        s.seconds = 0;
        s.active = false;
        save();
        render();
    }

    function calculateLearning(seconds, goalHrs) {
        const hours = seconds / 3600;
        const percent = (hours / goalHrs) * 100;
        if (percent < 20) return "Iniciante 🌱";
        if (percent < 50) return "Em progresso 📚";
        if (percent < 80) return "Consolidando 🧠";
        return "Mestre 🏆";
    }

    function format(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function render() {
        const list = document.getElementById('subjectsList');
        list.innerHTML = '';
        
        subjects.forEach(s => {
            const div = document.createElement('div');
            div.className = 'subject-item';
            div.innerHTML = `
                <div>
                    <div style="font-weight: bold; font-size: 1.1rem">${s.name}</div>
                    <div class="learning-badge">${calculateLearning(s.seconds, s.goal)}</div>
                </div>
                <div class="timer-val">${format(s.seconds)}</div>
                <div>
                    <button onclick="toggle(${s.id})">${s.active ? 'Pausar' : 'Focar'}</button>
                    <button class="btn-reset" onclick="reset(${s.id})">↺</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function updateChart() {
        const ctx = document.getElementById('studyChart').getContext('2d');
        const labels = subjects.map(s => s.name);
        const data = subjects.map(s => (s.seconds / 3600).toFixed(2));

        if(myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: ['#8b5cf6', '#10b981', '#f59e0b', '#3b82f6', '#ec4899'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { labels: { color: 'white' } } }
            }
        });
    }

    setInterval(() => {
        let changed = false;
        subjects.forEach(s => {
            if(s.active) {
                s.seconds++;
                changed = true;
            }
        });
        if(changed) {
            render();
            if(Math.random() > 0.8) save(); // Salva periodicamente
        }
    }, 1000);

    render();
    updateChart();
</script>

</body>
</html>
