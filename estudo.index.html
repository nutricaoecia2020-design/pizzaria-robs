<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Horas de Estudo</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        h1 { color: var(--secondary); text-align: center; }

        .form-group {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            padding: 10px 15px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #357abd; }

        .subjects-list {
            margin-top: 20px;
        }

        .subject-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr auto;
            align-items: center;
            gap: 15px;
        }

        .timer-display {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--secondary);
        }

        .controls { display: flex; gap: 5px; }

        .btn-start { background: var(--success); color: white; }
        .btn-stop { background: #f39c12; color: white; }
        .btn-reset { background: var(--danger); color: white; }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            grid-column: span 4;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.5s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Meus Estudos</h1>
    
    <div class="form-group">
        <input type="text" id="subjectInput" placeholder="Ex: Matemática">
        <input type="number" id="goalInput" placeholder="Meta (horas)">
        <button class="btn-add" onclick="addSubject()">Adicionar</button>
    </div>

    <div id="subjectsContainer" class="subjects-list">
        </div>
</div>

<script>
    let subjects = JSON.parse(localStorage.getItem('study_subjects')) || [];

    function save() {
        localStorage.setItem('study_subjects', JSON.stringify(subjects));
    }

    function addSubject() {
        const name = document.getElementById('subjectInput').value;
        const goal = document.getElementById('goalInput').value;

        if (!name || !goal) return alert("Preencha todos os campos!");

        const subject = {
            id: Date.now(),
            name: name,
            goal: parseFloat(goal),
            secondsElapsed: 0,
            isRunning: false
        };

        subjects.push(subject);
        save();
        render();
        
        document.getElementById('subjectInput').value = '';
        document.getElementById('goalInput').value = '';
    }

    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function toggleTimer(id) {
        const sub = subjects.find(s => s.id === id);
        sub.isRunning = !sub.isRunning;
        save();
        render();
    }

    function resetTimer(id) {
        if(!confirm("Deseja zerar o progresso desta disciplina?")) return;
        const sub = subjects.find(s => s.id === id);
        sub.secondsElapsed = 0;
        sub.isRunning = false;
        save();
        render();
    }

    function deleteSubject(id) {
        subjects = subjects.filter(s => s.id !== id);
        save();
        render();
    }

    // Loop do Cronômetro
    setInterval(() => {
        subjects.forEach(sub => {
            if (sub.isRunning) {
                sub.secondsElapsed++;
            }
        });
        if (subjects.some(s => s.isRunning)) {
            save();
            render();
        }
    }, 1000);

    function render() {
        const container = document.getElementById('subjectsContainer');
        container.innerHTML = '';

        subjects.forEach(sub => {
            const progress = Math.min((sub.secondsElapsed / (sub.goal * 3600)) * 100, 100).toFixed(1);
            
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `
                <div>
                    <strong>${sub.name}</strong><br>
                    <small>Meta: ${sub.goal}h</small>
                </div>
                <div class="timer-display">${formatTime(sub.secondsElapsed)}</div>
                <div class="controls">
                    <button class="${sub.isRunning ? 'btn-stop' : 'btn-start'}" onclick="toggleTimer(${sub.id})">
                        ${sub.isRunning ? 'Pausar' : 'Iniciar'}
                    </button>
                    <button class="btn-reset" onclick="resetTimer(${sub.id})">Zerar</button>
                </div>
                <button onclick="deleteSubject(${sub.id})" style="background:none; color:grey; font-size:12px">Remover</button>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progress}%"></div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    render();
</script>

</body>
</html>
