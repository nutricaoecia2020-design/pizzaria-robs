<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenStudy Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #06110d;
            --card-bg: #0d1f18;
            --primary: #10b981; /* Verde Esmeralda */
            --primary-glow: rgba(16, 185, 129, 0.3);
            --text: #ecfdf5;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 25px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .header {
            grid-column: span 2;
            text-align: center;
            padding-bottom: 20px;
        }

        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }

        /* Form */
        .input-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 12px;
            flex-wrap: wrap;
        }

        input {
            background: #06110d;
            border: 1px solid #10b981;
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
            width: 200px;
        }

        button {
            background: var(--primary);
            color: #06110d;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; transform: scale(1.02); }

        /* Lista */
        .subject-item, .appointment-item {
            background: rgba(16, 185, 129, 0.05);
            margin-bottom: 15px;
            padding: 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
        }

        .info h3 { margin: 0; color: var(--primary); }
        .timer { font-family: monospace; font-size: 1.4rem; font-weight: bold; }
        
        .badge {
            font-size: 0.7rem;
            background: var(--primary);
            color: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .actions { display: flex; gap: 8px; }
        .btn-stop { background: #f59e0b; }
        .btn-reset { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-del { background: var(--danger); color: white; }

        /* Chart */
        canvas { max-width: 100%; }

        /* Agenda Section */
        .full-width {
            grid-column: span 2;
        }

        .appointment-list {
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .header, .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌿 Study<span style="color:white">Green</span></h1>
        <div class="input-box">
            <input type="text" id="subjectName" placeholder="Disciplina (ex: Química)">
            <input type="number" id="subjectGoal" placeholder="Meta de Horas">
            <button onclick="addSubject()">+ Criar Disciplina</button>
        </div>
    </div>

    <div class="glass-card">
        <h2>Atividades de Estudo</h2>
        <div id="list"></div>
    </div>

    <div class="glass-card">
        <h2>Comparativo de Progresso</h2>
        <canvas id="myChart"></canvas>
        <div id="stats" style="margin-top: 20px; font-size: 0.9rem; line-height: 1.6;"></div>
    </div>

    <div class="glass-card full-width">
        <h2>📅 Agenda de Compromissos</h2>
        <div class="input-box">
            <input type="text" id="eventTitle" placeholder="Título do Compromisso">
            <input type="date" id="eventDate">
            <input type="time" id="eventTime">
            <button onclick="addAppointment()">Agendar Compromisso</button>
        </div>
        
        <div id="appointment-list" class="appointment-list">
            </div>
    </div>
</div>

<script>
    let subjects = JSON.parse(localStorage.getItem('green_study_data')) || [];
    let appointments = JSON.parse(localStorage.getItem('green_study_appointments')) || [];
    let chart = null;

    // Garante que tudo comece pausado ao dar F5
    subjects.forEach(s => s.active = false);

    function save() {
        localStorage.setItem('green_study_data', JSON.stringify(subjects));
        updateChart();
    }

    function saveAppointments() {
        localStorage.setItem('green_study_appointments', JSON.stringify(appointments));
        renderAppointments();
    }

    function addSubject() {
        const name = document.getElementById('subjectName').value;
        const goal = document.getElementById('subjectGoal').value;
        if (!name || !goal) return alert("Preencha o nome e a meta!");

        subjects.push({
            id: Date.now(),
            name: name,
            goal: parseFloat(goal),
            seconds: 0,
            active: false
        });

        document.getElementById('subjectName').value = '';
        document.getElementById('subjectGoal').value = '';
        save();
        render();
    }

    function removeSubject(id) {
        if(confirm("Excluir definitivamente esta disciplina?")) {
            subjects = subjects.filter(s => s.id !== id);
            save();
            render();
        }
    }

    function toggle(id) {
        subjects.forEach(s => {
            if (s.id === id) s.active = !s.active;
            else s.active = false; // Pausa as outras (Foco Único)
        });
        render();
    }

    function reset(id) {
        const s = subjects.find(x => x.id === id);
        s.seconds = 0;
        s.active = false;
        save();
        render();
    }

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function getLevel(s, goal) {
        const hrs = s / 3600;
        const p = (hrs / goal) * 100;
        if (p >= 100) return "Dominado 🌳";
        if (p >= 50) return "Crescendo 🌿";
        return "Semente 🌱";
    }

    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';

        subjects.forEach(s => {
            const item = document.createElement('div');
            item.className = 'subject-item';
            item.innerHTML = `
                <div class="info">
                    <h3>${s.name} <span class="badge">${getLevel(s.seconds, s.goal)}</span></h3>
                    <small>Meta: ${s.goal}h</small>
                </div>
                <div class="timer">${formatTime(s.seconds)}</div>
                <div class="actions">
                    <button class="${s.active ? 'btn-stop' : ''}" onclick="toggle(${s.id})">
                        ${s.active ? 'Pausar' : 'Focar'}
                    </button>
                    <button class="btn-reset" onclick="reset(${s.id})">Zerar</button>
                    <button class="btn-del" onclick="removeSubject(${s.id})">✕</button>
                </div>
            `;
            listDiv.appendChild(item);
        });
    }

    function updateChart() {
        const canvas = document.getElementById('myChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const labels = subjects.map(s => s.name);
        const dataSeconds = subjects.map(s => (s.seconds / 3600).toFixed(2));
        const goals = subjects.map(s => s.goal);

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Horas Estudadas',
                        data: dataSeconds,
                        backgroundColor: '#10b981',
                        borderRadius: 5
                    },
                    {
                        label: 'Meta Prevista',
                        data: goals,
                        backgroundColor: 'rgba(255, 255, 255, 0.1)',
                        borderColor: '#10b981',
                        borderWidth: 1,
                        borderRadius: 5
                    }
                ]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                plugins: {
                    legend: { labels: { color: '#ecfdf5' } }
                },
                scales: {
                    x: { ticks: { color: '#ecfdf5' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { ticks: { color: '#ecfdf5' }, grid: { display: false } }
                }
            }
        });
    }

    // --- Lógica da Agenda ---

    function addAppointment() {
        const title = document.getElementById('eventTitle').value;
        const date = document.getElementById('eventDate').value;
        const time = document.getElementById('eventTime').value;

        if (!title || !date || !time) return alert("Preencha todos os campos do compromisso!");

        appointments.push({
            id: Date.now(),
            title,
            date,
            time
        });

        // Limpar campos
        document.getElementById('eventTitle').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('eventTime').value = '';

        saveAppointments();
    }

    function removeAppointment(id) {
        appointments = appointments.filter(a => a.id !== id);
        saveAppointments();
    }

    function renderAppointments() {
        const apptList = document.getElementById('appointment-list');
        apptList.innerHTML = '';

        // Ordenar por data e hora
        const sorted = [...appointments].sort((a, b) => {
            return new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`);
        });

        sorted.forEach(a => {
            const dateFmt = a.date.split('-').reverse().join('/');
            const item = document.createElement('div');
            item.className = 'appointment-item';
            item.innerHTML = `
                <div class="info">
                    <h3>${a.title}</h3>
                    <small>📅 ${dateFmt} às ${a.time}h</small>
                </div>
                <div class="actions">
                    <button class="btn-del" onclick="removeAppointment(${a.id})">Apagar</button>
                </div>
            `;
            apptList.appendChild(item);
        });
    }

    // Loop do Cronômetro
    setInterval(() => {
        let activeExists = false;
        subjects.forEach(s => {
            if (s.active) {
                s.seconds++;
                activeExists = true;
            }
        });
        if (activeExists) {
            render();
            if (Date.now() % 10000 < 1000) save(); 
        }
    }, 1000);

    // Inicialização
    render();
    renderAppointments();
    updateChart();
</script>

</body>
</html>
