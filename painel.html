<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Robs - GESTÃO</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        header { background: #e31837; color: white; padding: 10px; text-align: center; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid #28a745; }
        .btn-concluir { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .itens { background: #fdf2f2; padding: 8px; margin: 10px 0; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<header><h1>PEDIDOS PIZZARIA ROBS</h1></header>
<div id="listaPedidos" class="grid">Carregando pedidos...</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAjzwX_sPyZOvZzcJc9ynBSbBN5uazaCHU",
        authDomain: "robs-pizzariadelivery.firebaseapp.com",
        projectId: "robs-pizzariadelivery",
        storageBucket: "robs-pizzariadelivery.firebasestorage.app",
        messagingSenderId: "847851003409",
        appId: "1:847851003409:web:7f3ed9f7089d4c61861bb0"
    };

    // Inicializa
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Função de Deletar (Global)
    function concluirPedido(id) {
        if(confirm("Deseja remover este pedido?")) {
            db.collection("pedidos").doc(id).delete()
            .then(() => { console.log("Removido!"); })
            .catch((error) => { alert("Erro ao remover: " + error); });
        }
    }

    // Escuta os pedidos em tempo real
    db.collection("pedidos").orderBy("data", "desc").onSnapshot((snapshot) => {
        const container = document.getElementById("listaPedidos");
        container.innerHTML = "";

        if (snapshot.empty) {
            container.innerHTML = "<h3>Nenhum pedido pendente 🍕</h3>";
            return;
        }

        snapshot.forEach((doc) => {
            const p = doc.data();
            const id = doc.id;
            
            let itensStr = "";
            if(p.itens) p.itens.forEach(i => itensStr += `• ${i.nome}<br>`);

            container.innerHTML += `
                <div class="card">
                    <h3>${p.cliente || 'Cliente'}</h3>
                    <p>📍 ${p.endereco || 'Não informado'}</p>
                    <p>📞 ${p.contato || '-'}</p>
                    <p>💳 ${p.pagamento || '-'}</p>
                    <div class="itens"><b>Itens:</b><br>${itensStr}</div>
                    <p><b>Total: R$ ${p.total}</b></p>
                    <button class="btn-concluir" onclick="concluirPedido('${id}')">CONCLUIR</button>
                </div>
            `;
        });
    });
</script>
</body>
</html>              CRIAR NO github
