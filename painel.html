<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Robs - GESTÃO</title>
    <style>
        :root { --red: #e31837; --green: #28a745; --bg: #f4f4f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        header { background: var(--red); color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 10px solid var(--green); }
        .card h3 { margin: 0; color: var(--red); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .info { margin: 10px 0; font-size: 14px; line-height: 1.5; }
        .total { font-size: 18px; font-weight: bold; color: var(--green); margin-top: 10px; }
        .btn { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>🚀 PEDIDOS PIZZARIA ROBS</h1>
    <button onclick="testarSom()" style="background: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">🔔 Testar Alerta</button>
</header>

<div id="listaPedidos" class="grid">Conectando ao banco...</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAjzwX_sPyZOvZzcJc9ynBSbBN5uazaCHU",
        authDomain: "robs-pizzariadelivery.firebaseapp.com",
        projectId: "robs-pizzariadelivery",
        storageBucket: "robs-pizzariadelivery.firebasestorage.app",
        messagingSenderId: "847851003409",
        appId: "1:847851003409:web:7f3ed9f7089d4c61861bb0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function testarSom() {
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play();
    }

    function concluir(id) {
        if(confirm("Pedido entregue? Isso vai apagar ele da tela.")) {
            db.collection("pedidos").doc(id).delete();
        }
    }

    // Escuta em tempo real os dados da coleção "pedidos"
    db.collection("pedidos").onSnapshot((snapshot) => {
        const container = document.getElementById("listaPedidos");
        container.innerHTML = "";

        if (snapshot.empty) {
            container.innerHTML = "<h3>Aguardando pedidos... 🍕</h3>";
            return;
        }

        snapshot.forEach((doc) => {
            const p = doc.data();
            const id = doc.id;
            
            // Ajustado para ler 'telefone' e 'total' conforme sua foto do Firebase
            container.innerHTML += `
                <div class="card">
                    <h3>👤 ${p.cliente || 'Sem Nome'}</h3>
                    <div class="info">
                        📍 <b>End:</b> ${p.endereco || 'Não informado'}<br>
                        📞 <b>Tel:</b> ${p.telefone || '-'}<br>
                        ⚙️ <b>Status:</b> ${p.status || '-'}
                    </div>
                    <div class="total">VALOR: R$ ${p.total || '0.00'}</div>
                    <button class="btn" onclick="concluir('${id}')">CONCLUIR PEDIDO</button>
                </div>
            `;
        });
    });
</script>
</body>
</html>
