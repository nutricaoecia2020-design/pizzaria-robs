<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Robs Pizzaria</title>

<style>

body{
font-family:Arial;
background:#f1f1f1;
padding:20px;
}

h1{
text-align:center;
color:#e31837;
}

h2{
margin-top:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:5px;
background:#e31837;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
}

.pedido{
background:white;
padding:15px;
border-left:8px solid #28a745;
border-radius:8px;
margin-bottom:10px;
}

.produto{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.excluir{
background:#dc3545;
margin-top:10px;
}

.status{
text-align:center;
font-size:20px;
margin-bottom:20px;
}

.aberto{
color:green;
}

.fechado{
color:red;
}

</style>
</head>

<body>

<h1>🍕 Painel Robs Pizzaria</h1>

<div class="status">
Status da Loja: <span id="statusLoja">Carregando...</span>
</div>

<button onclick="toggleLoja()">Abrir / Fechar Loja</button>

<h2>📦 Pedidos</h2>

<div id="listaPedidos"></div>

<h2>🍕 Cadastro de Produto</h2>

<div class="card">

<input type="text" id="nome" placeholder="Nome do produto">

<input type="number" id="preco" placeholder="Preço">

<input type="text" id="categoria" placeholder="Categoria">

<button onclick="cadastrarProduto()">Cadastrar Produto</button>

</div>

<h2>📋 Produtos cadastrados</h2>

<div id="listaProdutos"></div>


<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAjzwX_sPyZOvZzcJc9ynBSbBN5uazaCHU",
authDomain: "robs-pizzariadelivery.firebaseapp.com",
projectId: "robs-pizzariadelivery",
storageBucket: "robs-pizzariadelivery.firebasestorage.app",
messagingSenderId: "847851003409",
appId: "1:847851003409:web:7f3ed9f7089d4c61861bb0"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


// STATUS LOJA

db.collection("config").doc("loja").onSnapshot((doc)=>{

if(doc.exists){

const aberto = doc.data().aberto;

const status = document.getElementById("statusLoja");

if(aberto){

status.innerHTML="🟢 ABERTA";
status.className="aberto";

}else{

status.innerHTML="🔴 FECHADA";
status.className="fechado";

}

}

});


function toggleLoja(){

db.collection("config").doc("loja").get().then((doc)=>{

const atual = doc.data()?.aberto || false;

db.collection("config").doc("loja").set({

aberto:!atual

});

});

}



// PEDIDOS

db.collection("pedidos").onSnapshot((snap)=>{

const div = document.getElementById("listaPedidos");

div.innerHTML="";

snap.forEach((doc)=>{

const p = doc.data();

div.innerHTML+=`

<div class="pedido">

<h3>${p.cliente || "Cliente"}</h3>

<p>📍 ${p.endereco || "-"}</p>

<p>📞 ${p.telefone || "-"}</p>

<p>💰 Total: R$ ${p.total || 0}</p>

<button class="excluir" onclick="excluirPedido('${doc.id}')">
Concluir Pedido
</button>

</div>

`;

});

});

function excluirPedido(id){

db.collection("pedidos").doc(id).delete();

}



// CADASTRAR PRODUTO

function cadastrarProduto(){

const nome = document.getElementById("nome").value;
const preco = document.getElementById("preco").value;
const categoria = document.getElementById("categoria").value;

db.collection("produtos").add({

nome:nome,
preco:preco,
categoria:categoria

});

document.getElementById("nome").value="";
document.getElementById("preco").value="";
document.getElementById("categoria").value="";

}



// LISTAR PRODUTOS

db.collection("produtos").onSnapshot((snap)=>{

const div = document.getElementById("listaProdutos");

div.innerHTML="";

snap.forEach((doc)=>{

const p = doc.data();

div.innerHTML+=`

<div class="produto">

<h3>${p.nome}</h3>

<p>Categoria: ${p.categoria}</p>

<p>Preço: R$ ${p.preco}</p>

<button class="excluir" onclick="excluirProduto('${doc.id}')">
Excluir
</button>

</div>

`;

});

});


function excluirProduto(id){

db.collection("produtos").doc(id).delete();

}

</script>

</body>
</html>
