<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER ADMIN | Gestão Completa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .aba-conteudo { display: none; }
        .aba-ativa { display: block; }
        .menu-ativo { background: #ef4444 !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-800">

    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-black text-red-500">DELIVERY<span class="text-white">HUB</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="navegar('dashboard')" id="btn-dashboard" class="menu-btn w-full flex items-center p-3 rounded-xl menu-ativo">
                <i class="fas fa-home mr-3"></i> Início
            </button>
            <button onclick="navegar('lojas')" id="btn-lojas" class="menu-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800">
                <i class="fas fa-store mr-3"></i> Lojas
            </button>
            <button onclick="navegar('produtos')" id="btn-produtos" class="menu-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800">
                <i class="fas fa-hamburger mr-3"></i> Cardápios
            </button>
            <button onclick="navegar('vendas')" id="btn-vendas" class="menu-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800">
                <i class="fas fa-wallet mr-3"></i> Vendas/Comissão
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <h2 id="txt-titulo" class="font-bold text-slate-700 uppercase tracking-tight">Dashboard</h2>
            <div class="text-xs font-bold text-green-500 bg-green-50 px-3 py-1 rounded-full border border-green-200">● SISTEMA ONLINE</div>
        </header>

        <div class="p-6 space-y-8">
            
            <div id="aba-dashboard" class="aba-conteudo aba-ativa">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm border-l-8 border-l-red-500">
                        <p class="text-slate-400 font-bold text-xs uppercase">Unidades</p>
                        <h3 id="resumo-lojas" class="text-3xl font-black">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm border-l-8 border-l-blue-500">
                        <p class="text-slate-400 font-bold text-xs uppercase">Vendas Totais</p>
                        <h3 id="resumo-vendas" class="text-3xl font-black text-blue-600">R$ 0,00</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm border-l-8 border-l-green-500">
                        <p class="text-slate-400 font-bold text-xs uppercase">Sua Comissão</p>
                        <h3 id="resumo-comissao" class="text-3xl font-black text-green-600">R$ 0,00</h3>
                    </div>
                </div>
            </div>

            <div id="aba-lojas" class="aba-conteudo space-y-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 class="font-black text-lg mb-4 text-slate-700 uppercase italic">Novo Cadastro de Loja</h3>
                    <form id="f-loja" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="lnome" placeholder="Nome da Loja" class="border p-3 rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-red-500" required>
                        <input type="url" id="llogo" placeholder="URL da Logo" class="border p-3 rounded-lg bg-gray-50 outline-none">
                        <select id="lcat" class="border p-3 rounded-lg bg-gray-50 outline-none">
                            <option>Pizzarias</option>
                            <option>Lanchonetes</option>
                            <option>Doces</option>
                        </select>
                        <input type="number" id="lcom" placeholder="Comissão %" class="border p-3 rounded-lg bg-blue-50 font-bold outline-none" required>
                        <button type="submit" class="md:col-span-2 bg-red-600 text-white font-black rounded-lg py-3 hover:bg-red-700 uppercase tracking-widest transition">Cadastrar Loja</button>
                    </form>
                </div>
                <div id="grid-lojas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

            <div id="aba-produtos" class="aba-conteudo space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm h-fit">
                        <h3 class="font-black text-lg mb-4 text-slate-700 uppercase italic">Adicionar ao Cardápio</h3>
                        <form id="f-prod" class="space-y-4">
                            <select id="p-loja-select" class="w-full border p-3 rounded-lg bg-blue-100 font-bold outline-none" required></select>
                            <input type="text" id="pnome" placeholder="Nome do Produto (Ex: Pizza Calabresa)" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                            <input type="url" id="pimg" placeholder="URL da Imagem do Produto" class="w-full border p-3 rounded-lg outline-none">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" step="0.01" id="ppreco" placeholder="Preço R$" class="border p-3 rounded-lg outline-none font-bold text-green-600" required>
                                <button type="submit" class="bg-blue-600 text-white font-black rounded-lg uppercase tracking-tight hover:bg-blue-700 transition">Publicar</button>
                            </div>
                        </form>
                    </div>

                    <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                            <h4 class="font-bold text-xs uppercase text-slate-500">Itens Publicados</h4>
                            <select id="filtro-loja-prod" class="text-xs border rounded p-1 outline-none"></select>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <tbody id="lista-produtos" class="divide-y divide-gray-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div id="aba-vendas" class="aba-conteudo space-y-6">
                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800 text-white text-xs uppercase">
                            <tr>
                                <th class="p-4">Unidade</th>
                                <th class="p-4">Cliente / Endereço</th>
                                <th class="p-4">Valor</th>
                                <th class="p-4 text-green-400">Comissão</th>
                            </tr>
                        </thead>
                        <tbody id="lista-vendas" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATFpMv8Qd7XqypPjD4RRIzFd80EBdUDjc",
            authDomain: "deliveryaju-3e6bf.firebaseapp.com",
            databaseURL: "https://deliveryaju-3e6bf-default-rtdb.firebaseio.com",
            projectId: "deliveryaju-3e6bf",
            storageBucket: "deliveryaju-3e6bf.firebasestorage.app",
            appId: "1:582528849886:web:a7d4b0c545422c05b7ef4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.navegar = (aba) => {
            document.querySelectorAll('.aba-conteudo').forEach(x => x.classList.remove('aba-ativa'));
            document.querySelectorAll('.menu-btn').forEach(x => x.classList.remove('menu-ativo'));
            document.getElementById('aba-' + aba).classList.add('aba-ativa');
            document.getElementById('btn-' + aba).classList.add('menu-ativo');
            document.getElementById('txt-titulo').innerText = aba;
        };

        let cacheLojas = {};

        // SINCRONIZAR LOJAS
        onValue(ref(db, 'lojas'), (snap) => {
            const lojas = snap.val() || {};
            cacheLojas = lojas;
            const grid = document.getElementById('grid-lojas');
            const selectAdd = document.getElementById('p-loja-select');
            const selectFiltro = document.getElementById('filtro-loja-prod');
            
            grid.innerHTML = "";
            selectAdd.innerHTML = '<option value="">Selecione a Loja...</option>';
            selectFiltro.innerHTML = '<option value="">Ver Todas</option>';
            document.getElementById('resumo-lojas').innerText = Object.keys(lojas).length;

            Object.keys(lojas).forEach(id => {
                const l = lojas[id];
                const img = l.logo || l.imagem || "https://cdn-icons-png.flaticon.com/512/123/123403.png";
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border flex items-center gap-4">
                        <img src="${img}" class="w-12 h-12 rounded-lg object-cover border">
                        <div class="flex-1 text-sm font-bold uppercase">${l.nome}</div>
                        <button onclick="window.excluirLoja('${id}')" class="text-red-200 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                selectAdd.innerHTML += `<option value="${id}">${l.nome}</option>`;
                selectFiltro.innerHTML += `<option value="${id}">${l.nome}</option>`;
            });
        });

        // SINCRONIZAR PRODUTOS (RESTAURADO)
        function carregarProdutos(lojaId = "") {
            const lista = document.getElementById('lista-produtos');
            const caminho = lojaId ? `produtos/${lojaId}` : 'produtos';
            
            onValue(ref(db, caminho), (snap) => {
                const data = snap.val() || {};
                lista.innerHTML = "";
                
                // Trata se vier como objeto de lojas ou objeto de produtos
                const processarProd = (p, pId, lId) => {
                    const img = p.imagem || p.img || "https://img.freepik.com/vetores-premium/icone-de-imagem-padrao_671167-196.jpg";
                    lista.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="p-3 w-12"><img src="${img}" class="w-10 h-10 rounded-md object-cover border"></td>
                            <td class="p-3"><p class="text-sm font-bold text-slate-700">${p.nome}</p></td>
                            <td class="p-3 text-sm font-black text-green-600 italic">R$ ${parseFloat(p.preco).toFixed(2)}</td>
                            <td class="p-3 text-right">
                                <button onclick="window.excluirProd('${lId}','${pId}')" class="text-red-300 hover:text-red-600 p-2"><i class="fas fa-times"></i></button>
                            </td>
                        </tr>
                    `;
                };

                if (lojaId) {
                    Object.keys(data).forEach(pId => processarProd(data[pId], pId, lojaId));
                } else {
                    Object.keys(data).forEach(lId => {
                        Object.keys(data[lId]).forEach(pId => processarProd(data[lId][pId], pId, lId));
                    });
                }
            });
        }

        document.getElementById('filtro-loja-prod').onchange = (e) => carregarProdutos(e.target.value);
        carregarProdutos(); // Carga inicial

        // ADICIONAR PRODUTO
        document.getElementById('f-prod').onsubmit = (e) => {
            e.preventDefault();
            const lId = document.getElementById('p-loja-select').value;
            const dados = {
                nome: document.getElementById('pnome').value,
                imagem: document.getElementById('pimg').value,
                preco: document.getElementById('ppreco').value
            };
            if(!lId) return alert("Selecione uma loja!");
            push(ref(db, `produtos/${lId}`), dados).then(() => {
                e.target.reset();
                alert("Produto Adicionado!");
            });
        };

        // EXCLUSÃO
        window.excluirLoja = (id) => confirm("Apagar Loja?") && remove(ref(db, `lojas/${id}`));
        window.excluirProd = (lId, pId) => confirm("Apagar Produto?") && remove(ref(db, `produtos/${lId}/${pId}`));

        // VENDAS (MANTIDO)
        onValue(ref(db, 'pedidos'), (snap) => {
            const pedidos = snap.val() || {};
            const lista = document.getElementById('lista-vendas');
            lista.innerHTML = "";
            let tV = 0; let tC = 0;

            Object.keys(pedidos).forEach(id => {
                const p = pedidos[id];
                const l = cacheLojas[p.lojaId] || { nome: "S/ IDENTIFICAÇÃO", comissao: 0 };
                const valor = parseFloat(p.total || p.valor || 0);
                const com = (valor * (parseFloat(l.comissao) / 100));
                tV += valor; tC += com;

                lista.innerHTML += `
                    <tr>
                        <td class="p-4 text-xs font-bold uppercase text-slate-500">${l.nome}</td>
                        <td class="p-4"><p class="font-bold text-sm">${p.clienteNome || "Cliente"}</p><p class="text-[10px] text-slate-400">${p.endereco || ""}</p></td>
                        <td class="p-4 font-black">R$ ${valor.toFixed(2)}</td>
                        <td class="p-4 font-black text-green-600">R$ ${com.toFixed(2)}</td>
                    </tr>
                `;
            });
            document.getElementById('resumo-vendas').innerText = `R$ ${tV.toFixed(2)}`;
            document.getElementById('resumo-comissao').innerText = `R$ ${tC.toFixed(2)}`;
        });
    </script>
</body>
</html>
