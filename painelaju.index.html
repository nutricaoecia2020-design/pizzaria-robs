<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Gerenciar Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6">
            <h1 class="text-xl font-bold text-red-500">ADMIN<span class="text-white">DELIVERY</span></h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center p-3 bg-red-600 rounded-lg"><i class="fas fa-chart-line mr-3"></i> Dashboard</a>
            <a href="#" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition"><i class="fas fa-store mr-3"></i> Lojas</a>
            <a href="#" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition"><i class="fas fa-utensils mr-3"></i> Produtos</a>
        </nav>
        <div class="p-4 border-t border-gray-800 text-xs text-gray-500 text-center">v1.2 - Firebase Conectado</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center">
            <h2 class="text-xl font-semibold text-gray-700">Gestão do Marketplace</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500">Bem-vindo, <strong>Admin</strong></span>
                <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center"><i class="fas fa-user text-gray-400"></i></div>
            </div>
        </header>

        <div class="p-6 space-y-10">
            <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                    <div class="p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl">
                        <h3 class="font-bold text-gray-800"><i class="fas fa-store mr-2 text-red-500"></i>Nova Loja</h3>
                    </div>
                    <form id="formCadastroLoja" class="p-6 space-y-4">
                        <input type="text" id="nomeLoja" placeholder="Nome da Loja" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300 focus:ring-red-500" required>
                        <select id="categoriaLoja" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                            <option>Pizzarias</option>
                            <option>Lanchonetes</option>
                            <option>Saudáveis</option>
                            <option>Doces</option>
                            <option>PetShop</option>
                        </select>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="tempoEntrega" placeholder="Tempo (ex: 30-40)" class="border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                            <input type="number" id="comissaoLoja" placeholder="Comissão %" class="border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                        </div>
                        <input type="text" id="enderecoLoja" placeholder="Endereço Completo" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                        <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">CADASTRAR LOJA</button>
                    </form>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                    <div class="p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl">
                        <h3 class="font-bold text-gray-800"><i class="fas fa-hamburger mr-2 text-blue-500"></i>Novo Produto</h3>
                    </div>
                    <form id="formCadastroProduto" class="p-6 space-y-4">
                        <label class="block text-xs font-bold text-gray-400 uppercase">Vincular à Loja:</label>
                        <select id="selectLojasDisponiveis" class="w-full border rounded-lg p-2.5 bg-blue-50 border-blue-200 focus:ring-blue-500" required>
                            <option value="">Carregando lojas...</option>
                        </select>
                        
                        <input type="text" id="nomeProd" placeholder="Nome do Produto (ex: Pizza G)" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300" required>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" step="0.01" id="precoProd" placeholder="Preço R$" class="border rounded-lg p-2.5 bg-gray-50 border-gray-300" required>
                            <input type="text" id="descProd" placeholder="Descrição curta" class="border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition uppercase">Adicionar ao Cardápio</button>
                    </form>
                </div>

            </div>

            <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-orange-500">
                    <p class="text-xs text-gray-400 font-bold uppercase">Lojas no Sistema</p>
                    <h4 id="resumoLojas" class="text-3xl font-black text-gray-800">0</h4>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-blue-500">
                    <p class="text-xs text-gray-400 font-bold uppercase">Produtos Cadastrados</p>
                    <h4 id="resumoProdutos" class="text-3xl font-black text-gray-800">0</h4>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATFpMv8Qd7XqypPjD4RRIzFd80EBdUDjc",
            authDomain: "deliveryaju-3e6bf.firebaseapp.com",
            databaseURL: "https://deliveryaju-3e6bf-default-rtdb.firebaseio.com",
            projectId: "deliveryaju-3e6bf",
            storageBucket: "deliveryaju-3e6bf.firebasestorage.app",
            messagingSenderId: "582528849886",
            appId: "1:582528849886:web:a7d4b0c545422c05b7ef4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- REFERÊNCIAS ---
        const selectLojas = document.getElementById('selectLojasDisponiveis');
        const resumoLojas = document.getElementById('resumoLojas');
        const resumoProdutos = document.getElementById('resumoProdutos');

        // --- 1. SINCRONIZAR LOJAS (Para o Select e Contador) ---
        onValue(ref(db, 'lojas'), (snapshot) => {
            const lojas = snapshot.val();
            selectLojas.innerHTML = '<option value="">Selecione a Loja...</option>';
            let totalLojas = 0;

            if (lojas) {
                Object.keys(lojas).forEach(id => {
                    totalLojas++;
                    selectLojas.innerHTML += `<option value="${id}">${lojas[id].nome}</option>`;
                });
            }
            resumoLojas.innerText = totalLojas;
        });

        // --- 2. CONTADOR TOTAL DE PRODUTOS ---
        onValue(ref(db, 'produtos'), (snapshot) => {
            const allProds = snapshot.val();
            let totalGeral = 0;
            if (allProds) {
                Object.keys(allProds).forEach(lojaId => {
                    totalGeral += Object.keys(allProds[lojaId]).length;
                });
            }
            resumoProdutos.innerText = totalGeral;
        });

        // --- 3. CADASTRO DE LOJA ---
        document.getElementById('formCadastroLoja').addEventListener('submit', async (e) => {
            e.preventDefault();
            const novaLoja = {
                nome: document.getElementById('nomeLoja').value,
                categoria: document.getElementById('categoriaLoja').value,
                tempo: document.getElementById('tempoEntrega').value,
                comissao: document.getElementById('comissaoLoja').value,
                endereco: document.getElementById('enderecoLoja').value,
                imagem: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500",
                nota: "5.0"
            };
            try {
                await push(ref(db, 'lojas'), novaLoja);
                alert("Loja Cadastrada!");
                e.target.reset();
            } catch (err) { alert(err.message); }
        });

        // --- 4. CADASTRO DE PRODUTO ---
        document.getElementById('formCadastroProduto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const lojaId = selectLojas.value;
            if(!lojaId) return alert("Selecione uma loja primeiro!");

            const produto = {
                nome: document.getElementById('nomeProd').value,
                preco: document.getElementById('precoProd').value,
                descricao: document.getElementById('descProd').value,
                imagem: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=200"
            };

            try {
                await push(ref(db, 'produtos/' + lojaId), produto);
                alert("Produto adicionado ao cardápio!");
                e.target.reset();
            } catch (err) { alert(err.message); }
        });

    </script>
</body>
</html>
