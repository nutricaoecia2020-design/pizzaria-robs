<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Gerenciar Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Estilos do Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .product-card.inactive { opacity: 0.5; grayscale: 100%; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6">
            <h1 class="text-xl font-bold text-red-500">ADMIN<span class="text-white">DELIVERY</span></h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400"><i class="fas fa-chart-line mr-3"></i> Dashboard</a>
            <a href="#" class="flex items-center p-3 bg-red-600 rounded-lg text-white font-bold"><i class="fas fa-boxes mr-3"></i> Gerenciar Produtos</a>
            <a href="#" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400"><i class="fas fa-store mr-3"></i> Minha Loja</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-xl font-semibold text-gray-700">Gerenciamento de Cardápio</h2>
            <div class="flex items-center gap-2">
                <span id="store-status-badge" class="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full">LOJA ABERTA</span>
            </div>
        </header>

        <div class="p-6 space-y-8">
            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl shadow-md p-6 sticky top-24 border border-gray-200">
                        <h3 class="font-bold text-gray-800 mb-4 tracking-tight">CADASTRAR NOVO ITEM</h3>
                        <form id="product-form" class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nome do Produto</label>
                                <input type="text" id="p-name" required placeholder="Ex: Pizza Grande" class="w-full border border-gray-200 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-red-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Preço (R$)</label>
                                <input type="number" id="p-price" required step="0.01" placeholder="0.00" class="w-full border border-gray-200 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-red-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Link da Imagem</label>
                                <input type="text" id="p-image" placeholder="https://..." class="w-full border border-gray-200 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-red-500 outline-none">
                            </div>
                            <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition transform active:scale-95">
                                ADICIONAR AO CARDÁPIO
                            </button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                        <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                            <h3 class="font-bold text-gray-800">Itens Ativos</h3>
                            <span id="item-count" class="text-xs text-gray-500 font-medium">3 itens</span>
                        </div>
                        
                        <div id="product-list" class="divide-y divide-gray-100">
                            </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // Banco de dados inicial (Simulação)
        let products = [
            { id: 1, name: "Pizza de Calabresa G", price: 45.90, active: true, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=100" },
            { id: 2, name: "X-Burguer Bacon", price: 32.00, active: true, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100" }
        ];

        const productList = document.getElementById('product-list');
        const productForm = document.getElementById('product-form');
        const itemCount = document.getElementById('item-count');

        // Função para renderizar a lista
        function renderProducts() {
            productList.innerHTML = '';
            itemCount.innerText = `${products.length} itens`;

            products.forEach(product => {
                const div = document.createElement('div');
                div.className = `p-4 flex items-center justify-between hover:bg-gray-50 transition product-card ${!product.active ? 'inactive' : ''}`;
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${product.img || 'https://via.placeholder.com/100'}" class="w-14 h-14 object-cover rounded-lg shadow-sm">
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm">${product.name}</h4>
                            <p class="text-sm text-green-600 font-bold">R$ ${product.price.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="flex flex-col items-center">
                            <span class="text-[10px] text-gray-400 uppercase font-bold mb-1">${product.active ? 'Ativo' : 'Pausado'}</span>
                            <label class="switch">
                                <input type="checkbox" ${product.active ? 'checked' : ''} onchange="toggleStatus(${product.id})">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button onclick="deleteProduct(${product.id})" class="text-gray-300 hover:text-red-600 p-2 transition">
                            <i class="far fa-trash-alt text-lg"></i>
                        </button>
                    </div>
                `;
                productList.appendChild(div);
            });
        }

        // Adicionar novo produto
        productForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newProduct = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                img: document.getElementById('p-image').value,
                active: true
            };
            products.unshift(newProduct);
            productForm.reset();
            renderProducts();
        });

        // Alternar status (Ativar/Desativar)
        window.toggleStatus = (id) => {
            products = products.map(p => p.id === id ? {...p, active: !p.active} : p);
            renderProducts();
        };

        // Excluir produto
        window.deleteProduct = (id) => {
            if(confirm("Deseja realmente excluir este item?")) {
                products = products.filter(p => p.id !== id);
                renderProducts();
            }
        };

        // Iniciar
        renderProducts();
    </script>
</body>
</html>
