<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Gerenciar Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6">
            <h1 class="text-xl font-bold text-red-500">ADMIN<span class="text-white">DELIVERY</span></h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center p-3 bg-red-600 rounded-lg"><i class="fas fa-chart-line mr-3"></i> Dashboard</a>
            <a href="#" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition"><i class="fas fa-store mr-3"></i> Lojas Cadastradas</a>
            <a href="#" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition"><i class="fas fa-plus-circle mr-3"></i> Nova Loja</a>
            <a href="#" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition"><i class="fas fa-file-invoice-dollar mr-3"></i> Comissões</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center">
            <h2 class="text-xl font-semibold text-gray-700">Cadastrar Nova Loja</h2>
        </header>

        <div class="p-6">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-gray-100">
                        <h3 class="font-bold text-gray-800">Informações da Loja</h3>
                        <p class="text-sm text-gray-500">Preencha os dados para simular o cadastro.</p>
                    </div>
                    
                    <form id="formCadastroLoja" class="p-6 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nome da Loja</label>
                                <input type="text" id="nomeLoja" required placeholder="Ex: Pizzaria do Bairro" class="w-full border-gray-300 rounded-lg p-2.5 bg-gray-50 border focus:ring-red-500 focus:border-red-500">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Categoria Principal</label>
                                <select id="categoriaLoja" class="w-full border-gray-300 rounded-lg p-2.5 bg-gray-50 border focus:ring-red-500 focus:border-red-500">
                                    <option value="Lanchonetes">Lanchonetes</option>
                                    <option value="Pizzarias">Pizzarias</option>
                                    <option value="Supermercados">Supermercados</option>
                                    <option value="Farmácias">Farmácias</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Comissão (%)</label>
                                <input type="number" id="comissaoLoja" placeholder="10" class="w-full border-gray-300 rounded-lg p-2.5 bg-gray-50 border">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tempo de Entrega (min)</label>
                                <input type="text" id="tempoLoja" placeholder="30-45" class="w-full border-gray-300 rounded-lg p-2.5 bg-gray-50 border">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Endereço</label>
                            <input type="text" id="enderecoLoja" placeholder="Rua Exemplo, 123" class="w-full border-gray-300 rounded-lg p-2.5 bg-gray-50 border">
                        </div>

                        <div class="pt-4 flex justify-end">
                            <button type="button" onclick="window.location.reload()" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg mr-3 font-medium">Limpar</button>
                            <button type="submit" class="bg-red-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-red-700 transition">CADASTRAR LOJA</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById('formCadastroLoja');

        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Não deixa a página recarregar

            // 1. Pegar os valores que o usuário digitou
            const novaLoja = {
                id: Date.now(), // Gera um ID único baseado no tempo
                nome: document.getElementById('nomeLoja').value,
                categoria: document.getElementById('categoriaLoja').value,
                comissao: document.getElementById('comissaoLoja').value,
                tempo: document.getElementById('tempoLoja').value,
                endereco: document.getElementById('enderecoLoja').value,
                imagem: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" // Imagem padrão
            };

            // 2. Buscar lojas que já estão salvas (se existirem)
            let lojasExistentes = JSON.parse(localStorage.getItem('minhasLojas')) || [];

            // 3. Adicionar a nova loja na lista
            lojasExistentes.push(novaLoja);

            // 4. Salvar de volta no navegador
            localStorage.setItem('minhasLojas', JSON.stringify(lojasExistentes));

            alert('Loja "' + novaLoja.nome + '" cadastrada com sucesso! Agora ela está salva na memória do seu navegador.');
            form.reset();
        });
    </script>

</body>
</html>
