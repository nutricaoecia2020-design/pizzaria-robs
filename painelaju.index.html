<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Gold | Gestão de Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .aba-conteudo { display: none; }
        .aba-ativa { display: block; }
        .menu-item-ativo { background-color: #dc2626 !important; color: white !important; border-radius: 8px; }
        .card-loja:hover { transform: translateY(-5px); transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col border-r border-gray-800">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-xl font-black tracking-tighter text-red-500">ADMIN<span class="text-white">PRO</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="navegar('dashboard')" id="btn-dashboard" class="menu-btn w-full flex items-center p-3 text-gray-400 hover:bg-gray-800 transition menu-item-ativo">
                <i class="fas fa-chart-pie mr-3"></i> Dashboard
            </button>
            <button onclick="navegar('lojas')" id="btn-lojas" class="menu-btn w-full flex items-center p-3 text-gray-400 hover:bg-gray-800 transition">
                <i class="fas fa-store mr-3"></i> Lojas Cadastradas
            </button>
            <button onclick="navegar('produtos')" id="btn-produtos" class="menu-btn w-full flex items-center p-3 text-gray-400 hover:bg-gray-800 transition">
                <i class="fas fa-box-open mr-3"></i> Produtos/Cardápio
            </button>
            <button onclick="navegar('pedidos')" id="btn-pedidos" class="menu-btn w-full flex items-center p-3 text-gray-400 hover:bg-gray-800 transition">
                <i class="fas fa-receipt mr-3"></i> Vendas & Comissões
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
            <h2 id="titulo-sessao" class="text-lg font-bold text-gray-800">Resumo Geral</h2>
            <div class="flex items-center gap-3">
                <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-bold">FIREBASE ONLINE</span>
                <div class="h-8 w-8 bg-red-600 rounded-full flex items-center justify-center text-white font-bold">A</div>
            </div>
        </header>

        <div class="p-6 max-w-7xl mx-auto w-full">
            
            <section id="secao-dashboard" class="aba-conteudo aba-ativa space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-gray-400 text-xs font-bold uppercase">Lojas no Sistema</p>
                        <h3 id="dash-total-lojas" class="text-3xl font-black mt-1">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-gray-400 text-xs font-bold uppercase">Volume de Vendas</p>
                        <h3 id="dash-total-vendas" class="text-3xl font-black mt-1 text-blue-600">R$ 0,00</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-gray-400 text-xs font-bold uppercase">Sua Comissão Total</p>
                        <h3 id="dash-total-comissao" class="text-3xl font-black mt-1 text-green-600">R$ 0,00</h3>
                    </div>
                </div>
            </section>

            <section id="secao-lojas" class="aba-conteudo space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-bold text-gray-800 mb-4">Cadastrar Nova Unidade</h3>
                    <form id="formLoja" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="l-nome" placeholder="Nome da Loja" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-red-500" required>
                        <input type="url" id="l-logo" placeholder="Link da Logomarca (URL)" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-red-500">
                        <select id="l-cat" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-red-500">
                            <option>Pizzarias</option>
                            <option>Lanchonetes</option>
                            <option>Doces/Bolos</option>
                            <option>PetShop</option>
                        </select>
                        <input type="text" id="l-tempo" placeholder="Tempo de Entrega (ex: 40 min)" class="border p-3 rounded-lg">
                        <input type="number" id="l-com" placeholder="Comissão %" class="border p-3 rounded-lg" required>
                        <button type="submit" class="bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition">CADASTRAR LOJA</button>
                    </form>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="lista-lojas-cards">
                    </div>
            </section>

            <section id="secao-produtos" class="aba-conteudo space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-bold text-gray-800 mb-4">Adicionar Produto ao Cardápio</h3>
                    <form id="formProd" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <select id="p-loja-id" class="border p-3 rounded-lg bg-blue-50 font-bold" required>
                            <option value="">Escolha a Loja...</option>
                        </select>
                        <input type="text" id="p-nome" placeholder="Nome do Produto" class="border p-3 rounded-lg" required>
                        <input type="url" id="p-img" placeholder="URL da Imagem do Produto" class="border p-3 rounded-lg">
                        <input type="number" step="0.01" id="p-preco" placeholder="Preço R$" class="border p-3 rounded-lg" required>
                        <button type="submit" class="md:col-span-2 bg-blue-600 text-white font-bold py-3 rounded-lg">PUBLICAR PRODUTO</button>
                    </form>
                </div>
                <div id="container-produtos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="secao-pedidos" class="aba-conteudo space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4 text-xs font-bold text-gray-400 uppercase">Loja</th>
                                <th class="p-4 text-xs font-bold text-gray-400 uppercase">Cliente & Contato</th>
                                <th class="p-4 text-xs font-bold text-gray-400 uppercase">Total Pedido</th>
                                <th class="p-4 text-xs font-bold text-gray-400 uppercase text-green-600">Sua Parte</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-vendas" class="divide-y">
                            </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyATFpMv8Qd7XqypPjD4RRIzFd80EBdUDjc",
            authDomain: "deliveryaju-3e6bf.firebaseapp.com",
            databaseURL: "https://deliveryaju-3e6bf-default-rtdb.firebaseio.com",
            projectId: "deliveryaju-3e6bf",
            storageBucket: "deliveryaju-3e6bf.firebasestorage.app",
            appId: "1:582528849886:web:a7d4b0c545422c05b7ef4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // NAVEGAÇÃO
        window.navegar = (id) => {
            document.querySelectorAll('.aba-conteudo').forEach(a => a.classList.remove('aba-ativa'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('menu-item-ativo'));
            document.getElementById(`secao-${id}`).classList.add('aba-ativa');
            document.getElementById(`btn-${id}`).classList.add('menu-item-ativo');
        };

        // GESTÃO DE DADOS
        let lojasCache = {};

        // Sincronizar Lojas
        onValue(ref(db, 'lojas'), (snap) => {
            const dados = snap.val() || {};
            lojasCache = dados;
            const container = document.getElementById('lista-lojas-cards');
            const select = document.getElementById('p-loja-id');
            
            container.innerHTML = "";
            select.innerHTML = '<option value="">Escolha a Loja...</option>';
            document.getElementById('dash-total-lojas').innerText = Object.keys(dados).length;

            Object.keys(dados).forEach(key => {
                const loja = dados[key];
                const img = loja.logo || "https://cdn-icons-png.flaticon.com/512/123/123403.png";
                
                // Injetar no HTML
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border shadow-sm flex items-center gap-4 card-loja">
                        <img src="${img}" class="w-16 h-16 rounded-lg object-cover border" onerror="this.src='https://cdn-icons-png.flaticon.com/512/123/123403.png'">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800">${loja.nome}</h4>
                            <p class="text-xs text-gray-400">${loja.categoria} • ${loja.comissao}% comissão</p>
                        </div>
                        <button onclick="window.excluirLoja('${key}')" class="text-red-200 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                select.innerHTML += `<option value="${key}">${loja.nome}</option>`;
            });
        });

        // Sincronizar Pedidos/Vendas
        onValue(ref(db, 'pedidos'), (snap) => {
            const pedidos = snap.val() || {};
            const tabela = document.getElementById('tabela-vendas');
            tabela.innerHTML = "";
            
            let totalVendas = 0;
            let totalComissao = 0;

            Object.keys(pedidos).forEach(key => {
                const p = pedidos[key];
                const infoLoja = lojasCache[p.lojaId] || { nome: "Loja Excluída", comissao: 0 };
                
                const valor = parseFloat(p.total || 0);
                const comissaoValor = (valor * (parseFloat(infoLoja.comissao) / 100));

                totalVendas += valor;
                totalComissao += comissaoValor;

                tabela.innerHTML += `
                    <tr>
                        <td class="p-4 font-bold">${infoLoja.nome}</td>
                        <td class="p-4 text-sm">
                            <span class="block font-semibold">${p.clienteNome || 'Cliente Anônimo'}</span>
                            <span class="text-gray-400 text-xs">${p.endereco || 'Retirada'}</span>
                        </td>
                        <td class="p-4 font-bold text-gray-700">R$ ${valor.toFixed(2)}</td>
                        <td class="p-4 font-bold text-green-600">R$ ${comissaoValor.toFixed(2)}</td>
                    </tr>
                `;
            });

            document.getElementById('dash-total-vendas').innerText = `R$ ${totalVendas.toFixed(2)}`;
            document.getElementById('dash-total-comissao').innerText = `R$ ${totalComissao.toFixed(2)}`;
        });

        // Formulários
        document.getElementById('formLoja').onsubmit = (e) => {
            e.preventDefault();
            const novaLoja = {
                nome: document.getElementById('l-nome').value,
                logo: document.getElementById('l-logo').value,
                categoria: document.getElementById('l-cat').value,
                tempo: document.getElementById('l-tempo').value,
                comissao: document.getElementById('l-com').value
            };
            push(ref(db, 'lojas'), novaLoja);
            e.target.reset();
        };

        document.getElementById('formProd').onsubmit = (e) => {
            e.preventDefault();
            const lojaId = document.getElementById('p-loja-id').value;
            const novoProduto = {
                nome: document.getElementById('p-nome').value,
                imagem: document.getElementById('p-img').value,
                preco: document.getElementById('p-preco').value
            };
            push(ref(db, `produtos/${lojaId}`), novoProduto);
            e.target.reset();
            alert("Produto Adicionado!");
        };

        window.excluirLoja = (id) => confirm("Apagar loja?") && remove(ref(db, `lojas/${id}`));

    </script>
</body>
</html>
