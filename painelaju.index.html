<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER ADMIN | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .aba-conteudo { display: none; }
        .aba-ativa { display: block; }
        .menu-ativo { background-color: #ef4444 !important; color: white !important; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        tr:nth-child(even) { background-color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-2xl font-black text-red-500 tracking-tighter">DELIVERY<span class="text-white">HUB</span></h1>
            <p class="text-[10px] text-slate-500 uppercase font-bold mt-1">Painel de Controle Central</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="navegar('dashboard')" id="btn-dashboard" class="menu-btn w-full flex items-center p-3 rounded-xl transition menu-ativo">
                <i class="fas fa-home mr-3"></i> Início
            </button>
            <button onclick="navegar('lojas')" id="btn-lojas" class="menu-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition">
                <i class="fas fa-store mr-3"></i> Lojas
            </button>
            <button onclick="navegar('produtos')" id="btn-produtos" class="menu-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition">
                <i class="fas fa-hamburger mr-3"></i> Cardápios
            </button>
            <button onclick="navegar('vendas')" id="btn-vendas" class="menu-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition">
                <i class="fas fa-wallet mr-3"></i> Vendas/Comissão
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-20 shadow-sm">
            <h2 id="txt-titulo" class="font-bold text-xl text-slate-700">Dashboard</h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs font-bold text-slate-400 uppercase">Status</p>
                    <p class="text-sm font-bold text-green-500 flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Sincronizado</p>
                </div>
            </div>
        </header>

        <div class="p-6 space-y-8">
            
            <div id="aba-dashboard" class="aba-conteudo aba-ativa">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm border-l-8 border-l-red-500">
                        <p class="text-slate-400 font-bold text-xs uppercase">Unidades</p>
                        <h3 id="resumo-lojas" class="text-3xl font-black">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm border-l-8 border-l-blue-500">
                        <p class="text-slate-400 font-bold text-xs uppercase">Vendas Totais</p>
                        <h3 id="resumo-vendas" class="text-3xl font-black text-blue-600">R$ 0,00</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm border-l-8 border-l-green-500">
                        <p class="text-slate-400 font-bold text-xs uppercase">Sua Comissão</p>
                        <h3 id="resumo-comissao" class="text-3xl font-black text-green-600">R$ 0,00</h3>
                    </div>
                </div>
            </div>

            <div id="aba-lojas" class="aba-conteudo space-y-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 class="font-black text-lg mb-4 text-slate-700 uppercase italic">Novo Cadastro de Loja</h3>
                    <form id="f-loja" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="lnome" placeholder="Nome Fantasia" class="border p-3 rounded-lg bg-gray-50 focus:ring-2 focus:ring-red-500 outline-none" required>
                        <input type="url" id="llogo" placeholder="URL da Logo (Link da Imagem)" class="border p-3 rounded-lg bg-gray-50">
                        <select id="lcat" class="border p-3 rounded-lg bg-gray-50">
                            <option>Pizzarias</option>
                            <option>Lanchonetes</option>
                            <option>Doces</option>
                            <option>Outros</option>
                        </select>
                        <input type="number" id="lcom" placeholder="Comissão % (Ex: 10)" class="border p-3 rounded-lg bg-blue-50 font-bold" required>
                        <button type="submit" class="md:col-span-2 bg-red-600 text-white font-black rounded-lg py-3 hover:bg-red-700 transition uppercase tracking-widest">Salvar Unidade</button>
                    </form>
                </div>
                <div id="grid-lojas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

            <div id="aba-produtos" class="aba-conteudo space-y-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 class="font-black text-lg mb-4 text-slate-700 uppercase italic">Adicionar Item ao Cardápio</h3>
                    <form id="f-prod" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <select id="p-loja" class="border p-3 rounded-lg bg-blue-100 font-bold" required></select>
                        <input type="text" id="pnome" placeholder="Nome do Lanche/Prato" class="border p-3 rounded-lg" required>
                        <input type="url" id="pimg" placeholder="Link da Imagem do Produto" class="border p-3 rounded-lg">
                        <input type="number" step="0.01" id="ppreco" placeholder="Preço de Venda R$" class="border p-3 rounded-lg" required>
                        <button type="submit" class="md:col-span-2 bg-blue-600 text-white font-black py-4 rounded-lg uppercase tracking-widest">Publicar no Cardápio</button>
                    </form>
                </div>
                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-100">
                            <tr>
                                <th class="p-4 text-xs font-bold uppercase">Foto</th>
                                <th class="p-4 text-xs font-bold uppercase">Produto</th>
                                <th class="p-4 text-xs font-bold uppercase">Preço</th>
                                <th class="p-4 text-xs font-bold uppercase text-center">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="lista-produtos"></tbody>
                    </table>
                </div>
            </div>

            <div id="aba-vendas" class="aba-conteudo space-y-6">
                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800 text-white">
                            <tr>
                                <th class="p-4 text-xs font-bold uppercase">Unidade</th>
                                <th class="p-4 text-xs font-bold uppercase">Cliente / Endereço</th>
                                <th class="p-4 text-xs font-bold uppercase">Valor</th>
                                <th class="p-4 text-xs font-bold uppercase text-green-400">Comissão</th>
                            </tr>
                        </thead>
                        <tbody id="lista-vendas" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATFpMv8Qd7XqypPjD4RRIzFd80EBdUDjc",
            authDomain: "deliveryaju-3e6bf.firebaseapp.com",
            databaseURL: "https://deliveryaju-3e6bf-default-rtdb.firebaseio.com",
            projectId: "deliveryaju-3e6bf",
            storageBucket: "deliveryaju-3e6bf.firebasestorage.app",
            appId: "1:582528849886:web:a7d4b0c545422c05b7ef4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // NAVEGAÇÃO
        window.navegar = (aba) => {
            document.querySelectorAll('.aba-conteudo').forEach(x => x.classList.remove('aba-ativa'));
            document.querySelectorAll('.menu-btn').forEach(x => x.classList.remove('menu-ativo'));
            document.getElementById('aba-' + aba).classList.add('aba-ativa');
            document.getElementById('btn-' + aba).classList.add('menu-ativo');
            document.getElementById('txt-titulo').innerText = aba.toUpperCase();
        };

        let cacheLojas = {};

        // SINCRONIZAÇÃO DE LOJAS
        onValue(ref(db, 'lojas'), (snap) => {
            const lojas = snap.val() || {};
            cacheLojas = lojas;
            const grid = document.getElementById('grid-lojas');
            const select = document.getElementById('p-loja');
            
            grid.innerHTML = "";
            select.innerHTML = '<option value="">Selecione a Loja...</option>';
            document.getElementById('resumo-lojas').innerText = Object.keys(lojas).length;

            Object.keys(lojas).forEach(id => {
                const l = lojas[id];
                // MAPEAR IMAGEM (Tenta vários nomes de campos possíveis)
                const imgUrl = l.logo || l.imagem || l.img || "https://cdn-icons-png.flaticon.com/512/123/123403.png";

                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm flex items-center gap-4">
                        <img src="${imgUrl}" class="w-16 h-16 rounded-xl object-cover border bg-gray-50" onerror="this.src='https://cdn-icons-png.flaticon.com/512/123/123403.png'">
                        <div class="flex-1">
                            <h4 class="font-black text-slate-700 uppercase text-sm">${l.nome}</h4>
                            <p class="text-[10px] font-bold text-blue-500 uppercase">${l.categoria} • ${l.comissao}% OFF</p>
                        </div>
                        <button onclick="window.excluirLoja('${id}')" class="text-red-300 hover:text-red-600 transition"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                select.innerHTML += `<option value="${id}">${l.nome}</option>`;
            });
        });

        // SINCRONIZAÇÃO DE VENDAS (RELATÓRIO)
        onValue(ref(db, 'pedidos'), (snap) => {
            const pedidos = snap.val() || {};
            const lista = document.getElementById('lista-vendas');
            lista.innerHTML = "";
            
            let totalV = 0;
            let totalC = 0;

            Object.keys(pedidos).forEach(id => {
                const p = pedidos[id];
                const lInfo = cacheLojas[p.lojaId] || { nome: "S/ IDENTIFICAÇÃO", comissao: 0 };
                
                // MAPEAR CAMPOS DO CLIENTE
                const nomeCli = p.clienteNome || p.nome || p.usuario || "Cliente s/ Nome";
                const endCli = p.endereco || p.local || "Não informado";
                const vTotal = parseFloat(p.total || p.valor || 0);
                const vCom = (vTotal * (parseFloat(lInfo.comissao || 0) / 100));

                totalV += vTotal;
                totalC += vCom;

                lista.innerHTML += `
                    <tr class="hover:bg-blue-50 transition">
                        <td class="p-4 font-black text-xs text-slate-600 uppercase">${lInfo.nome}</td>
                        <td class="p-4">
                            <p class="font-bold text-sm text-slate-800">${nomeCli}</p>
                            <p class="text-[10px] text-slate-400 uppercase font-semibold">${endCli}</p>
                        </td>
                        <td class="p-4 font-black text-slate-700">R$ ${vTotal.toFixed(2)}</td>
                        <td class="p-4 font-black text-green-600">R$ ${vCom.toFixed(2)}</td>
                    </tr>
                `;
            });

            document.getElementById('resumo-vendas').innerText = `R$ ${totalV.toFixed(2)}`;
            document.getElementById('resumo-comissao').innerText = `R$ ${totalC.toFixed(2)}`;
        });

        // CADASTROS
        document.getElementById('f-loja').onsubmit = (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('lnome').value,
                logo: document.getElementById('llogo').value,
                categoria: document.getElementById('lcat').value,
                comissao: document.getElementById('lcom').value
            };
            push(ref(db, 'lojas'), dados).then(() => {
                e.target.reset();
                alert("Unidade cadastrada!");
            });
        };

        document.getElementById('f-prod').onsubmit = (e) => {
            e.preventDefault();
            const lojaId = document.getElementById('p-loja').value;
            const dados = {
                nome: document.getElementById('pnome').value,
                imagem: document.getElementById('pimg').value,
                preco: document.getElementById('ppreco').value
            };
            push(ref(db, `produtos/${lojaId}`), dados).then(() => {
                e.target.reset();
                alert("Produto publicado!");
                carregarProdutos(lojaId);
            });
        };

        // FILTRO DE PRODUTOS
        document.getElementById('p-loja').onchange = (e) => carregarProdutos(e.target.value);

        function carregarProdutos(lojaId) {
            const lista = document.getElementById('lista-produtos');
            if(!lojaId) { lista.innerHTML = ""; return; }
            
            onValue(ref(db, `produtos/${lojaId}`), (snap) => {
                const prods = snap.val() || {};
                lista.innerHTML = "";
                Object.keys(prods).forEach(id => {
                    const p = prods[id];
                    const img = p.imagem || p.img || p.logo || "https://img.freepik.com/vetores-premium/icone-de-imagem-padrao_671167-196.jpg";
                    lista.innerHTML += `
                        <tr class="border-b">
                            <td class="p-4"><img src="${img}" class="w-10 h-10 rounded-lg object-cover" onerror="this.src='https://img.freepik.com/vetores-premium/icone-de-imagem-padrao_671167-196.jpg'"></td>
                            <td class="p-4 font-bold text-slate-700">${p.nome}</td>
                            <td class="p-4 font-black text-green-600">R$ ${parseFloat(p.preco).toFixed(2)}</td>
                            <td class="p-4 text-center">
                                <button onclick="window.excluirProd('${lojaId}','${id}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        window.excluirLoja = (id) => confirm("Apagar loja?") && remove(ref(db, `lojas/${id}`));
        window.excluirProd = (lojaId, id) => confirm("Apagar produto?") && remove(ref(db, `produtos/${lojaId}/${id}`));

    </script>
</body>
</html>
