<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER ADMIN FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .aba-conteudo { display: none; }
        .aba-ativa { display: block; }
        .menu-ativo { background: #ef4444 !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden font-sans text-slate-800">

    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-2xl font-black text-red-500 italic">DELIVERY<span class="text-white font-light">HUB</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="navegar('dashboard')" id="btn-dashboard" class="menu-btn w-full flex items-center p-3 rounded-xl menu-ativo">
                <i class="fas fa-home mr-3"></i> Dashboard
            </button>
            <button onclick="navegar('lojas')" id="btn-lojas" class="menu-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800">
                <i class="fas fa-store mr-3"></i> Lojas
            </button>
            <button onclick="navegar('vendas')" id="btn-vendas" class="menu-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800">
                <i class="fas fa-receipt mr-3"></i> Vendas e Comissões
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-50">
            <h2 id="txt-titulo" class="font-black text-slate-700 uppercase italic">Painel Administrativo</h2>
            <span class="text-green-500 font-bold text-[10px] uppercase bg-green-50 px-2 py-1 rounded-full border border-green-200">● Conectado ao Firebase</span>
        </header>

        <div class="p-6 space-y-6">
            
            <div id="aba-dashboard" class="aba-conteudo aba-ativa">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl border-l-8 border-red-500 shadow-sm">
                        <p class="text-gray-400 text-xs font-bold uppercase">Lojas no Sistema</p>
                        <h3 id="resumo-lojas" class="text-4xl font-black">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border-l-8 border-blue-500 shadow-sm">
                        <p class="text-gray-400 text-xs font-bold uppercase">Total Vendido</p>
                        <h3 id="resumo-vendas" class="text-4xl font-black text-blue-600">R$ 0,00</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border-l-8 border-green-500 shadow-sm">
                        <p class="text-gray-400 text-xs font-bold uppercase">Sua Comissão</p>
                        <h3 id="resumo-comissao" class="text-4xl font-black text-green-600">R$ 0,00</h3>
                    </div>
                </div>
            </div>

            <div id="aba-lojas" class="aba-conteudo space-y-6">
                <div id="grid-lojas" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div id="aba-vendas" class="aba-conteudo">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800 text-white text-[10px] uppercase tracking-widest">
                            <tr>
                                <th class="p-4">Loja</th>
                                <th class="p-4">Cliente</th>
                                <th class="p-4">Valor Pedido</th>
                                <th class="p-4 text-green-400">Comissão</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-vendas" class="divide-y divide-gray-100 font-bold text-sm"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATFpMv8Qd7XqypPjD4RRIzFd80EBdUDjc",
            authDomain: "deliveryaju-3e6bf.firebaseapp.com",
            databaseURL: "https://deliveryaju-3e6bf-default-rtdb.firebaseio.com",
            projectId: "deliveryaju-3e6bf",
            storageBucket: "deliveryaju-3e6bf.firebasestorage.app",
            appId: "1:582528849886:web:a7d4b0c545422c05b7ef4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.navegar = (aba) => {
            document.querySelectorAll('.aba-conteudo').forEach(x => x.classList.remove('aba-ativa'));
            document.querySelectorAll('.menu-btn').forEach(x => x.classList.remove('menu-ativo'));
            document.getElementById('aba-' + aba).classList.add('aba-ativa');
            document.getElementById('btn-' + aba).classList.add('menu-ativo');
        };

        let cacheLojas = {};

        // 1. CARREGAR LOJAS (CORRIGINDO IMAGENS)
        onValue(ref(db, 'lojas'), (snap) => {
            const lojas = snap.val() || {};
            cacheLojas = lojas;
            const grid = document.getElementById('grid-lojas');
            grid.innerHTML = "";
            document.getElementById('resumo-lojas').innerText = Object.keys(lojas).length;

            for (let id in lojas) {
                const l = lojas[id];
                // Tenta todos os nomes possíveis para a imagem
                const img = l.logo || l.logo_url || l.imagem || l.url || "https://via.placeholder.com/150";
                
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border flex items-center gap-4 shadow-sm hover:shadow-md transition">
                        <img src="${img}" class="w-14 h-14 rounded-xl object-cover bg-gray-50 border" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="flex-1">
                            <h4 class="font-black text-slate-700 uppercase text-xs">${l.nome}</h4>
                            <p class="text-[10px] text-blue-500 font-bold italic">${l.comissao}% de Comissão</p>
                        </div>
                    </div>
                `;
            }
        });

        // 2. CARREGAR VENDAS (CORRIGINDO idloja E VALORES)
        onValue(ref(db, 'pedidos'), (snap) => {
            const pedidos = snap.val() || {};
            const tabela = document.getElementById('tabela-vendas');
            tabela.innerHTML = "";
            
            let vTotais = 0;
            let cTotais = 0;

            for (let id in pedidos) {
                const p = pedidos[id];
                
                // IMPORTANTE: Busca por 'idloja' (como está no seu print)
                const lojaId = p.idloja || p.lojaId; 
                const loja = cacheLojas[lojaId] || { nome: "Loja Excluída", comissao: 0 };
                
                const valor = parseFloat(p.total || p.valor || 0);
                const comPerc = parseFloat(loja.comissao || 0);
                const comReal = (valor * (comPerc / 100));

                vTotais += valor;
                cTotais += comReal;

                tabela.innerHTML += `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-4 text-xs font-black text-slate-400 uppercase">${loja.nome}</td>
                        <td class="p-4">
                            <div class="text-slate-700">${p.clienteNome || p.nome || "Cliente"}</div>
                            <div class="text-[9px] text-slate-400 uppercase font-normal">${p.endereco || "Não informado"}</div>
                        </td>
                        <td class="p-4 font-black">R$ ${valor.toFixed(2)}</td>
                        <td class="p-4 font-black text-green-600 italic">R$ ${comReal.toFixed(2)}</td>
                    </tr>
                `;
            }

            document.getElementById('resumo-vendas').innerText = `R$ ${vTotais.toFixed(2)}`;
            document.getElementById('resumo-comissao').innerText = `R$ ${cTotais.toFixed(2)}`;
            
            if (Object.keys(pedidos).length === 0) {
                tabela.innerHTML = "<tr><td colspan='4' class='p-10 text-center text-slate-300 italic'>Nenhum pedido encontrado.</td></tr>";
            }
        });

    </script>
</body>
</html>
