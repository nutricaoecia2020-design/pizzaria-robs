<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER ADMIN v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .aba-conteudo { display: none; }
        .aba-ativa { display: block; }
        .menu-ativo { background: #ef4444 !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden font-sans">

    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-black text-red-500">DELIVERY<span class="text-white">HUB</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="navegar('dashboard')" id="btn-dashboard" class="menu-btn w-full flex items-center p-3 rounded-lg menu-ativo">
                <i class="fas fa-chart-line mr-3"></i> Início
            </button>
            <button onclick="navegar('lojas')" id="btn-lojas" class="menu-btn w-full flex items-center p-3 rounded-lg text-slate-400 hover:bg-slate-800">
                <i class="fas fa-store mr-3"></i> Lojas
            </button>
            <button onclick="navegar('vendas')" id="btn-vendas" class="menu-btn w-full flex items-center p-3 rounded-lg text-slate-400 hover:bg-slate-800">
                <i class="fas fa-shopping-cart mr-3"></i> Vendas/Comissão
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-50">
            <h2 id="titulo-pagina" class="font-bold text-slate-700">Dashboard de Controle</h2>
            <div id="status-fb" class="text-xs font-bold text-green-500 uppercase">● Firebase Conectado</div>
        </header>

        <div class="p-6 max-w-7xl mx-auto w-full">
            
            <section id="aba-dashboard" class="aba-conteudo aba-ativa">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-red-500">
                        <p class="text-xs font-bold text-slate-400 uppercase">Lojas Ativas</p>
                        <h3 id="count-lojas" class="text-3xl font-black">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-500">
                        <p class="text-xs font-bold text-slate-400 uppercase">Vendas Totais</p>
                        <h3 id="total-vendas" class="text-3xl font-black text-blue-600">R$ 0,00</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-500">
                        <p class="text-xs font-bold text-slate-400 uppercase">Sua Comissão</p>
                        <h3 id="total-comissao" class="text-3xl font-black text-green-600">R$ 0,00</h3>
                    </div>
                </div>
            </section>

            <section id="aba-lojas" class="aba-conteudo space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border">
                    <h3 class="font-bold mb-4">Cadastrar Nova Loja</h3>
                    <form id="form-loja" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="loja-nome" placeholder="Nome da Loja" class="border p-2 rounded" required>
                        <input type="url" id="loja-logo" placeholder="URL da Logo" class="border p-2 rounded">
                        <select id="loja-cat" class="border p-2 rounded">
                            <option>Pizzarias</option>
                            <option>Lanchonetes</option>
                        </select>
                        <input type="number" id="loja-com" placeholder="Comissão %" class="border p-2 rounded" required>
                        <button class="bg-red-500 text-white font-bold p-2 rounded hover:bg-red-600">SALVAR LOJA</button>
                    </form>
                </div>
                <div id="lista-lojas" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="aba-vendas" class="aba-conteudo">
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900 text-white text-xs uppercase">
                            <tr>
                                <th class="p-4">Loja</th>
                                <th class="p-4">Cliente / Endereço</th>
                                <th class="p-4">Valor</th>
                                <th class="p-4">Sua Comissão</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-pedidos" class="text-sm"></tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATFpMv8Qd7XqypPjD4RRIzFd80EBdUDjc",
            authDomain: "deliveryaju-3e6bf.firebaseapp.com",
            databaseURL: "https://deliveryaju-3e6bf-default-rtdb.firebaseio.com",
            projectId: "deliveryaju-3e6bf",
            storageBucket: "deliveryaju-3e6bf.firebasestorage.app",
            appId: "1:582528849886:web:a7d4b0c545422c05b7ef4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // NAVEGAÇÃO
        window.navegar = (id) => {
            document.querySelectorAll('.aba-conteudo').forEach(a => a.classList.remove('aba-ativa'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('menu-ativo'));
            document.getElementById('aba-' + id).classList.add('aba-ativa');
            document.getElementById('btn-' + id).classList.add('menu-ativo');
        };

        let lojasGlobal = {};

        // 1. CARREGAR LOJAS (CORREÇÃO DE IMAGEM)
        onValue(ref(db, 'lojas'), (snapshot) => {
            const data = snapshot.val() || {};
            lojasGlobal = data;
            const container = document.getElementById('lista-lojas');
            container.innerHTML = "";
            
            document.getElementById('count-lojas').innerText = Object.keys(data).length;

            Object.keys(data).forEach(id => {
                const loja = data[id];
                // Fallback de imagem: tenta logo, depois imagem, depois icone.
                const img = loja.logo || loja.imagem || loja.url || "https://cdn-icons-png.flaticon.com/512/123/123403.png";
                
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border flex items-center gap-4">
                        <img src="${img}" class="w-12 h-12 rounded-full object-cover border" onerror="this.src='https://cdn-icons-png.flaticon.com/512/123/123403.png'">
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-800">${loja.nome || 'Sem Nome'}</h4>
                            <p class="text-xs text-slate-400 uppercase font-bold">${loja.categoria || 'Geral'} • ${loja.comissao || 0}% Comis.</p>
                        </div>
                        <button onclick="window.apagarLoja('${id}')" class="text-red-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
        });

        // 2. CARREGAR VENDAS (CORREÇÃO DE DADOS CLIENTE)
        onValue(ref(db, 'pedidos'), (snapshot) => {
            const pedidos = snapshot.val() || {};
            const tabela = document.getElementById('tabela-pedidos');
            tabela.innerHTML = "";
            
            let vTotais = 0;
            let cTotais = 0;

            Object.keys(pedidos).forEach(id => {
                const p = pedidos[id];
                const loja = lojasGlobal[p.lojaId] || { nome: "Loja Antiga", comissao: 0 };
                
                // Mapeamento Flexível (Tenta vários nomes de campo)
                const valor = parseFloat(p.total || p.valor || p.valorTotal || 0);
                const nomeCli = p.clienteNome || p.nome || p.usuario || "Anônimo";
                const endCli = p.endereco || p.local || "Retirada no Local";
                const comPerc = parseFloat(loja.comissao || 0);
                const comReal = (valor * (comPerc / 100));

                vTotais += valor;
                cTotais += comReal;

                tabela.innerHTML += `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-4 font-bold text-slate-700">${loja.nome}</td>
                        <td class="p-4">
                            <div class="font-bold">${nomeCli}</div>
                            <div class="text-[10px] text-slate-400 uppercase">${endCli}</div>
                        </td>
                        <td class="p-4 font-black">R$ ${valor.toFixed(2)}</td>
                        <td class="p-4 font-black text-green-600">R$ ${comReal.toFixed(2)}</td>
                    </tr>
                `;
            });

            document.getElementById('total-vendas').innerText = `R$ ${vTotais.toFixed(2)}`;
            document.getElementById('total-comissao').innerText = `R$ ${cTotais.toFixed(2)}`;
        });

        // 3. AÇÕES
        document.getElementById('form-loja').onsubmit = (e) => {
            e.preventDefault();
            const payload = {
                nome: document.getElementById('loja-nome').value,
                logo: document.getElementById('loja-logo').value,
                categoria: document.getElementById('loja-cat').value,
                comissao: document.getElementById('loja-com').value
            };
            push(ref(db, 'lojas'), payload).then(() => e.target.reset());
        };

        window.apagarLoja = (id) => confirm("Excluir definitivamente?") && remove(ref(db, `lojas/${id}`));

    </script>
</body>
</html>
