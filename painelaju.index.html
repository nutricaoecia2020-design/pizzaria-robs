<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Gerenciar Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6">
            <h1 class="text-xl font-bold text-red-500">ADMIN<span class="text-white">DELIVERY</span></h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center p-3 bg-red-600 rounded-lg"><i class="fas fa-chart-line mr-3"></i> Dashboard</a>
            <a href="#" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition"><i class="fas fa-store mr-3"></i> Lojas</a>
            <a href="#" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition"><i class="fas fa-utensils mr-3"></i> Produtos</a>
            <a href="#secaoPedidos" class="flex items-center p-3 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white transition"><i class="fas fa-shopping-cart mr-3"></i> Pedidos/Comissões</a>
        </nav>
        <div class="p-4 border-t border-gray-800 text-xs text-gray-500 text-center">v1.5 - Firebase Conectado</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center">
            <h2 class="text-xl font-semibold text-gray-700">Gestão do Marketplace</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500">Bem-vindo, <strong>Admin</strong></span>
                <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center"><i class="fas fa-user text-gray-400"></i></div>
            </div>
        </header>

        <div class="p-6 space-y-10">
            <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                    <div class="p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl">
                        <h3 class="font-bold text-gray-800"><i class="fas fa-store mr-2 text-red-500"></i>Nova Loja</h3>
                    </div>
                    <form id="formCadastroLoja" class="p-6 space-y-4">
                        <input type="text" id="nomeLoja" placeholder="Nome da Loja" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300" required>
                        <input type="url" id="logoLoja" placeholder="URL da Logomarca (PNG ou JPG)" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                        <select id="categoriaLoja" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                            <option>Pizzarias</option>
                            <option>Lanchonetes</option>
                            <option>Saudáveis</option>
                            <option>Doces</option>
                            <option>PetShop</option>
                        </select>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="tempoEntrega" placeholder="Tempo (ex: 30-40)" class="border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                            <div class="relative">
                                <input type="number" id="comissaoLoja" placeholder="Comissão" class="w-full border rounded-lg p-2.5 bg-blue-50 border-blue-200 font-bold text-blue-700" required>
                                <span class="absolute right-3 top-2.5 text-blue-400">%</span>
                            </div>
                        </div>
                        <input type="text" id="enderecoLoja" placeholder="Endereço Completo" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                        <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">CADASTRAR LOJA</button>
                    </form>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                    <div class="p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl">
                        <h3 class="font-bold text-gray-800"><i class="fas fa-hamburger mr-2 text-blue-500"></i>Novo Produto</h3>
                    </div>
                    <form id="formCadastroProduto" class="p-6 space-y-4">
                        <select id="selectLojasDisponiveis" class="w-full border rounded-lg p-2.5 bg-blue-50 border-blue-200" required>
                            <option value="">Carregando lojas...</option>
                        </select>
                        <input type="text" id="nomeProd" placeholder="Nome do Produto" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300" required>
                        <input type="url" id="imgProd" placeholder="URL da Imagem do Produto" class="w-full border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" step="0.01" id="precoProd" placeholder="Preço R$" class="border rounded-lg p-2.5 bg-gray-50 border-gray-300" required>
                            <input type="text" id="descProd" placeholder="Descrição curta" class="border rounded-lg p-2.5 bg-gray-50 border-gray-300">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition uppercase">Adicionar ao Cardápio</button>
                    </form>
                </div>
            </div>

            <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-4 border-b border-gray-100 bg-gray-50 font-bold text-gray-800 text-sm">Lojas Cadastradas</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-xs uppercase font-bold">
                                <th class="p-4">Logo</th>
                                <th class="p-4">Nome</th>
                                <th class="p-4">Comissão</th>
                                <th class="p-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaLojasBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-4 border-b border-gray-100 bg-blue-50 font-bold text-gray-800 text-sm flex justify-between items-center">
                    <span><i class="fas fa-list mr-2 text-blue-500"></i> Produtos por Loja</span>
                    <select id="filtroLojaProdutos" class="text-xs p-1 border rounded bg-white">
                        <option value="">Selecione para listar produtos...</option>
                    </select>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <tbody id="tabelaProdutosBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="secaoPedidos" class="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-4 border-b border-gray-100 bg-green-50 font-bold text-gray-800 text-sm text-green-700">
                    <i class="fas fa-file-invoice-dollar mr-2"></i> Relatório de Pedidos & Comissões
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-xs uppercase font-bold">
                                <th class="p-4">Loja</th>
                                <th class="p-4">Cliente</th>
                                <th class="p-4">Total</th>
                                <th class="p-4">Comissão</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaPedidosBody" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATFpMv8Qd7XqypPjD4RRIzFd80EBdUDjc",
            authDomain: "deliveryaju-3e6bf.firebaseapp.com",
            databaseURL: "https://deliveryaju-3e6bf-default-rtdb.firebaseio.com",
            projectId: "deliveryaju-3e6bf",
            storageBucket: "deliveryaju-3e6bf.firebasestorage.app",
            messagingSenderId: "582528849886",
            appId: "1:582528849886:web:a7d4b0c545422c05b7ef4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Expor funções de exclusão para o HTML
        window.excluirLoja = async (id) => {
            if(confirm("Deseja apagar esta loja e seus produtos?")) {
                await remove(ref(db, 'lojas/' + id));
                await remove(ref(db, 'produtos/' + id));
            }
        };

        window.excluirProduto = async (lojaId, prodId) => {
            if(confirm("Excluir este produto?")) {
                await remove(ref(db, `produtos/${lojaId}/${prodId}`));
            }
        };

        // 1. CARREGAR LOJAS
        onValue(ref(db, 'lojas'), (snapshot) => {
            const lojas = snapshot.val();
            const selectLojas = document.getElementById('selectLojasDisponiveis');
            const filtroLojaProdutos = document.getElementById('filtroLojaProdutos');
            const tabelaLojasBody = document.getElementById('tabelaLojasBody');

            selectLojas.innerHTML = '<option value="">Vincular à Loja...</option>';
            filtroLojaProdutos.innerHTML = '<option value="">Filtrar Produtos...</option>';
            tabelaLojasBody.innerHTML = "";

            if (lojas) {
                Object.keys(lojas).forEach(id => {
                    const loja = lojas[id];
                    const logoUrl = loja.logo || "https://cdn-icons-png.flaticon.com/512/123/123403.png";

                    selectLojas.innerHTML += `<option value="${id}">${loja.nome}</option>`;
                    filtroLojaProdutos.innerHTML += `<option value="${id}">${loja.nome}</option>`;
                    
                    tabelaLojasBody.innerHTML += `
                        <tr class="border-b">
                            <td class="p-3"><img src="${logoUrl}" class="w-10 h-10 rounded-full border"></td>
                            <td class="p-3 font-bold">${loja.nome}</td>
                            <td class="p-3 text-blue-600 font-bold">${loja.comissao || 0}%</td>
                            <td class="p-3 text-center">
                                <button onclick="window.excluirLoja('${id}')" class="text-red-500 hover:underline">Excluir</button>
                            </td>
                        </tr>
                    `;
                });
            }
        });

        // 2. LISTAR PRODUTOS INDIVIDUALIZADOS
        document.getElementById('filtroLojaProdutos').onchange = (e) => {
            const lojaId = e.target.value;
            const tabelaProd = document.getElementById('tabelaProdutosBody');
            if(!lojaId) { tabelaProd.innerHTML = ""; return; }

            onValue(ref(db, `produtos/${lojaId}`), (snapshot) => {
                const prods = snapshot.val();
                tabelaProd.innerHTML = "";
                if(prods) {
                    Object.keys(prods).forEach(prodId => {
                        const p = prods[prodId];
                        tabelaProd.innerHTML += `
                            <tr class="border-b text-sm">
                                <td class="p-3"><img src="${p.imagem}" class="w-8 h-8 rounded"></td>
                                <td class="p-3"><strong>${p.nome}</strong></td>
                                <td class="p-3 font-bold text-green-600">R$ ${p.preco}</td>
                                <td class="p-3 text-right">
                                    <button onclick="window.excluirProduto('${lojaId}', '${prodId}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    tabelaProd.innerHTML = "<tr><td class='p-4 text-center text-gray-400'>Nenhum produto cadastrado.</td></tr>";
                }
            });
        };

        // 3. RELATÓRIO DE PEDIDOS
        onValue(ref(db, 'pedidos'), (snapshot) => {
            const pedidos = snapshot.val();
            const tabelaPedidosBody = document.getElementById('tabelaPedidosBody');
            tabelaPedidosBody.innerHTML = "";

            if(pedidos) {
                // Pegar informações das lojas para calcular comissão
                onValue(ref(db, 'lojas'), (lSnap) => {
                    const lojasData = lSnap.val() || {};
                    Object.keys(pedidos).forEach(pedId => {
                        const ped = pedidos[pedId];
                        const infoLoja = lojasData[ped.lojaId] || { nome: "Loja Off", comissao: 0 };
                        const vTotal = parseFloat(ped.total || 0);
                        const vComissao = (vTotal * (parseFloat(infoLoja.comissao) / 100)).toFixed(2);

                        tabelaPedidosBody.innerHTML += `
                            <tr class="border-b">
                                <td class="p-4 font-bold">${infoLoja.nome}</td>
                                <td class="p-4">${ped.clienteNome}<br><small class='text-gray-400'>${ped.endereco}</small></td>
                                <td class="p-4 font-bold text-gray-700">R$ ${vTotal.toFixed(2)}</td>
                                <td class="p-4"><span class='bg-blue-100 text-blue-700 px-2 py-1 rounded'>R$ ${vComissao}</span></td>
                            </tr>
                        `;
                    });
                });
            }
        });

        // 4. CADASTRO LOJA
        document.getElementById('formCadastroLoja').onsubmit = async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nomeLoja').value,
                logo: document.getElementById('logoLoja').value || "",
                categoria: document.getElementById('categoriaLoja').value,
                tempo: document.getElementById('tempoEntrega').value,
                comissao: document.getElementById('comissaoLoja').value,
                endereco: document.getElementById('enderecoLoja').value
            };
            await push(ref(db, 'lojas'), dados);
            alert("Loja Salva!");
            e.target.reset();
        };

        // 5. CADASTRO PRODUTO
        document.getElementById('formCadastroProduto').onsubmit = async (e) => {
            e.preventDefault();
            const lojaId = document.getElementById('selectLojasDisponiveis').value;
            const produto = {
                nome: document.getElementById('nomeProd').value,
                preco: document.getElementById('precoProd').value,
                descricao: document.getElementById('descProd').value,
                imagem: document.getElementById('imgProd').value || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300"
            };
            await push(ref(db, `produtos/${lojaId}`), produto);
            alert("Produto Adicionado!");
            e.target.reset();
        };
    </script>
</body>
</html>
