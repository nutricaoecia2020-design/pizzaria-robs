<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Sistema Completo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a252f; --accent: #00d2ff; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar { background: var(--primary); min-height: 100vh; width: 250px; position: fixed; color: white; z-index: 1000; transition: 0.3s; }
        .nav-link { color: #adb5bd; margin: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; }
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; transform: translateX(5px); }

        /* Conteúdo Principal */
        .main-content { margin-left: 250px; padding: 40px; min-height: 100vh; }
        .card-caderno { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Botão + */
        .btn-flutuante { 
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; border-radius: 50%; 
            font-size: 28px; box-shadow: 0 8px 25px rgba(0, 210, 255, 0.4); z-index: 2000; 
            border: none; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; transition: 0.3s;
        }
        .btn-flutuante:hover { transform: scale(1.1) rotate(90deg); }

        /* Cards de Receita */
        .card-receita { border: none; border-radius: 15px; transition: 0.3s; background: white; height: 100%; border-left: 5px solid #eee; }
        .card-receita:hover { transform: translateY(-5px); border-left-color: var(--accent); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .mes-titulo { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: #95a5a6; }
        .mes-valor { font-size: 1.25rem; font-weight: 800; color: var(--primary); margin: 5px 0; }

        /* Estilos de Tabela e Imagem */
        .foto-perfil { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .table-index { width: 30px; height: 30px; background: #ebf2f7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: var(--primary); }
        .ficha-foto-grande { width: 140px; height: 140px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .search-container { position: relative; width: 100%; max-width: 400px; }
        .search-container i { position: absolute; left: 15px; top: 12px; color: #ccc; }
        .search-container input { padding-left: 40px; border-radius: 20px; border: 2px solid #eee; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="p-4 text-center">
        <h4 class="fw-bold mb-0">VERA FLUXO</h4>
        <small class="text-accent">GERENCIAMENTO</small>
    </div>
    <nav class="mt-4">
        <div class="nav-link active" onclick="mudarAba('livro', this)"><i class="fas fa-th-list"></i> Vendas</div>
        <div class="nav-link" onclick="mudarAba('clientes', this)"><i class="fas fa-address-book"></i> Livro de Clientes</div>
        <div class="nav-link" onclick="mudarAba('receita', this)"><i class="fas fa-chart-pie"></i> Receita Anual</div>
    </nav>
</aside>

<main class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="titulo-aba" class="fw-bold m-0">Vendas do Mês</h2>
        <div id="filtro-vendas" class="d-flex gap-2">
            <select id="filtro-mes-venda" class="form-select w-auto rounded-pill shadow-sm" onchange="renderizarTudo()">
                <option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option>
                <option value="04" selected>Abr</option><option value="05">Mai</option><option value="06">Jun</option>
                <option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option>
                <option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
            </select>
        </div>
    </header>

    <section id="aba-livro" class="card-caderno p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr><th class="ps-4">Data</th><th>Cliente</th><th>Plano</th><th>Valor</th><th>Recebimento</th><th class="text-end pe-4">Ação</th></tr>
                </thead>
                <tbody id="corpo-vendas"></tbody>
            </table>
        </div>
    </section>

    <section id="aba-clientes" class="d-none">
        <div class="d-flex justify-content-between mb-3 align-items-center">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="input-busca" class="form-control" placeholder="Procurar cliente..." oninput="renderizarTudo()">
            </div>
        </div>
        <div class="card-caderno">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr><th class="ps-4">Nº</th><th>Foto</th><th>Nome</th><th>WhatsApp</th><th class="text-center">Venda</th><th class="text-end pe-4">Ficha</th></tr>
                    </thead>
                    <tbody id="corpo-clientes"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="aba-receita" class="d-none">
        <div class="row g-4" id="cards-mensais"></div>
    </section>
</main>

<button class="btn-flutuante" onclick="abrirModalCli()"><i class="fas fa-plus"></i></button>

<div class="modal fade" id="modalCli" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0">
            <div class="modal-header bg-primary text-white"><h5 class="fw-bold">Nova Ficha de Cliente</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <form id="form-cli">
                <div class="modal-body row g-3">
                    <div class="col-md-4 text-center">
                        <div class="bg-light rounded p-2 mb-2 d-flex align-items-center justify-content-center" style="height:180px; overflow:hidden">
                            <img id="preview-foto" src="" class="d-none w-100 h-100" style="object-fit:cover">
                            <i id="icone-foto" class="fas fa-user-plus fa-3x text-muted"></i>
                        </div>
                        <input type="file" id="file-foto" class="form-control form-control-sm" accept="image/*" onchange="converterFoto(this)">
                    </div>
                    <div class="col-md-8 row g-3">
                        <div class="col-12"><label class="form-label small fw-bold">NOME COMPLETO</label><input type="text" id="c-nome" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">WHATSAPP</label><input type="tel" id="c-tel" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">CPF</label><input type="text" id="c-doc" class="form-control"></div>
                        <div class="col-12"><label class="form-label small fw-bold">ENDEREÇO</label><input type="text" id="c-end" class="form-control"></div>
                    </div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100 py-2 fw-bold">SALVAR NO LIVRO</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVenda" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white"><h5>Lançar Venda: <span id="v-cliente-nome"></span></h5></div>
            <form id="form-venda">
                <div class="modal-body row g-3">
                    <div class="col-12"><label class="form-label">Plano de Saúde</label><select id="v-plano" class="form-select"><option>Hapvida</option><option>Unimed</option><option>Bradesco</option><option>Amil</option><option>Outros</option></select></div>
                    <div class="col-6"><label class="form-label">Valor (R$)</label><input type="number" step="0.01" id="v-valor" class="form-control" required></div>
                    <div class="col-6"><label class="form-label">Data Venda</label><input type="date" id="v-data" class="form-control" required></div>
                    <div class="col-12"><label class="form-label text-danger fw-bold">Previsão Recebimento</label><input type="date" id="v-receber" class="form-control" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-success w-100">CONFIRMAR E ACUMULAR</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalFicha" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content"><div class="modal-body text-center" id="corpo-ficha"></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let clientes = JSON.parse(localStorage.getItem('vera_v10_cli')) || [];
    let vendas = JSON.parse(localStorage.getItem('vera_v10_ven')) || [];
    let nomeClienteAtual = "";

    const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

    function mudarAba(aba, el) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('aba-'+aba).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('titulo-aba').innerText = el.innerText;
        document.getElementById('filtro-vendas').classList.toggle('d-none', aba !== 'livro');
        renderizarTudo();
    }

    function abrirModalCli() { document.getElementById('form-cli').reset(); document.getElementById('preview-foto').classList.add('d-none'); document.getElementById('icone-foto').classList.remove('d-none'); new bootstrap.Modal(document.getElementById('modalCli')).show(); }

    function converterFoto(input) {
        if (input.files && input.files[0]) {
            let r = new FileReader();
            r.onload = e => {
                document.getElementById('preview-foto').src = e.target.result;
                document.getElementById('preview-foto').classList.remove('d-none');
                document.getElementById('icone-foto').classList.add('d-none');
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    document.getElementById('form-cli').onsubmit = function(e) {
        e.preventDefault();
        clientes.push({
            id: Date.now(),
            nome: document.getElementById('c-nome').value,
            tel: document.getElementById('c-tel').value,
            doc: document.getElementById('c-doc').value,
            end: document.getElementById('c-end').value,
            foto: document.getElementById('preview-foto').src
        });
        localStorage.setItem('vera_v10_cli', JSON.stringify(clientes));
        bootstrap.Modal.getInstance(document.getElementById('modalCli')).hide();
        renderizarTudo();
    };

    function lancarVenda(nome) {
        nomeClienteAtual = nome;
        document.getElementById('v-cliente-nome').innerText = nome;
        new bootstrap.Modal(document.getElementById('modalVenda')).show();
    }

    document.getElementById('form-venda').onsubmit = function(e) {
        e.preventDefault();
        vendas.push({
            id: Date.now(),
            cliente: nomeClienteAtual,
            plano: document.getElementById('v-plano').value,
            valor: parseFloat(document.getElementById('v-valor').value),
            data: document.getElementById('v-data').value,
            receber: document.getElementById('v-receber').value
        });
        localStorage.setItem('vera_v10_ven', JSON.stringify(vendas));
        bootstrap.Modal.getInstance(document.getElementById('modalVenda')).hide();
        renderizarTudo();
    };

    function verFicha(id) {
        const c = clientes.find(x => x.id === id);
        document.getElementById('corpo-ficha').innerHTML = `
            <img src="${c.foto || ''}" class="ficha-foto-grande">
            <h4 class="fw-bold text-primary">${c.nome}</h4>
            <div class="text-start bg-light p-3 rounded mb-3">
                <p class="mb-1"><strong>WhatsApp:</strong> ${c.tel}</p>
                <p class="mb-1"><strong>CPF:</strong> ${c.doc || '---'}</p>
                <p class="mb-1"><strong>Endereço:</strong> ${c.end || '---'}</p>
            </div>
            <button class="btn btn-danger w-100" onclick="apagarCli(${c.id})">APAGAR CLIENTE</button>
        `;
        new bootstrap.Modal(document.getElementById('modalFicha')).show();
    }

    function renderizarTudo() {
        const mesFiltro = document.getElementById('filtro-mes-venda').value;
        const busca = document.getElementById('input-busca').value.toLowerCase();

        // 1. Tabela Vendas
        const tVendas = document.getElementById('corpo-vendas');
        tVendas.innerHTML = '';
        vendas.filter(v => v.data.split('-')[1] === mesFiltro).forEach(v => {
            tVendas.innerHTML += `<tr><td class="ps-4 small">${v.data.split('-').reverse().join('/')}</td><td class="fw-bold">${v.cliente}</td><td>${v.plano}</td><td class="text-success fw-bold">R$ ${v.valor.toFixed(2)}</td><td>${v.receber.split('-').reverse().join('/')}</td><td class="text-end pe-4"><button class="btn btn-link text-danger" onclick="apagarVenda(${v.id})"><i class="fas fa-trash"></i></button></td></tr>`;
        });

        // 2. Tabela Clientes
        const tCli = document.getElementById('corpo-clientes');
        tCli.innerHTML = '';
        clientes.filter(c => c.nome.toLowerCase().includes(busca)).forEach((c, index) => {
            tCli.innerHTML += `<tr><td class="ps-4"><div class="table-index">${index+1}</div></td><td><img src="${c.foto}" class="foto-perfil"></td><td><strong>${c.nome}</strong></td><td>${c.tel}</td><td class="text-center"><button class="btn btn-success btn-sm px-3" onclick="lancarVenda('${c.nome}')">VENDER</button></td><td class="text-end pe-4"><button class="btn btn-outline-dark btn-sm" onclick="verFicha(${c.id})"><i class="fas fa-id-card"></i></button></td></tr>`;
        });

        // 3. ABA RECEITA
        const tRec = document.getElementById('cards-mensais');
        tRec.innerHTML = '';
        nomesMeses.forEach((nome, i) => {
            const indexMes = (i + 1).toString().padStart(2, '0');
            const total = vendas.filter(v => v.data.split('-')[1] === indexMes).reduce((a, b) => a + b.valor, 0);
            tRec.innerHTML += `<div class="col-md-3"><div class="card card-receita p-3"><span class="mes-titulo">${nome}</span><div class="mes-valor">R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div><small class="text-success">Total acumulado</small></div></div>`;
        });
    }

    function apagarVenda(id) { if(confirm("Remover venda?")) { vendas = vendas.filter(x => x.id !== id); localStorage.setItem('vera_v10_ven', JSON.stringify(vendas)); renderizarTudo(); } }
    function apagarCli(id) { if(confirm("Apagar cliente?")) { clientes = clientes.filter(x => x.id !== id); localStorage.setItem('vera_v10_cli', JSON.stringify(clientes)); bootstrap.Modal.getInstance(document.getElementById('modalFicha')).hide(); renderizarTudo(); } }

    window.onload = renderizarTudo;
</script>
</body>
</html>
