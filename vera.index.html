<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Livro de Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-dark: #1a252f; --accent-blue: #3498db; --paper-bg: #ffffff; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Sidebar Estilizada */
        .sidebar { background: var(--primary-dark); min-height: 100vh; width: 240px; position: fixed; color: white; transition: 0.3s; }
        .nav-link { color: #adb5bd; margin: 10px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--accent-blue); color: white; }

        .main-content { margin-left: 240px; padding: 30px; }
        
        /* Estilo Tabela de Caderno */
        .caderno-container { background: var(--paper-bg); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 5px solid var(--accent-blue); }
        .table thead { background: #f8f9fa; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .table-hover tbody tr:hover { background-color: #f1f8ff; }
        
        .status-receber { color: #e67e22; font-weight: bold; }
        .status-pago { color: #27ae60; font-weight: bold; }
        
        .foto-mini { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }
        
        /* Botão Flutuante para novo cadastro */
        .btn-novo { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4 text-center border-bottom border-secondary mb-4">
        <h4 class="fw-bold mb-0">VERA</h4>
        <small class="text-info">EMPREENDEDORA</small>
    </div>
    <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link active" onclick="showSection('painel')"><i class="fas fa-book me-2"></i> Livro de Vendas</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSection('clientes')"><i class="fas fa-users me-2"></i> Fichas de Clientes</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="titulo-pagina" class="fw-bold text-dark">Livro de Registro de Vendas</h2>
        <div class="d-flex align-items-center gap-3">
            <select id="filtro-mes" class="form-select w-auto shadow-sm" onchange="renderLivro()">
                <option value="01">Janeiro</option><option value="02">Fevereiro</option>
                <option value="03">Março</option><option value="04" selected>Abril</option>
                <option value="05">Maio</option><option value="06">Junho</option>
                <option value="07">Julho</option><option value="08">Agosto</option>
                <option value="09">Setembro</option><option value="10">Outubro</option>
                <option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
            <span class="badge bg-white text-dark p-2 shadow-sm">Olá, Vera! <i class="fas fa-user-circle text-info ms-1"></i></span>
        </div>
    </header>

    <section id="sec-painel" class="caderno-container">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">Data Venda</th>
                        <th>Cliente</th>
                        <th>Contato/Doc</th>
                        <th>Plano / Tipo</th>
                        <th>Valor</th>
                        <th>Pagamento</th>
                        <th>Recebimento</th>
                        <th class="text-center">Ação</th>
                    </tr>
                </thead>
                <tbody id="corpo-livro">
                    </tbody>
            </table>
        </div>
        <div id="vazio-msg" class="text-center p-5 d-none text-muted">
            <i class="fas fa-folder-open fa-3x mb-3"></i>
            <p>Nenhuma venda registrada para este mês.</p>
        </div>
    </section>

    <section id="sec-clientes" class="d-none">
        <div class="row g-4" id="grid-clientes"></div>
    </section>
</div>

<button class="btn btn-info text-white btn-novo" onclick="abrirModalCliente()" title="Novo Cliente">
    <i class="fas fa-plus"></i>
</button>

<div class="modal fade" id="modalCliente" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Nova Ficha de Cliente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="form-cliente">
                <div class="modal-body row g-3">
                    <div class="col-md-4 text-center">
                        <div id="foto-preview-box" class="bg-light border rounded mb-2" style="height: 150px; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-user-circle fa-4x text-secondary" id="icon-placeholder"></i>
                            <img id="img-preview" src="" class="d-none w-100 h-100" style="object-fit: cover;">
                        </div>
                        <input type="file" class="form-control form-control-sm" accept="image/*" onchange="previewFoto(this)">
                    </div>
                    <div class="col-md-8 row g-3">
                        <div class="col-md-12"><label class="form-label">Nome Completo</label><input type="text" id="cli-nome" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="tel" id="cli-tel" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">CPF/CNPJ</label><input type="text" id="cli-doc" class="form-control"></div>
                        <div class="col-md-12"><label class="form-label">Endereço Completo</label><input type="text" id="cli-end" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Data Nascimento</label><input type="date" id="cli-nasc" class="form-control"></div>
                    </div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">Salvar e Criar Ficha</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVenda" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title">Registrar Venda para <span id="venda-nome-cli"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="form-venda">
                <div class="modal-body row g-3">
                    <div class="col-12">
                        <label class="form-label">Plano de Saúde</label>
                        <select id="ven-plano" class="form-select">
                            <option>Hapvida</option><option>Unimed</option><option>Bradesco</option><option>SulAmérica</option><option>Amil</option>
                        </select>
                    </div>
                    <div class="col-md-6"><label class="form-label">Tipo</label><select id="ven-tipo" class="form-select"><option>PF (Individual)</option><option>PME (Empresa)</option></select></div>
                    <div class="col-md-6"><label class="form-label">Valor (R$)</label><input type="number" id="ven-valor" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Data da Venda</label><input type="date" id="ven-data" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Data Recebimento</label><input type="date" id="ven-agend" class="form-control" required></div>
                    <div class="col-12"><label class="form-label">Forma de Pagamento</label><select id="ven-forma" class="form-select"><option>Pix</option><option>Cartão</option><option>Boleto</option><option>Dinheiro</option></select></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-info text-white w-100">Confirmar Venda</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let clientes = JSON.parse(localStorage.getItem('vera_v4_cli')) || [];
    let vendas = JSON.parse(localStorage.getItem('vera_v4_ven')) || [];
    let cliSelecionado = "";

    function showSection(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-' + id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(id === 'painel') renderLivro();
        if(id === 'clientes') renderGridClientes();
    }

    function previewFoto(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = e => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('img-preview').classList.remove('d-none');
                document.getElementById('icon-placeholder').classList.add('d-none');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function abrirModalCliente() { new bootstrap.Modal(document.getElementById('modalCliente')).show(); }

    document.getElementById('form-cliente').onsubmit = function(e) {
        e.preventDefault();
        const novo = {
            id: Date.now(),
            nome: document.getElementById('cli-nome').value,
            tel: document.getElementById('cli-tel').value,
            doc: document.getElementById('cli-doc').value,
            end: document.getElementById('cli-end').value,
            nasc: document.getElementById('cli-nasc').value,
            foto: document.getElementById('img-preview').src
        };
        clientes.push(novo);
        localStorage.setItem('vera_v4_cli', JSON.stringify(clientes));
        this.reset();
        bootstrap.Modal.getInstance(document.getElementById('modalCliente')).hide();
        renderGridClientes();
        showSection('clientes');
    };

    function renderGridClientes() {
        const grid = document.getElementById('grid-clientes');
        grid.innerHTML = '';
        clientes.forEach(c => {
            grid.innerHTML += `
            <div class="col-md-3">
                <div class="card p-3 text-center shadow-sm">
                    <img src="${c.foto || '#'}" class="rounded-circle mx-auto mb-2" style="width:70px;height:70px;object-fit:cover;background:#eee">
                    <h6 class="mb-1 fw-bold">${c.nome}</h6>
                    <button class="btn btn-sm btn-info text-white mb-1 w-100" onclick="abrirVenda('${c.nome}')">Nova Venda</button>
                    <button class="btn btn-sm btn-outline-secondary w-100" onclick="alert('Ficha:\\nNome: ${c.nome}\\nCPF: ${c.doc}\\nEnd: ${c.end}')">Dados Completos</button>
                </div>
            </div>`;
        });
    }

    function abrirVenda(nome) {
        cliSelecionado = nome;
        document.getElementById('venda-nome-cli').innerText = nome;
        new bootstrap.Modal(document.getElementById('modalVenda')).show();
    }

    document.getElementById('form-venda').onsubmit = function(e) {
        e.preventDefault();
        const clienteObj = clientes.find(c => c.nome === cliSelecionado);
        const venda = {
            id: Date.now(),
            cliente: cliSelecionado,
            contato: clienteObj ? clienteObj.tel : '---',
            doc: clienteObj ? clienteObj.doc : '---',
            plano: document.getElementById('ven-plano').value,
            tipo: document.getElementById('ven-tipo').value,
            valor: parseFloat(document.getElementById('ven-valor').value),
            data: document.getElementById('ven-data').value,
            agend: document.getElementById('ven-agend').value,
            forma: document.getElementById('ven-forma').value
        };
        vendas.push(venda);
        localStorage.setItem('vera_v4_ven', JSON.stringify(vendas));
        bootstrap.Modal.getInstance(document.getElementById('modalVenda')).hide();
        renderLivro();
        showSection('painel');
    };

    function renderLivro() {
        const mesFiltro = document.getElementById('filtro-mes').value;
        const corpo = document.getElementById('corpo-livro');
        corpo.innerHTML = '';
        
        let filtered = vendas.filter(v => v.data.split('-')[1] === mesFiltro);
        
        if(filtered.length === 0) {
            document.getElementById('vazio-msg').classList.remove('d-none');
        } else {
            document.getElementById('vazio-msg').classList.add('d-none');
            filtered.forEach(v => {
                corpo.innerHTML += `
                <tr>
                    <td class="ps-4 text-muted">${new Date(v.data).toLocaleDateString()}</td>
                    <td class="fw-bold text-primary">${v.cliente}</td>
                    <td><small>${v.contato}<br>${v.doc}</small></td>
                    <td><span class="badge bg-light text-dark border">${v.plano}</span><br><small class="text-muted">${v.tipo}</small></td>
                    <td class="fw-bold">R$ ${v.valor.toLocaleString()}</td>
                    <td><small class="badge bg-secondary">${v.forma}</small></td>
                    <td class="${new Date(v.agend) > new Date() ? 'status-receber' : 'status-pago'}">
                        ${new Date(v.agend).toLocaleDateString()}
                    </td>
                    <td class="text-center">
                        <button class="btn btn-sm text-danger" onclick="apagarVenda(${v.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
        }
    }

    function apagarVenda(id) {
        if(confirm("Remover este registro do caderno?")) {
            vendas = vendas.filter(v => v.id !== id);
            localStorage.setItem('vera_v4_ven', JSON.stringify(vendas));
            renderLivro();
        }
    }

    window.onload = renderLivro;
</script>
</body>
</html>
