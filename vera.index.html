<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Sistema Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a252f; --accent: #00d2ff; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        .sidebar { background: var(--primary); min-height: 100vh; width: 250px; position: fixed; color: white; z-index: 1000; }
        .nav-link { color: #adb5bd; margin: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        .main-content { margin-left: 250px; padding: 40px; min-height: 100vh; }
        .card-caderno { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); }

        /* ANIMAÇÃO PISCANTE PARA VALORES A RECEBER */
        @keyframes alert-pulsar {
            0% { box-shadow: 0 0 0px rgba(231, 76, 60, 0.4); border-color: #eee; }
            50% { box-shadow: 0 0 20px rgba(231, 76, 60, 0.7); border-color: var(--danger); }
            100% { box-shadow: 0 0 0px rgba(231, 76, 60, 0.4); border-color: #eee; }
        }
        .card-piscante { 
            animation: alert-pulsar 1.5s infinite; 
            border-left: 8px solid var(--danger) !important;
        }

        .btn-flutuante { 
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; border-radius: 50%; 
            font-size: 28px; box-shadow: 0 8px 25px rgba(0, 210, 255, 0.4); z-index: 2000; 
            border: none; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; transition: 0.3s;
        }

        .card-receita { border: none; border-radius: 15px; background: white; border-left: 5px solid #eee; transition: 0.3s; }
        .foto-perfil { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .table-index { width: 30px; height: 30px; background: #ebf2f7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="p-4 text-center">
        <h4 class="fw-bold mb-0">VERA FLUXO</h4>
        <small class="text-accent">SISTEMA LOCAL</small>
    </div>
    <nav class="mt-4">
        <div class="nav-link active" onclick="mudarAba('livro', this)"><i class="fas fa-th-list me-2"></i> Vendas</div>
        <div class="nav-link" onclick="mudarAba('clientes', this)"><i class="fas fa-address-book me-2"></i> Livro de Clientes</div>
        <div class="nav-link" onclick="mudarAba('receber', this)"><i class="fas fa-clock me-2"></i> A Receber</div>
        <div class="nav-link" onclick="mudarAba('receita', this)"><i class="fas fa-chart-pie me-2"></i> Receita Anual</div>
    </nav>
</aside>

<main class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="titulo-aba" class="fw-bold m-0">Vendas do Mês</h2>
        <div id="area-filtro" class="d-flex gap-2">
            <select id="filtro-mes" class="form-select w-auto rounded-pill" onchange="renderizarTudo()">
                <option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option>
                <option value="04" selected>Abr</option><option value="05">Mai</option><option value="06">Jun</option>
                <option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option>
                <option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
            </select>
        </div>
    </header>

    <section id="aba-livro" class="card-caderno p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light"><tr><th class="ps-4">Data</th><th>Cliente</th><th>Plano</th><th>Valor</th><th>Receber</th><th class="text-end pe-4">Ação</th></tr></thead>
                <tbody id="corpo-vendas"></tbody>
            </table>
        </div>
    </section>

    <section id="aba-clientes" class="d-none">
        <div class="mb-3"><input type="text" id="busca-cli" class="form-control rounded-pill w-50" placeholder="Buscar cliente..." oninput="renderizarTudo()"></div>
        <div class="card-caderno">
            <table class="table align-middle mb-0">
                <thead class="table-dark"><tr><th class="ps-4">Nº</th><th>Foto</th><th>Nome</th><th class="text-center">Venda</th><th class="text-end pe-4">Ação</th></tr></thead>
                <tbody id="corpo-clientes"></tbody>
            </table>
        </div>
    </section>

    <section id="aba-receber" class="d-none">
        <div class="row g-3" id="cards-receber"></div>
    </section>

    <section id="aba-receita" class="d-none">
        <div class="row g-4" id="cards-receita"></div>
    </section>
</main>

<button class="btn-flutuante" onclick="abrirModalCli()"><i class="fas fa-plus"></i></button>

<div class="modal fade" id="modalCli" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5>Cadastrar Cliente</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <form id="form-cli"><div class="modal-body row g-3">
                <div class="col-md-4 text-center">
                    <img id="prev-foto" src="" class="d-none w-100 rounded mb-2 shadow-sm">
                    <input type="file" class="form-control form-control-sm" accept="image/*" onchange="previewImg(this)">
                </div>
                <div class="col-md-8 row g-3">
                    <div class="col-12"><label>Nome</label><input type="text" id="c-nome" class="form-control" required></div>
                    <div class="col-md-6"><label>WhatsApp</label><input type="tel" id="c-tel" class="form-control" required></div>
                    <div class="col-12"><label>Endereço</label><input type="text" id="c-end" class="form-control"></div>
                </div>
            </div><div class="modal-footer"><button type="submit" class="btn btn-primary w-100">SALVAR</button></div></form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVenda" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-success text-white"><h5>Venda para <span id="v-nome"></span></h5></div>
        <form id="form-venda"><div class="modal-body row g-3">
            <div class="col-12"><label>Plano</label><select id="v-plano" class="form-select"><option>Hapvida</option><option>Unimed</option><option>Bradesco</option><option>Amil</option></select></div>
            <div class="col-6"><label>Valor R$</label><input type="number" step="0.01" id="v-valor" class="form-control" required></div>
            <div class="col-6"><label>Data Venda</label><input type="date" id="v-data" class="form-control" required></div>
            <div class="col-12"><label class="text-danger fw-bold">Data do Recebimento</label><input type="date" id="v-receber" class="form-control" required></div>
        </div><div class="modal-footer"><button type="submit" class="btn btn-success w-100">LANÇAR</button></div></form>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let clientes = JSON.parse(localStorage.getItem('vera_v11_cli')) || [];
    let vendas = JSON.parse(localStorage.getItem('vera_v11_ven')) || [];
    let nomeAtual = "";

    function mudarAba(aba, el) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('aba-'+aba).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('titulo-aba').innerText = el.innerText;
        renderizarTudo();
    }

    function previewImg(input) {
        if (input.files && input.files[0]) {
            let r = new FileReader();
            r.onload = e => { document.getElementById('prev-foto').src = e.target.result; document.getElementById('prev-foto').classList.remove('d-none'); };
            r.readAsDataURL(input.files[0]);
        }
    }

    function abrirModalCli() { document.getElementById('form-cli').reset(); new bootstrap.Modal(document.getElementById('modalCli')).show(); }

    document.getElementById('form-cli').onsubmit = function(e) {
        e.preventDefault();
        clientes.push({ id: Date.now(), nome: document.getElementById('c-nome').value, tel: document.getElementById('c-tel').value, end: document.getElementById('c-end').value, foto: document.getElementById('prev-foto').src });
        localStorage.setItem('vera_v11_cli', JSON.stringify(clientes));
        bootstrap.Modal.getInstance(document.getElementById('modalCli')).hide();
        renderizarTudo();
    };

    function lancarVenda(nome) { nomeAtual = nome; document.getElementById('v-nome').innerText = nome; new bootstrap.Modal(document.getElementById('modalVenda')).show(); }

    document.getElementById('form-venda').onsubmit = function(e) {
        e.preventDefault();
        vendas.push({ id: Date.now(), cliente: nomeAtual, plano: document.getElementById('v-plano').value, valor: parseFloat(document.getElementById('v-valor').value), data: document.getElementById('v-data').value, receber: document.getElementById('v-receber').value });
        localStorage.setItem('vera_v11_ven', JSON.stringify(vendas));
        bootstrap.Modal.getInstance(document.getElementById('modalVenda')).hide();
        renderizarTudo();
    };

    function renderizarTudo() {
        const mes = document.getElementById('filtro-mes').value;
        const hoje = new Date().toISOString().split('T')[0];

        // 1. Vendas
        const tVendas = document.getElementById('corpo-vendas');
        tVendas.innerHTML = '';
        vendas.filter(v => v.data.split('-')[1] === mes).forEach(v => {
            tVendas.innerHTML += `<tr><td class="ps-4 small">${v.data.split('-').reverse().join('/')}</td><td class="fw-bold">${v.cliente}</td><td>${v.plano}</td><td class="text-success fw-bold">R$ ${v.valor.toFixed(2)}</td><td>${v.receber.split('-').reverse().join('/')}</td><td class="text-end pe-4"><button class="btn btn-link text-danger" onclick="delVen(${v.id})"><i class="fas fa-trash"></i></button></td></tr>`;
        });

        // 2. Clientes
        const busca = document.getElementById('busca-cli').value.toLowerCase();
        const tCli = document.getElementById('corpo-clientes');
        tCli.innerHTML = '';
        clientes.filter(c => c.nome.toLowerCase().includes(busca)).forEach((c, i) => {
            tCli.innerHTML += `<tr><td class="ps-4"><div class="table-index">${i+1}</div></td><td><img src="${c.foto}" class="foto-perfil"></td><td><strong>${c.nome}</strong></td><td class="text-center"><button class="btn btn-success btn-sm" onclick="lancarVenda('${c.nome}')">VENDER</button></td><td class="text-end pe-4"><button class="btn btn-danger btn-sm" onclick="delCli(${c.id})">APAGAR</button></td></tr>`;
        });

        // 3. CARDS A RECEBER (COM EFEITO PISCANTE)
        const cReceber = document.getElementById('cards-receber');
        cReceber.innerHTML = '';
        vendas.filter(v => v.receber > hoje).forEach(v => {
            cReceber.innerHTML += `
                <div class="col-md-4">
                    <div class="card p-3 card-piscante">
                        <div class="d-flex justify-content-between"><span class="small fw-bold">A RECEBER</span><i class="fas fa-exclamation-triangle text-danger"></i></div>
                        <h5 class="fw-bold mb-0">${v.cliente}</h5>
                        <h4 class="text-danger fw-bold">R$ ${v.valor.toFixed(2)}</h4>
                        <small>Data prevista: ${v.receber.split('-').reverse().join('/')}</small>
                    </div>
                </div>`;
        });

        // 4. Receita Anual
        const cRec = document.getElementById('cards-receita');
        cRec.innerHTML = '';
        ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"].forEach((m, i) => {
            const total = vendas.filter(v => parseInt(v.data.split('-')[1]) === i + 1).reduce((a, b) => a + b.valor, 0);
            cRec.innerHTML += `<div class="col-md-3"><div class="card card-receita p-3"><small>${m}</small><h5 class="fw-bold">R$ ${total.toFixed(2)}</h5></div></div>`;
        });
    }

    function delVen(id) { if(confirm("Remover venda?")) { vendas = vendas.filter(v => v.id !== id); localStorage.setItem('vera_v11_ven', JSON.stringify(vendas)); renderizarTudo(); } }
    function delCli(id) { if(confirm("Apagar cliente?")) { clientes = clientes.filter(c => c.id !== id); localStorage.setItem('vera_v11_cli', JSON.stringify(clientes)); renderizarTudo(); } }

    window.onload = renderizarTudo;
</script>
</body>
</html>
