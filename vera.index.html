<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --bg-claro: #fffdf2; 
            --accent: #f1c40f; 
            --sidebar-color: #2c3e50;
            --danger: #e74c3c;
        }
        body { background-color: var(--bg-claro); font-family: 'Segoe UI', sans-serif; color: #444; }
        .sidebar { background: var(--sidebar-color); min-height: 100vh; width: 260px; position: fixed; color: white; z-index: 1000; }
        .logo-area { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-area h2 { font-size: 2.4rem; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        .logo-area small { letter-spacing: 3px; text-transform: uppercase; font-size: 0.9rem; color: #ecf0f1; }
        
        .nav-link { color: #bdc3c7; margin: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: #2c3e50; }
        .main-content { margin-left: 260px; padding: 40px; }
        
        .card-caderno { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #f9f1c0; }
        .alerta-piscante { color: var(--danger); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .btn-flutuante { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; border-radius: 50%; font-size: 30px; border: none; background: var(--accent); color: #2c3e50; box-shadow: 0 8px 20px rgba(0,0,0,0.2); z-index: 999; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">
        <h2>VERA</h2>
        <small>Empreendedora</small>
    </div>
    <ul class="nav flex-column mt-4">
        <li class="nav-item"><a class="nav-link active" onclick="showSec('livro')"><i class="fas fa-list-ul me-2"></i> Livro de Vendas</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('receber')"><i class="fas fa-hand-holding-usd me-2"></i> A Receber</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('clientes')"><i class="fas fa-users me-2"></i> Meus Clientes</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <h3 id="page-title" class="fw-bold">Livro de Vendas</h3>
        <select id="filtro-mes" class="form-select w-auto shadow-sm" onchange="renderAll()">
            <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
            <option value="04" selected>Abril</option><option value="05">Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
            <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
    </header>

    <section id="sec-livro" class="card-caderno p-0 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Data</th>
                        <th>Cliente</th>
                        <th>Plano</th>
                        <th>Valor</th>
                        <th>Recebimento</th>
                        <th class="text-center">Ação</th>
                    </tr>
                </thead>
                <tbody id="corpo-vendas"></tbody>
            </table>
        </div>
    </section>

    <section id="sec-receber" class="d-none">
        <div class="row g-3" id="grid-receber"></div>
    </section>

    <section id="sec-clientes" class="d-none">
        <div class="row g-4" id="grid-clientes"></div>
    </section>
</div>

<button class="btn-flutuante" onclick="new bootstrap.Modal(document.getElementById('modalCli')).show()"><i class="fas fa-user-plus"></i></button>

<div class="modal fade" id="modalCli" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning"><h5 class="modal-title fw-bold">Novo Cliente</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form id="form-cli">
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Nome</label><input type="text" id="c-nome" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">WhatsApp</label><input type="tel" id="c-tel" class="form-control" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-warning w-100 fw-bold">SALVAR CLIENTE</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVen" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5 class="modal-title">Nova Venda para <span id="v-nome-cli"></span></h5></div>
            <form id="form-ven">
                <div class="modal-body row g-3">
                    <div class="col-12"><label class="form-label">Plano</label><input type="text" id="v-plano" class="form-control" placeholder="Ex: Hapvida" required></div>
                    <div class="col-md-6"><label class="form-label">Valor R$</label><input type="number" id="v-valor" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Data Venda</label><input type="date" id="v-data" class="form-control" required></div>
                    <div class="col-12"><label class="form-label text-danger fw-bold">Data para Receber</label><input type="date" id="v-receber" class="form-control border-danger" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">REGISTRAR VENDA</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        databaseURL: "https://veraempreendedora-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let clientes = [];
    let vendas = [];
    let cliSelecionado = "";

    // Sincronizar Clientes
    db.ref('clientes').on('value', snap => {
        clientes = [];
        snap.forEach(c => { clientes.push({id: c.key, ...c.val()}); });
        renderAll();
    });

    // Sincronizar Vendas
    db.ref('vendas').on('value', snap => {
        vendas = [];
        snap.forEach(v => { vendas.push({id: v.key, ...v.val()}); });
        renderAll();
    });

    function showSec(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-'+id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('page-title').innerText = event.currentTarget.innerText;
    }

    document.getElementById('form-cli').onsubmit = function(e) {
        e.preventDefault();
        db.ref('clientes').push({
            nome: document.getElementById('c-nome').value,
            tel: document.getElementById('c-tel').value
        });
        this.reset();
        bootstrap.Modal.getInstance(document.getElementById('modalCli')).hide();
    };

    function modalVenda(nome) {
        cliSelecionado = nome;
        document.getElementById('v-nome-cli').innerText = nome;
        new bootstrap.Modal(document.getElementById('modalVen')).show();
    }

    document.getElementById('form-ven').onsubmit = function(e) {
        e.preventDefault();
        db.ref('vendas').push({
            cliente: cliSelecionado,
            plano: document.getElementById('v-plano').value,
            valor: document.getElementById('v-valor').value,
            data: document.getElementById('v-data').value,
            receber: document.getElementById('v-receber').value
        });
        this.reset();
        bootstrap.Modal.getInstance(document.getElementById('modalVen')).hide();
    };

    function renderAll() {
        const mes = document.getElementById('filtro-mes').value;
        const hoje = new Date().toISOString().split('T')[0];

        // Render Livro
        const corpoVendas = document.getElementById('corpo-vendas');
        corpoVendas.innerHTML = '';
        vendas.filter(v => v.data.split('-')[1] === mes).forEach(v => {
            const isFuturo = v.receber > hoje;
            corpoVendas.innerHTML += `<tr>
                <td class="ps-4">${v.data.split('-').reverse().join('/')}</td>
                <td class="fw-bold">${v.cliente}</td>
                <td>${v.plano}</td>
                <td class="${isFuturo ? 'alerta-piscante' : 'fw-bold text-success'}">R$ ${v.valor}</td>
                <td class="${isFuturo ? 'text-danger fw-bold' : ''}">${v.receber.split('-').reverse().join('/')}</td>
                <td class="text-center"><button class="btn btn-sm text-danger" onclick="db.ref('vendas/${v.id}').remove()"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });

        // Render A Receber (Individual)
        const gridRec = document.getElementById('grid-receber');
        gridRec.innerHTML = '';
        vendas.filter(v => v.receber > hoje).forEach(v => {
            gridRec.innerHTML += `<div class="col-md-4">
                <div class="card p-3 border-0 shadow-sm border-start border-danger border-5">
                    <h6 class="fw-bold mb-1">${v.cliente}</h6>
                    <h5 class="alerta-piscante">R$ ${v.valor}</h5>
                    <small class="text-muted">Data: ${v.receber.split('-').reverse().join('/')}</small>
                </div>
            </div>`;
        });

        // Render Clientes
        const gridCli = document.getElementById('grid-clientes');
        gridCli.innerHTML = '';
        clientes.forEach(c => {
            gridCli.innerHTML += `<div class="col-md-3">
                <div class="card p-3 text-center shadow-sm border-0">
                    <div class="mx-auto bg-warning rounded-circle mb-2 d-flex align-items-center justify-content-center" style="width:50px;height:50px"><i class="fas fa-user text-white"></i></div>
                    <h6 class="fw-bold mb-0">${c.nome}</h6>
                    <small class="text-muted d-block mb-3">${c.tel}</small>
                    <div class="d-grid gap-2">
                        <button class="btn btn-sm btn-warning fw-bold" onclick="modalVenda('${c.nome}')">NOVA VENDA</button>
                        <button class="btn btn-sm btn-link text-danger text-decoration-none" onclick="if(confirm('Apagar cliente?')) db.ref('clientes/${c.id}').remove()">Apagar Cadastro</button>
                    </div>
                </div>
            </div>`;
        });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
