<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Fluxo Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a252f; --accent: #3498db; --success-green: #27ae60; --warning-red: #e74c3c; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        
        .sidebar { background: var(--primary); min-height: 100vh; width: 250px; position: fixed; color: white; z-index: 100; }
        .nav-link { color: #adb5bd; margin: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        .main-content { margin-left: 250px; padding: 40px; }
        .card-caderno { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; border-top: 5px solid var(--accent); }
        
        .table-index { width: 35px; height: 35px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); }
        
        .search-box { position: relative; max-width: 500px; margin-bottom: 20px; }
        .search-box i { position: absolute; left: 15px; top: 13px; color: #aaa; }
        .search-box input { padding-left: 45px; border-radius: 25px; height: 45px; border: 2px solid #ddd; }

        .btn-flutuante { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; border-radius: 50%; font-size: 28px; box-shadow: 0 5px 20px rgba(52, 152, 219, 0.4); z-index: 999; }
        
        .foto-mini { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }
        .ficha-foto { width: 120px; height: 120px; border-radius: 15px; object-fit: cover; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .badge-venda { cursor: pointer; transition: 0.2s; }
        .badge-venda:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column">
    <div class="p-4 text-center">
        <h3 class="fw-bold text-white mb-0">VERA</h3>
        <small class="text-info">EMPREENDEDORA</small>
    </div>
    <ul class="nav flex-column mt-4">
        <li class="nav-item"><a class="nav-link active" onclick="showSec('livro', this)"><i class="fas fa-book-open me-2"></i> Livro de Vendas</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('clientes', this)"><i class="fas fa-address-book me-2"></i> Livro de Clientes</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('receber', this)"><i class="fas fa-hand-holding-usd me-2"></i> Valores a Receber</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="header-title" class="fw-bold">Livro de Vendas</h2>
    </header>

    <section id="sec-livro" class="card-caderno">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Data</th>
                        <th>Cliente</th>
                        <th>Plano</th>
                        <th>Valor</th>
                        <th>Recebimento</th>
                        <th class="text-end pe-4">Ação</th>
                    </tr>
                </thead>
                <tbody id="lista-vendas"></tbody>
            </table>
        </div>
    </section>

    <section id="sec-clientes" class="d-none">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="busca-cli" class="form-control shadow-sm" placeholder="Buscar cliente..." oninput="renderAll()">
        </div>
        <div class="card-caderno">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">Nº</th>
                            <th>Foto</th>
                            <th>Nome do Cliente</th>
                            <th>WhatsApp</th>
                            <th class="text-center">Ações de Venda</th>
                            <th class="text-end pe-4">Ficha</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-clientes"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="sec-receber" class="d-none">
        <div class="row g-3" id="lista-receber"></div>
    </section>
</div>

<button class="btn btn-info text-white btn-flutuante" onclick="modalCli()" title="Cadastrar Novo Cliente">
    <i class="fas fa-user-plus"></i>
</button>

<div class="modal fade" id="modalCli" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Novo Cadastro de Cliente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="f-cli">
                <div class="modal-body row g-3">
                    <div class="col-md-4 text-center border-end">
                        <div class="bg-light rounded mb-2 d-flex align-items-center justify-content-center" style="height:150px; overflow:hidden">
                            <img id="p-img" src="" class="d-none w-100 h-100" style="object-fit:cover">
                            <i id="p-icon" class="fas fa-camera fa-3x text-muted"></i>
                        </div>
                        <input type="file" class="form-control form-control-sm" accept="image/*" onchange="readImg(this)">
                    </div>
                    <div class="col-md-8 row g-3">
                        <div class="col-12"><label class="form-label">Nome Completo</label><input type="text" id="n-cli" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="tel" id="t-cli" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">CPF</label><input type="text" id="d-cli" class="form-control"></div>
                        <div class="col-12"><label class="form-label">Endereço</label><input type="text" id="e-cli" class="form-control"></div>
                        <div class="col-12">
                            <label class="form-label">Dependentes (Até 4)</label>
                            <div class="row g-2">
                                <div class="col-6"><input type="text" id="dep1" class="form-control form-control-sm" placeholder="Dep. 1"></div>
                                <div class="col-6"><input type="text" id="dep2" class="form-control form-control-sm" placeholder="Dep. 2"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">SALVAR CLIENTE</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVen" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="fas fa-cart-plus me-2"></i>Venda para: <span id="v-nome"></span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="f-ven">
                <div class="modal-body row g-3">
                    <div class="col-12"><label class="form-label">Plano</label><select id="pv" class="form-select"><option>Hapvida</option><option>Unimed</option><option>Bradesco</option><option>Amil</option><option>SulAmérica</option></select></div>
                    <div class="col-6"><label class="form-label">Valor R$</label><input type="number" id="vv" class="form-control" required></div>
                    <div class="col-6"><label class="form-label">Data Venda</label><input type="date" id="dv" class="form-control" required></div>
                    <div class="col-12"><label class="form-label text-danger fw-bold">Data para Receber</label><input type="date" id="rv" class="form-control border-danger" required></div>
                    <div class="col-12"><label class="form-label">Forma de Pagamento</label><select id="fv" class="form-select"><option>Pix</option><option>Cartão</option><option>Boleto</option><option>Dinheiro</option></select></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-success w-100 fw-bold">CONFIRMAR E SALVAR VENDA</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalFicha" tabindex="-1">
    <div class="modal-dialog shadow-lg">
        <div class="modal-content border-0">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Ficha do Cliente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center" id="corpo-ficha"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let db_cli = JSON.parse(localStorage.getItem('vera_cli_final')) || [];
    let db_ven = JSON.parse(localStorage.getItem('vera_ven_final')) || [];
    let cli_atual = "";

    function showSec(id, el) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-'+id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('header-title').innerText = el.innerText;
        renderAll();
    }

    function readImg(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = e => {
                document.getElementById('p-img').src = e.target.result;
                document.getElementById('p-img').classList.remove('d-none');
                document.getElementById('p-icon').classList.add('d-none');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // CADASTRO CLIENTE
    document.getElementById('f-cli').onsubmit = function(e) {
        e.preventDefault();
        db_cli.push({
            id: Date.now(),
            nome: document.getElementById('n-cli').value,
            tel: document.getElementById('t-cli').value,
            doc: document.getElementById('d-cli').value,
            end: document.getElementById('e-cli').value,
            foto: document.getElementById('p-img').src,
            deps: [document.getElementById('dep1').value, document.getElementById('dep2').value].filter(d => d)
        });
        localStorage.setItem('vera_cli_final', JSON.stringify(db_cli));
        bootstrap.Modal.getInstance(document.getElementById('modalCli')).hide();
        renderAll();
    };

    // FUNÇÃO PARA ABRIR MODAL DE VENDA
    function novaVenda(nome) {
        cli_atual = nome;
        document.getElementById('v-nome').innerText = nome;
        // Fecha a ficha se estiver aberta para não sobrepor errado
        const mFicha = bootstrap.Modal.getInstance(document.getElementById('modalFicha'));
        if(mFicha) mFicha.hide();
        
        new bootstrap.Modal(document.getElementById('modalVen')).show();
    }

    // SALVAR VENDA
    document.getElementById('f-ven').onsubmit = function(e) {
        e.preventDefault();
        db_ven.push({
            id: Date.now(),
            cliente: cli_atual,
            plano: document.getElementById('pv').value,
            valor: parseFloat(document.getElementById('vv').value).toFixed(2),
            data: document.getElementById('dv').value,
            receber: document.getElementById('rv').value,
            forma: document.getElementById('fv').value
        });
        localStorage.setItem('vera_ven_final', JSON.stringify(db_ven));
        bootstrap.Modal.getInstance(document.getElementById('modalVen')).hide();
        showSec('livro', document.querySelector('.nav-link')); // Volta para o livro de vendas
        renderAll();
    };

    function verFicha(id) {
        const c = db_cli.find(x => x.id === id);
        document.getElementById('corpo-ficha').innerHTML = `
            <img src="${c.foto || 'https://via.placeholder.com/150'}" class="ficha-foto mb-3 shadow">
            <h4 class="fw-bold mb-0">${c.nome}</h4>
            <hr>
            <div class="text-start bg-light p-3 rounded">
                <p><strong>WhatsApp:</strong> ${c.tel}</p>
                <p><strong>CPF:</strong> ${c.doc || '---'}</p>
                <p><strong>Endereço:</strong> ${c.end || '---'}</p>
                <p><strong>Dependentes:</strong> ${c.deps.join(', ') || 'Nenhum'}</p>
            </div>
            <div class="d-grid gap-2 mt-3">
                <button class="btn btn-success" onclick="novaVenda('${c.nome}')"><i class="fas fa-cart-plus me-2"></i>EFETUAR VENDA AGORA</button>
                <button class="btn btn-outline-danger btn-sm" onclick="delCli(${c.id})">APAGAR CLIENTE</button>
            </div>
        `;
        new bootstrap.Modal(document.getElementById('modalFicha')).show();
    }

    function renderAll() {
        // Tabela de Clientes
        const busca = document.getElementById('busca-cli').value.toLowerCase();
        const tabela = document.getElementById('tabela-clientes');
        tabela.innerHTML = '';
        db_cli.filter(c => c.nome.toLowerCase().includes(busca)).forEach((c, index) => {
            tabela.innerHTML += `
                <tr>
                    <td class="ps-4"><div class="table-index">${index + 1}</div></td>
                    <td><img src="${c.foto || 'https://via.placeholder.com/45'}" class="foto-mini"></td>
                    <td><strong class="text-primary">${c.nome}</strong></td>
                    <td>${c.tel}</td>
                    <td class="text-center">
                        <button class="btn btn-success btn-sm fw-bold shadow-sm" onclick="novaVenda('${c.nome}')">
                            <i class="fas fa-dollar-sign me-1"></i> EFETUAR VENDA
                        </button>
                    </td>
                    <td class="text-end pe-4">
                        <button class="btn btn-outline-dark btn-sm" onclick="verFicha(${c.id})"><i class="fas fa-id-card"></i></button>
                    </td>
                </tr>`;
        });

        // Livro de Vendas
        const listaVendas = document.getElementById('lista-vendas');
        listaVendas.innerHTML = '';
        db_ven.sort((a,b) => new Date(b.data) - new Date(a.data)).forEach(v => {
            listaVendas.innerHTML += `
                <tr>
                    <td class="ps-4 small">${v.data.split('-').reverse().join('/')}</td>
                    <td><strong>${v.cliente}</strong></td>
                    <td>${v.plano}</td>
                    <td class="text-success fw-bold">R$ ${v.valor}</td>
                    <td>${v.receber.split('-').reverse().join('/')}</td>
                    <td class="text-end pe-4"><button class="btn btn-link text-danger" onclick="delVen(${v.id})"><i class="fas fa-trash"></i></button></td>
                </tr>`;
        });
    }

    function delVen(id) { if(confirm("Remover venda?")) { db_ven = db_ven.filter(x => x.id !== id); localStorage.setItem('vera_ven_final', JSON.stringify(db_ven)); renderAll(); } }
    function delCli(id) { if(confirm("Apagar cliente?")) { db_cli = db_cli.filter(x => x.id !== id); localStorage.setItem('vera_cli_final', JSON.stringify(db_cli)); bootstrap.Modal.getInstance(document.getElementById('modalFicha')).hide(); renderAll(); } }

    window.onload = renderAll;
</script>
</body>
</html>
