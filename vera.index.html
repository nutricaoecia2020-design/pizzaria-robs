<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Sistema Sincronizado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #1a252f; --vera-blue: #00a8ff; --bg-gray: #f4f7f6; --text-light: #adb5bd; }
        body { background-color: var(--bg-gray); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* Sidebar Estilo Foto 1 */
        .sidebar { background: var(--sidebar-bg); min-height: 100vh; width: 250px; position: fixed; color: white; z-index: 1000; transition: 0.3s; }
        .sidebar .logo-box { padding: 35px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar .logo-box h3 { font-weight: 800; margin: 0; letter-spacing: 1.5px; font-size: 24px; }
        .sidebar .logo-box small { color: var(--vera-blue); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        .nav-menu { padding: 25px 15px; }
        .nav-link { color: var(--text-light); padding: 14px 18px; display: flex; align-items: center; text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: var(--vera-blue); color: white; box-shadow: 0 4px 15px rgba(0, 168, 255, 0.3); }
        .nav-link i { width: 30px; font-size: 20px; }

        /* Conteúdo Principal */
        .main-content { margin-left: 250px; padding: 40px; min-height: 100vh; transition: 0.3s; }
        .header-title { margin-bottom: 35px; }
        .header-title h2 { font-weight: 800; color: #2c3e50; }

        /* Tabela Estilo Foto 2 */
        .table-container { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .table thead { background: #f8f9fa; border-bottom: 2px solid var(--vera-blue); }
        .table th { font-size: 11px; text-transform: uppercase; color: #95a5a6; padding: 18px; font-weight: 700; letter-spacing: 0.5px; }
        .table td { padding: 18px; font-size: 14px; color: #2c3e50; border-bottom: 1px solid #f8f9fa; }

        /* Cards Clientes Estilo Foto 4/6 */
        .card-cliente { background: white; border-radius: 20px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.04); padding: 25px; text-align: center; transition: 0.3s; height: 100%; position: relative; }
        .card-cliente:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
        .foto-perfil { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid #f8f9fa; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-cliente h5 { font-weight: 700; margin-bottom: 5px; color: #2c3e50; }
        .card-cliente .zap-link { color: #27ae60; text-decoration: none; font-size: 13px; font-weight: 600; display: block; margin-bottom: 10px; }
        .card-cliente .end-text { font-size: 12px; color: #7f8c8d; margin-bottom: 15px; min-height: 36px; }

        /* Cards Receber Estilo Foto 3 */
        @keyframes alert-pulsar { 0% { transform: scale(1); box-shadow: 0 0 0px rgba(231,76,60,0); } 50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(231,76,60,0.2); } 100% { transform: scale(1); box-shadow: 0 0 0px rgba(231,76,60,0); } }
        .card-pendente { border-left: 6px solid #e74c3c !important; animation: alert-pulsar 2s infinite; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .badge-pendente { background: #e74c3c; color: white; font-size: 10px; font-weight: 800; padding: 5px 10px; border-radius: 50px; }

        /* Botão Adicionar Foto 7 */
        .btn-add-main { position: fixed; bottom: 40px; right: 40px; width: 65px; height: 65px; border-radius: 50%; background: var(--vera-blue); color: white; border: none; font-size: 28px; box-shadow: 0 8px 25px rgba(0, 168, 255, 0.4); z-index: 1001; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-add-main:hover { transform: scale(1.1) rotate(90deg); background: #0097e6; }

        /* Ajustes Mobile */
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar .logo-box h3, .sidebar .logo-box small, .sidebar span { display: none; }
            .main-content { margin-left: 80px; padding: 20px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-box">
        <h3>VERA</h3>
        <small>Empreendedora</small>
    </div>
    <div class="nav-menu">
        <button class="nav-link active" onclick="navegar('vendas', this)"><i class="fas fa-list-ul"></i> <span>Livro de Vendas</span></button>
        <button class="nav-link" onclick="navegar('receber', this)"><i class="fas fa-clock"></i> <span>A Receber</span></button>
        <button class="nav-link" onclick="navegar('clientes', this)"><i class="fas fa-users"></i> <span>Clientes</span></button>
    </div>
</aside>

<main class="main-content">
    <div class="header-title d-flex justify-content-between align-items-center">
        <h2 id="titulo-pagina">Livro de Vendas</h2>
        <div class="d-flex gap-2">
            <select class="form-select rounded-pill border-0 shadow-sm" id="filtroMes" onchange="buscarDados()">
                <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
                <option value="04" selected>Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
        </div>
    </div>

    <section id="sec-vendas" class="table-container">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">Data Venda</th>
                        <th>Cliente</th>
                        <th>Plano/Tipo</th>
                        <th>Valor</th>
                        <th>Pagamento</th>
                        <th>Previsão Receber</th>
                        <th class="text-end pe-4">Ação</th>
                    </tr>
                </thead>
                <tbody id="listaVendas">
                    </tbody>
            </table>
        </div>
    </section>

    <section id="sec-receber" class="d-none">
        <div class="row g-4" id="listaReceber">
            </div>
    </section>

    <section id="sec-clientes" class="d-none">
        <div class="mb-4">
            <input type="text" class="form-control rounded-pill border-0 shadow-sm ps-4 py-2" id="buscaInput" placeholder="Pesquisar por nome do cliente..." oninput="buscarDados()">
        </div>
        <div class="row g-4" id="listaClientes">
            </div>
    </section>
</main>

<button class="btn-add-main" onclick="abrirModalCliente()"><i class="fas fa-plus"></i></button>

<div class="modal fade" id="modalCli" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-primary text-white border-0 py-3">
                <h5 class="modal-title fw-bold">Ficha de Cadastro Vera</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="formCliente">
                <div class="modal-body p-4 row g-3">
                    <div class="col-md-4 text-center border-end">
                        <div id="prev-container" class="rounded-4 mb-3 d-flex align-items-center justify-content-center bg-light" style="height: 180px; overflow: hidden; border: 2px dashed #ddd;">
                            <i class="fas fa-user-circle fa-5x text-muted" id="icon-prev"></i>
                        </div>
                        <input type="file" id="inpFoto" class="form-control form-control-sm" accept="image/*" onchange="previewImagem(this)">
                    </div>
                    <div class="col-md-8 row g-3">
                        <div class="col-12"><label class="small fw-bold">Nome Completo</label><input type="text" id="nome" class="form-control" required></div>
                        <div class="col-md-6"><label class="small fw-bold">WhatsApp</label><input type="tel" id="zap" class="form-control" required placeholder="(00) 00000-0000"></div>
                        <div class="col-md-6"><label class="small fw-bold">CPF</label><input type="text" id="cpf" class="form-control"></div>
                        <div class="col-12"><label class="small fw-bold">Endereço Completo</label><input type="text" id="end" class="form-control" required placeholder="Rua, Número, Bairro, Cidade"></div>
                        <div class="col-12 mt-2"><label class="small fw-bold text-primary">Dependentes (Opcional)</label></div>
                        <div class="col-6"><input type="text" id="dep1" class="form-control form-control-sm" placeholder="Dependente 1"></div>
                        <div class="col-6"><input type="text" id="dep2" class="form-control form-control-sm" placeholder="Dependente 2"></div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4"><button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-3">SALVAR NA NUVEM</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVenda" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header bg-success text-white py-3"><h5 class="modal-title fw-bold">Venda: <span id="vCliNome"></span></h5></div>
            <form id="formVenda">
                <div class="modal-body p-4 row g-3">
                    <div class="col-12"><label class="small fw-bold">Plano Escolhido</label><select id="vPlano" class="form-select"><option>Hapvida</option><option>Unimed</option><option>Bradesco</option><option>Amil</option><option>Outro</option></select></div>
                    <div class="col-6"><label class="small fw-bold">Valor da Venda R$</label><input type="number" step="0.01" id="vValor" class="form-control" required></div>
                    <div class="col-6"><label class="small fw-bold">Data da Venda</label><input type="date" id="vData" class="form-control" required></div>
                    <div class="col-12"><label class="small fw-bold text-danger">Data do Recebimento (Previsão)</label><input type="date" id="vRec" class="form-control border-danger" required></div>
                    <div class="col-12"><label class="small fw-bold">Meio de Pagamento</label><select id="vMeio" class="form-select"><option>Pix</option><option>Dinheiro</option><option>Cartão Crédito</option><option>Cartão Débito</option></select></div>
                </div>
                <div class="modal-footer border-0 p-4"><button type="submit" class="btn btn-success w-100 py-2 fw-bold">FINALIZAR VENDA</button></div>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // CONFIGURAÇÃO DO SEU FIREBASE (SUBSTITUA PELOS SEUS DADOS AQUI)
    const firebaseConfig = {
        apiKey: "COLE_SUA_API_KEY_AQUI",
        authDomain: "veraempreenderora.firebaseapp.com",
        databaseURL: "https://veraempreenderora-default-rtdb.firebaseio.com",
        projectId: "veraempreenderora",
        storageBucket: "veraempreenderora.appspot.com",
        messagingSenderId: "SEU_ID",
        appId: "SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // FUNÇÕES GLOBAIS PARA O SISTEMA
    window.buscarDados = () => {
        const mesFiltro = document.getElementById('filtroMes').value;
        const buscaCli = document.getElementById('buscaInput').value.toLowerCase();
        const hoje = new Date().toISOString().split('T')[0];

        // Carregar Clientes
        onValue(ref(db, 'clientes'), (snap) => {
            const container = document.getElementById('listaClientes');
            container.innerHTML = "";
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    const c = data[id];
                    if(c.nome.toLowerCase().includes(buscaCli)) {
                        container.innerHTML += `
                        <div class="col-md-4">
                            <div class="card-cliente">
                                <img src="${c.foto || 'https://via.placeholder.com/90'}" class="foto-perfil">
                                <h5>${c.nome}</h5>
                                <a href="https://wa.me/${c.zap.replace(/\D/g,'')}" target="_blank" class="zap-link"><i class="fab fa-whatsapp me-1"></i> ${c.zap}</a>
                                <div class="end-text"><i class="fas fa-map-marker-alt me-1"></i> ${c.end}</div>
                                <button class="btn btn-primary btn-sm w-100 rounded-pill mb-2 fw-bold" onclick="abrirVenda('${id}', '${c.nome}')">NOVA VENDA</button>
                                <button class="btn btn-link btn-sm text-danger text-decoration-none" onclick="excluir('clientes', '${id}')"><i class="fas fa-trash-alt"></i> Excluir</button>
                            </div>
                        </div>`;
                    }
                });
            }
        });

        // Carregar Vendas e "A Receber"
        onValue(ref(db, 'vendas'), (snap) => {
            const tBody = document.getElementById('listaVendas');
            const recBody = document.getElementById('listaReceber');
            tBody.innerHTML = ""; recBody.innerHTML = "";
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    const v = data[id];
                    // Tabela de Vendas (Filtro por mês)
                    if(v.dataVenda.split('-')[1] === mesFiltro) {
                        tBody.innerHTML += `
                        <tr>
                            <td class="ps-4">${v.dataVenda.split('-').reverse().join('/')}</td>
                            <td class="fw-bold">${v.clienteNome}</td>
                            <td><span class="badge bg-light text-dark border">${v.plano}</span></td>
                            <td class="fw-bold text-primary">R$ ${parseFloat(v.valor).toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                            <td><span class="badge bg-light text-dark border">${v.meio}</span></td>
                            <td class="text-danger fw-bold">${v.dataRec.split('-').reverse().join('/')}</td>
                            <td class="text-end pe-4"><button class="btn btn-link text-muted" onclick="excluir('vendas', '${id}')"><i class="fas fa-trash-alt"></i></button></td>
                        </tr>`;
                    }
                    // Aba "A Receber" (Somente o que vence hoje ou no futuro)
                    if(v.dataRec >= hoje) {
                        recBody.innerHTML += `
                        <div class="col-md-4">
                            <div class="card-pendente">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="fw-bold mb-0 text-dark">${v.clienteNome}</h6>
                                    <span class="badge-pendente">A RECEBER</span>
                                </div>
                                <h4 class="fw-bold text-danger mb-3">R$ ${parseFloat(v.valor).toLocaleString('pt-BR', {minimumFractionDigits:2})}</h4>
                                <div class="small text-muted"><i class="fas fa-calendar-check me-2"></i>Vencimento: <strong>${v.dataRec.split('-').reverse().join('/')}</strong></div>
                                <div class="small text-muted mt-1"><i class="fas fa-tag me-2"></i>Plano: ${v.plano}</div>
                            </div>
                        </div>`;
                    }
                });
            }
        });
    };

    // Salvar Cliente
    document.getElementById('formCliente').onsubmit = (e) => {
        e.preventDefault();
        const obj = {
            nome: document.getElementById('nome').value,
            zap: document.getElementById('zap').value,
            cpf: document.getElementById('cpf').value,
            end: document.getElementById('end').value,
            dep1: document.getElementById('dep1').value,
            dep2: document.getElementById('dep2').value,
            foto: window.currentFoto || ""
        };
        push(ref(db, 'clientes'), obj).then(() => {
            bootstrap.Modal.getInstance(document.getElementById('modalCli')).hide();
            e.target.reset();
            document.getElementById('prev-container').innerHTML = `<i class="fas fa-user-circle fa-5x text-muted"></i>`;
        });
    };

    // Salvar Venda
    document.getElementById('formVenda').onsubmit = (e) => {
        e.preventDefault();
        const obj = {
            clienteId: window.currentCliId,
            clienteNome: document.getElementById('vCliNome').innerText,
            plano: document.getElementById('vPlano').value,
            valor: document.getElementById('vValor').value,
            dataVenda: document.getElementById('vData').value,
            dataRec: document.getElementById('vRec').value,
            meio: document.getElementById('vMeio').value
        };
        push(ref(db, 'vendas'), obj).then(() => {
            bootstrap.Modal.getInstance(document.getElementById('modalVenda')).hide();
            e.target.reset();
        });
    };

    window.excluir = (caminho, id) => { if(confirm("Deseja apagar esse registro permanentemente?")) remove(ref(db, `${caminho}/${id}`)); };

    window.onload = buscarDados;
</script>

<script>
    function navegar(aba, btn) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-'+aba).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        const titulos = {vendas: "Livro de Vendas", receber: "Valores a Receber", clientes: "Livro de Clientes"};
        document.getElementById('titulo-pagina').innerText = titulos[aba];
    }

    function abrirModalCliente() { new bootstrap.Modal(document.getElementById('modalCli')).show(); }
    
    function abrirVenda(id, nome) {
        window.currentCliId = id;
        document.getElementById('vCliNome').innerText = nome;
        new bootstrap.Modal(document.getElementById('modalVenda')).show();
    }

    function previewImagem(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('prev-container').innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                window.currentFoto = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
