<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Gestão Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a252f; --accent: #3498db; --warning-red: #e74c3c; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        
        /* Sidebar Estilo Escuro Original */
        .sidebar { background: var(--primary); min-height: 100vh; width: 260px; position: fixed; color: white; z-index: 100; }
        .logo-area { padding: 35px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-area h2 { font-size: 2rem; font-weight: 900; color: #fff; margin-bottom: 0; }
        .logo-area span { color: var(--accent); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }

        .nav-link { color: #adb5bd; margin: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        .main-content { margin-left: 260px; padding: 40px; }
        .card-caderno { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid var(--accent); }
        
        /* Alerta Piscante que você pediu */
        .alerta-piscante {
            color: var(--warning-red);
            font-weight: bold;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .btn-excluir { color: #bdc3c7; transition: 0.3s; border: none; background: none; }
        .btn-excluir:hover { color: var(--warning-red); transform: scale(1.1); }
        
        .btn-flutuante { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; border-radius: 50%; font-size: 28px; box-shadow: 0 5px 20px rgba(52, 152, 219, 0.4); z-index: 999; background: var(--accent); color: white; border: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">
        <h2>VERA</h2>
        <span>EMPREENDEDORA</span>
    </div>
    <ul class="nav flex-column mt-4">
        <li class="nav-item"><a class="nav-link active" onclick="showSec('livro')"><i class="fas fa-book-open me-2"></i> Livro de Vendas</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('receber')"><i class="fas fa-hand-holding-usd me-2"></i> A Receber Depois</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('clientes')"><i class="fas fa-users-cog me-2"></i> Gerenciar Clientes</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <h2 id="header-title" class="fw-bold">Livro de Registro</h2>
        <select id="filtro-mes" class="form-select w-auto shadow-sm" onchange="renderAll()">
            <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
            <option value="04" selected>Abril</option><option value="05">Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
            <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
    </header>

    <section id="sec-livro" class="card-caderno">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Data Venda</th>
                        <th>Cliente</th>
                        <th>Plano/Tipo</th>
                        <th>Valor</th>
                        <th>Previsão Recebimento</th>
                        <th class="text-end pe-4">Ação</th>
                    </tr>
                </thead>
                <tbody id="lista-vendas"></tbody>
            </table>
        </div>
    </section>

    <section id="sec-receber" class="d-none">
        <div class="row g-3" id="lista-cards-receber"></div>
    </section>

    <section id="sec-clientes" class="d-none">
        <div class="row g-4" id="grid-clientes"></div>
    </section>
</div>

<button class="btn-flutuante" onclick="modalCli()"><i class="fas fa-user-plus"></i></button>

<div class="modal fade" id="modalCli" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5 class="modal-title">Novo Cliente</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form id="f-cli">
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Nome Completo</label><input type="text" id="n-cli" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">WhatsApp</label><input type="tel" id="t-cli" class="form-control" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">CADASTRAR CLIENTE</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVen" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-info text-white"><h5 class="modal-title">Venda: <span id="v-nome"></span></h5></div>
            <form id="f-ven">
                <div class="modal-body row g-3">
                    <div class="col-12"><label class="form-label">Plano</label><input type="text" id="pv" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Valor R$</label><input type="number" id="vv" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Data Venda</label><input type="date" id="dv" class="form-control" required></div>
                    <div class="col-12"><label class="form-label text-danger">Data do Recebimento</label><input type="date" id="rv" class="form-control border-danger" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-success w-100">SALVAR VENDA NO BANCO</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://veraempreendedora-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let clientes = [];
    let vendas = [];
    let cliAtual = "";

    // Sincronizar Dados
    db.ref('clientes').on('value', snap => {
        clientes = [];
        snap.forEach(c => { clientes.push({id: c.key, ...c.val()}); });
        renderAll();
    });

    db.ref('vendas').on('value', snap => {
        vendas = [];
        snap.forEach(v => { vendas.push({id: v.key, ...v.val()}); });
        renderAll();
    });

    function showSec(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-'+id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderAll();
    }

    function modalCli() { new bootstrap.Modal(document.getElementById('modalCli')).show(); }

    document.getElementById('f-cli').onsubmit = function(e) {
        e.preventDefault();
        db.ref('clientes').push({
            nome: document.getElementById('n-cli').value,
            tel: document.getElementById('t-cli').value
        });
        this.reset();
        bootstrap.Modal.getInstance(document.getElementById('modalCli')).hide();
    };

    function abrirVenda(nome) {
        cliAtual = nome;
        document.getElementById('v-nome').innerText = nome;
        new bootstrap.Modal(document.getElementById('modalVen')).show();
    }

    document.getElementById('f-ven').onsubmit = function(e) {
        e.preventDefault();
        db.ref('vendas').push({
            cliente: cliAtual,
            plano: document.getElementById('pv').value,
            valor: document.getElementById('vv').value,
            data: document.getElementById('dv').value,
            receber: document.getElementById('rv').value
        });
        this.reset();
        bootstrap.Modal.getInstance(document.getElementById('modalVen')).hide();
    };

    function renderAll() {
        const mes = document.getElementById('filtro-mes').value;
        const hoje = new Date().toISOString().split('T')[0];
        
        // Tabela Vendas
        const lista = document.getElementById('lista-vendas');
        lista.innerHTML = '';
        vendas.filter(v => v.data.split('-')[1] === mes).forEach(v => {
            const isFuturo = v.receber > hoje;
            lista.innerHTML += `
            <tr>
                <td class="ps-4">${v.data.split('-').reverse().join('/')}</td>
                <td class="fw-bold">${v.cliente}</td>
                <td>${v.plano}</td>
                <td class="${isFuturo ? 'alerta-piscante' : 'fw-bold text-success'}">
                    ${isFuturo ? '⚠️ ' : ''} R$ ${v.valor}
                </td>
                <td class="${isFuturo ? 'text-danger fw-bold' : ''}">${v.receber.split('-').reverse().join('/')}</td>
                <td class="text-end pe-4"><button class="btn-excluir" onclick="db.ref('vendas/${v.id}').remove()"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });

        // Aba A Receber Individual
        const gridRec = document.getElementById('lista-cards-receber');
        gridRec.innerHTML = '';
        vendas.filter(v => v.receber > hoje).forEach(v => {
            gridRec.innerHTML += `
            <div class="col-md-4">
                <div class="card p-3 border-0 shadow-sm border-start border-danger border-5">
                    <h6 class="fw-bold mb-1">${v.cliente}</h6>
                    <h5 class="alerta-piscante">R$ ${v.valor}</h5>
                    <small class="text-muted">Receber dia: ${v.receber.split('-').reverse().join('/')}</small>
                </div>
            </div>`;
        });

        // Aba Clientes com Opção de Apagar e Vender
        const gridCli = document.getElementById('grid-clientes');
        gridCli.innerHTML = '';
        clientes.forEach(c => {
            gridCli.innerHTML += `
            <div class="col-md-3">
                <div class="card border-0 shadow-sm p-3 text-center">
                    <div class="mx-auto bg-primary rounded-circle mb-2 d-flex align-items-center justify-content-center" style="width:50px;height:50px"><i class="fas fa-user text-white"></i></div>
                    <h6 class="fw-bold mb-0">${c.nome}</h6>
                    <small class="text-muted d-block mb-3">${c.tel}</small>
                    <div class="d-grid gap-2">
                        <button class="btn btn-sm btn-info text-white fw-bold" onclick="abrirVenda('${c.nome}')">NOVA VENDA</button>
                        <button class="btn btn-sm btn-link text-danger text-decoration-none" onclick="if(confirm('Apagar cliente?')) db.ref('clientes/${c.id}').remove()">Apagar Cadastro</button>
                    </div>
                </div>
            </div>`;
        });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
