<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Fluxo Pro Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a252f; --accent: #3498db; --warning-red: #e74c3c; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: var(--primary); min-height: 100vh; width: 250px; position: fixed; color: white; z-index: 100; }
        .nav-link { color: #adb5bd; margin: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        .main-content { margin-left: 250px; padding: 40px; }
        .card-caderno { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid var(--accent); }
        .foto-perfil { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; background: #eee; }
        .dep-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .alerta-piscante { color: var(--warning-red); font-weight: bold; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .btn-flutuante { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; border-radius: 50%; font-size: 28px; z-index: 999; }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column">
    <div class="p-4 text-center">
        <h3 class="fw-bold text-white mb-0">VERA</h3>
        <small class="text-info">GESTÃO DE VENDAS</small>
    </div>
    <ul class="nav flex-column mt-4">
        <li class="nav-item"><a class="nav-link active" onclick="showSec('livro')"><i class="fas fa-book-open me-2"></i> Livro de Registro</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('receber')"><i class="fas fa-hand-holding-usd me-2"></i> Valores a Receber</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('clientes')"><i class="fas fa-users-cog me-2"></i> Gerenciar Clientes</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <h2 id="header-title" class="fw-bold">Livro de Registro</h2>
        <select id="filtro-mes" class="form-select shadow-sm" style="width: 150px;" onchange="renderAll()">
            <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
            <option value="04" selected>Abril</option><option value="05">Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
            <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
    </header>

    <section id="sec-livro" class="card-caderno">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Data Venda</th>
                        <th>Cliente</th>
                        <th>Plano</th>
                        <th>Valor</th>
                        <th>Pagamento</th>
                        <th>Previsão</th>
                        <th class="text-end pe-4">Ação</th>
                    </tr>
                </thead>
                <tbody id="lista-vendas"></tbody>
            </table>
        </div>
    </section>

    <section id="sec-receber" class="d-none">
        <div class="row g-3" id="lista-cards-receber"></div>
    </section>

    <section id="sec-clientes" class="d-none">
        <div class="row g-4" id="grid-clientes"></div>
    </section>
</div>

<button class="btn btn-info text-white btn-flutuante shadow" onclick="modalCli()"><i class="fas fa-user-plus"></i></button>

<div class="modal fade" id="modalCli" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content border-0">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">FICHA COMPLETA DO BENEFICIÁRIO</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="f-cli">
                <div class="modal-body p-4">
                    <div class="row g-3 mb-4">
                        <div class="col-md-3 text-center border-end">
                            <div class="bg-light border rounded mb-2 d-flex align-items-center justify-content-center" style="height:160px; overflow:hidden;">
                                <img id="p-img" src="" class="d-none w-100 h-100" style="object-fit:cover">
                                <i id="p-icon" class="fas fa-camera fa-3x text-muted"></i>
                            </div>
                            <input type="file" id="up-foto" class="d-none" accept="image/*" onchange="readImg(this)">
                            <button type="button" class="btn btn-sm btn-dark" onclick="document.getElementById('up-foto').click()">Alterar Foto</button>
                        </div>
                        <div class="col-md-9 row g-3">
                            <div class="col-md-8"><label class="form-label">Nome Titular</label><input type="text" id="n-cli" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">WhatsApp</label><input type="tel" id="t-cli" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">CPF/CNPJ</label><input type="text" id="d-cli" class="form-control"></div>
                            <div class="col-md-4"><label class="form-label">Nascimento</label><input type="date" id="na-cli" class="form-control"></div>
                            <div class="col-md-4"><label class="form-label">Estado Civil</label><select id="e-cli" class="form-select"><option>Casado(a)</option><option>Solteiro(a)</option><option>Divorciado(a)</option></select></div>
                            <div class="col-12"><label class="form-label">Endereço Completo</label><input type="text" id="en-cli" class="form-control"></div>
                        </div>
                    </div>

                    <h6 class="fw-bold text-primary border-bottom pb-2 mb-3"><i class="fas fa-users me-2"></i>DADOS DOS DEPENDENTES (OPCIONAL)</h6>
                    <div class="row g-2">
                        <script>
                            for(let i=1; i<=4; i++) {
                                document.write(`
                                    <div class="col-md-6">
                                        <div class="dep-box">
                                            <small class="fw-bold text-info">DEPENDENTE 0${i}</small>
                                            <input type="text" id="d${i}-n" class="form-control form-control-sm mb-1" placeholder="Nome Completo">
                                            <div class="row g-1">
                                                <div class="col-6"><input type="text" id="d${i}-c" class="form-control form-control-sm" placeholder="CPF"></div>
                                                <div class="col-6"><input type="text" id="d${i}-p" class="form-control form-control-sm" placeholder="Parentesco"></div>
                                            </div>
                                        </div>
                                    </div>
                                `);
                            }
                        </script>
                    </div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100 py-3 fw-bold">SALVAR FICHA COMPLETA</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Link direto do seu Firebase mostrado na imagem
    const firebaseConfig = { databaseURL: "https://veraempreendedora-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let db_cli = {}, db_ven = {};

    // Sincronização em tempo real: Se mudar no banco, muda na tela
    db.ref().on('value', snap => {
        const data = snap.val();
        db_cli = data?.clientes || {};
        db_ven = data?.vendas || {};
        renderAll();
    });

    function showSec(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-'+id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function readImg(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = e => {
                document.getElementById('p-img').src = e.target.result;
                document.getElementById('p-img').classList.remove('d-none');
                document.getElementById('p-icon').classList.add('d-none');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function modalCli() { 
        document.getElementById('f-cli').reset();
        document.getElementById('p-img').classList.add('d-none');
        document.getElementById('p-icon').classList.remove('d-none');
        new bootstrap.Modal(document.getElementById('modalCli')).show(); 
    }

    // FUNÇÃO QUE SALVA DE VERDADE NO FIREBASE
    document.getElementById('f-cli').onsubmit = function(e) {
        e.preventDefault();
        const id = Date.now();
        const deps = [];
        for(let i=1; i<=4; i++) {
            const n = document.getElementById(`d${i}-n`).value;
            if(n) deps.push({ nome: n, cpf: document.getElementById(`d${i}-c`).value, par: document.getElementById(`d${i}-p`).value });
        }

        const payload = {
            id,
            nome: document.getElementById('n-cli').value,
            tel: document.getElementById('t-cli').value,
            doc: document.getElementById('d-cli').value,
            nasc: document.getElementById('na-cli').value,
            est: document.getElementById('e-cli').value,
            end: document.getElementById('en-cli').value,
            foto: document.getElementById('p-img').src || "",
            dependentes: deps
        };

        // Grava no caminho /clientes/ID
        db.ref('clientes/' + id).set(payload).then(() => {
            bootstrap.Modal.getInstance(document.getElementById('modalCli')).hide();
            alert("Cliente salvo com sucesso na nuvem!");
        }).catch(err => alert("Erro ao salvar: " + err));
    };

    function renderAll() {
        const gridCli = document.getElementById('grid-clientes');
        gridCli.innerHTML = '';
        Object.values(db_cli).forEach(c => {
            gridCli.innerHTML += `
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 text-center h-100">
                        <img src="${c.foto || 'https://via.placeholder.com/80'}" class="foto-perfil mx-auto mb-2 shadow-sm">
                        <h6 class="fw-bold mb-1 text-uppercase">${c.nome}</h6>
                        <p class="text-muted small mb-3">${c.tel}</p>
                        <div class="d-grid gap-2">
                            <button class="btn btn-sm btn-outline-info" onclick="alert('Funcionalidade de venda em breve')">NOVA VENDA</button>
                            <button class="btn btn-sm btn-light text-danger border-0" onclick="delCli('${c.id}')"><i class="fas fa-trash me-1"></i> APAGAR</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function delCli(id) { if(confirm("Apagar cliente?")) db.ref('clientes/'+id).remove(); }
</script>
</body>
</html>
