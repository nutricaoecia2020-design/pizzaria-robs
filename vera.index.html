<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Gestão Profissional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --sidebar-bg: #2c3e50; 
            --accent-blue: #3498db; 
            --success-green: #2ecc71;
            --warning-orange: #f39c12;
            --danger-red: #e74c3c;
        }
        
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* Sidebar conforme o Print */
        .sidebar { background: var(--sidebar-bg); min-height: 100vh; width: 260px; position: fixed; color: white; z-index: 1000; }
        .logo-area { padding: 40px 20px; text-align: center; }
        .logo-area h2 { font-weight: 900; letter-spacing: 2px; margin: 0; color: #fff; }
        .logo-area small { color: var(--accent-blue); text-transform: uppercase; font-size: 0.75rem; font-weight: bold; }

        .nav-link { color: #bdc3c7; padding: 12px 25px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; }
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: var(--accent-blue); border-left: 4px solid var(--accent-blue); }

        .main-content { margin-left: 260px; padding: 30px; }

        /* Cards de Resumo (Painel) */
        .card-stat { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #ccc; height: 100%; }
        .card-stat.vendas { border-left-color: var(--accent-blue); }
        .card-stat.clientes { border-left-color: var(--success-green); }
        .card-stat.receber { border-left-color: var(--warning-orange); }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: #7f8c8d; font-weight: bold; }
        .stat-value { font-size: 1.8rem; font-weight: 800; margin-top: 5px; }

        /* Estilo dos Cards de Clientes (Fichas) */
        .client-card { background: white; border-radius: 15px; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .client-card:hover { transform: translateY(-5px); }
        .client-img { width: 80px; height: 80px; border-radius: 50%; background: #eee; margin: 0 auto 15px; object-fit: cover; border: 3px solid #f8f9fa; }
        
        /* Alerta Piscante */
        .piscante { color: var(--danger-red); font-weight: bold; animation: blink 1.2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .btn-main { background: var(--accent-blue); color: white; border: none; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .btn-main:hover { background: #2980b9; transform: scale(1.02); }
        .btn-add { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent-blue); color: white; font-size: 24px; border: none; box-shadow: 0 5px 15px rgba(52,152,219,0.4); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">
        <h2>VERA</h2>
        <small>Empreendedora</small>
    </div>
    <nav class="mt-4">
        <a class="nav-link active" onclick="showSec('painel')"><i class="fas fa-chart-line"></i> Painel</a>
        <a class="nav-link" onclick="showSec('clientes')"><i class="fas fa-users"></i> Clientes</a>
        <a class="nav-link" onclick="showSec('vendas')"><i class="fas fa-file-invoice-dollar"></i> Vendas</a>
    </nav>
</div>

<div class="main-content">
    <section id="sec-painel">
        <h3 class="fw-bold mb-4">Painel de Controle</h3>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card-stat vendas">
                    <div class="stat-label">Vendas do Mês</div>
                    <div class="stat-value text-dark" id="resumo-vendas">R$ 0,00</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat clientes">
                    <div class="stat-label">Clientes Ativos</div>
                    <div class="stat-value text-dark" id="resumo-clientes">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat receber">
                    <div class="stat-label">A Receber</div>
                    <div class="stat-value text-warning" id="resumo-receber">R$ 0,00</div>
                </div>
            </div>
        </div>
    </section>

    <section id="sec-clientes" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">Fichas de Clientes</h3>
            <button class="btn btn-main px-4" data-bs-toggle="modal" data-bs-target="#modalCliente"><i class="fas fa-plus me-2"></i> Novo Cadastro</button>
        </div>
        <div class="row g-4" id="lista-clientes">
            </div>
    </section>

    <section id="sec-vendas" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">Livro de Registro</h3>
            <select id="filtro-mes" class="form-select w-auto shadow-sm" onchange="renderVendas()">
                <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
                <option value="04" selected>Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
        </div>
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4">Data</th>
                        <th>Cliente</th>
                        <th>Plano</th>
                        <th>Valor</th>
                        <th>Pagamento</th>
                        <th>Recebimento</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela-vendas"></tbody>
            </table>
        </div>
    </section>
</div>

<div class="modal fade" id="modalCliente" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold">Novo Cadastro de Cliente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="form-cliente">
                <div class="modal-body row g-3">
                    <div class="col-md-12"><label class="form-label">Nome Completo</label><input type="text" id="c-nome" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">WhatsApp (Telefone)</label><input type="tel" id="c-tel" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">E-mail</label><input type="email" id="c-mail" class="form-control"></div>
                    <div class="col-12"><label class="form-label">Endereço Completo</label><input type="text" id="c-end" class="form-control"></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-main w-100 py-3">SALVAR CLIENTE NO BANCO</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVenda" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-success text-white"><h5 class="modal-title">Efetuar Venda: <span id="v-nome-cli"></span></h5></div>
            <form id="form-venda">
                <div class="modal-body row g-3">
                    <div class="col-12"><label class="form-label">Plano / Tipo de Serviço</label><input type="text" id="v-plano" class="form-control" placeholder="Ex: Hapvida" required></div>
                    <div class="col-md-6"><label class="form-label">Valor R$</label><input type="number" id="v-valor" class="form-control" step="0.01" required></div>
                    <div class="col-md-6"><label class="form-label">Forma de Pagamento</label>
                        <select id="v-pag" class="form-select"><option>Pix</option><option>Cartão</option><option>Dinheiro</option></select>
                    </div>
                    <div class="col-md-6"><label class="form-label">Data da Venda</label><input type="date" id="v-data" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label text-danger fw-bold">Data de Recebimento</label><input type="date" id="v-receber" class="form-control border-danger" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-success w-100">CONFIRMAR VENDA</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Configuração do seu Banco de Dados
    const firebaseConfig = { databaseURL: "https://veraempreendedora-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let listagemClientes = [];
    let listagemVendas = [];
    let clienteSelecionadoParaVenda = "";

    // ESCUTAR BANCO DE DADOS
    db.ref('clientes').on('value', snap => {
        listagemClientes = [];
        snap.forEach(item => { listagemClientes.push({id: item.key, ...item.val()}); });
        renderAll();
    });

    db.ref('vendas').on('value', snap => {
        listagemVendas = [];
        snap.forEach(item => { listagemVendas.push({id: item.key, ...item.val()}); });
        renderAll();
    });

    // Mudar de Seção
    function showSec(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-'+id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // Salvar Novo Cliente
    document.getElementById('form-cliente').onsubmit = function(e) {
        e.preventDefault();
        const novo = {
            nome: document.getElementById('c-nome').value,
            tel: document.getElementById('c-tel').value,
            email: document.getElementById('c-mail').value,
            endereco: document.getElementById('c-end').value
        };
        db.ref('clientes').push(novo);
        this.reset();
        bootstrap.Modal.getInstance(document.getElementById('modalCliente')).hide();
    };

    // Abrir Modal de Venda
    function abrirModalVenda(nome) {
        clienteSelecionadoParaVenda = nome;
        document.getElementById('v-nome-cli').innerText = nome;
        new bootstrap.Modal(document.getElementById('modalVenda')).show();
    }

    // Salvar Venda
    document.getElementById('form-venda').onsubmit = function(e) {
        e.preventDefault();
        const venda = {
            cliente: clienteSelecionadoParaVenda,
            plano: document.getElementById('v-plano').value,
            valor: parseFloat(document.getElementById('v-valor').value),
            pagamento: document.getElementById('v-pag').value,
            data: document.getElementById('v-data').value,
            receber: document.getElementById('v-receber').value
        };
        db.ref('vendas').push(venda);
        this.reset();
        bootstrap.Modal.getInstance(document.getElementById('modalVenda')).hide();
    };

    function renderAll() {
        const hoje = new Date().toISOString().split('T')[0];
        
        // Renderizar Painel
        document.getElementById('resumo-clientes').innerText = listagemClientes.length;
        
        const totalVendido = listagemVendas.reduce((acc, v) => acc + v.valor, 0);
        document.getElementById('resumo-vendas').innerText = `R$ ${totalVendido.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

        const totalAReceber = listagemVendas.filter(v => v.receber > hoje).reduce((acc, v) => acc + v.valor, 0);
        document.getElementById('resumo-receber').innerText = `R$ ${totalAReceber.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

        // Renderizar Cards de Clientes
        const containerCli = document.getElementById('lista-clientes');
        containerCli.innerHTML = '';
        listagemClientes.forEach(c => {
            containerCli.innerHTML += `
            <div class="col-md-4">
                <div class="card client-card p-4 text-center">
                    <div class="client-img d-flex align-items-center justify-content-center bg-light">
                        <i class="fas fa-user fa-2x text-secondary"></i>
                    </div>
                    <h5 class="fw-bold mb-1">${c.nome}</h5>
                    <p class="text-muted small mb-3"><i class="fas fa-map-marker-alt me-1"></i> ${c.endereco || 'Sem endereço'}</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-primary btn-sm fw-bold" onclick="abrirModalVenda('${c.nome}')">EFETUAR VENDA</button>
                        <button class="btn btn-light btn-sm text-secondary" onclick="alert('Email: ${c.email}\\nTel: ${c.tel}')">VER FICHA COMPLETA</button>
                        <button class="btn btn-link btn-sm text-danger text-decoration-none" onclick="if(confirm('Apagar cliente?')) db.ref('clientes/${c.id}').remove()">Excluir Cadastro</button>
                    </div>
                </div>
            </div>`;
        });

        renderVendas();
    }

    function renderVendas() {
        const mes = document.getElementById('filtro-mes').value;
        const hoje = new Date().toISOString().split('T')[0];
        const corpo = document.getElementById('corpo-tabela-vendas');
        corpo.innerHTML = '';

        listagemVendas.filter(v => v.data.split('-')[1] === mes).forEach(v => {
            const futuro = v.receber > hoje;
            corpo.innerHTML += `
            <tr class="border-bottom">
                <td class="ps-4 small">${v.data.split('-').reverse().join('/')}</td>
                <td class="fw-bold">${v.cliente}</td>
                <td><span class="badge bg-info-subtle text-info px-3">${v.plano}</span></td>
                <td class="fw-bold ${futuro ? 'piscante' : 'text-success'}">R$ ${v.valor.toFixed(2)}</td>
                <td>${v.pagamento}</td>
                <td class="${futuro ? 'text-danger fw-bold' : ''}">${v.receber.split('-').reverse().join('/')}</td>
                <td class="text-center">
                    <button class="btn btn-sm text-danger" onclick="db.ref('vendas/${v.id}').remove()"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
