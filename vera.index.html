<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Fluxo Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a252f; --accent: #3498db; --warning-red: #e74c3c; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        
        .sidebar { background: var(--primary); min-height: 100vh; width: 250px; position: fixed; color: white; z-index: 100; }
        .nav-link { color: #adb5bd; margin: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        .main-content { margin-left: 250px; padding: 40px; }
        .card-caderno { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid var(--accent); }
        
        .alerta-piscante {
            color: var(--warning-red);
            font-weight: bold;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .foto-perfil { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #eee; }
        .btn-excluir { color: #bdc3c7; transition: 0.3s; border: none; background: none; }
        .btn-excluir:hover { color: var(--warning-red); transform: scale(1.1); }
        
        .btn-flutuante { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; border-radius: 50%; font-size: 28px; box-shadow: 0 5px 20px rgba(52, 152, 219, 0.4); z-index: 999; }
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column">
    <div class="p-4 text-center">
        <h3 class="fw-bold text-white mb-0">VERA</h3>
        <small class="text-info tracking-widest">EMPREENDEDORA</small>
    </div>
    <ul class="nav flex-column mt-4">
        <li class="nav-item"><a class="nav-link active" onclick="showSec('livro')"><i class="fas fa-book-open me-2"></i> Livro de Vendas</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('receber')"><i class="fas fa-hand-holding-usd me-2"></i> Valores a Receber</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('clientes')"><i class="fas fa-users-cog me-2"></i> Gerenciar Clientes</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <h2 id="header-title" class="fw-bold">Livro de Registro</h2>
        <div class="d-flex gap-2">
            <select id="filtro-mes" class="form-select border-0 shadow-sm" onchange="renderAll()">
                <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
                <option value="04" selected>Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
        </div>
    </header>

    <section id="sec-livro" class="card-caderno">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Data Venda</th>
                        <th>Cliente</th>
                        <th>Plano/Tipo</th>
                        <th>Valor</th>
                        <th>Pagamento</th>
                        <th>Previsão Recebimento</th>
                        <th class="text-end pe-4">Ação</th>
                    </tr>
                </thead>
                <tbody id="lista-vendas"></tbody>
            </table>
        </div>
    </section>

    <section id="sec-receber" class="d-none">
        <div class="alert alert-info border-0 shadow-sm mb-4">
            <i class="fas fa-info-circle me-2"></i> Estes são os valores com recebimento agendado para datas futuras.
        </div>
        <div class="row g-3" id="lista-cards-receber"></div>
    </section>

    <section id="sec-clientes" class="d-none">
        <div class="row g-4" id="grid-clientes"></div>
    </section>
</div>

<button class="btn btn-info text-white btn-flutuante" onclick="modalCli()" title="Cadastrar Novo Cliente">
    <i class="fas fa-user-plus"></i>
</button>

<div class="modal fade" id="modalCli" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Nova Ficha do Cliente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="f-cli">
                <div class="modal-body row g-3">
                    <div class="col-md-4 text-center">
                        <div class="bg-light border rounded mb-2 d-flex align-items-center justify-content-center" style="height:160px; overflow: hidden;">
                            <img id="p-img" src="" class="d-none w-100 h-100 shadow-sm" style="object-fit:cover">
                            <i id="p-icon" class="fas fa-camera fa-3x text-muted"></i>
                        </div>
                        <input type="file" class="form-control form-control-sm" accept="image/*" onchange="readImg(this)">
                    </div>
                    <div class="col-md-8 row g-3">
                        <div class="col-12"><label class="form-label">Nome Completo</label><input type="text" id="n-cli" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="tel" id="t-cli" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">CPF/CNPJ</label><input type="text" id="d-cli" class="form-control"></div>
                        <div class="col-12"><label class="form-label">Endereço</label><input type="text" id="e-cli" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Nascimento</label><input type="date" id="na-cli" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Dependentes (Nomes)</label><input type="text" id="dep-cli" class="form-control" placeholder="Ex: Filho, Cônjuge..."></div>
                    </div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100 py-2 fw-bold">SALVAR FICHA</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVen" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-info text-white"><h5 class="modal-title">Venda para <span id="v-nome"></span></h5></div>
            <form id="f-ven">
                <div class="modal-body row g-3">
                    <div class="col-12">
                        <label class="form-label">Operadora / Plano</label>
                        <select id="pv" class="form-select">
                            <optgroup label="Mais Comuns">
                                <option>Hapvida</option>
                                <option>Unimed</option>
                                <option>Bradesco Saúde</option>
                                <option>Amil</option>
                                <option>SulAmérica</option>
                            </optgroup>
                            <optgroup label="Outras Operadoras">
                                <option>Allianz Saúde</option>
                                <option>Sampi (Cofina)</option>
                                <option>Care Plus</option>
                                <option>Golden Cross</option>
                                <option>Intermédica (GNDI)</option>
                                <option>Mediservice</option>
                                <option>Omint</option>
                                <option>Porto Seguro Saúde</option>
                                <option>Prevent Senior</option>
                                <option>Qsaúde</option>
                                <option>Seguros Unimed</option>
                                <option>Sompo Saúde</option>
                                <option>You Saúde</option>
                                <option>OdontoPrev (Odonto)</option>
                                <option>Outro / Particular</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Tipo de Contrato</label>
                        <select id="tv" class="form-select">
                            <option>Individual / Familiar</option>
                            <option>Empresarial (PME)</option>
                            <option>Coletivo por Adesão</option>
                        </select>
                    </div>
                    <div class="col-md-6"><label class="form-label">Valor R$</label><input type="number" id="vv" class="form-control" step="0.01" required></div>
                    <div class="col-md-6"><label class="form-label">Data Venda</label><input type="date" id="dv" class="form-control" required></div>
                    <div class="col-12"><label class="form-label text-danger fw-bold">Data Agendada para Receber</label><input type="date" id="rv" class="form-control border-danger" required></div>
                    <div class="col-12"><label class="form-label">Forma de Pagamento</label><select id="fv" class="form-select"><option>Pix</option><option>Cartão</option><option>Boleto</option><option>Dinheiro</option></select></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-success w-100">CONFIRMAR VENDA</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVerFicha" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Ficha Detalhada</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detalhe-cliente-corpo">
                </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let db_cli = JSON.parse(localStorage.getItem('v5_cli')) || [];
    let db_ven = JSON.parse(localStorage.getItem('v5_ven')) || [];
    let cli_atual = "";

    function showSec(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-'+id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        // Ajuste para pegar o elemento correto no clique
        if(event) {
            const link = event.currentTarget;
            link.classList.add('active');
            document.getElementById('header-title').innerText = link.innerText;
        }
        renderAll();
    }

    function readImg(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = e => {
                document.getElementById('p-img').src = e.target.result;
                document.getElementById('p-img').classList.remove('d-none');
                document.getElementById('p-icon').classList.add('d-none');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function modalCli() { 
        document.getElementById('f-cli').reset();
        document.getElementById('p-img').classList.add('d-none');
        document.getElementById('p-icon').classList.remove('d-none');
        new bootstrap.Modal(document.getElementById('modalCli')).show(); 
    }

    document.getElementById('f-cli').onsubmit = function(e) {
        e.preventDefault();
        db_cli.push({
            id: Date.now(),
            nome: document.getElementById('n-cli').value,
            tel: document.getElementById('t-cli').value,
            doc: document.getElementById('d-cli').value,
            end: document.getElementById('e-cli').value,
            nasc: document.getElementById('na-cli').value,
            dependentes: document.getElementById('dep-cli').value,
            foto: document.getElementById('p-img').src
        });
        localStorage.setItem('v5_cli', JSON.stringify(db_cli));
        this.reset();
        bootstrap.Modal.getInstance(document.getElementById('modalCli')).hide();
        renderAll();
    };

    function verFicha(id) {
        const c = db_cli.find(x => x.id == id);
        if(!c) return;
        const corpo = document.getElementById('detalhe-cliente-corpo');
        corpo.innerHTML = `
            <div class="text-center mb-4">
                <img src="${c.foto || 'https://via.placeholder.com/100'}" class="rounded-circle shadow-sm mb-2" style="width:100px; height:100px; object-fit:cover;">
                <h4 class="fw-bold mb-0">${c.nome}</h4>
                <span class="text-muted">${c.tel}</span>
            </div>
            <table class="table table-sm">
                <tr><th>CPF/CNPJ:</th><td>${c.doc || '---'}</td></tr>
                <tr><th>Nascimento:</th><td>${c.nasc ? c.nasc.split('-').reverse().join('/') : '---'}</td></tr>
                <tr><th>Endereço:</th><td>${c.end || '---'}</td></tr>
                <tr><th>Dependentes:</th><td>${c.dependentes || 'Nenhum'}</td></tr>
            </table>
        `;
        new bootstrap.Modal(document.getElementById('modalVerFicha')).show();
    }

    function abrirVenda(nome) {
        cli_atual = nome;
        document.getElementById('v-nome').innerText = nome;
        new bootstrap.Modal(document.getElementById('modalVen')).show();
    }

    document.getElementById('f-ven').onsubmit = function(e) {
        e.preventDefault();
        db_ven.push({
            id: Date.now(),
            cliente: cli_atual,
            plano: document.getElementById('pv').value,
            tipo: document.getElementById('tv').value,
            valor: parseFloat(document.getElementById('vv').value),
            data: document.getElementById('dv').value,
            receber: document.getElementById('rv').value,
            forma: document.getElementById('fv').value
        });
        localStorage.setItem('v5_ven', JSON.stringify(db_ven));
        bootstrap.Modal.getInstance(document.getElementById('modalVen')).hide();
        renderAll();
    };

    function renderAll() {
        const mes = document.getElementById('filtro-mes').value;
        const hoje = new Date().toISOString().split('T')[0];
        
        // Render Livro
        const lista = document.getElementById('lista-vendas');
        lista.innerHTML = '';
        db_ven.filter(v => v.data.split('-')[1] === mes).forEach(v => {
            const isFuturo = v.receber > hoje;
            lista.innerHTML += `
            <tr>
                <td class="ps-4 text-muted small">${v.data.split('-').reverse().join('/')}</td>
                <td class="fw-bold">${v.cliente}</td>
                <td><small class="d-block fw-bold">${v.plano}</small><small class="text-muted">${v.tipo || ''}</small></td>
                <td class="${isFuturo ? 'alerta-piscante' : 'fw-bold text-success'}">
                    ${isFuturo ? '<i class="fas fa-exclamation-triangle me-1"></i>' : ''} R$ ${v.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                </td>
                <td><span class="badge bg-light text-dark border">${v.forma}</span></td>
                <td class="${isFuturo ? 'text-danger fw-bold' : ''}">${v.receber.split('-').reverse().join('/')}</td>
                <td class="text-end pe-4"><button class="btn-excluir" onclick="delVenda(${v.id})"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });

        // Render Receber
        const gridRec = document.getElementById('lista-cards-receber');
        gridRec.innerHTML = '';
        db_ven.filter(v => v.receber > hoje).forEach(v => {
            gridRec.innerHTML += `
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-3 border-start border-danger border-4">
                    <div class="d-flex justify-content-between">
                        <h6 class="fw-bold text-primary mb-1">${v.cliente}</h6>
                        <span class="badge bg-danger">PENDENTE</span>
                    </div>
                    <p class="mb-1 small">Plano: ${v.plano}</p>
                    <h5 class="alerta-piscante mb-2">R$ ${v.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</h5>
                    <div class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">
                        <small class="text-muted"><i class="far fa-calendar-check me-1"></i> Receber em: <b>${v.receber.split('-').reverse().join('/')}</b></small>
                    </div>
                </div>
            </div>`;
        });

        // Render Clientes
        const gridCli = document.getElementById('grid-clientes');
        gridCli.innerHTML = '';
        db_cli.forEach(c => {
            gridCli.innerHTML += `
            <div class="col-md-4 col-lg-3">
                <div class="card border-0 shadow-sm p-3 text-center h-100">
                    <img src="${c.foto || 'https://via.placeholder.com/80'}" class="foto-perfil mx-auto mb-3 shadow-sm cursor-pointer" onclick="verFicha(${c.id})">
                    <h6 class="fw-bold mb-1 cursor-pointer" onclick="verFicha(${c.id})">${c.nome}</h6>
                    <p class="text-muted small mb-3">${c.tel}</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-sm btn-outline-info" onclick="abrirVenda('${c.nome}')">NOVA VENDA</button>
                        <button class="btn btn-sm btn-light text-danger border-0" onclick="delCli(${c.id})"><i class="fas fa-user-minus me-1"></i> APAGAR CLIENTE</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function delVenda(id) { if(confirm("Apagar esta venda do histórico?")) { db_ven = db_ven.filter(v => v.id !== id); localStorage.setItem('v5_ven', JSON.stringify(db_ven)); renderAll(); } }
    
    function delCli(id) { 
        if(confirm("ATENÇÃO: Isso apagará o cliente e TODO o histórico dele. Confirma?")) { 
            db_cli = db_cli.filter(c => c.id !== id); 
            localStorage.setItem('v5_cli', JSON.stringify(db_cli)); 
            renderAll(); 
        } 
    }

    window.onload = renderAll;
</script>
</body>
</html>
