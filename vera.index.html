<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Empreendedora | Gestão Profissional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --bg-claro: #fffdf2; /* Amarelinho claro solicitado */
            --accent: #f1c40f; 
            --sidebar-color: #2c3e50;
            --danger: #e74c3c;
            --text-dark: #2c3e50;
        }
        
        body { background-color: var(--bg-claro); font-family: 'Segoe UI', sans-serif; color: #444; }
        
        /* Sidebar Customizada */
        .sidebar { background: var(--sidebar-color); min-height: 100vh; width: 260px; position: fixed; color: white; z-index: 1000; transition: all 0.3s; }
        .logo-area { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-area h2 { font-size: 2.2rem; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        .logo-area small { letter-spacing: 3px; text-transform: uppercase; font-size: 0.8rem; display: block; margin-bottom: 15px; }
        
        /* Foto da Vera no Menu */
        .perfil-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .nav-link { color: #bdc3c7; margin: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: var(--text-dark); }

        .main-content { margin-left: 260px; padding: 40px; }
        
        /* Cards e Tabelas Estilo Amarelo */
        .card-caderno { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #f9f1c0; }
        .table thead { background: #fef9e7; color: var(--text-dark); }

        /* Alerta Visual Piscante para Valores Futuros */
        .alerta-piscante { color: var(--danger); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .btn-flutuante { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; border-radius: 50%; font-size: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); z-index: 999; border: none; background: var(--accent); color: var(--text-dark); }
        
        .card-receber { border-left: 5px solid var(--danger); transition: transform 0.2s; }
        .card-receber:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">
        <h2>VERA</h2>
        <small>Empreendedora</small>
        <img src="VERA.jpg" alt="Vera" class="perfil-img">
    </div>
    <ul class="nav flex-column mt-4">
        <li class="nav-item"><a class="nav-link active" onclick="showSec('livro')"><i class="fas fa-list-ul me-2"></i> Livro de Vendas</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('receber')"><i class="fas fa-clock me-2"></i> A Receber</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showSec('clientes')"><i class="fas fa-address-book me-2"></i> Meus Clientes</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <h3 id="page-title" class="fw-bold text-dark">Livro de Vendas</h3>
        <select id="filtro-mes" class="form-select w-auto shadow-sm" onchange="renderAll()">
            <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
            <option value="04" selected>Abril</option><option value="05">Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
            <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
    </header>

    <section id="sec-livro" class="card-caderno p-0 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">Data</th>
                        <th>Cliente</th>
                        <th>Plano</th>
                        <th>Valor</th>
                        <th>Forma</th>
                        <th>Recebimento</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-vendas"></tbody>
            </table>
        </div>
    </section>

    <section id="sec-receber" class="d-none">
        <div class="row g-3" id="grid-receber"></div>
    </section>

    <section id="sec-clientes" class="d-none">
        <div class="row g-4" id="grid-clientes"></div>
    </section>
</div>

<button class="btn-flutuante" onclick="abrirModalCli()"><i class="fas fa-plus"></i></button>

<div class="modal fade" id="modalCli" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0">
            <div class="modal-header bg-warning">
                <h5 class="modal-title fw-bold">Cadastrar Novo Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="form-cli">
                <div class="modal-body row g-3">
                    <div class="col-md-12"><label class="form-label">Nome Completo</label><input type="text" id="c-nome" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="tel" id="c-tel" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">CPF/CNPJ</label><input type="text" id="c-doc" class="form-control"></div>
                    <div class="col-12"><label class="form-label">Endereço</label><input type="text" id="c-end" class="form-control"></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-warning w-100 fw-bold">SALVAR NO BANCO DE DADOS</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Configuração do Firebase (Substitua as chaves se necessário)
    const firebaseConfig = {
        apiKey: "COLOQUE_AQUI",
        authDomain: "COLOQUE_AQUI",
        databaseURL: "https://veraempreendedora-default-rtdb.firebaseio.com",
        projectId: "veraempreendedora",
        storageBucket: "COLOQUE_AQUI",
        messagingSenderId: "COLOQUE_AQUI",
        appId: "COLOQUE_AQUI"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let clientes = [];
    let vendas = [];

    // Sincronização em tempo real
    db.ref('clientes').on('value', snapshot => {
        clientes = [];
        snapshot.forEach(child => { clientes.push({id: child.key, ...child.val()}); });
        renderAll();
    });

    db.ref('vendas').on('value', snapshot => {
        vendas = [];
        snapshot.forEach(child => { vendas.push({id: child.key, ...child.val()}); });
        renderAll();
    });

    function showSec(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
        document.getElementById('sec-'+id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('page-title').innerText = event.currentTarget.innerText;
    }

    function abrirModalCli() { new bootstrap.Modal(document.getElementById('modalCli')).show(); }

    document.getElementById('form-cli').onsubmit = function(e) {
        e.preventDefault();
        const novo = {
            nome: document.getElementById('c-nome').value,
            tel: document.getElementById('c-tel').value,
            doc: document.getElementById('c-doc').value,
            end: document.getElementById('c-end').value
        };
        db.ref('clientes').push(novo);
        this.reset();
        bootstrap.Modal.getInstance(document.getElementById('modalCli')).hide();
    };

    function renderAll() {
        const mes = document.getElementById('filtro-mes').value;
        const hoje = new Date().toISOString().split('T')[0];

        // Tabela de Vendas
        const corpoVendas = document.getElementById('corpo-vendas');
        corpoVendas.innerHTML = '';
        vendas.filter(v => v.data.split('-')[1] === mes).forEach(v => {
            const futuro = v.receber > hoje;
            corpoVendas.innerHTML += `
            <tr>
                <td class="ps-4 small">${v.data.split('-').reverse().join('/')}</td>
                <td class="fw-bold">${v.cliente}</td>
                <td><span class="badge bg-light text-dark border">${v.plano}</span></td>
                <td class="${futuro ? 'alerta-piscante' : 'fw-bold text-success'}">
                    ${futuro ? '<i class="fas fa-bell me-1"></i>' : ''} R$ ${v.valor}
                </td>
                <td>${v.forma}</td>
                <td class="${futuro ? 'text-danger fw-bold' : ''}">${v.receber.split('-').reverse().join('/')}</td>
                <td class="text-center"><button class="btn btn-sm text-danger" onclick="excluirVenda('${v.id}')"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });

        // Aba "A Receber" Individualizado
        const gridRec = document.getElementById('grid-receber');
        gridRec.innerHTML = '';
        vendas.filter(v => v.receber > hoje).forEach(v => {
            gridRec.innerHTML += `
            <div class="col-md-4">
                <div class="card card-receber p-3 shadow-sm border-0">
                    <h6 class="fw-bold text-dark">${v.cliente}</h6>
                    <p class="mb-1 text-muted small">Plano: ${v.plano}</p>
                    <h5 class="alerta-piscante">R$ ${v.valor}</h5>
                    <div class="mt-2 pt-2 border-top">
                        <small class="text-danger"><i class="fas fa-calendar-alt me-1"></i> Receber em: ${v.receber.split('-').reverse().join('/')}</small>
                    </div>
                </div>
            </div>`;
        });

        // Lista de Clientes
        const gridCli = document.getElementById('grid-clientes');
        gridCli.innerHTML = '';
        clientes.forEach(c => {
            gridCli.innerHTML += `
            <div class="col-md-3">
                <div class="card p-3 text-center shadow-sm border-0 h-100">
                    <div class="mx-auto bg-warning-subtle rounded-circle mb-2 d-flex align-items-center justify-content-center" style="width:60px;height:60px">
                        <i class="fas fa-user text-warning fs-4"></i>
                    </div>
                    <h6 class="fw-bold mb-1">${c.nome}</h6>
                    <small class="text-muted d-block mb-3">${c.tel}</small>
                    <div class="d-grid gap-2">
                        <button class="btn btn-sm btn-outline-warning text-dark fw-bold" onclick="alert('Funcionalidade de Venda em breve!')">EFETUAR VENDA</button>
                        <button class="btn btn-sm btn-link text-danger text-decoration-none" onclick="excluirCli('${c.id}')"><i class="fas fa-user-minus"></i> APAGAR CADASTRO</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function excluirVenda(id) { if(confirm("Apagar esta venda permanentemente?")) db.ref('vendas/'+id).remove(); }
    function excluirCli(id) { if(confirm("Apagar este cliente e todos os dados dele?")) db.ref('clientes/'+id).remove(); }

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
