<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Roberto Vasconcelos | Nutrição & Nefrologia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .clinical-header { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .input-label { display: block; font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 0.5rem; margin-left: 0.25rem; }
        .input-clinical { border: 2px solid #e2e8f0; border-radius: 0.75rem; padding: 0.8rem 1rem; font-weight: 600; width: 100%; transition: all 0.3s; background: #fff; }
        .input-clinical:focus { border-color: #10b981; outline: none; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .admin-bg { background-color: #0f172a; }
        .btn-vibrante { background: #10b981; color: white; font-weight: 800; border-radius: 1rem; transition: all 0.3s; text-transform: uppercase; }
        .btn-vibrante:hover { background: #059669; transform: translateY(-1px); }
        .mini-data { font-size: 0.7rem; color: #475569; }
        .label-mini { font-weight: 800; color: #0f172a; text-transform: uppercase; }
    </style>
</head>
<body class="antialiased">

    <header class="clinical-header text-white pt-12 pb-20 px-4 shadow-lg text-center">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase">ROBERTO <span class="text-emerald-200">VASCONCELOS</span></h1>
            <p class="text-emerald-50 font-bold text-sm md:text-lg uppercase mt-2 tracking-widest">Nutricionista Clínico & Nefrologia</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8 mb-20">
        
        <div class="glass-card p-6 md:p-10 mb-10">
            <h2 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-3">
                <i class="fas fa-calendar-alt text-emerald-500"></i> AGENDAR NOVA CONSULTA
            </h2>
            
            <form id="formAgendamento" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2">
                        <label class="input-label">Nome Completo do Paciente</label>
                        <input type="text" id="nome" required class="input-clinical" placeholder="Ex: João da Silva">
                    </div>
                    <div>
                        <label class="input-label">Telefone / WhatsApp</label>
                        <input type="tel" id="whatsapp" required class="input-clinical" placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                    <div>
                        <label class="input-label">Data de Nascimento</label>
                        <input type="date" id="nascimento" required class="input-clinical">
                    </div>
                    <div>
                        <label class="input-label">Cartão CASSI / Convênio</label>
                        <input type="text" id="cassie" required class="input-clinical" placeholder="Nº do cartão">
                    </div>
                    <div>
                        <label class="input-label">Data da Consulta</label>
                        <input type="date" id="dataConsulta" required class="input-clinical" onchange="popularHorarios()">
                    </div>
                    <div>
                        <label class="input-label">Horário Disponível</label>
                        <select id="diaHora" required class="input-clinical">
                            <option value="">Selecione a data primeiro</option>
                        </select>
                    </div>
                </div>

                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                    <div>
                        <label class="input-label">Peso Atual (kg)</label>
                        <input type="number" step="0.1" id="peso" required class="input-clinical" placeholder="0.0" oninput="calcularIMC()">
                    </div>
                    <div>
                        <label class="input-label">Altura (m)</label>
                        <input type="number" step="0.01" id="altura" required class="input-clinical" placeholder="0.00" oninput="calcularIMC()">
                    </div>
                    <div class="bg-emerald-600 text-white p-4 rounded-xl text-center font-black shadow-inner">
                        <span id="boxIMC" class="text-lg">IMC: --</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="input-label">Motivo da Consulta</label>
                        <textarea id="motivo" required class="input-clinical h-28" placeholder="Descreva brevemente..."></textarea>
                    </div>
                    <div>
                        <label class="input-label">Medicações ou Suplementos</label>
                        <textarea id="medicacao" class="input-clinical h-28" placeholder="O que você toma atualmente?"></textarea>
                    </div>
                </div>

                <div class="flex items-center gap-4 bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <i class="fas fa-file-pdf text-blue-500 text-xl"></i>
                    <div class="flex-1">
                        <label class="input-label !mb-0">Anexar Exames (PDF)</label>
                        <input type="file" id="exames" accept="application/pdf" class="text-xs mt-1">
                    </div>
                </div>

                <button type="submit" class="w-full btn-vibrante py-5 text-lg shadow-lg flex items-center justify-center gap-3">
                    CONFIRMAR AGENDAMENTO <i class="fab fa-whatsapp"></i>
                </button>
            </form>
        </div>

        <div class="text-center mb-10">
            <button onclick="acessarAdmin()" class="text-slate-400 font-bold text-xs uppercase tracking-widest hover:text-emerald-600 transition-all">
                <i class="fas fa-lock mr-1"></i> Área Restrita do Profissional
            </button>
        </div>

        <div id="painelAdmin" class="hidden space-y-8">
            <div class="admin-bg rounded-[2rem] p-6 shadow-2xl border-b-4 border-emerald-500">
                <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                    <h3 class="text-white font-black text-xl uppercase">Gestão da Clínica</h3>
                    <div class="flex gap-2">
                        <button onclick="bloquearData()" class="bg-amber-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Bloquear Data</button>
                        <button onclick="location.reload()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Sair</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white p-4 rounded-xl"><p class="text-[10px] font-black text-slate-400 uppercase">Pacientes</p><h4 id="stat_pacientes" class="text-2xl font-black text-slate-800">0</h4></div>
                    <div class="bg-white p-4 rounded-xl"><p class="text-[10px] font-black text-slate-400 uppercase">Receita</p><h4 id="stat_receita" class="text-2xl font-black text-emerald-600">R$ 0,00</h4></div>
                    <div class="bg-white p-4 rounded-xl"><p class="text-[10px] font-black text-slate-400 uppercase">Despesas</p><h4 id="stat_despesas" class="text-2xl font-black text-red-500">R$ 0,00</h4></div>
                    <div class="bg-white p-4 rounded-xl"><p class="text-[10px] font-black text-slate-400 uppercase">Saldo</p><h4 id="stat_saldo" class="text-2xl font-black text-blue-600">R$ 0,00</h4></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-1 bg-slate-800 p-6 rounded-2xl space-y-4">
                        <h4 class="text-white font-black text-xs uppercase border-l-4 border-emerald-400 pl-2">Novo Lançamento</h4>
                        <input type="text" id="gest_desc" class="input-clinical !bg-slate-700 !border-slate-600 !text-white text-sm" placeholder="Descrição">
                        <input type="number" id="gest_valor" class="input-clinical !bg-slate-700 !border-slate-600 !text-white text-sm" placeholder="Valor R$">
                        <input type="date" id="gest_data" class="input-clinical !bg-slate-700 !border-slate-600 !text-white text-sm">
                        <select id="gest_tipo" class="input-clinical !bg-slate-700 !border-slate-600 !text-white text-sm">
                            <option value="receita text-black">Receita</option>
                            <option value="despesa text-black">Despesa</option>
                        </select>
                        <button onclick="salvarFinanceiro()" class="w-full bg-emerald-500 text-white font-black py-3 rounded-lg text-xs uppercase">Registrar</button>
                        <div id="listaFinanceiro" class="max-h-48 overflow-y-auto space-y-2 mt-4"></div>
                    </div>

                    <div class="lg:col-span-2 bg-white rounded-2xl overflow-hidden">
                        <div class="p-4 bg-slate-100 border-b font-black text-xs text-slate-600 uppercase">Próximos Agendamentos</div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                                    <tr>
                                        <th class="p-4">Ficha do Paciente</th>
                                        <th class="p-4">Data/Hora</th>
                                        <th class="p-4 text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="corpoAdmin" class="divide-y"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SENHA_ADMIN = "253641";
        const horariosBase = ["20:00", "20:40", "21:20"];
        const diasPermitidos = [1, 2, 4]; // Seg, Ter, Qui

        let db = JSON.parse(localStorage.getItem('roberto_v10_db')) || [];
        let financeiro = JSON.parse(localStorage.getItem('roberto_v10_fin')) || [];
        let bloqueios = JSON.parse(localStorage.getItem('roberto_v10_bloq')) || [];

        function calcularIMC() {
            const p = parseFloat(document.getElementById('peso').value);
            const a = parseFloat(document.getElementById('altura').value);
            if(p > 0 && a > 0) {
                const imc = (p / (a*a)).toFixed(1);
                document.getElementById('boxIMC').innerText = `IMC: ${imc}`;
                return imc;
            }
            document.getElementById('boxIMC').innerText = `IMC: --`;
            return '--';
        }

        function popularHorarios() {
            const data = document.getElementById('dataConsulta').value;
            const sel = document.getElementById('diaHora');
            sel.innerHTML = '<option value="">Escolha o horário</option>';
            if(!data) return;
            
            const diaS = new Date(data + 'T00:00:00').getDay();
            if(!diasPermitidos.includes(diaS) || bloqueios.includes(data)) {
                alert("Roberto não atende nesta data ou o dia está bloqueado.");
                document.getElementById('dataConsulta').value = "";
                return;
            }

            horariosBase.forEach(h => {
                if(!db.find(x => x.dataConsulta === data && x.horario === h)) {
                    let opt = document.createElement('option');
                    opt.value = h; opt.text = h; sel.add(opt);
                }
            });
        }

        document.getElementById('formAgendamento').onsubmit = async function(e) {
            e.preventDefault();
            const file = document.getElementById('exames').files[0];
            const pdf = file ? await toBase64(file) : null;

            const novo = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                nascimento: document.getElementById('nascimento').value,
                cassie: document.getElementById('cassie').value,
                dataConsulta: document.getElementById('dataConsulta').value,
                horario: document.getElementById('diaHora').value,
                peso: document.getElementById('peso').value,
                altura: document.getElementById('altura').value,
                imc: calcularIMC(),
                motivo: document.getElementById('motivo').value,
                medicacao: document.getElementById('medicacao').value,
                pdf: pdf
            };

            db.push(novo);
            localStorage.setItem('roberto_v10_db', JSON.stringify(db));
            alert("Agendamento realizado com sucesso!");
            location.reload();
        };

        const toBase64 = f => new Promise(r => { let rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); });

        function acessarAdmin() {
            if(prompt("Senha:") === SENHA_ADMIN) {
                document.getElementById('painelAdmin').classList.remove('hidden');
                document.getElementById('gest_data').value = new Date().toISOString().split('T')[0];
                renderAdmin();
            }
        }

        function salvarFinanceiro() {
            const f = {
                id: Date.now(),
                desc: document.getElementById('gest_desc').value,
                valor: parseFloat(document.getElementById('gest_valor').value),
                data: document.getElementById('gest_data').value,
                tipo: document.getElementById('gest_tipo').value
            };
            if(!f.desc || !f.valor) return alert("Preencha descrição e valor.");
            financeiro.push(f);
            localStorage.setItem('roberto_v10_fin', JSON.stringify(financeiro));
            renderAdmin();
        }

        function renderAdmin() {
            const rec = financeiro.filter(x => x.tipo === 'receita').reduce((a,b) => a + b.valor, 0);
            const des = financeiro.filter(x => x.tipo === 'despesa').reduce((a,b) => a + b.valor, 0);
            document.getElementById('stat_pacientes').innerText = db.length;
            document.getElementById('stat_receita').innerText = `R$ ${rec.toFixed(2)}`;
            document.getElementById('stat_despesas').innerText = `R$ ${des.toFixed(2)}`;
            document.getElementById('stat_saldo').innerText = `R$ ${(rec-des).toFixed(2)}`;

            const corpo = document.getElementById('corpoAdmin');
            corpo.innerHTML = "";
            db.sort((a,b) => new Date(a.dataConsulta) - new Date(b.dataConsulta)).forEach(p => {
                corpo.innerHTML += `
                    <tr class="hover:bg-slate-50">
                        <td class="p-4">
                            <div class="font-black text-slate-800 uppercase text-xs">${p.nome}</div>
                            <div class="grid grid-cols-2 gap-x-2 mt-1">
                                <span class="mini-data"><b class="label-mini">Zap:</b> ${p.whatsapp}</span>
                                <span class="mini-data"><b class="label-mini">Nasc:</b> ${p.nascimento.split('-').reverse().join('/')}</span>
                                <span class="mini-data"><b class="label-mini">IMC:</b> ${p.imc}</span>
                                <span class="mini-data"><b class="label-mini">Card:</b> ${p.cassie}</span>
                            </div>
                        </td>
                        <td class="p-4">
                            <div class="text-[10px] font-black">${p.dataConsulta.split('-').reverse().join('/')}</div>
                            <div class="text-emerald-600 font-bold text-xs">${p.horario}</div>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="excluirP(${p.id})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            const listaF = document.getElementById('listaFinanceiro');
            listaF.innerHTML = "";
            financeiro.slice().reverse().forEach(f => {
                listaF.innerHTML += `
                    <div class="bg-slate-700 p-2 rounded text-[10px] flex justify-between items-center text-white">
                        <span>${f.desc} (${f.data.split('-').reverse().slice(0,2).join('/')})</span>
                        <span class="${f.tipo === 'receita' ? 'text-emerald-400' : 'text-red-400'} font-bold">R$ ${f.valor.toFixed(2)}</span>
                    </div>
                `;
            });
        }

        function excluirP(id) { if(confirm("Remover agendamento?")) { db = db.filter(x => x.id !== id); localStorage.setItem('roberto_v10_db', JSON.stringify(db)); renderAdmin(); } }
        function bloquearData() { const d = prompt("Data (AAAA-MM-DD):"); if(d) { bloqueios.push(d); localStorage.setItem('roberto_v10_bloq', JSON.stringify(bloqueios)); alert("Bloqueado!"); } }
        window.onload = () => { document.getElementById('dataConsulta').setAttribute('min', new Date().toISOString().split('T')[0]); };
    </script>
</body>
</html>
