<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Roberto Vasconcelos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .input-style { border: 1.5px solid #e2e8f0; transition: all 0.2s; }
        .input-style:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); outline: none; }
    </style>
</head>
<body class="antialiased">

    <header class="hero-gradient text-white pt-12 pb-28 px-4">
        <div class="max-w-5xl mx-auto text-center">
            <h1 class="text-3xl md:text-5xl font-extralight tracking-tight text-white">
                ROBERTO <span class="font-bold">VASCONCELOS</span>
            </h1>
            <p class="text-blue-300 mt-2 text-lg font-medium tracking-widest uppercase text-xs md:text-sm">
                Nutricionista Clínico & <span class="text-white italic">Nefrologia</span>
            </p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 -mt-16 mb-20">
        <div class="glass-panel rounded-[2.5rem] shadow-2xl p-6 md:p-12 border border-white">
            <div class="mb-10 text-center">
                <h2 class="text-2xl font-bold text-slate-800">Reserva de Consulta Online</h2>
                <div class="h-1 w-20 bg-blue-600 mx-auto mt-2 rounded-full"></div>
            </div>

            <form id="formAgendamento" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="nome" required class="input-style w-full p-4 rounded-2xl bg-white" placeholder="Nome Completo">
                    <input type="date" id="nascimento" required class="input-style w-full p-4 rounded-2xl bg-white text-slate-500">
                    <input type="tel" id="whatsapp" required class="input-style w-full p-4 rounded-2xl bg-white" placeholder="WhatsApp (DDD + Número)">
                    <input type="text" id="cassie" required class="input-style w-full p-4 rounded-2xl bg-white" placeholder="Número do Cartão CASSI">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <select id="diaHora" required class="input-style w-full p-4 rounded-2xl bg-white appearance-none cursor-pointer">
                        <option value="">Selecione o Horário</option>
                    </select>
                    <div class="flex items-center justify-between px-6 py-4 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
                        <span class="text-sm font-semibold text-slate-500">Menor de idade?</span>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="radio" name="menor" value="Sim" class="w-4 h-4 accent-blue-600"> Sim</label>
                            <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="radio" name="menor" value="Não" checked class="w-4 h-4 accent-blue-600"> Não</label>
                        </div>
                    </div>
                </div>

                <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100 group">
                    <label class="block text-blue-800 font-bold mb-3 text-sm flex items-center gap-2">
                        <i class="fas fa-file-pdf"></i> Anexar Exames Bioquímicos (PDF)
                    </label>
                    <input type="file" id="exames" accept="application/pdf" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-6 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                    <p class="text-[10px] text-blue-400 mt-2">*Arquivos muito grandes podem não ser salvos no painel.</p>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl transition-all shadow-xl flex items-center justify-center gap-3 text-lg">
                    CONCLUIR AGENDAMENTO <i class="fab fa-whatsapp"></i>
                </button>
            </form>
        </div>

        <div class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white/50 p-4 rounded-2xl flex items-center gap-3 border border-slate-200">
                <i class="fas fa-video text-blue-600"></i>
                <span class="text-sm text-slate-600">Videochamada via Link</span>
            </div>
            <div class="bg-white/50 p-4 rounded-2xl flex items-center gap-3 border border-slate-200">
                <i class="fas fa-stopwatch text-blue-600"></i>
                <span class="text-sm text-slate-600">Duração: 40 minutos</span>
            </div>
            <div class="bg-white/50 p-4 rounded-2xl flex items-center gap-3 border border-slate-200">
                <i class="fas fa-calendar-check text-blue-600"></i>
                <span class="text-sm text-slate-600">Seg, Ter, Qui | 20h - 22h</span>
            </div>
        </div>

        <div class="mt-20 border-t pt-10 text-center">
            <button onclick="abrirAdmin()" class="text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-blue-600">Acesso Restrito</button>
            
            <div id="painelAdmin" class="hidden mt-8 bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden text-left">
                <div class="bg-slate-900 p-6 flex justify-between items-center">
                    <h3 class="text-white font-bold text-sm uppercase">Lista de Agendamentos</h3>
                    <button onclick="location.reload()" class="bg-red-500 text-white text-[10px] px-3 py-1 rounded-lg">SAIR</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 border-b">
                            <tr class="text-slate-400 text-[10px] uppercase">
                                <th class="p-5 text-left font-black">Horário</th>
                                <th class="p-5 text-left font-black">Paciente</th>
                                <th class="p-5 text-left font-black">Exames</th>
                                <th class="p-5 text-center font-black">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const WHATSAPP_NUM = "55799999978280";
        const SENHA_ADMIN = "253641";
        const horarios = ["20:00", "20:40", "21:20"];
        const dias = ["Segunda-feira", "Terça-feira", "Quinta-feira"];

        let db = JSON.parse(localStorage.getItem('agendamentos_v5')) || [];

        function init() {
            const select = document.getElementById('diaHora');
            select.innerHTML = '<option value="">Selecione o Horário</option>';
            dias.forEach(d => {
                horarios.forEach(h => {
                    const id = `${d} - ${h}`;
                    if(!db.find(a => a.horario === id)) {
                        const opt = document.createElement('option');
                        opt.value = id; opt.textContent = id; select.appendChild(opt);
                    }
                });
            });
        }

        document.getElementById('formAgendamento').onsubmit = async function(e) {
            e.preventDefault();
            const file = document.getElementById('exames').files[0];
            let pdfData = null;

            // Tratamento de Erro do PDF: Limita o tamanho para evitar travamento
            if (file) {
                if (file.size > 2 * 1024 * 1024) { // 2MB
                    alert("O PDF é muito grande para salvar no painel, mas o agendamento será feito!");
                } else {
                    pdfData = await new Promise(res => {
                        const r = new FileReader();
                        r.onload = () => res(r.result);
                        r.readAsDataURL(file);
                    });
                }
            }

            const novo = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                cassie: document.getElementById('cassie').value,
                horario: document.getElementById('diaHora').value,
                pdf: pdfData
            };

            db.push(novo);
            localStorage.setItem('agendamentos_v5', JSON.stringify(db));

            const textoZap = `🦷 *NOVO AGENDAMENTO*\n👤 *Paciente:* ${novo.nome}\n⏰ *Horário:* ${novo.horario}\n📑 *Exames:* ${novo.pdf ? 'Anexado' : 'Não enviado'}`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUM}&text=${encodeURIComponent(textoZap)}`);
            
            alert("Agendamento Enviado!");
            location.reload();
        };

        function abrirAdmin() {
            if(prompt("Senha:") === SENHA_ADMIN) {
                document.getElementById('painelAdmin').classList.remove('hidden');
                renderAdmin();
            }
        }

        function renderAdmin() {
            const lista = document.getElementById('corpoTabela');
            lista.innerHTML = db.length === 0 ? '<tr><td colspan="4" class="p-10 text-center text-slate-400">Nenhum registro.</td></tr>' : '';
            db.forEach(a => {
                lista.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="p-5 font-bold text-blue-700">${a.horario}</td>
                        <td class="p-5">
                            <div class="font-bold">${a.nome}</div>
                            <div class="text-[10px] text-slate-400">ZAP: ${a.whatsapp}</div>
                        </td>
                        <td class="p-5">
                            ${a.pdf ? `<button onclick="verPDF('${a.id}')" class="bg-red-50 text-red-600 px-3 py-1 rounded-full text-[10px] font-bold border border-red-100 hover:bg-red-600 hover:text-white">ABRIR PDF</button>` : '--'}
                        </td>
                        <td class="p-5 text-center">
                            <button onclick="excluir(${a.id})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        // FUNÇÃO CORRIGIDA PARA ABRIR O PDF
        window.verPDF = function(id) {
            const registro = db.find(a => a.id == id);
            if (registro && registro.pdf) {
                const win = window.open();
                win.document.write('<iframe src="' + registro.pdf + '" frameborder="0" style="border:0; top:0px; left:0px; bottom:0px; right:0px; width:100%; height:100%;" allowfullscreen></iframe>');
            } else {
                alert("Arquivo não disponível.");
            }
        };

        function excluir(id) {
            if(confirm("Liberar este horário?")) {
                db = db.filter(a => a.id !== id);
                localStorage.setItem('agendamentos_v5', JSON.stringify(db));
                renderAdmin();
                init();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
