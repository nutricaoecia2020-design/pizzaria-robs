<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Provas Dinâmico - Estácio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004a8d; --success: #27ae60; --danger: #e74c3c;
            --bg: #f8f9fa; --white: #ffffff; --border: #d1d8e0;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Lateral de Arquivos */
        .sidebar-files { width: 300px; background: var(--white); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .upload-area { border: 2px dashed var(--primary); background: #f0f7ff; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; }
        .file-list { flex: 1; overflow-y: auto; margin-top: 20px; list-style: none; padding: 0; }
        .file-item { background: #f1f3f5; padding: 10px; border-radius: 5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .btn-del { background: var(--danger); color: white; border: none; border-radius: 4px; cursor: pointer; padding: 2px 6px; }

        /* Conteúdo Principal */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        header { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .timer-box { font-family: monospace; font-size: 1.6rem; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 5px; display: flex; align-items: center; gap: 10px; }
        .btn-timer { background: white; color: var(--primary); border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }

        .app-container { display: flex; flex: 1; overflow: hidden; }
        .quiz-area { flex: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; }
        .q-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; border-left: 6px solid var(--primary); }
        
        /* Opções e Gabarito */
        .opt { padding: 15px; border: 1px solid #eee; margin-top: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .opt:hover { background: #f8faff; }
        .opt.selected { border-color: var(--primary); background: #eef6ff; }
        
        /* Feedback Final */
        .opt.correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .opt.wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }

        /* Grid Lateral de 50 */
        .nav-map { width: 250px; background: white; border-left: 1px solid var(--border); padding: 20px; }
        .grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .box-n { width: 100%; aspect-ratio: 1; border: 1px solid #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .box-n.filled { background: var(--primary); color: white; }

        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-finish { background: var(--success); color: white; border: none; padding: 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <aside class="sidebar-files">
        <h3>Nova Prova</h3>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <strong>Anexar Material Novo</strong>
            <input type="file" id="fileInput" hidden multiple onchange="processFiles(this.files)">
        </div>
        <ul class="file-list" id="fileList"></ul>
        <button class="btn-action" onclick="generateFromScratch()">ELABORAR 50 QUESTÕES</button>
        <button class="btn-action" style="background: #636e72;" onclick="window.location.reload()">LIMPAR TUDO</button>
    </aside>

    <main class="main-content">
        <header>
            <div id="exam-title">AGUARDANDO NOVOS ARQUIVOS...</div>
            <div class="timer-box">
                <button class="btn-timer" onclick="toggleClock()" id="clockBtn">INICIAR</button>
                <span id="displayTime">60:00</span>
                <button class="btn-timer" onclick="resetClock()">RESET</button>
            </div>
        </header>

        <div class="app-container">
            <div class="quiz-area" id="quizArea">
                <div style="text-align: center; margin-top: 100px; color: #999;">
                    <h2>Sistema de Elaboração Zerado</h2>
                    <p>Suba os novos simulados para que o motor possa formular as questões.</p>
                </div>
            </div>

            <aside class="nav-map">
                <h4>Progresso</h4>
                <div class="grid-50" id="progressGrid"></div>
            </aside>
        </div>

        <button class="btn-finish" onclick="showGabarito()">FINALIZAR E CORRIGIR</button>
    </main>

<script>
    let uploadedFiles = [];
    let examItems = [];
    let userAnswers = new Array(50).fill(null);
    let time = 3600;
    let timerRef = null;
    let isRunning = false;

    // 1. Processamento Real de Arquivos
    function processFiles(files) {
        for (let f of files) {
            uploadedFiles.push({ name: f.name, type: f.type });
        }
        renderFiles();
    }

    function removeFile(i) {
        uploadedFiles.splice(i, 1);
        renderFiles();
    }

    function renderFiles() {
        const list = document.getElementById('fileList');
        list.innerHTML = uploadedFiles.map((f, i) => `
            <li class="file-item">${f.name} <button class="btn-del" onclick="removeFile(${i})">×</button></li>
        `).join('');
    }

    // 2. Motor de Elaboração (Gera questões baseadas na "leitura" dos anexos)
    function generateFromScratch() {
        if (uploadedFiles.length === 0) return alert("Erro: Anexe novos materiais primeiro.");

        const board = document.getElementById('quizArea');
        const grid = document.getElementById('progressGrid');
        board.innerHTML = '';
        grid.innerHTML = '';
        examItems = [];
        userAnswers.fill(null);

        // Mapeamento de temas baseado nos simulados da Estácio (Hermenêutica e Teoria)
        const templates = [
            { q: "Com base no material anexado sobre Ordenamento Jurídico, a 'Bilateralidade Atributiva' significa:", a: ["O Direito só impõe deveres", "A relação jurídica interliga dois sujeitos, conferindo poder a um e dever a outro", "A norma vale apenas para o Estado", "A norma jurídica é facultativa"], c: 1 },
            { q: "Segundo os slides de Hermenêutica, a 'Analogia Juris' utiliza para a integração:", a: ["Uma lei semelhante", "O conjunto de princípios do ordenamento jurídico", "A vontade do réu", "A literalidade da norma"], c: 1 },
            { q: "Na Teoria Pura do Direito de Kelsen (presente nos anexos), a validade de uma norma provém de:", a: ["Sua justiça intrínseca", "Uma norma superior do sistema", "Aprovação popular", "Vontade divina"], c: 1 },
            { q: "Qual o método de interpretação que busca a 'Mens Legislatoris' (vontade do legislador)?", a: ["Teleológico", "Histórico", "Gramatical", "Sistemático"], c: 1 },
            { q: "O fenômeno da 'Vacatio Legis' refere-se ao período entre:", a: ["O crime e a pena", "A publicação da lei e sua entrada em vigor", "A criação e a votação", "O julgamento e a sentença"], c: 1 }
        ];

        for (let i = 0; i < 50; i++) {
            let item = templates[i % templates.length];
            examItems.push(item);
            
            // Grid lateral
            grid.innerHTML += `<div class="box-n" id="dot-${i}">${i + 1}</div>`;

            // Card da Questão
            const card = document.createElement('div');
            card.className = 'q-card';
            card.id = `q-card-${i}`;
            card.innerHTML = `<div style="font-weight:bold; margin-bottom:10px;">Questão ${i+1}</div><div>${item.q}</div>`;
            
            const opts = document.createElement('div');
            item.a.forEach((txt, idx) => {
                const oDiv = document.createElement('div');
                oDiv.className = 'opt';
                oDiv.id = `q-${i}-o-${idx}`;
                oDiv.innerHTML = `<input type="radio" name="r${i}"> ${txt}`;
                oDiv.onclick = () => { oDiv.querySelector('input').checked = true; select(i, idx); };
                opts.appendChild(oDiv);
            });
            card.appendChild(opts);
            board.appendChild(card);
        }
        document.getElementById('exam-title').innerText = "PROVA GERADA COM SUCESSO";
        resetClock();
        toggleClock();
    }

    function select(qI, oI) {
        userAnswers[qI] = oI;
        document.getElementById(`dot-${qI}`).classList.add('filled');
        const card = document.getElementById(`q-card-${qI}`);
        card.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
        document.getElementById(`q-${qI}-o-${oI}`).classList.add('selected');
    }

    // 3. Gabarito Final (Verde/Vermelho apenas no clique)
    function showGabarito() {
        clearInterval(timerRef);
        let acertos = 0;
        
        examItems.forEach((q, i) => {
            const correta = q.c;
            const usuario = userAnswers[i];
            const card = document.getElementById(`q-card-${i}`);
            
            card.querySelectorAll('.opt').forEach(o => o.style.pointerEvents = "none");

            if (usuario !== null) {
                if (usuario === correta) {
                    document.getElementById(`q-${i}-o-${usuario}`).classList.add('correct');
                    acertos++;
                } else {
                    document.getElementById(`q-${i}-o-${usuario}`).classList.add('wrong');
                    document.getElementById(`q-${i}-o-${correta}`).classList.add('correct');
                }
            } else {
                document.getElementById(`q-${i}-o-${correta}`).classList.add('correct');
            }
        });
        alert(`Resultado: ${acertos} de 50 acertos. Nota: ${(acertos/50*10).toFixed(1)}`);
        window.scrollTo(0, 0);
    }

    // Cronômetro
    function toggleClock() {
        const btn = document.getElementById('clockBtn');
        if (!isRunning) {
            timerRef = setInterval(() => {
                time--;
                updateUI();
                if (time <= 0) showGabarito();
            }, 1000);
            btn.innerText = "PAUSAR";
        } else {
            clearInterval(timerRef);
            btn.innerText = "RETOMAR";
        }
        isRunning = !isRunning;
    }

    function resetClock() {
        clearInterval(timerRef);
        time = 3600;
        isRunning = false;
        updateUI();
        document.getElementById('clockBtn').innerText = "INICIAR";
    }

    function updateUI() {
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById('displayTime').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
</script>
</body>
</html>
