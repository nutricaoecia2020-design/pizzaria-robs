<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Avaliação Acadêmica - Estácio</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f9;
            --sidebar-bg: #ffffff;
            --primary: #004a8d;
            --success: #27ae60;
            --text-dark: #2c3e50;
            --border: #dcdde1;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar de Navegação */
        .sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .sidebar h2 { font-size: 1.2rem; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; overflow-y: auto; padding-right: 5px; }
        .nav-item { 
            width: 100%; aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; font-size: 0.85rem; 
            font-weight: 600; cursor: pointer; transition: 0.2s; background: #fff; color: var(--text-dark);
        }
        .nav-item.answered { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .nav-item:hover { border-color: var(--primary); color: var(--primary); }

        /* Área Principal */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        header { 
            background: var(--primary); color: white; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center; font-weight: 600;
        }

        .timer { font-family: monospace; font-size: 1.5rem; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 5px; }

        .quiz-container { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        
        .question-card { 
            background: white; border-radius: 8px; padding: 30px; margin-bottom: 40px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid var(--primary);
        }
        .question-card p { font-size: 1.1rem; line-height: 1.6; color: var(--text-dark); margin-top: 0; }

        .options-list { list-style: none; padding: 0; }
        .option { 
            border: 1px solid var(--border); border-radius: 6px; padding: 12px 15px; 
            margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; transition: 0.2s;
        }
        .option:hover { background: #f8f9fa; border-color: var(--primary); }
        .option.selected { border-color: var(--primary); background: #eef5ff; }
        .option input { margin-right: 15px; accent-color: var(--primary); pointer-events: none; }

        footer { padding: 20px 40px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
        .btn-finish { background: var(--success); color: white; border: none; padding: 12px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* Modal Resultado */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 50px; border-radius: 15px; text-align: center; max-width: 400px; }
        .grade { font-size: 4rem; color: var(--primary); font-weight: 800; margin: 10px 0; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Progresso</h2>
        <div class="nav-grid" id="nav-grid">
            </div>
        <div style="margin-top: auto; padding-top: 20px; font-size: 0.8rem; color: #7f8c8d;">
            Verde: Respondida <br>
            Branco: Pendente
        </div>
    </aside>

    <main class="main-content">
        <header>
            <div>INTRODUÇÃO AO ESTUDO DO DIREITO - PROVA FINAL</div>
            <div class="timer" id="timer">60:00</div>
        </header>

        <div class="quiz-container" id="quiz-container">
            </div>

        <footer>
            <button class="btn-finish" onclick="showResult()">Finalizar Avaliação</button>
        </footer>
    </main>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>Resultado da Avaliação</h3>
            <div class="grade" id="final-grade">0.0</div>
            <p id="total-hits"></p>
            <button class="btn-finish" style="background: var(--primary); width:100%" onclick="location.reload()">Refazer Prova</button>
        </div>
    </div>

<script>
    // Banco de Dados baseado nos slides (Teoria, Jusnaturalismo, Hermenêutica)
    const db = [
        { q: "Segundo o Conteúdo 1, qual a característica da norma jurídica que impõe o cumprimento sob ameaça de sanção?", a: ["Bilateralidade", "Coercibilidade", "Generalidade", "Abstração"], c: 1 },
        { q: "O Jusnaturalismo clássico fundamenta a validade do Direito em:", a: ["Normas estatais", "Vontade da maioria", "Leis da natureza e razão divina", "Decisões dos juízes"], c: 2 },
        { q: "A 'Teoria Tridimensional do Direito' de Miguel Reale integra:", a: ["Lei, Justiça e Ordem", "Fato, Valor e Norma", "Estado, Povo e Território", "Civil, Penal e Público"], c: 1 },
        { q: "Hans Kelsen, em sua 'Teoria Pura', busca afastar do Direito elementos de:", a: ["Lógica", "Sociologia e Psicologia", "Normatividade", "Sanção"], c: 1 },
        { q: "O que caracteriza o Pós-positivismo (Conteúdo 2)?", a: ["Retorno ao Direito Natural Absoluto", "Separação total entre Direito e Moral", "Centralidade dos princípios e direitos fundamentais", "Fim da jurisdição constitucional"], c: 2 },
        { q: "O brocardo 'In claris cessat interpretatio' é combatido pela hermenêutica moderna porque:", a: ["A clareza é impossível", "Toda norma exige interpretação no contexto", "As leis são inúteis", "O juiz não deve ler a lei"], c: 1 },
        { q: "Uma 'Lacuna Jurídica' ocorre quando (Conteúdo 4):", a: ["A lei é inconstitucional", "Não há norma prevista para o caso concreto", "Existem duas leis conflitantes", "O réu é absolvido"], c: 1 },
        { q: "A interpretação 'Teleológica' busca alcançar:", a: ["O sentido literal das palavras", "A vontade histórica do legislador", "A finalidade e o objetivo social da norma", "A relação com outras leis do sistema"], c: 2 },
        { q: "Qual a função da 'Norma Hipotética Fundamental' em Kelsen?", a: ["Punir criminosos", "Dar validade última ao ordenamento", "Substituir a Constituição", "Controlar a moralidade"], c: 1 },
        { q: "Diferente das regras, os Princípios (Dworkin/Alexy) possuem:", a: ["Aplicação binária", "Dimensão de peso e ponderação", "Menor importância", "Validade temporária"], c: 1 }
    ];

    // Expandir para 50 questões (Simulando variações do conteúdo)
    const questions = [];
    for(let i=0; i<50; i++) {
        let base = db[i % db.length];
        questions.push({...base, id: i});
    }

    let userAnswers = new Array(50).fill(null);
    let timeLeft = 3600;

    // Inicialização
    function init() {
        const grid = document.getElementById('nav-grid');
        const container = document.getElementById('quiz-container');

        questions.forEach((q, i) => {
            // Criar Sidebar
            const navBtn = document.createElement('div');
            navBtn.className = 'nav-item';
            navBtn.id = `nav-${i}`;
            navBtn.innerText = i + 1;
            navBtn.onclick = () => document.getElementById(`q-block-${i}`).scrollIntoView();
            grid.appendChild(navBtn);

            // Criar Questões
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-block-${i}`;
            card.innerHTML = `<p><strong>Questão ${i+1}:</strong> ${q.q}</p>`;
            
            const opts = document.createElement('div');
            opts.className = 'options-list';
            q.a.forEach((opt, optIdx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.id = `q-${i}-opt-${optIdx}`;
                optDiv.innerHTML = `<input type="radio" name="q${i}"> ${opt}`;
                optDiv.onclick = () => selectOption(i, optIdx);
                opts.appendChild(optDiv);
            });
            
            card.appendChild(opts);
            container.appendChild(card);
        });

        startTimer();
    }

    function selectOption(qIdx, optIdx) {
        userAnswers[qIdx] = optIdx;
        
        // Atualiza UI da questão
        const parent = document.getElementById(`q-block-${qIdx}`);
        parent.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
        document.getElementById(`q-${qIdx}-opt-${optIdx}`).classList.add('selected');

        // Atualiza Sidebar
        document.getElementById(`nav-${qIdx}`).classList.add('answered');
    }

    function startTimer() {
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if(timeLeft <= 0) {
                clearInterval(interval);
                showResult();
            }
        }, 1000);
    }

    function showResult() {
        let score = 0;
        questions.forEach((q, i) => {
            if(userAnswers[i] === q.c) score++;
        });

        const grade = ((score / 50) * 10).toFixed(1);
        document.getElementById('final-grade').innerText = grade;
        document.getElementById('total-hits').innerText = `Você acertou ${score} de 50 questões.`;
        document.getElementById('modal').style.display = 'flex';
    }

    window.onload = init;
</script>
</body>
</html>
