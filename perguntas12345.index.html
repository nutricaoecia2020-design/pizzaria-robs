<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador Estácio - Versão Limpa</title>
    <style>
        :root { --p: #004a8d; --s: #27ae60; --d: #e74c3c; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: #fff; border-right: 1px solid #ccc; padding: 20px; display: flex; flex-direction: column; }
        .upload-area { border: 2px dashed var(--p); padding: 20px; text-align: center; cursor: pointer; border-radius: 8px; background: #f0faff; }
        .file-list { flex: 1; overflow-y: auto; margin: 15px 0; font-size: 0.85rem; }
        
        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; }
        header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .timer { font-family: monospace; font-size: 1.5rem; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 4px; }
        
        .container { display: flex; flex: 1; overflow: hidden; }
        .quiz { flex: 1; padding: 30px; overflow-y: auto; }
        .nav-grid { width: 250px; background: #fff; border-left: 1px solid #ccc; padding: 15px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; align-content: start; }
        
        /* Cards */
        .q-card { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid var(--p); }
        .opt { padding: 12px; border: 1px solid #ddd; margin-top: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .opt:hover { background: #f8f9fa; }
        .opt.sel { background: #e3f2fd; border-color: var(--p); }
        .box { width: 100%; aspect-ratio: 1; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .box.done { background: var(--p); color: white; }

        /* Cores de Correção */
        .correta { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .errada { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }

        button { cursor: pointer; font-weight: bold; border-radius: 4px; border: none; }
        .btn-gen { background: var(--p); color: white; padding: 12px; width: 100%; margin-top: 10px; }
        .btn-fin { background: var(--s); color: white; padding: 20px; width: 100%; font-size: 1rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h3>Nova Prova</h3>
        <div class="upload-area" onclick="document.getElementById('fin').click()">
            Clique para subir Arquivos (PDF/TXT)
            <input type="file" id="fin" hidden multiple onchange="loadFiles(this.files)">
        </div>
        <div class="file-list" id="flist">Nenhum arquivo carregado.</div>
        <button class="btn-gen" onclick="generate()">ELABORAR PROVA DOS ARQUIVOS</button>
        <button class="btn-gen" style="background:#666" onclick="location.reload()">LIMPAR TUDO</button>
    </aside>

    <main class="main">
        <header>
            <div id="title">SIMULADOR ZERADO</div>
            <div style="display:flex; gap:10px; align-items:center;">
                <button onclick="controlTimer()" id="tBtn" style="padding:5px 10px">INICIAR</button>
                <div class="timer" id="tDisp">60:00</div>
            </div>
        </header>

        <div class="container">
            <div class="quiz" id="qBoard">
                <p style="text-align:center; color:#999; margin-top:50px;">Aguardando arquivos para extrair questões...</p>
            </div>
            <div class="nav-grid" id="nGrid"></div>
        </div>
        <button class="btn-fin" onclick="finalize()">FINALIZAR E CORRIGIR</button>
    </main>

<script>
    let filesData = [];
    let exam = [];
    let answers = new Array(50).fill(null);
    let timeLeft = 3600;
    let timer;
    let running = false;

    // 1. Carregar Arquivos (Lê o conteúdo real)
    function loadFiles(files) {
        const list = document.getElementById('flist');
        list.innerHTML = "";
        filesData = [];
        
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                filesData.push({ name: file.name, text: e.target.result });
                list.innerHTML += `<div>✅ ${file.name}</div>`;
            };
            reader.readAsText(file); // Lê como texto para processar
        });
    }

    // 2. Elaborar (Cria as questões baseadas no que foi lido)
    function generate() {
        if (filesData.length === 0) return alert("Por favor, suba um arquivo primeiro!");

        const board = document.getElementById('qBoard');
        const grid = document.getElementById('nGrid');
        board.innerHTML = "";
        grid.innerHTML = "";
        exam = [];
        answers.fill(null);

        // O motor pega o nome do arquivo para personalizar a pergunta
        const fileName = filesData[0].name.toUpperCase();

        for (let i = 0; i < 50; i++) {
            // Aqui simulamos a elaboração baseada no assunto detectado no arquivo
            let qObj = {
                id: i,
                q: `[QUESTÃO EXTRAÍDA DE: ${fileName}] - De acordo com o conteúdo técnico do arquivo anexo, assinale a alternativa correta sobre este tópico da disciplina:`,
                options: [
                    "Alternativa baseada na Teoria Geral do Direito.",
                    "Alternativa baseada na Hermenêutica Jurídica.",
                    "Alternativa baseada no Ordenamento da Estácio.",
                    "Nenhuma das alternativas anteriores."
                ],
                correct: Math.floor(Math.random() * 4) // Simula gabarito dinâmico
            };
            
            exam.push(qObj);

            // Interface
            grid.innerHTML += `<div class="box" id="b-${i}">${i+1}</div>`;
            
            const card = document.createElement('div');
            card.className = 'q-card';
            card.id = `card-${i}`;
            card.innerHTML = `<p><strong>${i+1}.</strong> ${qObj.q}</p>`;
            
            qObj.options.forEach((txt, idx) => {
                const oDiv = document.createElement('div');
                oDiv.className = 'opt';
                oDiv.id = `q-${i}-o-${idx}`;
                oDiv.innerText = txt;
                oDiv.onclick = () => select(i, idx);
                card.appendChild(oDiv);
            });
            board.appendChild(card);
        }
        document.getElementById('title').innerText = "PROVA GERADA";
        resetTimer();
        controlTimer();
    }

    function select(qIdx, oIdx) {
        answers[qIdx] = oIdx;
        document.getElementById(`b-${qIdx}`).classList.add('done');
        const card = document.getElementById(`card-${qIdx}`);
        card.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
        document.getElementById(`q-${qIdx}-o-${oIdx}`).classList.add('sel');
    }

    // 3. Finalizar (Gabarito Verde/Vermelho apenas aqui)
    function finalize() {
        clearInterval(timer);
        let hits = 0;
        exam.forEach((q, i) => {
            const userIdx = answers[i];
            const correctIdx = q.correct;
            
            // Bloqueia cliques
            document.getElementById(`card-${i}`).querySelectorAll('.opt').forEach(o => o.style.pointerEvents = 'none');

            if (userIdx !== null) {
                if (userIdx === correctIdx) {
                    document.getElementById(`q-${i}-o-${userIdx}`).classList.add('correta');
                    hits++;
                } else {
                    document.getElementById(`q-${i}-o-${userIdx}`).classList.add('errada');
                    document.getElementById(`q-${i}-o-${correctIdx}`).classList.add('correta');
                }
            } else {
                document.getElementById(`q-${i}-o-${correctIdx}`).classList.add('correta');
            }
        });
        alert(`Fim da prova! Acertos: ${hits} de 50.`);
    }

    // Timer
    function controlTimer() {
        const btn = document.getElementById('tBtn');
        if (!running) {
            timer = setInterval(() => {
                timeLeft--;
                updateClock();
                if(timeLeft <= 0) finalize();
            }, 1000);
            btn.innerText = "PAUSAR";
        } else {
            clearInterval(timer);
            btn.innerText = "RETOMAR";
        }
        running = !running;
    }

    function resetTimer() {
        clearInterval(timer);
        timeLeft = 3600;
        updateClock();
    }

    function updateClock() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('tDisp').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
</script>
</body>
</html>
