<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Provas - Estácio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004a8d; --success: #d4edda; --success-border: #28a745;
            --danger: #f8d7da; --danger-border: #dc3545; --bg: #f8f9fa; --text: #2d3436;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Esquerda - Arquivos */
        .file-sidebar { width: 280px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        .file-sidebar h3 { font-size: 1rem; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .file-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin-top: 10px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; background: #f1f3f5; padding: 8px; border-radius: 5px; margin-bottom: 8px; font-size: 0.85rem; }
        .btn-delete-file { background: none; border: none; color: #e74c3c; cursor: pointer; font-weight: bold; }
        .upload-area { border: 2px dashed #ccc; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; margin-top: 10px; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Controles de Tempo */
        .timer-controls { display: flex; align-items: center; gap: 10px; }
        #timer { font-family: monospace; font-size: 1.5rem; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 5px; }
        .btn-timer { background: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }

        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* Dashboard de Questões (Direita) */
        .progress-sidebar { width: 250px; background: white; border-left: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        .grid-nav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .nav-box { width: 100%; aspect-ratio: 1; border: 1px solid #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .nav-box.done { background: #28a745 !important; color: white; border-color: #28a745; }

        /* Área da Prova */
        .quiz-area { flex: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; }
        .question-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; border-left: 5px solid var(--primary); }
        
        /* Feedback de Cores */
        .option { padding: 15px; border: 1px solid #eee; margin-top: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .option.correct { background-color: var(--success) !important; border-color: var(--success-border) !important; }
        .option.wrong { background-color: var(--danger) !important; border-color: var(--danger-border) !important; }
        .option.disabled { pointer-events: none; opacity: 0.8; }

        .btn-final { background: var(--primary); color: white; border: none; padding: 20px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="file-sidebar">
        <h3>Material da Disciplina</h3>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <small>Clique para anexar PDF/Imagens</small>
            <input type="file" id="fileInput" hidden multiple onchange="handleFiles(this.files)">
        </div>
        <ul class="file-list" id="fileList">
            </ul>
        <button class="btn-timer" style="background: var(--primary); color: white; padding: 15px;" onclick="generateExam()">GERAR PROVA COM ANEXOS</button>
    </aside>

    <main class="main-content">
        <header>
            <div>EXAME DISCIPLINAR: ESTÁCIO</div>
            <div class="timer-controls">
                <button class="btn-timer" onclick="toggleTimer()" id="btnPause">PAUSAR</button>
                <div id="timer">60:00</div>
                <button class="btn-timer" onclick="resetTimer()">RESET</button>
            </div>
        </header>

        <div class="app-body">
            <div class="quiz-area" id="quizArea">
                <div style="text-align: center; margin-top: 100px; color: #666;">
                    <h2>Bem-vindo, Professor.</h2>
                    <p>Anexe os materiais ao lado e clique em "Gerar Prova" para formular as 50 questões.</p>
                </div>
            </div>

            <aside class="progress-sidebar">
                <h3>Progresso</h3>
                <div class="grid-nav" id="gridNav"></div>
            </aside>
        </div>
    </main>

<script>
    // Banco de questões baseado nos slides (Hermenêutica, Kelsen, Reale, Jusnaturalismo)
    const rawDatabase = [
        { q: "Qual o objeto principal da 'Teoria Pura do Direito' de Hans Kelsen?", a: ["Justiça Social", "Norma Jurídica Positiva", "Moralidade Cristã", "Fatos Sociológicos"], c: 1 },
        { q: "A interpretação que busca a finalidade social da norma é chamada de:", a: ["Gramatical", "Histórica", "Teleológica", "Sistemática"], c: 2 },
        { q: "Miguel Reale define o Direito através de quais pilares?", a: ["Lei e Ordem", "Fato, Valor e Norma", "Crime e Castigo", "Estado e Indivíduo"], c: 1 },
        { q: "O conceito de 'Coercibilidade' refere-se a:", a: ["Uso da força para cumprir a norma", "Livre arbítrio", "Educação moral", "Conselhos éticos"], c: 0 },
        { q: "O que caracteriza uma lacuna no ordenamento jurídico?", a: ["Excesso de leis", "Conflito de normas", "Ausência de norma para o caso", "Revogação de lei"], c: 2 }
    ];

    let files = [];
    let timeLeft = 3600;
    let timerRunning = false;
    let timerInterval;
    let currentQuestions = [];

    // Gerenciamento de Arquivos
    function handleFiles(newFiles) {
        for (let file of newFiles) {
            files.push(file.name);
        }
        renderFileList();
    }

    function removeFile(index) {
        files.splice(index, 1);
        renderFileList();
    }

    function renderFileList() {
        const list = document.getElementById('fileList');
        list.innerHTML = '';
        files.forEach((f, i) => {
            list.innerHTML += `<li class="file-item">${f} <button class="btn-delete-file" onclick="removeFile(${i})">×</button></li>`;
        });
    }

    // Cronômetro
    function toggleTimer() {
        const btn = document.getElementById('btnPause');
        if (timerRunning) {
            clearInterval(timerInterval);
            btn.innerText = "INICIAR";
        } else {
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if(timeLeft <= 0) clearInterval(timerInterval);
            }, 1000);
            btn.innerText = "PAUSAR";
        }
        timerRunning = !timerRunning;
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = 3600;
        timerRunning = false;
        updateTimerDisplay();
        document.getElementById('btnPause').innerText = "INICIAR";
    }

    function updateTimerDisplay() {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    // Gerador de Prova
    function generateExam() {
        if (files.length === 0) {
            alert("Por favor, anexe ao menos um arquivo para basear as questões.");
            return;
        }

        const area = document.getElementById('quizArea');
        const grid = document.getElementById('gridNav');
        area.innerHTML = '';
        grid.innerHTML = '';
        currentQuestions = [];

        // Simulando a criação de 50 questões baseadas nos anexos e no DB jurídico
        for (let i = 0; i < 50; i++) {
            let base = rawDatabase[i % rawDatabase.length];
            currentQuestions.push({ ...base, id: i });

            // Renderiza na Grade Lateral
            grid.innerHTML += `<div class="nav-box" id="nav-${i}">${i + 1}</div>`;

            // Renderiza o Card da Questão
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `card-${i}`;
            card.innerHTML = `<p><strong>${i + 1}.</strong> ${base.q}</p>`;

            const optsDiv = document.createElement('div');
            base.a.forEach((opt, idx) => {
                const optEl = document.createElement('div');
                optEl.className = 'option';
                optEl.innerText = opt;
                optEl.onclick = () => checkAnswer(i, idx, base.c, optEl);
                optsDiv.appendChild(optEl);
            });

            card.appendChild(optsDiv);
            area.appendChild(card);
        }
        resetTimer();
        toggleTimer();
    }

    function checkAnswer(qIdx, selectedIdx, correctIdx, element) {
        const card = document.getElementById(`card-${qIdx}`);
        const options = card.querySelectorAll('.option');
        
        options.forEach((opt, idx) => {
            opt.classList.add('disabled');
            if (idx === correctIdx) {
                opt.classList.add('correct'); // Verde claro
            } else if (idx === selectedIdx) {
                opt.classList.add('wrong'); // Vermelho claro
            }
        });

        // Marca na sidebar
        document.getElementById(`nav-${qIdx}`).classList.add('done');
    }
</script>
</body>
</html>
