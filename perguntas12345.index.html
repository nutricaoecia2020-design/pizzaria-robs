<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador IA Estácio - Gerador Direto</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --primary: #004a8d; --success: #27ae60; --danger: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--primary); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .quiz-container { flex: 1; padding: 30px; overflow-y: auto; scroll-behavior: smooth; }
        
        .card { background: #fff; padding: 25px; margin-bottom: 25px; border-radius: 10px; border-left: 8px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .opt { padding: 12px; border: 1px solid #eee; margin-top: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .opt:hover { background: #f1f8ff; }
        .opt.sel { background: #e3f2fd; border-color: var(--primary); font-weight: bold; }
        
        /* Estilos de Correção */
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-finish { background: var(--success); color: white; border: none; padding: 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        
        #status { padding: 10px; border-radius: 4px; font-size: 0.9rem; font-weight: bold; text-align: center; display: none; }
        .loading { background: #fff3cd; color: #856404; display: block !important; }
        input[type="file"], input[type="password"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 style="margin:0; color:var(--primary)">IA Simulador</h2>
        <p style="font-size:0.8rem; color:#666">O sistema lê o PDF e a IA cria a prova.</p>
        
        <label><strong>1. Chave API Gemini:</strong></label>
        <input type="password" id="apiKey" placeholder="Cole sua chave aqui...">
        
        <label><strong>2. Subir PDFs:</strong></label>
        <input type="file" id="pdfFiles" accept="application/pdf" multiple>
        
        <button class="btn-action" onclick="processar()">GERAR 50 QUESTÕES</button>
        
        <div id="status"></div>
        
        <div style="margin-top:auto">
            <button onclick="location.reload()" style="width:100%; border:none; background:#eee; padding:10px; cursor:pointer">RESETAR TUDO</button>
        </div>
    </aside>

    <main class="main">
        <header>
            <div id="headerTitle">AGUARDANDO MATERIAL</div>
            <div id="timer" style="font-family:monospace; font-size:1.4rem">60:00</div>
        </header>

        <div class="quiz-container" id="quizArea">
            <div style="text-align:center; margin-top:100px; color:#999">
                <h3>Instruções:</h3>
                <p>1. Cole sua API Key.<br>2. Selecione seus arquivos PDF.<br>3. Clique em Gerar.</p>
            </div>
        </div>
        
        <button class="btn-finish" onclick="corrigir()">FINALIZAR E CORRIGIR</button>
    </main>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    
    let dadosProva = [];
    let escolhasUsuario = [];

    async function extrairTexto(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        let textoCompleto = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            textoCompleto += content.items.map(s => s.str).join(" ") + " ";
        }
        return textoCompleto;
    }

    async function processar() {
        const key = document.getElementById('apiKey').value;
        const files = document.getElementById('pdfFiles').files;
        const statusDiv = document.getElementById('status');

        if (!key || files.length === 0) return alert("API Key e Arquivos são obrigatórios!");

        statusDiv.style.display = "block";
        statusDiv.className = "loading";
        statusDiv.innerText = "⏳ Extraindo texto e consultando IA...";

        try {
            let textoMaterial = "";
            for (let f of files) { textoMaterial += await extrairTexto(f); }

            // Chama a IA (Modelo 1.5 Flash para velocidade e contexto longo)
            const prompt = `Analise este texto jurídico/acadêmico: "${textoMaterial.substring(0, 20000)}". 
            Gere EXATAMENTE 50 questões de múltipla escolha. 
            Retorne APENAS um JSON puro no formato: 
            [{"q": "Pergunta", "options": ["A", "B", "C", "D"], "correct": 0}]`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const result = await response.json();
            const rawText = result.candidates[0].content.parts[0].text;
            const cleanJson = rawText.replace(/```json|```/g, '').trim();
            
            dadosProva = JSON.parse(cleanJson);
            montarQuiz();
            statusDiv.style.display = "none";
            document.getElementById('headerTitle').innerText = "PROVA GERADA DO MATERIAL";
        } catch (e) {
            console.error(e);
            alert("Erro ao processar. Verifique sua chave ou o tamanho dos arquivos.");
            statusDiv.style.display = "none";
        }
    }

    function montarQuiz() {
        const area = document.getElementById('quizArea');
        area.innerHTML = "";
        escolhasUsuario = new Array(dadosProva.length).fill(null);

        dadosProva.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<p><strong>${i+1}.</strong> ${item.q}</p>`;
            
            item.options.forEach((opt, idx) => {
                const oDiv = document.createElement('div');
                oDiv.className = 'opt';
                oDiv.id = `q-${i}-o-${idx}`;
                oDiv.innerText = opt;
                oDiv.onclick = () => {
                    escolhasUsuario[i] = idx;
                    card.querySelectorAll('.opt').forEach(el => el.classList.remove('sel'));
                    oDiv.classList.add('sel');
                };
                card.appendChild(oDiv);
            });
            area.appendChild(card);
        });
    }

    function corrigir() {
        let nota = 0;
        dadosProva.forEach((q, i) => {
            const user = escolhasUsuario[i];
            const correct = q.correct;
            
            if (user !== null) {
                if (user === correct) {
                    document.getElementById(`q-${i}-o-${user}`).classList.add('correct');
                    nota++;
                } else {
                    document.getElementById(`q-${i}-o-${user}`).classList.add('wrong');
                    document.getElementById(`q-${i}-o-${correct}`).classList.add('correct');
                }
            } else {
                document.getElementById(`q-${i}-o-${correct}`).classList.add('correct');
            }
        });
        alert(`Simulado concluído!\nAcertos: ${nota} de ${dadosProva.length}`);
    }
</script>
</body>
</html>
