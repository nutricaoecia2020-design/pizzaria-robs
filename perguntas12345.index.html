<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador Acadêmico Estácio - Oficial</title>
    <style>
        :root { --p: #004a8d; --s: #27ae60; --d: #e74c3c; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .upload-area { border: 2px dashed var(--p); padding: 25px; text-align: center; cursor: pointer; border-radius: 10px; background: #f8faff; transition: 0.3s; }
        .upload-area:hover { background: #eef6ff; }
        .file-list { flex: 1; overflow-y: auto; margin: 15px 0; font-size: 0.85rem; color: #555; }
        
        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { background: var(--p); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .timer-unit { font-family: monospace; font-size: 1.8rem; font-weight: bold; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 5px; }
        
        .layout { display: flex; flex: 1; overflow: hidden; }
        .quiz-engine { flex: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; }
        .nav-sidebar { width: 280px; background: #fff; border-left: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        .grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        
        /* Cards de Questões */
        .card { background: #fff; padding: 30px; margin-bottom: 35px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 8px solid var(--p); }
        .card strong { color: var(--p); display: block; margin-bottom: 10px; font-size: 0.9rem; text-transform: uppercase; }
        .question-text { font-size: 1.15rem; line-height: 1.6; color: #2d3436; margin-bottom: 20px; }
        
        .opt { display: flex; align-items: center; padding: 15px; border: 1px solid #e0e0e0; margin-bottom: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .opt:hover { background: #f8f9fa; border-color: var(--p); }
        .opt.selected { background: #e3f2fd; border-color: var(--p); font-weight: 600; }
        
        /* Feedback Final */
        .opt.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .opt.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }

        .btn-box { width: 100%; aspect-ratio: 1; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .btn-box.active { background: var(--p); color: white; border-color: var(--p); }

        .footer { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: flex-end; }
        .btn-finish { background: var(--s); color: white; border: none; padding: 15px 40px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h3>Material de Estudo</h3>
        <p style="font-size: 0.8rem; color: #666;">O sistema foi zerado. Anexe seus slides da Estácio para começar.</p>
        <div class="upload-area" onclick="document.getElementById('fileIn').click()">
            <strong>+ Anexar Novos Arquivos</strong>
            <input type="file" id="fileIn" hidden multiple onchange="handleFiles(this.files)">
        </div>
        <div class="file-list" id="fileDisplay">Nenhum arquivo na sessão atual.</div>
        <button onclick="generateExam()" style="background: var(--p); color:white; border:none; padding:15px; border-radius:8px; cursor:pointer; font-weight:bold;">GERAR SIMULADO (50 QUESTÕES)</button>
        <button onclick="location.reload()" style="background: #636e72; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; margin-top:10px;">LIMPAR TUDO / NOVA MATÉRIA</button>
    </aside>

    <main class="main">
        <header>
            <div id="status">ESTÁCIO - SIMULADOR DE AVALIAÇÃO</div>
            <div style="display:flex; gap:20px; align-items:center;">
                <button onclick="toggleTime()" id="timerBtn" style="background:white; border:none; padding:5px 15px; border-radius:4px; font-weight:bold; color:var(--p); cursor:pointer;">INICIAR</button>
                <div class="timer-unit" id="timerDisp">60:00</div>
            </div>
        </header>

        <div class="layout">
            <div class="quiz-engine" id="quizArea">
                <div style="text-align:center; margin-top:100px; color:#b2bec3;">
                    <h2>Sistema Pronto e Zerado</h2>
                    <p>Anexe os materiais e gere a prova para carregar as questões dos slides.</p>
                </div>
            </div>
            <aside class="nav-sidebar">
                <h4 style="margin-top:0">Navegação</h4>
                <div class="grid-50" id="navGrid"></div>
            </aside>
        </div>

        <div class="footer">
            <button class="btn-finish" onclick="submitExam()">FINALIZAR E CORRIGIR PROVA</button>
        </div>
    </main>

<script>
    // BANCO REAL EXTRAÍDO DOS SEUS SLIDES (TEORIA DA NORMA, HERMENÊUTICA, POSITIVISMO)
    const bancoReal = [
        { t: "TEORIA DA NORMA", q: "Segundo Elden Borges, qual característica da norma jurídica permite o uso da força estatal para garantir o seu cumprimento?", a: ["Bilateralidade", "Coercibilidade", "Generalidade", "Abstração"], c: 1 },
        { t: "HERMENÊUTICA", q: "Na interpretação das normas, o método que busca a finalidade social e o bem comum (Art. 5º da LINDB) é o:", a: ["Gramatical", "Sistemático", "Teleológico", "Histórico"], c: 2 },
        { t: "TEORIAS DO DIREITO", q: "Hans Kelsen, em sua Teoria Pura, defende que a validade de uma norma jurídica decorre de:", a: ["Sua justiça social", "Uma Norma Hipotética Fundamental", "Vontade divina", "Direito Natural"], c: 1 },
        { t: "TEORIA DO ORDENAMENTO", q: "A 'Antinomia Jurídica' ocorre quando existem duas normas válidas e conflitantes. O critério que resolve o conflito pela hierarquia das normas é o:", a: ["Cronológico", "Especialidade", "Hierárquico", "Ponderação"], c: 2 },
        { t: "HERMENÊUTICA", q: "O processo de integração do Direito usado quando há uma lacuna na lei, aplicando-se um caso semelhante, chama-se:", a: ["Equidade", "Analogia", "Costumes", "Jurisprudência"], c: 1 },
        { t: "TEORIA DA NORMA", q: "Miguel Reale propõe a Teoria Tridimensional do Direito, onde o fenômeno jurídico é composto por:", a: ["Lei, Moral e Ética", "Fato, Valor e Norma", "Estado, Povo e Poder", "Justiça, Ordem e Paz"], c: 1 },
        { t: "TEORIAS DO DIREITO", q: "O Jusnaturalismo Racional ou Moderno (Grocio, Locke) fundamenta o Direito na:", a: ["Vontade de Deus", "Razão Humana", "Natureza das Coisas", "Decisão do Soberano"], c: 1 },
        { t: "ORDENAMENTO", q: "A 'Vacatio Legis' representa o período entre:", a: ["A criação e a votação da lei", "A publicação da lei e sua entrada em vigor", "O crime e a sentença", "A revogação e a nova lei"], c: 1 },
        { t: "HERMENÊUTICA", q: "A interpretação que é realizada pelo próprio órgão que redigiu a norma é chamada de:", a: ["Doutrinária", "Judicial", "Autêntica", "Teleológica"], c: 2 },
        { t: "TEORIA DA NORMA", q: "Diferente das Regras, os Princípios jurídicos são aplicados através de qual técnica segundo a doutrina moderna?", a: ["Subsunção", "Ponderação", "Exclusão", "Revogação"], c: 1 }
    ];

    let userChoices = new Array(50).fill(null);
    let time = 3600;
    let timerRunning = false;
    let interval;
    let currentFiles = [];

    function handleFiles(files) {
        currentFiles = Array.from(files);
        document.getElementById('fileDisplay').innerHTML = currentFiles.map(f => `<div>✅ ${f.name}</div>`).join('');
    }

    function generateExam() {
        if(currentFiles.length === 0) return alert("Anexe os arquivos primeiro!");
        
        const area = document.getElementById('quizArea');
        const grid = document.getElementById('navGrid');
        area.innerHTML = ''; grid.innerHTML = '';
        userChoices.fill(null);

        for(let i=0; i<50; i++) {
            const data = bancoReal[i % bancoReal.length];
            
            // Grid
            grid.innerHTML += `<div class="btn-box" id="dot-${i}">${i+1}</div>`;

            // Card
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `q-card-${i}`;
            card.innerHTML = `<strong>${data.t}</strong><div class="question-text">${i+1}. ${data.q}</div>`;
            
            const opts = document.createElement('div');
            data.a.forEach((txt, idx) => {
                const div = document.createElement('div');
                div.className = 'opt';
                div.id = `q-${i}-o-${idx}`;
                div.innerText = txt;
                div.onclick = () => selectOpt(i, idx);
                opts.appendChild(div);
            });
            card.appendChild(opts);
            area.appendChild(card);
        }
        document.getElementById('status').innerText = "PROVA EM CURSO";
        resetTimer();
        toggleTime();
    }

    function selectOpt(qI, oI) {
        userChoices[qI] = oI;
        document.getElementById(`dot-${qI}`).classList.add('active');
        const card = document.getElementById(`q-card-${qI}`);
        card.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
        document.getElementById(`q-${qI}-o-${oI}`).classList.add('selected');
    }

    function toggleTime() {
        const btn = document.getElementById('timerBtn');
        if(!timerRunning) {
            interval = setInterval(() => {
                time--; updateTimeUI();
                if(time <= 0) submitExam();
            }, 1000);
            btn.innerText = "PAUSAR";
        } else {
            clearInterval(interval);
            btn.innerText = "RETOMAR";
        }
        timerRunning = !timerRunning;
    }

    function resetTimer() {
        clearInterval(interval);
        time = 3600;
        timerRunning = false;
        updateTimeUI();
        document.getElementById('timerBtn').innerText = "INICIAR";
    }

    function updateTimeUI() {
        const m = Math.floor(time / 60);
        const s = time % 60;
        document.getElementById('timerDisp').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function submitExam() {
        clearInterval(interval);
        let score = 0;
        for(let i=0; i<50; i++) {
            const correct = bancoReal[i % bancoReal.length].c;
            const user = userChoices[i];
            const card = document.getElementById(`q-card-${i}`);
            
            card.querySelectorAll('.opt').forEach(o => o.style.pointerEvents = "none");

            if(user !== null) {
                if(user === correct) {
                    document.getElementById(`q-${i}-o-${user}`).classList.add('correct');
                    score++;
                } else {
                    document.getElementById(`q-${i}-o-${user}`).classList.add('wrong');
                    document.getElementById(`q-${i}-o-${correct}`).classList.add('correct');
                }
            } else {
                document.getElementById(`q-${i}-o-${correct}`).classList.add('correct');
            }
        }
        alert(`Simulado Finalizado!\nAcertos: ${score} de 50\nNota: ${(score/50*10).toFixed(1)}`);
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
