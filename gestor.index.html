<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Robs Pro v4.0 | Light Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #47a9ff; 
            --primary-soft: #eef7ff;
            --bg-main: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        nav { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .logo-area { text-align: center; padding-bottom: 25px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .logo-area h2 { font-size: 20px; font-weight: 700; }
        .logo-area span { color: var(--primary); }
        .nav-item { padding: 12px 16px; cursor: pointer; color: var(--text-dim); border-radius: 8px; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; transition: 0.2s; }
        .nav-item.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }

        main { flex: 1; overflow-y: auto; padding: 30px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .section { display: none; }
        .section.active { display: block; }

        /* Cards de Pedido (Estilo da Imagem 1) */
        .grid-pedidos { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        .order-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); border-top: 6px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .order-header { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: bold; }
        .order-body { padding: 15px; }
        .info-linha { margin-bottom: 12px; }
        .info-linha strong { font-size: 11px; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 2px; }
        .info-linha span { font-weight: 600; font-size: 14px; }
        .item-list { background: #fdfdfd; padding: 12px; border-radius: 8px; border: 1px solid #f1f5f9; border-left: 4px solid #ff9800; margin: 10px 0; }

        /* Estilo Botões */
        .btn { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; font-size: 12px; padding: 6px 12px; }
        .btn-primary { background: var(--primary); color: white; }

        /* Tabelas Financeiro */
        .glass-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 10px; color: var(--text-dim); border-bottom: 2px solid var(--bg-main); font-size: 12px; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }

        /* Cardápio (Estilo da Imagem 3) */
        .card-menu { background: white; padding: 15px; border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .card-menu h4 { font-size: 14px; text-transform: uppercase; }
        .card-menu .preco { color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>

<nav>
    <div class="logo-area"><h2>ROBS <span>PRO</span></h2></div>
    <div class="nav-item active" onclick="mudarTab('pedidos')"><i class="fas fa-desktop"></i> Monitor</div>
    <div class="nav-item" onclick="mudarTab('caixa')"><i class="fas fa-wallet"></i> Financeiro</div>
    <div class="nav-item" onclick="mudarTab('estoque')"><i class="fas fa-list-ul"></i> Cardápio</div>
    <div style="margin-top: auto; font-size: 11px; color: var(--text-dim); text-align: center;">v4.0 Light Mode 2026</div>
</nav>

<main>
    <div id="pedidos" class="section active">
        <div class="header-top">
            <h2>Monitor de Cozinha</h2>
            <div id="clock" style="font-weight: 600; color: var(--text-dim);">00:00:00</div>
        </div>
        <div class="grid-pedidos" id="lista-pedidos">Carregando fila...</div>
    </div>

    <div id="caixa" class="section">
        <div class="header-top">
            <h2>Relatório do Dia</h2>
            <button class="btn btn-danger" onclick="resetarVendas()"><i class="fas fa-trash"></i> Limpar Financeiro</button>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px;">
            <div class="glass-card" style="text-align:center"><span>Entrada</span><h2 id="total-caixa">R$ 0,00</h2></div>
            <div class="glass-card" style="text-align:center"><span>Pedidos</span><h2 id="qtd-caixa">0</h2></div>
            <div class="glass-card" style="text-align:center"><span>Média</span><h2 id="media-caixa">R$ 0,00</h2></div>
        </div>
        <div class="glass-card">
            <table>
                <thead><tr><th>HORA</th><th>CLIENTE</th><th>TOTAL</th></tr></thead>
                <tbody id="corpo-caixa"></tbody>
            </table>
        </div>
    </div>

    <div id="estoque" class="section">
        <div class="header-top"><h2>Gestão de Cardápio</h2></div>
        <div class="grid-pedidos" id="lista-cardapio-delete"></div>
    </div>
</main>

<script>
    // Configurações Firebase & Supabase
    const firebaseConfig = {
        apiKey: "AIzaSyAjzwX_sPyZOvZzcJc9ynBSbBN5uazaCHU",
        authDomain: "robs-pizzariadelivery.firebaseapp.com",
        projectId: "robs-pizzariadelivery",
        storageBucket: "robs-pizzariadelivery.firebasestorage.app",
        messagingSenderId: "847851003409",
        appId: "1:847851003409:web:7f3ed9f7089d4c61861bb0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const _supa = supabase.createClient('https://gsvvyktjeqlmhspqzppy.supabase.co', 'sb_publishable_0lVSMGWIIYBvwu_iWWWPKw_qvoAHjOs');

    let vendasDoDia = JSON.parse(localStorage.getItem('vendas_robs')) || [];

    function mudarTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'estoque') carregarItensCardapio();
        if(id === 'caixa') renderizarCaixa();
    }

    // Monitor Firebase
    db.collection("pedidos").orderBy("data", "desc").onSnapshot(snap => {
        const container = document.getElementById("lista-pedidos");
        container.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            const hora = p.data?.toDate ? p.data.toDate().toLocaleTimeString() : new Date().toLocaleTimeString();
            container.innerHTML += `
                <div class="order-card">
                    <div class="order-header"><span>#${doc.id.substring(0,5).toUpperCase()}</span><span>${hora}</span></div>
                    <div class="order-body">
                        <div class="info-linha"><strong>👤 Cliente</strong><span>${p.cliente}</span></div>
                        <div class="info-linha"><strong>📍 Endereço</strong><span>${p.endereco || 'Retirada'}</span></div>
                        <div class="item-list"><strong>🍕 Itens:</strong><br>${p.produtos.replace(/\n/g, '<br>')}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px">
                            <h2 style="color:var(--primary)">R$ ${p.total}</h2>
                            <button class="btn btn-success" onclick="finalizarPedido('${doc.id}', '${p.cliente}', '${p.total}', '${hora}')">CONCLUIR</button>
                        </div>
                    </div>
                </div>`;
        });
    });

    function finalizarPedido(id, cliente, total, hora) {
        vendasDoDia.push({ cliente, total: parseFloat(total), hora });
        localStorage.setItem('vendas_robs', JSON.stringify(vendasDoDia));
        db.collection("pedidos").doc(id).delete();
        renderizarCaixa();
    }

    function renderizarCaixa() {
        const corpo = document.getElementById('corpo-caixa');
        let total = 0;
        corpo.innerHTML = vendasDoDia.slice().reverse().map(v => {
            total += v.total;
            return `<tr><td>${v.hora}</td><td>${v.cliente}</td><td>R$ ${v.total.toFixed(2)}</td></tr>`;
        }).join('');
        document.getElementById('total-caixa').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('qtd-caixa').innerText = vendasDoDia.length;
        const media = vendasDoDia.length ? total / vendasDoDia.length : 0;
        document.getElementById('media-caixa').innerText = `R$ ${media.toFixed(2)}`;
    }

    function resetarVendas() {
        if(confirm("Apagar todos os registros de entrada de hoje?")) {
            vendasDoDia = [];
            localStorage.removeItem('vendas_robs');
            renderizarCaixa();
        }
    }

    // Cardápio Supabase
    async function carregarItensCardapio() {
        const { data } = await _supa.from('produtos').select('*');
        const container = document.getElementById('lista-cardapio-delete');
        container.innerHTML = data.map(item => `
            <div class="card-menu">
                <h4>${item.nome}</h4>
                <span class="preco">R$ ${item.preco}</span>
                <button class="btn btn-danger" onclick="removerDoBanco(${item.id})">Remover</button>
            </div>
        `).join('');
    }

    async function removerDoBanco(id) {
        if(confirm("Remover este item definitivamente do cardápio?")) {
            await _supa.from('produtos').delete().eq('id', id);
            carregarItensCardapio();
        }
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
