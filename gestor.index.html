<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Robs v4.1 - Estável</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --sidebar: #222d32; --sidebar-h: #1a2226; --accent: #00c0ef; --bg: #f4f6f9;
            --c-green: #00a65a; --c-orange: #f39c12; --c-red: #dd4b39; --c-blue: #0073b7;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Menu Lateral */
        nav { width: 230px; background: var(--sidebar); color: #b8c7ce; display: flex; flex-direction: column; }
        .nav-header { padding: 20px; background: #1a2226; text-align: center; color: white; font-weight: bold; border-bottom: 1px solid #444; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-h); color: white; border-left-color: var(--accent); }

        main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .top-bar { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .content { padding: 20px; }

        /* Cards Estilo Imagem */
        .dash-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { color: white; padding: 20px; border-radius: 4px; position: relative; }
        .stat-box h3 { margin: 0; font-size: 24px; }
        .stat-box i { position: absolute; right: 15px; top: 15px; font-size: 30px; opacity: 0.3; }

        .section { display: none; }
        .section.active { display: block; }

        /* Componentes */
        .panel { background: white; border-top: 3px solid #d2d6de; border-radius: 3px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .panel-header { padding: 10px 15px; border-bottom: 1px solid #f4f4f4; font-weight: bold; }
        .panel-body { padding: 15px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #eee; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid #f4f4f4; font-size: 13px; }

        /* Mesas */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 5px; }
        .mesa { padding: 12px 0; border-radius: 4px; text-align: center; cursor: pointer; color: white; font-weight: bold; font-size: 11px; }
        .mesa.livre { background: var(--c-green); }
        .mesa.ocupada { background: var(--c-red); }
        .mesa.selecionada { outline: 3px solid var(--accent); }

        .btn { border: none; padding: 10px; border-radius: 3px; cursor: pointer; font-weight: bold; color: white; }
        input { padding: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }

        @media print {
            body * { visibility: hidden; }
            #cupom-fiscal, #cupom-fiscal * { visibility: visible; }
            #cupom-fiscal { display: block !important; position: absolute; left:0; top:0; width: 100%; }
        }
    </style>
</head>
<body>

<div id="cupom-fiscal" style="display:none; font-family: monospace; padding: 20px;">
    <center><h2>PIZZARIA ROBS</h2><p id="c-data"></p></center>
    <hr><div id="c-lista"></div><hr>
    <h3 id="c-total"></h3>
</div>

<nav>
    <div class="nav-header">GESTOR ROBS</div>
    <div class="nav-item active" onclick="mudarTab('dash', this)"><i class="fas fa-home"></i> Dashboard</div>
    <div class="nav-item" onclick="mudarTab('monitor', this)"><i class="fas fa-list"></i> Pedidos</div>
    <div class="nav-item" onclick="mudarTab('pdv', this)"><i class="fas fa-cash-register"></i> Frente de Caixa</div>
    <div class="nav-item" onclick="mudarTab('estoque', this)"><i class="fas fa-box"></i> Cardápio</div>
</nav>

<main>
    <div class="top-bar">
        <h2 id="titulo-pagina">Dashboard</h2>
        <div id="relogio"></div>
    </div>

    <div class="content">
        <div class="dash-row">
            <div class="stat-box" style="background: var(--c-green);"><h3 id="st-vendas">R$ 0,00</h3><p>VENDAS HOJE</p><i class="fas fa-dollar-sign"></i></div>
            <div class="stat-box" style="background: var(--c-orange);"><h3 id="st-pedidos">0</h3><p>PEDIDOS MONITOR</p><i class="fas fa-shopping-cart"></i></div>
            <div class="stat-box" style="background: var(--c-blue);"><h3 id="st-mesas">0</h3><p>MESAS OCUPADAS</p><i class="fas fa-utensils"></i></div>
        </div>

        <div id="monitor" class="section">
            <div id="grid-pedidos" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:15px;"></div>
        </div>

        <div id="pdv" class="section">
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
                <div>
                    <div class="panel">
                        <div class="panel-header">Mapa de Mesas</div>
                        <div class="panel-body"><div class="grid-mesas" id="container-mesas"></div></div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">Itens - <span id="label-mesa">Balcão</span></div>
                        <div class="panel-body">
                            <div style="display:flex; gap:10px; margin-bottom:10px;">
                                <input type="text" id="busca-p" placeholder="Produto...">
                                <input type="number" id="qtd-p" value="1" style="width:70px">
                                <button class="btn" style="background:var(--c-blue)" onclick="adicionarAoPDV()">ADD</button>
                            </div>
                            <table>
                                <thead><tr><th>Item</th><th>Qtd</th><th>Total</th><th>#</th></tr></thead>
                                <tbody id="lista-pdv"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="panel" style="background:var(--sidebar); color:white;">
                    <div class="panel-body">
                        <p>TOTAL</p>
                        <h1 id="total-pdv" style="color:var(--accent); font-size:40px;">R$ 0,00</h1>
                        <button class="btn" style="background:var(--c-green); width:100%; padding:15px; margin-top:20px;" onclick="fecharVenda()">FINALIZAR (F2)</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="dash" class="section active">
            <div class="panel">
                <div class="panel-header">Vendas Recentes</div>
                <div class="panel-body">
                    <table>
                        <thead><tr><th>Hora</th><th>Origem</th><th>Valor</th></tr></thead>
                        <tbody id="lista-caixa"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="estoque" class="section">
            <div class="panel">
                <div class="panel-header">Cadastrar Produto</div>
                <div class="panel-body">
                    <input type="text" id="cad-nome" placeholder="Nome" style="margin-bottom:10px">
                    <input type="number" id="cad-preco" placeholder="Preço" style="margin-bottom:10px">
                    <button class="btn" style="background:var(--c-green)" onclick="salvarProduto()">CADASTRAR</button>
                </div>
            </div>
        </div>
    </div>
</main>

<audio id="alerta" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    // 1. CONFIGURAÇÕES
    const firebaseConfig = {
        apiKey: "AIzaSyAjzwX_sPyZOvZzcJc9ynBSbBN5uazaCHU",
        authDomain: "robs-pizzariadelivery.firebaseapp.com",
        projectId: "robs-pizzariadelivery",
        storageBucket: "robs-pizzariadelivery.firebasestorage.app",
        messagingSenderId: "847851003409",
        appId: "1:847851003409:web:7f3ed9f7089d4c61861bb0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const _supa = supabase.createClient('https://gsvvyktjeqlmhspqzppy.supabase.co', 'sb_publishable_0lVSMGWIIYBvwu_iWWWPKw_qvoAHjOs');

    // 2. ESTADO
    let mesaSel = null; 
    let statusMesas = JSON.parse(localStorage.getItem('mesas_v4')) || Array.from({length: 20}, () => ({ itens: [] }));
    let vendaBalcao = [];
    let historico = JSON.parse(localStorage.getItem('caixa_v4')) || [];

    // 3. NAVEGAÇÃO
    function mudarTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        document.getElementById('titulo-pagina').innerText = el.innerText;
        if(id === 'pdv') renderMesas();
    }

    // 4. MONITOR FIREBASE
    db.collection("pedidos").orderBy("data", "desc").onSnapshot(snap => {
        const cont = document.getElementById("grid-pedidos");
        cont.innerHTML = "";
        document.getElementById('st-pedidos').innerText = snap.size;
        if(!snap.empty) document.getElementById('alerta').play().catch(()=>{});

        snap.forEach(doc => {
            const p = doc.data();
            cont.innerHTML += `
                <div class="panel" style="border-top-color:var(--c-red)">
                    <div class="panel-body">
                        <b>${p.cliente}</b><br><small>${p.endereco}</small>
                        <div style="background:#f4f4f4; padding:8px; margin:10px 0; font-size:12px;">${p.produtos}</div>
                        <h4 style="color:var(--c-red)">R$ ${p.total}</h4>
                        <button class="btn" style="background:var(--c-green); width:100%" onclick="baixarPedido('${doc.id}', ${parseFloat(p.total)})">CONCLUIR</button>
                    </div>
                </div>`;
        });
    });

    // 5. PDV E MESAS
    function renderMesas() {
        const cont = document.getElementById('container-mesas');
        cont.innerHTML = `<div class="mesa" style="background:#666; grid-column: span 2" onclick="setMesa(null)">BALCÃO</div>`;
        let ocupadas = 0;
        statusMesas.forEach((m, i) => {
            const isOcupada = m.itens.length > 0;
            if(isOcupada) ocupadas++;
            cont.innerHTML += `<div class="mesa ${isOcupada?'ocupada':'livre'} ${mesaSel===i?'selecionada':''}" onclick="setMesa(${i})">${i+1}</div>`;
        });
        document.getElementById('st-mesas').innerText = ocupadas;
    }

    function setMesa(i) {
        mesaSel = i;
        document.getElementById('label-mesa').innerText = i === null ? "Balcão" : "Mesa " + (i+1);
        renderMesas();
        renderItens();
    }

    async function adicionarAoPDV() {
        const busca = document.getElementById('busca-p').value;
        const qtd = parseFloat(document.getElementById('qtd-p').value);
        if(!busca) return;

        const { data } = await _supa.from('produtos').select('*').ilike('nome', `%${busca}%`);
        if(data && data[0]) {
            const p = data[0];
            const item = { nome: p.nome, preco: p.preco, qtd: qtd, total: p.preco * qtd };
            if(mesaSel === null) vendaBalcao.push(item);
            else statusMesas[mesaSel].itens.push(item);
            
            localStorage.setItem('mesas_v4', JSON.stringify(statusMesas));
            renderItens();
            renderMesas();
            document.getElementById('busca-p').value = "";
        }
    }

    function renderItens() {
        const lista = mesaSel === null ? vendaBalcao : statusMesas[mesaSel].itens;
        const corpo = document.getElementById('lista-pdv');
        corpo.innerHTML = "";
        let total = 0;
        lista.forEach((item, idx) => {
            total += item.total;
            corpo.innerHTML += `<tr><td>${item.nome}</td><td>${item.qtd}</td><td>R$ ${item.total.toFixed(2)}</td><td onclick="removerItem(${idx})" style="color:red; cursor:pointer">X</td></tr>`;
        });
        document.getElementById('total-pdv').innerText = "R$ " + total.toFixed(2);
    }

    function fecharVenda() {
        const lista = mesaSel === null ? vendaBalcao : statusMesas[mesaSel].itens;
        if(lista.length === 0) return;

        const total = lista.reduce((a,b) => a + b.total, 0);
        
        // Impressão
        document.getElementById('c-data').innerText = new Date().toLocaleString();
        document.getElementById('c-lista').innerHTML = lista.map(i => `<div>${i.qtd}x ${i.nome} - R$ ${i.total.toFixed(2)}</div>`).join('');
        document.getElementById('c-total').innerText = "TOTAL: R$ " + total.toFixed(2);
        window.print();

        // Salvar
        historico.push({ valor: total, hora: new Date().toLocaleTimeString(), origem: mesaSel === null ? "Balcão" : "Mesa "+(mesaSel+1) });
        localStorage.setItem('caixa_v4', JSON.stringify(historico));

        if(mesaSel === null) vendaBalcao = [];
        else statusMesas[mesaSel].itens = [];
        
        localStorage.setItem('mesas_v4', JSON.stringify(statusMesas));
        setMesa(null);
        atualizarDash();
    }

    function removerItem(idx) {
        if(mesaSel === null) vendaBalcao.splice(idx, 1);
        else statusMesas[mesaSel].itens.splice(idx, 1);
        localStorage.setItem('mesas_v4', JSON.stringify(statusMesas));
        renderItens();
        renderMesas();
    }

    // 6. DASHBOARD E CADASTRO
    function atualizarDash() {
        const total = historico.reduce((a,b) => a + b.valor, 0);
        document.getElementById('st-vendas').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits:2});
        
        const corpo = document.getElementById('lista-caixa');
        corpo.innerHTML = historico.slice(-10).reverse().map(v => `<tr><td>${v.hora}</td><td>${v.origem}</td><td>R$ ${v.valor.toFixed(2)}</td></tr>`).join('');
    }

    function baixarPedido(id, valor) {
        historico.push({ valor: valor, hora: new Date().toLocaleTimeString(), origem: "iFood/Site" });
        localStorage.setItem('caixa_v4', JSON.stringify(historico));
        db.collection("pedidos").doc(id).delete();
        atualizarDash();
    }

    async function salvarProduto() {
        const nome = document.getElementById('cad-nome').value;
        const preco = document.getElementById('cad-preco').value;
        if(nome && preco) {
            await _supa.from('produtos').insert([{ nome, preco }]);
            alert("Produto Salvo!");
            document.getElementById('cad-nome').value = "";
            document.getElementById('cad-preco').value = "";
        }
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleString(); }, 1000);
    window.onload = () => { atualizarDash(); renderMesas(); };
</script>
</body>
</html>
