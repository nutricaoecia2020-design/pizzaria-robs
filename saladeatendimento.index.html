<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videochamada Particular</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .video-container { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        video { width: 45%; max-width: 400px; background: #000; border-radius: 10px; border: 2px solid #333; }
        .controls { margin-top: 20px; background: #222; padding: 20px; border-radius: 10px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; background: #4f46e5; color: white; font-weight: bold; }
        .btn-copy { background: #22c55e; margin-top: 10px; }
        #status { color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Atendimento por Vídeo</h2>
    <div id="secure-warning" style="display:none; color: gold; padding: 10px;">
        ⚠️ Atenção: Use <b>HTTPS</b> ou <b>Localhost</b> para a câmera funcionar.
    </div>

    <div class="video-container">
        <video id="local-video" autoplay muted playsinline style="transform: scaleX(-1);"></video>
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <input type="text" id="room-input" placeholder="Nome da sala">
        <button onclick="startCall()">Entrar / Iniciar</button>
        <br>
        <button class="btn-copy" onclick="copyRoomLink()">Copiar Link de Convite</button>
        <p id="status">Aguardando ação...</p>
    </div>

    <script>
        let localStream;
        let peer;

        // Verifica se é ambiente seguro
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            document.getElementById('secure-warning').style.display = 'block';
        }

        async function startCall() {
            const roomId = document.getElementById('room-input').value.toLowerCase().trim();
            if (!roomId) return alert("Digite um nome para a sala");

            try {
                // Tenta pegar câmera e áudio
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('status').innerText = "Câmera ativa. Conectando...";

                // Inicializa PeerJS
                peer = new Peer('room-' + roomId);

                peer.on('open', (id) => {
                    document.getElementById('status').innerText = "Na sala: " + roomId;
                    // Tenta ligar para quem já estiver lá
                    const call = peer.call('room-' + roomId, localStream);
                    if(call) handleCall(call);
                });

                peer.on('call', (call) => {
                    call.answer(localStream);
                    handleCall(call);
                });

                peer.on('error', (err) => {
                    if(err.type === 'unavailable-id') {
                        // Se você não for o "dono" da sala, apenas espere ou tente ligar
                        console.log("Sala já tem um dono, aguardando conexão...");
                    }
                });

            } catch (err) {
                console.error(err);
                alert("ERRO DE MÍDIA: Verifique se deu permissão à câmera e se está usando HTTPS.");
            }
        }

        function handleCall(call) {
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
                document.getElementById('status').innerText = "Conectado com outra pessoa!";
            });
        }

        function copyRoomLink() {
            const roomName = document.getElementById('room-input').value;
            if(!roomName) return alert("Digite o nome da sala primeiro");
            
            const url = window.location.origin + window.location.pathname + '?room=' + roomName;
            
            // Método de cópia compatível com mais ambientes
            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            alert("Link copiado: " + url);
        }

        // Auto-carregar se vier link com ?room=
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('room')) {
            document.getElementById('room-input').value = urlParams.get('room');
        }
    </script>
</body>
</html>
